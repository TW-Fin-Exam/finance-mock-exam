var app=document.getElementById('app');
var K_SES='fce.session.v2', K_HIS='fce.history.v2';
var S=null, timerId=null, revealFilter='wrong', sheetOpen=false;

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function fmtT(sec){sec=Math.max(0,Math.round(sec));var m=Math.floor(sec/60),s=sec%60;return (m<10?'0':'')+m+':'+(s<10?'0':'')+s}
function fmtDate(ts){var d=new Date(ts);function p(n){return n<10?'0'+n:n}return (d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes())}
var LS={get:function(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}},del:function(k){try{localStorage.removeItem(k)}catch(e){}}};
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t}return a}
function examById(id){for(var i=0;i<META.exams.length;i++)if(META.exams[i].id===id)return META.exams[i];return null}
function bankOf(id){return (BANK&&BANK[id])||[]}
function LETTER(i){return ['A','B','C','D'][i]}

/* ---------- 抽題：先依科目配額（如常識50+道德50），科目內依主題比例分層隨機 ---------- */
function prepQ(q){
  var perm=shuffle([0,1,2,3]);
  return {id:q.id,subject:q.subject||'',topic:q.topic||'綜合',diff:q.difficulty||2,q:q.q,
    opts:perm.map(function(i){return q.options[i]}),
    exps:perm.map(function(i){return (q.explain&&q.explain[i])||''}),
    ans:perm.indexOf(q.answer), src:q.src||''};
}
function stratSample(pool,n){
  if(n>=pool.length)return shuffle(pool);
  var byT={},keys=[];
  pool.forEach(function(q){var t=q.topic||'綜合';if(!byT[t]){byT[t]=[];keys.push(t)}byT[t].push(q)});
  keys.forEach(function(t){byT[t]=shuffle(byT[t])});
  var out=[],quota={},rem=[];
  keys.forEach(function(t){var exact=n*byT[t].length/pool.length;quota[t]=Math.floor(exact);rem.push([t,exact-quota[t]])});
  rem.sort(function(a,b){return b[1]-a[1]});
  var used=keys.reduce(function(s,t){return s+quota[t]},0);
  for(var i=0;used<n&&i<rem.length;i++,used++)quota[rem[i][0]]++;
  keys.forEach(function(t){out=out.concat(byT[t].slice(0,quota[t]))});
  return shuffle(out).slice(0,n);
}
function drawExam(exam,n,topics){
  var pool=bankOf(exam.id);
  if(topics&&topics.length)pool=pool.filter(function(q){return topics.indexOf(q.topic)>=0});
  var qs=[];
  if(!topics&&exam.splits&&exam.splits.length){ // 正式模擬考依科目配額
    var scale=Math.min(1,n/exam.splits.reduce(function(s,p){return s+p.n},0));
    exam.splits.forEach(function(p){
      var sub=pool.filter(function(q){return q.subject===p.subject});
      qs=qs.concat(stratSample(sub,Math.round(p.n*scale)));
    });
  }else{
    qs=stratSample(pool,n);
  }
  return qs.map(prepQ);
}

/* ---------- Session ---------- */
function newSession(examId,mode,n,topics){
  var exam=examById(examId);
  var qs=drawExam(exam,n,topics);
  S={examId:examId,mode:mode,qs:qs,picked:qs.map(function(){return null}),flags:qs.map(function(){return false}),
     revealed:qs.map(function(){return false}),idx:0,total:qs.length,startTs:Date.now(),
     limitMin:mode==='mock'?exam.min:null,deadline:mode==='mock'?Date.now()+exam.min*60000:null,done:false};
  save();
}
function save(){if(S&&!S.done)LS.set(K_SES,S)}
function answeredCount(){var c=0;S.picked.forEach(function(p){if(p!=null)c++});return c}
function grade(){
  var correct=0;
  S.qs.forEach(function(q,i){if(S.picked[i]===q.ans)correct++});
  var score=Math.round(correct*100/S.total*10)/10;
  return {correct:correct,score:score};
}
function submit(auto){
  clearInterval(timerId);timerId=null;
  var g=grade(),exam=examById(S.examId);
  S.done=true;S.submittedAt=Date.now();S.correct=g.correct;S.score=g.score;
  S.pass=S.mode==='mock'?g.score>=exam.pass:null;
  LS.del(K_SES);
  var his=LS.get(K_HIS,[]);
  his.unshift({examId:S.examId,mode:S.mode,ts:Date.now(),score:g.score,correct:g.correct,total:S.total,
    pass:S.pass,usedSec:Math.round((Date.now()-S.startTs)/1000)});
  LS.set(K_HIS,his.slice(0,60));
  if(auto){openModal('時間到','測驗時間已結束，系統已自動交卷。','<button class="btn btn-pri" data-act="toResults">查看成績</button>');}
  else vResults();
}

function startTimer(){
  clearInterval(timerId);
  function tick(){
    if(!S||S.done)return clearInterval(timerId);
    var left=(S.deadline-Date.now())/1000,el=document.getElementById('tmr');
    if(el){el.textContent=fmtT(left);if(left<=300)el.classList.add('low')}
    if(left<=0){clearInterval(timerId);submit(true)}
  }
  tick();timerId=setInterval(tick,500);
}

function topicStats(){
  var m={},order=[];
  S.qs.forEach(function(q,i){
    var t=(q.subject?q.subject+'｜':'')+q.topic;
    if(!m[t]){m[t]={c:0,n:0};order.push(t)}
    m[t].n++;if(S.picked[i]===q.ans)m[t].c++;
  });
  return order.map(function(t){return{t:t,c:m[t].c,n:m[t].n}});
}

  var h='<div class="'+hueCls(e)+'">';
  h+='<div class="result-hero"><div><div class="score-big"><span class="v num">'+S.score+'</span><span class="d">／100</span></div></div>'

    +'<div class="rmeta"><h2>'+esc(e.name)+'｜'+(mock?'模擬考成績單':'練習結果')+'</h2>'
    +'<div class="row"><span class="chip">答對 <b class="num">'+S.correct+'</b>／'+S.total+' 題</span><span class="chip">答錯 <b class="num">'+wrong+'</b> 題</span><span class="chip">未答 <b class="num">'+skip+'</b> 題</span><span class="chip">用時 <b class="num">'+fmtT(used)+'</b></span>'+(mock?'<span class="chip">及格標準 <b class="num">'+e.pass+'</b> 分</span>':'')+'</div>'
    +(e.passNote&&mock?'<p class="rnote">'+esc(e.passNote)+'</p>':'')+'</div></div>';
  var st=topicStats();
  h+='<div class="tstats"><h3>各主題答對率</h3>';
  st.forEach(function(r){
    var p=Math.round(r.c*100/r.n);
    var col=p>=70?'var(--ok)':(p>=50?'#C48A1F':'var(--bad)');
    h+='<div class="trow"><span class="lbl" title="'+esc(r.t)+'">'+esc(r.t)+'</span><span class="track"><span class="fill" style="width:'+p+'%;background:'+col+'"></span></span><span class="pct num">'+r.c+'/'+r.n+'（'+p+'%）</span></div>';
  });
  h+='</div><div class="racts">'
    +'<button class="btn btn-pri btn-lg" data-act="review" data-f="wrong">錯題檢討（'+wrongAll+'）</button>'
    +'<button class="btn btn-ghost btn-lg" data-act="review" data-f="all">全部題目檢討</button>'
    +'<button class="btn btn-ghost btn-lg" data-act="again">再測一次（重新抽題）</button>'
    +'<button class="btn btn-ghost btn-lg" data-act="home">回首頁</button></div></div>';
  setHTML(h);
}

function vReview(){
  var e=examById(S.examId);
  var idxs=[];
  S.qs.forEach(function(q,i){
    var ok=S.picked[i]===q.ans;
    if(revealFilter==='all'||!ok)idxs.push(i);
  });
  var h='<div class="'+hueCls(e)+'"><div class="rev-top"><button class="btn btn-ghost btn-sm" data-act="toResults">← 回成績單</button>'
    +'<b style="font-size:14px">'+esc(e.short)+'｜題目檢討</b><span style="flex:1"></span>'
    +'<div class="tabs"><button class="'+(revealFilter==='wrong'?'on':'')+'" data-act="rf" data-f="wrong">只看錯題</button><button class="'+(revealFilter==='all'?'on':'')+'" data-act="rf" data-f="all">全部題目</button></div></div>';
  if(!idxs.length)h+='<div class="panel" style="text-align:center"><h2>全數答對！</h2><p class="notice">本次作答沒有錯題，繼續保持。</p><button class="btn btn-pri" data-act="toResults">回成績單</button></div>';
  idxs.forEach(function(i){
    var q=S.qs[i],picked=S.picked[i],ok=picked===q.ans;
    h+='<div class="rcard '+(ok?'correct-card':'wrong-card')+'"><div class="rhead"><span class="qno num" style="font-size:15px">第 '+(i+1)+' 題</span>'
      +'<span class="st '+(picked==null?'skip">未作答':(ok?'ok">答對':'bad">答錯'))+'</span>'
      +(q.subject?'<span class="qtag">'+esc(q.subject)+'</span>':'')+'<span class="qtag">'+esc(q.topic)+'</span></div>'
      +'<p class="qtext" style="font-size:15px">'+esc(q.q)+'</p>';
    for(var j=0;j<4;j++){
      var cls='ropt';if(j===q.ans)cls+=' ans';else if(picked===j)cls+=' pickw';
      h+='<div class="'+cls+'"><span class="k">'+LETTER(j)+'</span><div class="body">'+esc(q.opts[j])
        +(j===q.ans?'<span class="tag t-ans">正確答案</span>':'')+(picked===j&&j!==q.ans?'<span class="tag t-you">你的答案</span>':'')
        +(q.exps[j]?'<span class="why">'+(j===q.ans?'✓ ':'✗ ')+esc(q.exps[j])+'</span>':'')
        +'</div></div>';
    }
    if(q.src)h+='<div class="src">依據：'+esc(q.src)+'</div>';
    h+='</div>';
  });
  h+='<div class="racts"><button class="btn btn-pri" data-act="toResults">← 回成績單</button><button class="btn btn-ghost" data-act="again">再測一次</button><button class="btn btn-ghost" data-act="home">回首頁</button></div></div>';
  setHTML(h);
}

/* ---------- Modal ---------- */
function openModal(title,body,actsHtml){
  closeModal();
  var d=document.createElement('div');d.className='mask';d.id='mask';
  d.innerHTML='<div class="modal" role="dialog" aria-modal="true"><h3>'+esc(title)+'</h3><p>'+body+'</p><div class="macts">'+actsHtml+'</div></div>';
  document.body.appendChild(d);

function closeModal(){var m=document.getElementById('mask');if(m)m.remove()}

/* ---------- 行為 ---------- */
var ACT={
  home:function(){vHome()},
  intro:function(d){vIntro(d.id)},
  custom:function(d){vCustom(d.id)},
  startMock:function(d){var e=examById(d.id);newSession(d.id,'mock',Math.min(e.qn,bankOf(d.id).length),null);vExam()},
  setN:function(d,t){customState.n=+d.n;document.querySelectorAll('#segN button').forEach(function(b){b.classList.toggle('on',b===t)})},
  tgT:function(d,t){t.classList.toggle('on');var v=d.t,a=customState.topics,ix=a.indexOf(v);if(ix>=0)a.splice(ix,1);else a.push(v)},
  startCustom:function(){
    var pool=bankOf(customState.id);
    if(customState.topics.length)pool=pool.filter(function(q){return customState.topics.indexOf(q.topic)>=0});
    var n=customState.n===0?pool.length:Math.min(customState.n,pool.length);
    if(!n)return;
    newSession(customState.id,'practice',n,customState.topics.length?customState.topics:null);vExam();
  },
  pick:function(d){
    var i=+d.i;
    if(S.mode==='practice'){if(S.revealed[S.idx])return;S.picked[S.idx]=i;S.revealed[S.idx]=true}
    else S.picked[S.idx]=S.picked[S.idx]===i?null:i;
    save();vExam();
  },
  prev:function(){if(S.idx>0){S.idx--;save();vExam()}},
  next:function(){if(S.idx<S.total-1){S.idx++;save();vExam()}},
  jump:function(d){S.idx=+d.i;sheetOpen=false;save();vExam()},
  flag:function(){S.flags[S.idx]=!S.flags[S.idx];save();vExam()},
  sheet:function(){sheetOpen=!sheetOpen;vExam()},
  submitAsk:function(){
    var un=S.total-answeredCount(),fl=S.flags.filter(Boolean).length;
    var msg=(S.mode==='mock'?'交卷後立即結算成績，不可再修改作答。':'結束練習後將顯示本次結果。')
      +'<br>尚有 <b class="num">'+un+'</b> 題未作答'+(fl?'、<b class="num">'+fl+'</b> 題標記待檢查':'')+'。';
    openModal(S.mode==='mock'?'確定要交卷嗎？':'結束練習？',msg,
      '<button class="btn btn-ghost" data-act="modalClose">繼續作答</button><button class="btn '+(S.mode==='mock'?'btn-danger':'btn-pri')+'" data-act="submitYes">'+(S.mode==='mock'?'確定交卷':'結束並看結果')+'</button>');
  },
  submitYes:function(){closeModal();submit(false)},
  modalClose:function(){closeModal()},
  toResults:function(){closeModal();vResults()},
  review:function(d){revealFilter=d.f||'wrong';vReview()},
  rf:function(d){revealFilter=d.f;vReview()},
  again:function(){var id=S.examId,mode=S.mode,e=examById(id);
    if(mode==='mock'){newSession(id,'mock',Math.min(e.qn,bankOf(id).length),null);vExam()}
    else{newSession(id,'practice',S.total,null);vExam()}},
  resume:function(){var sv=LS.get(K_SES,null);if(!sv)return vHome();S=sv;
    if(S.mode==='mock'&&Date.now()>=S.deadline){submit(true)}else vExam()},
  abandon:function(){LS.del(K_SES);vHome()},
  clearHis:function(){LS.del(K_HIS);vHome()}
};
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-act]');if(!t||t.disabled)return;
  var fn=ACT[t.dataset.act];if(fn)fn(t.dataset,t,e);
});
document.addEventListener('keydown',function(e){
  if(!S||S.done||document.getElementById('mask'))return;
  if(!document.querySelector('.exam-top'))return;
  var k=e.key;
  if(k>='1'&&k<='4')ACT.pick({i:String(+k-1)});
  else if(/^[a-dA-D]$/.test(k))ACT.pick({i:String('abcd'.indexOf(k.toLowerCase()))});
  else if(k==='ArrowLeft')ACT.prev();
  else if(k==='ArrowRight')ACT.next();
  else if(k==='f'||k==='F')ACT.flag();
});
vHome();
})();
</script>

</body>
</html>
