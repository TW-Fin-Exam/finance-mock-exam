意作對己有利之解釋，違反誠信，且本題問要保人之義務展現。","錯誤。簽約後仍須誠實履行契約義務，並非不受拘束。"],"src":"職業道德—誠實信用原則：最大誠信原則、要保人據實說明"},{"id":"ETH-EA-034","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":2,"q":"客戶開戶時未攜帶身分證正本，要求營業員「先幫我用影本填一填，簽名我口頭授權你代簽就好」。營業員正確之做法為何？","options":["為服務客戶，依其口頭授權代填代簽文件","依主管機關規定確實核驗身分文件，不得造假或代填代簽","只要客戶事後補簽名，先代簽也無妨","反正是老客戶，身分查核可以從簡"],"answer":1,"explain":["錯誤。依口頭授權代填代簽文件屬造假，違反身分查核與誠信原則。","正確。應依主管機關規定確實核驗身分文件，不得造假、代填或代簽，以維護誠信與防範風險。","錯誤。先代簽再補簽仍屬代簽造假，不因事後補簽而合法。","錯誤。身分查核不因客戶熟識而從簡，仍須依規定確實辦理。"],"src":"職業道德—誠實信用原則：身分查核不得造假、代填代簽"},{"id":"ETH-EA-035","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":2,"q":"營業員因個人資金週轉困難，暫時挪用客戶交割專戶內的款項，打算數日後補回。此行為之評價為何？","options":["只要事後補回、客戶未受損，即無不當","客戶帳戶餘額很多，暫借無妨","挪用、侵占客戶資產屬嚴重違反誠信之行為，絕對禁止","有補回計畫即屬合理資金調度"],"answer":2,"explain":["錯誤。是否違規不以事後補回為斷，挪用當下即已違反誠信並可能觸法。","錯誤。客戶餘額多寡與挪用之違法性無關，仍屬侵占。","正確。挪用、侵占客戶款項或資產，嚴重違反誠實信用原則，屬絕對禁止之行為。","錯誤。挪用客戶資產不因有補回計畫而正當化，仍為禁止行為。"],"src":"職業道德—誠實信用原則：不得挪用侵占客戶資產"},{"id":"ETH-EA-036","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":2,"q":"關於金融機構向客戶收取費用，下列何種做法符合誠實信用原則？","options":["趁客戶不熟悉行情，收取明顯不合理之高額費用招攬","以低於成本之價格搭配保證獲利承諾招攬客戶","對不同客戶隨意浮動收費以極大化利潤","收費應考量成本與服務內容，公平合理"],"answer":3,"explain":["錯誤。趁客戶資訊不足收取不合理高費，違反公平合理與誠信原則。","錯誤。以保證獲利承諾招攬本身即違規，且低價搭配不當承諾不符誠信。","錯誤。隨意浮動、任意浮濫收費不符公平合理原則。","正確。收費應考量成本與服務內容，維持公平合理，符合誠實信用原則。"],"src":"職業道德—誠實信用原則：收費公平合理"},{"id":"ETH-EA-037","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":3,"q":"契約簽訂後，客戶依約請求辦理某項服務，惟因當時市況對公司不利，主管暗示可「拖延或藉故不履行」。從業人員正確之做法為何？","options":["切實依契約條款履行對客戶之義務","依主管暗示拖延，優先維護公司利益","市況不利時契約可暫不履行","只在對公司有利時才履行契約"],"answer":0,"explain":["正確。契約簽訂後應切實依條款履行對客戶之義務，不得因市況或業績而藉故不履行。","錯誤。依暗示拖延不履行契約，違反誠信與切實履行義務，縱為主管指示亦不得為之。","錯誤。契約義務不因市況不利而免除，仍應履行。","錯誤。選擇性履行契約違反誠實信用與切實履行原則。"],"src":"職業道德—誠實信用原則：契約條款切實履行"},{"id":"ETH-EA-038","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":2,"q":"營業員在作業過程中發現自己輸入錯誤，導致客戶帳務出現差錯。依誠實信用原則，最適當之處理方式為何？","options":["隱匿錯誤，期待沒有人會發現","立即依規定向主管與相關單位報告並辦理更正","等客戶自己發現後再說","先設法把帳目調整到看不出來"],"answer":1,"explain":["錯誤。隱匿作業疏失違反誠信，且可能擴大損害。","正確。發現作業疏失或錯誤應立即依規定報告並辦理更正，不得隱匿。","錯誤。消極等待客戶發現而不主動處理，違反誠實面對錯誤之要求。","錯誤。掩飾帳目屬作假，違反誠信且可能觸法。"],"src":"職業道德—誠實信用原則：疏失立即報告更正、不得隱匿"},{"id":"ETH-EA-039","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":1,"q":"下列何者違反誠實信用原則？","options":["依規定核驗客戶身分文件之真實性","發現錯帳立即報告並更正","將客戶委託保管之款項挪為己用","依契約約定切實履行對客戶之義務"],"answer":2,"explain":["錯誤。確實核驗客戶身分文件，符合誠信原則。","錯誤。發現錯帳立即報告更正，符合誠信原則。","正確。將客戶委託之款項挪為己用，屬挪用侵占，嚴重違反誠實信用原則。","錯誤。依契約切實履行義務，符合誠信原則。"],"src":"職業道德—誠實信用原則：不得挪用侵占客戶資產"},{"id":"ETH-EA-040","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":3,"q":"要保人投保健康險時，對保險人書面詢問之既往病史刻意隱匿不報，事後就該病症申請理賠。依最大誠信原則，下列敘述何者正確？","options":["保險已成立，保險人一律須全額理賠","病史屬個人隱私，要保人本無告知必要","業務員知情仍協助隱匿病史並無責任","要保人違反據實說明義務，將影響其權益（保險人得依法解約或拒賠）"],"answer":3,"explain":["錯誤。要保人違反據實說明義務時，保險人並非一律須全額理賠。","錯誤。就保險人書面詢問之重要事項，要保人負有據實說明義務，不得以隱私為由隱匿。","錯誤。業務員明知而協助隱匿病史違反誠信與相關規範，並非無責任。","正確。要保人對書面詢問之重要事項（含既往病史）負據實說明義務，違反者影響其權益，保險人得依法解除契約或拒絕理賠。"],"src":"職業道德—誠實信用原則：最大誠信原則、據實說明義務"},{"id":"ETH-EB-001","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":1,"q":"金融從業人員於執行業務時，當自身或公司利益與客戶利益發生衝突，依職業道德規範，應以何者之利益為優先考量？","options":["客戶之利益","公司股東之利益","從業人員個人之利益","主管機關之利益"],"answer":0,"explain":["正確。利益衝突避免原則的核心即為『客戶利益優先』，從業人員應本於誠信將客戶利益置於自身、公司或股東利益之前。","錯誤。公司股東利益並非利益衝突時的優先對象；金融服務業以受託人立場為客戶服務，客戶利益優先於公司或股東利益。","錯誤。從業人員追求自身利益而犧牲客戶，正是利益衝突原則所要防止的行為。","錯誤。主管機關並非交易當事人，此處衝突的比較對象是客戶與從業人員/公司，正解為客戶利益優先。"],"src":"職業道德-有關利益衝突原則；客戶利益優先"},{"id":"ETH-EB-002","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":1,"q":"下列關於金融從業人員收受佣金、酬金或回扣的敘述，何者正確？","options":["只要客戶不知情，收受廠商回扣並無不可","以顧問費名義收受不當報酬即屬合法","以任何名義收受不當佣金、酬金或回扣均不被允許","僅收受現金回扣才違規，收受禮券則無妨"],"answer":2,"explain":["錯誤。收受不當回扣的違規性不因客戶是否知情而改變，仍屬禁止行為。","錯誤。改換『顧問費』等名義並不能使不當報酬合法化，重點在於報酬性質是否正當。","正確。從業人員不得以任何名義收受不當之佣金、酬金或回扣，換名目、換形式均不影響其違規本質。","錯誤。不當利益不因給付形式是現金或禮券而有別，兩者皆在禁止之列。"],"src":"職業道德-有關利益衝突原則；不得以任何名義收受不當佣金回扣"},{"id":"ETH-EB-003","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":2,"q":"承銷部門人員甲得知公司即將大量買進A公司股票，於公司下單前，甲先以自己帳戶買進A股票，待公司買盤推升股價後賣出獲利。甲的行為屬於下列何者？","options":["合法的個人理財，與職務無關","禁止的搶帽子（先行交易）行為","善盡告知義務的表現","正常的自營避險操作"],"answer":1,"explain":["錯誤。甲係利用職務知悉之未公開委託資訊為己牟利，並非與職務無關的單純理財。","正確。內部人知悉公司（承銷或自營）將買賣某股票，於公司委託前先行以自己或告知他人帳戶買賣，即為禁止之『搶帽子』（front running）先行交易行為。","錯誤。此行為與告知義務無關，反而是濫用未公開資訊圖利，違反利益衝突避免原則。","錯誤。自營避險係公司依規定進行的部位管理，甲以私人帳戶搶先交易牟取價差並非避險。"],"src":"職業道德-有關利益衝突原則；禁止搶帽子（front running）"},{"id":"ETH-EB-004","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":2,"q":"依證券投資信託事業之利益衝突規範，關於同一基金經理人操作行為之限制，下列敘述何者正確？","options":["同一經理人不得於同一日就同一種有價證券作相反之投資決定","同一經理人得於同一日對同一股票同時作買進與賣出之相反決定","只要分屬不同基金，同日反向操作同一股票並無限制","經理人反向操作僅需事後報備即可，無須禁止"],"answer":0,"explain":["正確。為避免利益輸送與衝突，同一基金經理人不得於同一日就同一種有價證券作相反（一買一賣）之投資決定。","錯誤。允許同日對同一股票作相反決定，正是規範所要防止的情形，可能損及部分基金受益人利益。","錯誤。縱使分屬不同基金，同一經理人同日對同一股票反向操作仍受限制，以防止在不同基金間移轉利益。","錯誤。此為事前禁止之行為，並非事後報備即可，敘述違反規範本旨。"],"src":"職業道德-有關利益衝突原則；投信經理人不得同日同股反向操作"},{"id":"ETH-EB-005","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":1,"q":"證券投資信託事業運用自有資金買賣有價證券，當與所管理之基金同時有相同標的之交易需求時，於執行順序及價格分配上應如何處理，方符合利益衝突避免原則？","options":["應優先執行自有資金之交易，較有利價格歸自有資金","應優先執行基金之買賣，價格分配應有利於基金（客戶）","自有資金與基金一律以抽籤決定成交順序","以能為公司賺取最多利潤者優先成交"],"answer":1,"explain":["錯誤。將自有資金置於基金之前並取得較有利價格，正是損害受益人（客戶）利益的利益衝突行為。","正確。基金受益人利益優先於公司自有部位，故應優先執行基金之買賣，且成交價格之分配應有利於基金（客戶），不得讓自有資金優先或取得較佳價格。","錯誤。抽籤並非規範要求；規範明確要求以基金（客戶）利益優先，而非機率式分配。","錯誤。以公司利潤最大化為成交順序依據，違反客戶利益優先原則。"],"src":"職業道德-有關利益衝突原則；自有資金應讓基金優先成交"},{"id":"ETH-EB-006","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":2,"q":"某客戶為感謝理財專員甲的服務，致贈甲一只價值遠超過一般社交往來標準的名錶。依職業道德規範，甲最適當的處理方式為何？","options":["予以拒絕，或依公司規定申報處理","欣然收下，因為是客戶主動致贈","轉送給主管即可，自己不留","收下後私下回贈等值禮品即可"],"answer":0,"explain":["正確。逾越正常社交往來標準之餽贈或招待，從業人員應予拒絕，或依所屬公司規定申報處理，以避免利益衝突之虞。","錯誤。餽贈是否客戶主動致贈並非重點；逾越正常社交標準之貴重餽贈可能影響專業判斷之公正性，不得逕自收受。","錯誤。轉送主管並未消除利益衝突與收受不當利益之問題，仍非正當處理方式。","錯誤。私下回贈無法解決收受逾越標準餽贈的道德疑慮，正確作法是拒絕或依規申報。"],"src":"職業道德-有關利益衝突原則；逾越正常社交之餽贈應拒絕"},{"id":"ETH-EB-007","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":3,"q":"從業人員在服務過程中，遇到自身利益與客戶利益難以兼顧的情形時，下列處理態度何者最符合職業道德？","options":["一律以自身利益為最優先，客戶其次","完全順從客戶的要求，即使違背專業判斷也照做","給予客戶專業分析，並為客戶爭取合理之利益","以達成公司業績目標為唯一考量"],"answer":2,"explain":["錯誤。以自身利益最優先違反客戶利益優先原則，並非正解。","錯誤。完全順從客戶、放棄專業判斷屬過度極端，反而未盡專業義務；正確作法是提供專業分析後為客戶爭取合理利益。","正確。利益無法兼顧時，應本於專業立場給予客戶專業分析，並為其爭取『合理』之利益，而非盲從客戶或犧牲客戶，此為兼顧專業與客戶利益的正確態度。","錯誤。將公司業績列為唯一考量而忽略客戶利益，違反利益衝突避免與客戶利益優先原則。"],"src":"職業道德-有關利益衝突原則；取捨時以專業分析爭取合理利益"},{"id":"ETH-EB-008","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":2,"q":"自營部門人員乙獲悉公司自營帳戶將於明日開盤大量買進B股票。下列何種行為符合利益衝突避免之規範？","options":["先通知熟識的大客戶搶先買進B股票","於公司下單前先以親屬帳戶買進B股票","在公司完成委託買賣前，不先行為自己或他人買賣B股票","將此消息告知同部門同事，讓大家一起獲利"],"answer":2,"explain":["錯誤。通知大客戶搶先買進，係洩漏未公開委託資訊並協助他人先行交易，屬禁止之搶帽子行為。","錯誤。以親屬帳戶搶先買進與以自己名義搶先無異，同屬先行交易之禁止行為。","正確。內部人知悉公司將買賣某股票時，在公司完成該委託買賣之前，不得先行為自己或他人（含親友、客戶）買賣同種類股票，此即禁止搶帽子之正確作法。","錯誤。轉告同事共同獲利同樣是洩漏未公開資訊並協助先行交易，違反規範。"],"src":"職業道德-有關利益衝突原則；承銷自營將買賣前不得先行委託、不得告知親友客戶"},{"id":"ETH-EB-009","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":1,"q":"下列何者屬於金融從業人員得以正當取得之利益？","options":["因提供服務而依規定收取之合法佣金收入","為客戶承作業務而私下向客戶索取之額外報酬","因洩漏客戶委託資訊予他人所獲之分紅","收受廠商為爭取業務所給付之回扣"],"answer":0,"explain":["正確。因實際提供服務而依公司與法令規定收取之合法佣金、手續費，屬於正當利益，與不當佣金回扣有本質差異。","錯誤。私下向客戶額外索取報酬並非依規定收取，屬不當利益。","錯誤。洩漏客戶委託資訊本身即屬違規，藉此所得之分紅為不當得利。","錯誤。收受廠商回扣以換取業務，屬典型之不當佣金回扣，非正當利益。"],"src":"職業道德-有關利益衝突原則；正當利益為合法佣金收入"},{"id":"ETH-EB-010","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":3,"q":"關於金融從業人員之個人投資及兼職，下列敘述何者最符合利益衝突避免原則？","options":["個人投資只要有賺錢就好，無須考量是否與公司或客戶利益衝突","以個人帳戶與所服務客戶對作，屬個人自由不受規範","只要不使用公司資源，任何兼職都完全不受限制","從業人員之個人投資若可能與公司或客戶利益衝突時，應予避免，兼任職務亦受限制"],"answer":3,"explain":["錯誤。個人投資是否賺錢並非判準；重點在於是否與公司或客戶利益衝突，忽略此點即違反原則。","錯誤。以個人帳戶與所服務客戶對作，明顯構成利益衝突，並非不受規範之個人自由。","錯誤。兼職限制不僅止於是否使用公司資源，若兼職可能造成利益衝突或影響職務公正，仍受限制。","正確。從業人員之個人投資若可能與公司或客戶利益發生衝突時應予避免，兼任其他職務亦有相關限制，以防止利益衝突。"],"src":"職業道德-有關利益衝突原則；個人投資與兼任職務之利益衝突迴避"},{"id":"ETH-EB-011","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":2,"q":"廠商為爭取與金融機構往來，招待承辦人員丙出席一場明顯超出正常業務往來標準之高額招待活動。依規範，丙應如何處理最為妥適？","options":["因屬業務往來，一律欣然接受並不需告知公司","予以婉拒，或依公司規定辦理申報","接受招待，但於事後私下告知同事即可","只要不影響核給廠商業務，接受招待並無問題"],"answer":1,"explain":["錯誤。逾越正常標準之招待可能影響業務決策之公正性，不得以『屬業務往來』為由一律接受。","正確。對於逾越正常社交或業務往來標準之餽贈、招待，應予婉拒或依公司規定辦理申報，以維持職務公正並避免利益衝突。","錯誤。私下告知同事並非規範所要求之處理方式，無法免除接受不當招待之疑慮。","錯誤。『不影響核給業務』之主觀認定並不能正當化接受逾越標準之招待，仍應婉拒或申報。"],"src":"職業道德-有關利益衝突原則；逾越正常社交之招待應拒絕或申報"},{"id":"ETH-EB-012","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":1,"q":"下列何種作法違反『客戶利益優先』之職業道德原則？","options":["依客戶投資目標與風險屬性提供適合之建議","為衝高個人業績，勸誘客戶購買不符其需求但佣金較高之商品","據實向客戶揭露商品之費用與風險","於利益衝突時為客戶爭取合理利益"],"answer":1,"explain":["錯誤。依客戶目標與風險屬性提供適合建議，正是客戶利益優先的具體實踐。","正確。為個人業績或高佣金而勸誘客戶購買不符其需求之商品，係將自身利益置於客戶利益之上，違反客戶利益優先原則。","錯誤。據實揭露費用與風險符合誠信與客戶利益優先原則。","錯誤。利益衝突時為客戶爭取合理利益，符合而非違反客戶利益優先原則。"],"src":"職業道德-有關利益衝突原則；客戶利益優先之反面判斷"},{"id":"ETH-EB-013","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":3,"q":"下列關於利益衝突避免之敘述，何者正確？","options":["只要最終有幫客戶賺錢，先行搶帽子交易即可被接受","同一投信經理人為求績效，得同日對同一股票在不同基金間反向操作","從業人員應迴避可能之利益衝突，收受不當回扣、搶帽子及自有資金搶先於基金成交均在禁止之列","逾越正常社交標準之餽贈，只要金額不大即可自行收下"],"answer":2,"explain":["錯誤。搶帽子交易本身即屬禁止行為，不因事後客戶是否獲利而合法化。","錯誤。同一經理人同日對同一股票反向操作（縱分屬不同基金）為禁止行為，不得以追求績效為由為之。","正確。利益衝突避免之核心即為迴避各種可能衝突：不得收受不當回扣、不得搶帽子先行交易、自有資金亦不得搶先於基金成交，敘述完整且正確。","錯誤。逾越正常社交標準之餽贈應拒絕或申報，不因金額大小而可自行收下。"],"src":"職業道德-有關利益衝突原則；綜合（回扣、搶帽子、自有資金優先）"},{"id":"ETH-EB-014","exam":"ethics","subject":"職業道德","topic":"利益衝突之避免","difficulty":2,"q":"從業人員因職務知悉公司即將進行之大額委託買賣資訊，下列何者為規範所禁止之行為？","options":["依公司內部作業流程據實執行客戶或公司委託","將該未公開之委託資訊告知親友，使其搶先買賣","於公司完成委託後始依規定進行個人投資","對該資訊予以保密，不對外洩漏"],"answer":1,"explain":["錯誤。依內部流程據實執行委託係本分工作，並不違規。","正確。將未公開之委託資訊告知親友使其搶先買賣，屬洩漏資訊並協助他人搶帽子先行交易，為規範所禁止。","錯誤。待公司完成委託後始依規定進行個人投資，並未搶先於公司，符合規範。","錯誤。對未公開資訊予以保密，正是應盡之義務，並非禁止行為。"],"src":"職業道德-有關利益衝突原則；不得告知親友客戶搶先交易"},{"id":"ETH-EB-015","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":1,"q":"金融從業人員對於執行業務所知悉之客戶資料，於下列何種情形始得將其揭露或提供予第三人？","options":["經客戶授權同意，或依法律規定應提供時","只要對公司行銷有幫助即可任意提供","只要接收方也是金融從業人員即可提供","客戶未特別交代要保密時即可自由運用"],"answer":0,"explain":["正確。保密原則的例外僅限於『經客戶授權同意』或『依法律規定應提供』，此外一律應予保密。","錯誤。對公司行銷有幫助並非揭露客戶資料的法定或授權事由，仍屬違反保密義務。","錯誤。接收方身分為金融從業人員，並不構成揭露客戶資料的正當事由。","錯誤。保密義務不以客戶是否特別交代為前提，縱客戶未特別交代，從業人員仍負保密義務。"],"src":"職業道德-保密原則；保密例外僅限法律規定或經授權"},{"id":"ETH-EB-016","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":2,"q":"金融機構欲將客戶資料提供予集團內其他公司進行共同行銷（交叉行銷），依規範應具備何種要件？","options":["只要屬同一金控集團，即可無條件交互運用客戶資料","只要行銷商品對客戶有利即可運用，無須客戶同意","僅需於營業場所公告即可運用客戶資料","應與客戶簽訂契約，或經客戶書面同意，始得運用"],"answer":3,"explain":["錯誤。縱屬同一金控集團，客戶資料之交互運用仍有限制，並非可無條件運用。","錯誤。是否對客戶有利屬主觀判斷，不能免除取得客戶同意（簽約或書面同意）之要件。","錯誤。單純於營業場所公告並不等同取得客戶同意，不符合規範要件。","正確。運用客戶資料進行共同行銷，須與客戶簽訂契約，或經客戶書面同意，方得為之。"],"src":"職業道德-保密原則；共同行銷運用客戶資料須簽約或書面同意"},{"id":"ETH-EB-017","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":1,"q":"金融機構以電子郵件寄送電子對帳單予客戶時，為保護客戶資料，於安全機制上應如何處理？","options":["應比照網路交易，採取適當之加密及認證機制","為方便客戶開啟，不需任何加密即可寄送","只要寄送對象為客戶本人，即無須任何保護措施","以一般未加密郵件寄送即可，資料外洩由客戶自負"],"answer":0,"explain":["正確。電子對帳單應比照網路交易之標準，採取適當之加密及認證機制，以確保客戶資料於傳輸過程之安全。","錯誤。電子對帳單含客戶交易資料，未加密寄送易遭攔截外洩，不符保密要求。","錯誤。縱寄送對象為本人，郵件於傳輸途中仍可能外洩，故仍須加密認證等保護措施。","錯誤。以未加密郵件寄送並將外洩風險推予客戶，違反機構應盡之保密與資料保護義務。"],"src":"職業道德-保密原則；電子對帳單須加密認證"},{"id":"ETH-EB-018","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":1,"q":"下列關於客戶資料運用之敘述，何者符合保密原則？","options":["可將客戶名單販售予行銷公司以增加收入","可將客戶資料與同業交換以擴大客源","不得將客戶資料販售、與同業交換或提供親友使用","可提供客戶資料供親友作為業務開發之用"],"answer":2,"explain":["錯誤。販售客戶名單予行銷公司屬嚴重違反保密義務之行為。","錯誤。與同業交換客戶資料同樣違反保密原則，使客戶資料落入未授權之第三人。","正確。客戶資料不得販售、不得與同業交換、亦不得提供親友使用，此為保密原則之基本要求。","錯誤。將客戶資料提供親友作業務開發，屬未經授權之外洩，違反保密原則。"],"src":"職業道德-保密原則；客戶資料不得販售交換或供親友使用"},{"id":"ETH-EB-019","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":2,"q":"從業人員甲自金融機構離職後，將其任職期間所取得之客戶名單提供予新任職之同業公司使用。關於甲之保密義務，下列敘述何者正確？","options":["離職後保密義務即告消滅，甲之行為並無不當","客戶名單屬甲個人努力所得，離職後可自由運用","只要甲未收取對價，提供客戶名單即無問題","保密義務於在職期間繼續有效，離職後仍應繼續遵守，甲之行為違反保密原則"],"answer":3,"explain":["錯誤。保密義務並不因離職而消滅，認為離職即免除保密義務係錯誤觀念。","錯誤。客戶名單屬原公司之營業資料而非甲個人財產，離職後不得自由運用。","錯誤。是否收取對價並非判準；縱未收取對價，洩漏客戶名單仍違反保密義務。","正確。從業人員之保密義務於離職後仍繼續存在，甲將原任職期間取得之客戶名單提供他人使用，違反離職後應繼續遵守之保密義務。"],"src":"職業道德-保密原則；離職後保密義務繼續"},{"id":"ETH-EB-020","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":2,"q":"下列何人得於符合規範之情形下接觸或取得特定客戶之帳戶資料？","options":["同事基於好奇想了解某知名客戶的往來情形","客戶之鄰居宣稱與客戶熟識前來查詢","依法令規定或經客戶授權而有正當業務需要之人員","任何持有該金融機構識別證之員工"],"answer":2,"explain":["錯誤。基於好奇查詢並非業務所需，屬未經授權之接觸，違反保密原則。","錯誤。第三人自稱與客戶熟識，並不構成查詢客戶資料之正當事由。","正確。僅依法令規定或經客戶授權、且有正當業務需要之人員，始得於必要範圍內接觸客戶資料，體現『依法或依授權』之保密精神。","錯誤。持有識別證僅代表其為員工，並不當然具有接觸個別客戶資料之權限，仍須有正當業務需要且依授權為之。"],"src":"職業道德-保密原則；誰可接觸客戶資料（依法或依授權）"},{"id":"ETH-EB-021","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":3,"q":"金融從業人員對客戶及公司之資訊負有保密義務，其主要理由包括下列何者？","options":["防止他人利用該資訊從事競爭而損及公司","防止資訊外洩致公司與客戶蒙受損害","維護客戶對金融機構之信賴","以上皆是"],"answer":3,"explain":["此為理由之一但非完整答案。防止他人利用資訊競爭而損害公司，確為保密之理由之一。","此為理由之一但非完整答案。防止資訊外洩致公司與客戶受損，亦為保密之重要理由。","此為理由之一但非完整答案。維護客戶信賴同為保密之目的。","正確。保密之理由包含防止競爭利用、防止公司與客戶受損、以及維護客戶信賴等，故『以上皆是』為最完整之答案。"],"src":"職業道德-保密原則；保密之理由（以上皆是）"},{"id":"ETH-EB-022","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":1,"q":"從業人員因執行職務而知悉尚未公開之公司重大訊息，依規範應如何處理？","options":["可告知熟識客戶，以增進客戶關係","應予保密，不得對外洩漏","可於親友間私下討論，不算對外洩漏","可提前運用該訊息為自己買賣有價證券"],"answer":1,"explain":["錯誤。告知客戶未公開重大訊息屬洩密，並可能涉及內線交易，為規範所禁止。","正確。執行職務所知悉之未公開重大訊息應予保密，不得對外洩漏，此亦與內線交易之禁止相連結。","錯誤。於親友間討論未公開重大訊息同屬洩漏，並可能導致親友從事內線交易。","錯誤。提前運用未公開重大訊息買賣有價證券，即構成內線交易，為法所禁止。"],"src":"職業道德-保密原則；未公開重大訊息不得洩漏（連結內線交易）"},{"id":"ETH-EB-023","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":2,"q":"關於金控公司子公司間交互運用客戶資料，下列敘述何者正確？","options":["子公司間交互運用客戶資料仍應受相關規範限制，並符合客戶同意等要件","同屬一金控，子公司間可完全不受限制地交互運用客戶資料","只要母公司同意，子公司間即可任意運用客戶資料","客戶資料一經蒐集，集團內即可永久無限制使用"],"answer":0,"explain":["正確。金控子公司間交互運用客戶資料仍受相關規範限制，須符合客戶同意（簽約或書面同意）等要件，並非可任意運用。","錯誤。同屬一金控並不代表可完全不受限制地交互運用，仍有法令與客戶同意之限制。","錯誤。母公司同意並不能取代客戶之同意，子公司間仍不得任意運用客戶資料。","錯誤。客戶資料之使用須在合法目的與客戶同意範圍內，並非集團內可永久無限制使用。"],"src":"職業道德-保密原則；金控子公司間交互運用客戶資料之限制"},{"id":"ETH-EB-024","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":3,"q":"下列有關保密原則之敘述，何者正確？","options":["客戶資料只要不涉及金額，即無須保密","保密義務僅於服務期間存在，且共同行銷運用資料無須客戶同意","除經授權或法律規定外應保密，共同行銷運用資料須經客戶同意，且離職後保密義務仍繼續","電子對帳單只要寄給本人即無須加密"],"answer":2,"explain":["錯誤。客戶資料之保密不以是否涉及金額為限，客戶身分、往來情形等均應保密。","錯誤。保密義務於離職後仍繼續，且共同行銷運用客戶資料須經客戶同意（簽約或書面同意），此敘述兩點皆錯。","正確。保密原則的完整內涵為：除經授權或法律規定外應保密、共同行銷運用客戶資料須經客戶同意、且離職後保密義務仍繼續，敘述正確且完整。","錯誤。電子對帳單縱寄給本人仍應採加密及認證機制，寄予本人並不能免除加密要求。"],"src":"職業道德-保密原則；綜合（例外、共同行銷、離職後義務）"},{"id":"ETH-EB-025","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":1,"q":"下列何種行為符合金融從業人員之保密原則？","options":["在社群媒體公開分享知名客戶之交易明細","將客戶帳戶餘額告知前來詢問之客戶友人","僅於業務必要且經授權之範圍內處理客戶資料，並妥善保管","為炫耀業績向他人透露特定大客戶之投資部位"],"answer":2,"explain":["錯誤。於社群媒體公開客戶交易明細，屬嚴重洩漏客戶資料之行為。","錯誤。未經客戶授權將帳戶餘額告知其友人，違反保密原則。","正確。僅於業務必要且經授權之範圍內處理客戶資料並妥善保管，符合保密原則之要求。","錯誤。為炫耀業績透露大客戶投資部位，屬未經授權之洩漏，違反保密義務。"],"src":"職業道德-保密原則；符合保密之正確行為"},{"id":"ETH-EB-026","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":2,"q":"銀行理專欲將客戶往來資料提供予同集團之保險子公司行銷保單，於未取得客戶簽約或書面同意前，下列處理何者正確？","options":["先行提供資料進行行銷，待客戶反映再停止","以電話行銷成功為前提，事後再補件同意","只要口頭告知客戶即可提供資料","不得逕行提供，應先取得客戶簽訂契約或書面同意"],"answer":3,"explain":["錯誤。先提供資料再視客戶反映停止，係先違規後補救，仍屬未經同意之運用。","錯誤。行銷成功後再補件同意，仍屬先行違規運用資料，不符規範。","錯誤。單純口頭告知不等同取得書面同意，不符合共同行銷運用資料之要件。","正確。於共同行銷運用客戶資料前，應先與客戶簽訂契約或取得書面同意，未取得前不得逕行提供資料。"],"src":"職業道德-保密原則；共同行銷須先取得書面同意或簽約"},{"id":"ETH-EB-027","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":2,"q":"客戶向金融機構申請以電子方式收取對帳單，下列作法何者最符合保密與資料保護之要求？","options":["以未加密之一般電子郵件夾帶對帳單，方便客戶下載","建置具加密及身分認證機制之電子對帳單傳輸方式","將對帳單上傳至公開網頁供客戶自行查看","以社群通訊軟體傳送對帳單截圖給客戶"],"answer":1,"explain":["錯誤。未加密郵件夾帶對帳單，於傳輸途中易遭攔截外洩，不符資料保護要求。","正確。電子對帳單應比照網路交易，建置具加密及身分認證機制之傳輸方式，以確保客戶資料安全。","錯誤。將對帳單置於公開網頁，任何人皆可能存取，屬重大資料外洩風險，違反保密原則。","錯誤。以社群通訊軟體傳送對帳單截圖，欠缺適當加密與認證，且易遭轉傳外洩，不符要求。"],"src":"職業道德-保密原則；電子對帳單之加密認證機制"},{"id":"ETH-EB-028","exam":"ethics","subject":"職業道德","topic":"保密原則","difficulty":3,"q":"檢察官依法持相關法律文件，要求金融機構提供某客戶帳戶交易紀錄以偵辦案件。承辦人員之處理，下列敘述何者正確？","options":["基於保密原則，一律拒絕提供任何客戶資料","依法律規定應提供時，得於法定範圍內提供，此為保密義務之例外","須先取得該客戶同意，否則縱有法律依據亦不得提供","為求謹慎，除交易紀錄外主動附上其他無關客戶之資料一併提供"],"answer":1,"explain":["錯誤。保密原則設有例外，依法律規定應提供時並非一律拒絕，否則將妨礙司法。","正確。『依法律規定應提供』為保密義務之法定例外，於檢察官依法要求時，機構得於法定範圍內提供該客戶資料。","錯誤。依法律規定應提供之情形，屬保密義務之例外，無須另行取得客戶同意即可依法提供。","錯誤。應僅於法定範圍內提供所需資料，主動附上其他無關客戶之資料反而構成不當洩漏。"],"src":"職業道德-保密原則；保密例外之判斷（依法律規定）"},{"id":"ETH-EB-029","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":1,"q":"下列何者屬於金融從業人員道德行為規範所強調之內涵？","options":["守法、誠信","自律、保密","專業能力、客戶利益優先","以上皆是"],"answer":3,"explain":["此為內涵之一但非完整答案。守法與誠信固為道德規範之核心，但尚有其他內涵。","此為內涵之一但非完整答案。自律與保密亦屬道德規範內涵。","此為內涵之一但非完整答案。專業能力與客戶利益優先同為道德規範所強調。","正確。道德行為規範強調守法、誠信、自律、保密、專業能力及客戶利益優先等，故『以上皆是』為最完整之答案。"],"src":"職業道德-遵守法律規範與自律；道德規範內涵（以上皆是）"},{"id":"ETH-EB-030","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":2,"q":"依洗錢防制法之規定，下列何者不屬於該法所稱應遵循洗錢防制規定之『金融機構』範圍？","options":["票券金融公司","信用卡公司","證券集中保管事業","人力銀行"],"answer":3,"explain":["錯誤（此項屬金融機構）。票券金融公司屬洗錢防制法所稱之金融機構。","錯誤（此項屬金融機構）。信用卡公司屬洗錢防制法規範之金融機構範圍。","錯誤（此項屬金融機構）。證券集中保管事業亦屬洗錢防制法所稱之金融機構。","正確。人力銀行為人力仲介服務業，並非洗錢防制法所稱之金融機構，故為正解（本題問『不屬於』者）。"],"src":"職業道德-遵守法律規範與自律；洗防法金融機構範圍（人力銀行非）"},{"id":"ETH-EB-031","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":2,"q":"公務員或相關人員將依法受理之檢舉案件中檢舉人之身分資料予以洩漏，可能涉及下列何種刑事責任？","options":["洩漏國防以外秘密罪","背信罪","偽造文書罪","侵占罪"],"answer":0,"explain":["正確。洩漏依法應保守之檢舉人身分等秘密，可能構成刑法之洩漏國防以外秘密罪（洩密罪），以保護檢舉人。","錯誤。背信罪係為他人處理事務而違背任務致生損害，與洩漏檢舉人身分之情形不同。","錯誤。偽造文書罪係製作、變造不實文書，與洩漏檢舉人資料之行為態樣不符。","錯誤。侵占罪係將持有他人之物據為己有，與洩漏檢舉人身分無涉。"],"src":"職業道德-遵守法律規範與自律；洩漏檢舉人資料涉洩密罪"},{"id":"ETH-EB-032","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":1,"q":"金融從業人員於執行業務時，經交易相對人或客戶要求確認其身分，下列處理何者正確？","options":["應出示識別證件等以配合確認身分","以保護個人隱私為由，一律拒絕表明身分","僅口頭報上姓名即可，無須出示任何證件","要求對方先自證身分後，自己才需表明"],"answer":0,"explain":["正確。交易相對人或客戶要求時，從業人員應出示識別證件等，配合完成身分確認，以昭公信並防範詐騙。","錯誤。以個人隱私為由拒絕表明身分，不符合配合確認身分之要求。","錯誤。僅口頭報名而不出示證件，未能有效配合身分確認之要求。","錯誤。以對方須先自證為條件而拒絕表明身分，不符合應配合出示識別證件之規範。"],"src":"職業道德-遵守法律規範與自律；交易相對人要求時出示識別證件"},{"id":"ETH-EB-033","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":2,"q":"依衍生性金融商品銷售人員之行為與操守準則，銷售人員與客戶間下列何種約定為所禁止？","options":["依商品條件據實說明可能之報酬與風險","提供經核准之商品說明文件予客戶","協助客戶完成風險承受度評估","與客戶約定共同分享投資收益或分擔損失"],"answer":3,"explain":["錯誤。依商品條件據實說明報酬與風險，係應盡之告知義務，並非禁止行為。","錯誤。提供經核准之商品說明文件予客戶，係正常且應為之作為，非禁止行為。","錯誤。協助客戶完成風險承受度評估屬適合度作業之一環，並不違規。","正確。衍生性金融商品銷售人員不得與客戶約定收益分享或損失分擔，此類約定為操守準則所禁止。"],"src":"職業道德-遵守法律規範與自律；衍生商品銷售不得約定收益分享損失分擔"},{"id":"ETH-EB-034","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":3,"q":"從業人員在達成業績目標的壓力下，發現若依法令規定辦理將無法完成業績，而某作法雖可衝高業績卻明顯違反法令。此時正確之處理原則為何？","options":["以完成業績為優先，法令規定可暫時變通","法令規範與業績目標衝突時，一律以遵守法令為準","視主管是否知情而定，主管默許即可執行","只要事後補正程序，先違規完成業績亦可"],"answer":1,"explain":["錯誤。以業績優先而變通法令，係本末倒置，違反守法之基本要求。","正確。當法令規範與業績目標發生衝突時，應一律以遵守法令為準，不得為業績而違反法令。","錯誤。是否違法不因主管是否知情或默許而改變，主管默許並不能使違法行為合法。","錯誤。先違規再事後補正之作法仍屬違法，不符守法原則。"],"src":"職業道德-遵守法律規範與自律；法令與業績衝突一律依法令"},{"id":"ETH-EB-035","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":1,"q":"關於法令、公會自律規範與公司內部規範之遵循，下列敘述何者正確？","options":["法令、公會自律規範與公司內規均應遵守，違反自律規範仍可能受處分","只要遵守法令即可，公會自律規範可不必理會","公司內規與法令牴觸時，應優先遵守公司內規","自律規範不具拘束力，違反亦不生任何後果"],"answer":0,"explain":["正確。從業人員應同時遵守法令、公會自律規範與公司內部規範，違反自律規範仍可能受到相應處分。","錯誤。除法令外，公會自律規範亦具拘束力，不得置之不理。","錯誤。公司內規不得牴觸法令，牴觸時應以法令為準，而非優先遵守內規。","錯誤。自律規範對會員及從業人員具有拘束力，違反可能受處分，並非無任何後果。"],"src":"職業道德-遵守法律規範與自律；自律規範位階與遵循"},{"id":"ETH-EB-036","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":2,"q":"主管指示承辦人員辦理一項明顯違反法令之業務，並表示『責任由主管承擔』。承辦人員應如何處理最為妥適？","options":["因有主管承擔責任，即可依指示照辦","只要留存主管指示紀錄，即可安心執行違規事項","先照辦再向更高層檢舉即可","縱使主管指示，違反法令之事項仍應拒絕辦理"],"answer":3,"explain":["錯誤。主管表示承擔責任並不能免除違法之後果，承辦人員仍不得執行違法事項。","錯誤。留存指示紀錄無法使違法行為正當化，承辦人員仍不得執行違規事項。","錯誤。先照辦即已參與違法行為，不因事後檢舉而免責，應於事前拒絕辦理。","正確。縱使係主管之指示，若屬違反法令之事項，承辦人員仍應予以拒絕辦理，守法義務不因上級指示而免除。"],"src":"職業道德-遵守法律規範與自律；主管指示違規亦應拒絕"},{"id":"ETH-EB-037","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":3,"q":"下列有關遵守法律規範與自律之敘述，何者正確？","options":["業績與法令衝突時得以業績為重，事後再說明","洩漏依法受理之檢舉人身分不涉刑責，僅屬行政疏失","應遵守法令與自律規範，違法之主管指示應拒絕，且不得與客戶約定收益共享或損失分擔","交易相對人要求確認身分時，得以隱私為由拒絕出示證件"],"answer":2,"explain":["錯誤。業績與法令衝突應以法令為準，不得以業績為重。","錯誤。洩漏檢舉人身分可能構成洩漏國防以外秘密罪，涉及刑事責任，非僅行政疏失。","正確。遵守法律規範與自律之內涵包含：遵守法令與自律規範、拒絕違法之主管指示、以及不得與客戶約定收益共享或損失分擔，敘述正確且完整。","錯誤。交易相對人要求時應出示識別證件配合確認身分，不得以隱私為由拒絕。"],"src":"職業道德-遵守法律規範與自律；綜合（守法、拒絕違規指示、禁收益共享）"},{"id":"ETH-EB-038","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":1,"q":"金融從業人員之職業道德規範中，將『客戶利益優先』列為重要內涵，其主要目的為何？","options":["確保公司獲利最大化","促使從業人員以客戶利益為念，建立客戶與市場之信賴","方便從業人員推銷高佣金商品","使從業人員得以規避法律責任"],"answer":1,"explain":["錯誤。道德規範之目的並非確保公司獲利最大化，而是保護客戶並維護市場信賴。","正確。將客戶利益優先列為道德規範內涵，旨在促使從業人員以客戶利益為念，藉以建立客戶與市場對金融業之信賴。","錯誤。推銷高佣金商品與客戶利益優先之目的相悖，並非該規範之目的。","錯誤。道德規範之目的在於引導正當行為，而非供從業人員規避法律責任。"],"src":"職業道德-遵守法律規範與自律；道德規範以客戶利益優先為內涵"},{"id":"ETH-EB-039","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":2,"q":"從業人員於執行職務時，對於內線交易與市場操縱之規範，下列敘述何者正確？","options":["只要獲利不大，利用未公開重大消息買賣並無不可","內線交易之禁止僅適用於公司董事，一般員工不受規範","市場操縱僅指散布謠言，實際下單拉抬股價不算操縱","禁止內線交易及操縱市場，重大消息公開前不得據以買賣，並應配合相關法令"],"answer":3,"explain":["錯誤。內線交易之違法性不以獲利大小為判準，利用未公開重大消息買賣即屬違法。","錯誤。內線交易之規範對象包含公司內部人及消息受領人等，並非僅限董事，一般員工知悉未公開重大消息亦受規範。","錯誤。連續高價買進或以其他方式拉抬、壓低股價亦屬操縱市場態樣，非僅限於散布謠言。","正確。法令禁止內線交易及操縱市場，於重大消息公開前不得據以買賣有價證券，從業人員並應配合遵守相關法令規範。"],"src":"職業道德-遵守法律規範與自律；內線交易與操縱市場之禁止"},{"id":"ETH-EB-040","exam":"ethics","subject":"職業道德","topic":"遵守法律規範與自律","difficulty":3,"q":"下列關於金融從業人員遵守法律規範與自律之情境，何者處理正確？","options":["接獲主管違法指示，因擔心考績而照辦","為完成業績，向客戶約定保證收益並分擔其損失","交易相對人依規要求確認身分時，主動出示識別證件配合","發現客戶帳戶疑似洗錢異常態樣，因怕流失客戶而不予理會"],"answer":2,"explain":["錯誤。因擔心考績而執行主管之違法指示，仍屬違法，應予拒絕。","錯誤。與客戶約定保證收益並分擔損失，違反不得與客戶約定收益共享或損失分擔之規範。","正確。交易相對人依規要求確認身分時，主動出示識別證件配合，符合身分確認與守法之要求，處理正確。","錯誤。發現疑似洗錢異常態樣卻因怕流失客戶而不予理會，違反洗錢防制之申報與注意義務。"],"src":"職業道德-遵守法律規範與自律；綜合情境判斷"}],"gaoye-fin":[{"id":"FN-A-001","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":1,"q":"依國際會計準則（IAS 1）之規定，下列何者「不」屬於一套完整財務報表所包含之組成部分？","options":["財務狀況表（資產負債表）","綜合損益表","董事會營運策略報告","現金流量表"],"answer":2,"explain":["財務狀況表為完整財務報表五要素之一，屬正確組成部分。","綜合損益表（含本期淨利與其他綜合損益）為五要素之一，屬正確組成部分。","正確答案。IAS 1 所定完整財務報表為：財務狀況表、綜合損益表、權益變動表、現金流量表及附註共五項；董事會營運策略報告非屬IAS 1所規範之財務報表組成部分。","現金流量表為五要素之一，屬正確組成部分。"],"src":"IAS 1 財務報表之表達；研究筆記第1章完整財務報表五要素"},{"id":"FN-A-002","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":1,"q":"關於財務報表「附註」之敘述，下列何者正確？","options":["附註為完整財務報表之組成部分，具與其他報表同等之揭露地位","附註僅供參考，非屬財務報表之一部分","附註僅需於年報揭露，季報得免附","附註內容不受會計師查核或核閱"],"answer":0,"explain":["正確答案。IAS 1 規定附註為完整財務報表五要素之一，用以補充說明各表無法充分表達之資訊，與其他報表具同等地位。","錯誤。依IAS 1，附註明確屬於完整財務報表之組成部分，非僅供參考。","錯誤。附註為財報組成部分，期中財報亦須依規定作精簡揭露，非僅年報需附。","錯誤。附註屬財務報表之一部分，同受會計師查核或核閱範圍涵蓋。"],"src":"IAS 1；研究筆記第1章「附註為財報之一部分」"},{"id":"FN-A-003","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":1,"q":"會計基本方程式為「資產＝負債＋權益」。若某公司總資產為 5,000 萬元、總負債為 3,000 萬元，則其權益為多少？","options":["8,000 萬元","3,000 萬元","2,000 萬元","5,000 萬元"],"answer":2,"explain":["錯誤。8,000萬元為資產加負債之和，非權益；權益應為資產減負債。","錯誤。3,000萬元為總負債金額，非權益。","正確答案。權益＝資產−負債＝5,000−3,000＝2,000萬元。","錯誤。5,000萬元為總資產金額，非權益。"],"src":"會計基本方程式：資產＝負債＋權益；研究筆記第1章"},{"id":"FN-A-004","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":2,"q":"依財務報導概念架構，財務資訊之「基本品質特性」包含下列何者？","options":["攸關性與忠實表述","可比性與可驗證性","時效性與可了解性","重大性與一致性"],"answer":0,"explain":["正確答案。概念架構將基本品質特性定為「攸關性」（具預測價值或確認價值）與「忠實表述」（完整、中立、免於錯誤）兩者。","錯誤。可比性與可驗證性屬「強化」品質特性，非基本品質特性。","錯誤。時效性與可了解性屬「強化」品質特性，非基本品質特性。","錯誤。重大性是攸關性之面向（門檻）、一致性是可比性之應用，二者皆非概念架構所列之基本品質特性名稱。"],"src":"財務報導概念架構品質特性；研究筆記第1章基本特性vs強化特性"},{"id":"FN-A-005","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":2,"q":"下列何者屬於財務資訊之「強化」品質特性（enhancing qualitative characteristics）？","options":["預測價值","中立性","可驗證性","免於錯誤"],"answer":2,"explain":["錯誤。預測價值屬「攸關性」（基本品質特性）之組成內涵。","錯誤。中立性屬「忠實表述」（基本品質特性）之組成內涵。","正確答案。強化品質特性有四項：可比性、可驗證性、時效性、可了解性；可驗證性為其一。","錯誤。免於錯誤屬「忠實表述」（基本品質特性）之組成內涵。"],"src":"概念架構強化品質特性（可比性、可驗證性、時效性、可了解性）；研究筆記第1章"},{"id":"FN-A-006","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":1,"q":"編製「共同比（common-size）綜合損益表」時，係以下列何項目作為 100% 之基準？","options":["銷貨毛利","稅前淨利","銷貨（營業收入）淨額","本期淨利"],"answer":2,"explain":["錯誤。共同比損益表係以銷貨淨額為基準，銷貨毛利本身為其中一列百分比。","錯誤。稅前淨利為損益表中間項目，非共同比損益表之基準。","正確答案。共同比損益表以「銷貨（營業收入）淨額」為100%，各項目除以銷貨淨額換算為百分比；共同比資產負債表則以總資產為100%。","錯誤。本期淨利為損益表最後結果，非作為共同比之分母基準。"],"src":"垂直分析（共同比報表）；研究筆記第1章「損益表以銷貨淨額為100%」"},{"id":"FN-A-007","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":2,"q":"某公司本年度銷貨淨額為 1,200 萬元，較上年度之 1,000 萬元增加。就「水平分析（趨勢分析）」而言，本年度銷貨淨額之增減百分比為何？","options":["120%","增加 200 萬元但無法計算百分比","16.7%","20%"],"answer":3,"explain":["錯誤。120%為本年度相對上年度之比較百分比（本年÷上年），而水平分析之增減率係指變動幅度。","錯誤。水平分析可明確計算增減百分比，即以基期為分母。","錯誤。16.7%＝200÷1,200，係誤以本期為分母；正確應以基期（上年度）為分母。","正確答案。水平分析增減率＝(本期−基期)÷基期＝(1,200−1,000)÷1,000＝200÷1,000＝20%。"],"src":"水平分析（趨勢分析）增減率＝(本期−基期)÷基期；研究筆記第1章"},{"id":"FN-A-008","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":2,"q":"依IFRS規定，企業「變更折舊方法、耐用年限或殘值之估計」時，其會計處理原則為何？","options":["屬會計政策變動，應追溯重編以前年度財務報表","屬會計估計變動，採推延（不追溯）適用，僅影響變動當期及以後期間","屬前期錯誤更正，應追溯重編","屬會計政策變動，僅需於附註揭露不必調整"],"answer":1,"explain":["錯誤。變更折舊方法、年限或殘值屬會計「估計」變動，非會計政策變動，不追溯重編。","正確答案。折舊方法、耐用年限、殘值及壞帳率之變動均屬「會計估計變動」，採推延適用，僅調整變動當期及以後期間，不追溯重編以前年度。","錯誤。前期錯誤更正才須追溯重編；本題屬正常之估計修正，非錯誤。","錯誤。此屬估計變動而非政策變動，且須推延調整當期及以後折舊，並非僅附註揭露。"],"src":"會計估計變動採推延適用；研究筆記第1章會計變動"},{"id":"FN-A-009","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":2,"q":"下列關於「會計政策變動」與「會計估計變動」處理方式之配對，何者正確？","options":["會計政策變動→推延適用；會計估計變動→追溯適用","會計政策變動→追溯適用；會計估計變動→推延（不追溯）適用","兩者均採追溯重編","兩者均採推延適用"],"answer":1,"explain":["錯誤。兩者處理方式恰相反：政策變動追溯、估計變動推延。","正確答案。會計政策變動原則採「追溯適用」（重編比較期間）；會計估計變動採「推延（不追溯）適用」，僅影響當期及以後。","錯誤。僅會計政策變動與前期錯誤更正採追溯；估計變動不追溯。","錯誤。僅估計變動採推延；政策變動須追溯。"],"src":"研究筆記第1章：政策變動追溯、估計變動推延、錯誤更正追溯重編"},{"id":"FN-A-010","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":3,"q":"下列關於「攸關性」品質特性之敘述，何者正確？","options":["攸關之財務資訊必同時具備預測價值及確認價值，二者缺一不可","重大性（materiality）為攸關性之一種企業特定面向（門檻）","攸關性要求資訊必須完整、中立且免於錯誤","資訊只要具攸關性即無須考量成本效益限制"],"answer":1,"explain":["錯誤。攸關資訊具「預測價值或確認價值」即可，二者不必同時具備。","正確答案。重大性是攸關性之企業特定面向（門檻），係就個別企業資訊之性質或金額判斷其省略或誤述是否影響使用者決策。","錯誤。完整、中立、免於錯誤屬「忠實表述」之要件，非攸關性。","錯誤。成本效益為財務報導整體之限制，攸關資訊仍受其制約。"],"src":"概念架構攸關性（含重大性、預測與確認價值）；研究筆記第1章"},{"id":"FN-A-011","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":1,"q":"依會計方程式，權益之組成通常「不」包含下列何者？","options":["股本","資本公積","保留盈餘","應付公司債"],"answer":3,"explain":["錯誤。股本為權益之組成項目。","錯誤。資本公積為權益之組成項目。","錯誤。保留盈餘為權益之組成項目。","正確答案。應付公司債屬「負債」，非權益之組成。權益＝股本＋資本公積＋保留盈餘＋其他權益−庫藏股。"],"src":"權益組成：股本＋資本公積＋保留盈餘＋其他權益−庫藏股；研究筆記第1章"},{"id":"FN-A-012","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":1,"q":"綜合損益表中之「其他綜合損益（OCI）」與「本期淨利」，兩者合計稱為下列何者？","options":["綜合損益總額","營業毛利","保留盈餘","營運資金"],"answer":0,"explain":["正確答案。本期淨利加其他綜合損益（OCI）合計為「綜合損益總額」，此即綜合損益表所表達之最終結果。","錯誤。營業毛利為銷貨淨額減銷貨成本，屬損益表中間項目。","錯誤。保留盈餘為權益項目，係歷年累積盈餘減分配後之餘額，非本期損益之合計。","錯誤。營運資金為流動資產減流動負債，與綜合損益無關。"],"src":"IAS 1 綜合損益表＝本期淨利＋OCI；研究筆記第1章"},{"id":"FN-A-013","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":2,"q":"下列何者最能體現「忠實表述（faithful representation）」之要求？","options":["資訊須及時提供給使用者以利決策","財務資訊應完整、中立且免於錯誤地表達其所欲表達之經濟現象","資訊須可與其他期間或其他企業比較","不同人員採相同方法能達成共識"],"answer":1,"explain":["錯誤。及時提供屬「時效性」（強化品質特性），非忠實表述之核心。","正確答案。忠實表述要求資訊完整（含必要說明）、中立（無偏差）且免於錯誤地反映其所欲表達之經濟實質。","錯誤。可與其他期間或企業比較屬「可比性」（強化品質特性）。","錯誤。不同人員達成共識屬「可驗證性」（強化品質特性）。"],"src":"概念架構忠實表述（完整、中立、免於錯誤）；研究筆記第1章"},{"id":"FN-A-014","exam":"gaoye-fin","subject":"財務分析","topic":"財報結構與分析工具","difficulty":3,"q":"下列關於「比率分析」限制之敘述，何者「不」正確？","options":["財務報表多以歷史成本表達，比率可能未反映資產之現時價值","不同產業之營運特性差異大，跨產業比率比較須謹慎","企業可能於期末進行窗飾（window dressing）美化比率","比率分析可完全消除不同公司會計政策差異對可比性之影響"],"answer":3,"explain":["此敘述正確，非答案。歷史成本表達確為比率分析之限制之一。","此敘述正確，非答案。產業特性差異使跨產業比率比較須謹慎，屬比率分析之限制。","此敘述正確，非答案。期末窗飾可能暫時美化流動比率等指標，屬比率分析之限制。","正確答案（此敘述不正確）。比率分析「無法」完全消除不同公司會計政策（如存貨評價、折舊方法）差異對可比性之影響，反而是其重要限制之一。"],"src":"比率分析限制（歷史成本、產業差異、窗飾）；研究筆記第1章"},{"id":"FN-A-015","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":1,"q":"下列何者「不」屬於一般認定之流動資產？","options":["現金及約當現金","應收帳款","存貨","長期股權投資"],"answer":3,"explain":["錯誤。現金及約當現金為典型流動資產。","錯誤。應收帳款預期於一年或一營業循環內收回，屬流動資產。","錯誤。存貨預期於正常營業循環中出售，屬流動資產。","正確答案。長期股權投資屬非流動（投資）資產。流動資產係預期於一年或一營業循環（以較長者）內變現、出售或耗用之資產。"],"src":"IAS 1 流動資產分類；研究筆記第2章流動資產"},{"id":"FN-A-016","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":1,"q":"計算「速動比率（酸性測驗比率）」時，速動資產應由流動資產中扣除下列哪些項目？","options":["扣除存貨與預付費用","扣除現金與短期投資","扣除應收帳款與應收票據","扣除短期借款與應付帳款"],"answer":0,"explain":["正確答案。速動比率＝(流動資產−存貨−預付費用)÷流動負債；存貨與預付費用變現能力較差故須扣除，遺漏「預付費用」是最常見錯誤。","錯誤。現金與短期投資屬速動資產，應保留而非扣除。","錯誤。應收帳款與應收票據屬速動資產，應保留。","錯誤。短期借款與應付帳款屬流動「負債」，為分母，不涉及速動資產之計算。"],"src":"速動比率＝(流動資產−存貨−預付費用)÷流動負債；研究筆記公式2、陷阱1"},{"id":"FN-A-017","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":1,"q":"某公司流動資產 800 萬元、流動負債 400 萬元，則其「流動比率」為何？","options":["0.5","1.25","400 萬元","2"],"answer":3,"explain":["錯誤。0.5＝流動負債÷流動資產，係分子分母顛倒。","錯誤。1.25為速動比率之常見數值型態，非本題流動比率；流動比率應為800÷400＝2。","錯誤。流動比率為倍數（比值）而非金額；400萬元為營運資金之誤植。","正確答案。流動比率＝流動資產÷流動負債＝800÷400＝2。"],"src":"流動比率＝流動資產÷流動負債；研究筆記公式1、例1"},{"id":"FN-A-018","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":2,"q":"某公司流動資產 800 萬元，其中存貨 300 萬元、預付費用 50 萬元，流動負債 400 萬元。其「速動比率」為何？","options":["2.00","1.125","1.375","0.875"],"answer":1,"explain":["錯誤。2.00為流動比率（800÷400），未扣除存貨與預付費用。","正確答案。速動資產＝800−300−50＝450；速動比率＝450÷400＝1.125。","錯誤。1.375＝(800−250)÷400，係漏扣或錯扣項目所致；正確須同時扣除存貨300與預付50。","錯誤。0.875非正確計算結果；正確為(800−300−50)÷400＝450÷400＝1.125。"],"src":"速動比率＝(流動資產−存貨−預付費用)÷流動負債；研究筆記例1"},{"id":"FN-A-019","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":2,"q":"某公司流動比率原為 2（流動資產 800、流動負債 400）。若以現金 100 償還應付帳款，則償還後之流動比率變化為何？","options":["下降至約 1.75","上升至約 1.75","上升至約 2.33","維持不變仍為 2"],"answer":2,"explain":["錯誤。當流動比率大於1時，等額同減會使比率上升而非下降。","錯誤。方向正確（上升）但數值有誤；應為(800−100)÷(400−100)。","正確答案。償還後流動資產＝700、流動負債＝300，流動比率＝700÷300≈2.33，較原本上升。當比率>1時分子分母等額同減會使比率變大。","錯誤。分子分母金額改變（各減100），比率不會維持不變。"],"src":"研究筆記例2、陷阱3：比率>1時等額同減使比率上升"},{"id":"FN-A-020","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":2,"q":"其他條件不變下，公司以「現金購入存貨（現購）」對其流動比率與速動比率之影響為何？","options":["流動比率不變，速動比率下降","流動比率上升，速動比率上升","流動比率下降，速動比率不變","兩者均下降"],"answer":0,"explain":["正確答案。現購存貨：現金（速動及流動資產）減少、存貨（流動資產但非速動資產）增加，流動資產總額不變故流動比率不變；但速動資產減少，速動比率下降。","錯誤。流動資產總額不變，流動比率不會上升；速動資產減少故速動比率下降而非上升。","錯誤。流動資產總額不變，流動比率不會下降；速動資產減少，速動比率會下降而非不變。","錯誤。流動比率不變（流動資產總額未變），並非兩者皆降。"],"src":"研究筆記陷阱3：現購存貨速動↓、流動不變"},{"id":"FN-A-021","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":2,"q":"依IAS 2，下列何者「非」我國（IFRS）允許採用之存貨成本流動假設？","options":["個別認定法","先進先出法（FIFO）","後進先出法（LIFO）","加權平均法"],"answer":2,"explain":["錯誤。個別認定法為IAS 2允許之成本流動假設。","錯誤。先進先出法（FIFO）為IAS 2允許之成本流動假設。","正確答案。IFRS（IAS 2）明文禁用後進先出法（LIFO），僅允許個別認定、先進先出及加權平均三種。","錯誤。加權平均法為IAS 2允許之成本流動假設。"],"src":"IAS 2；研究筆記第2章「IFRS禁用LIFO」"},{"id":"FN-A-022","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":2,"q":"於「物價持續上漲」期間，採用「先進先出法（FIFO）」相較於加權平均法，對財務報表之影響為何？","options":["期末存貨較高、銷貨成本較低、淨利較高","期末存貨較低、銷貨成本較高、淨利較低","期末存貨與淨利均不受成本流動假設影響","銷貨成本較高、所得稅較低"],"answer":0,"explain":["正確答案。物價上漲時，FIFO使較新（較貴）之成本留於期末存貨，故期末存貨最高、銷貨成本最低、毛利與淨利最高（所得稅亦最高）；加權平均法則居中。","錯誤。物價上漲時FIFO先出售較早（較便宜）之存貨，銷貨成本反而較低、淨利較高。","錯誤。不同成本流動假設會使期末存貨與淨利產生差異，並非不受影響。","錯誤。FIFO於物價上漲時銷貨成本較低、淨利較高，所得稅反而較高而非較低。"],"src":"研究筆記第2章、陷阱4：物價上漲FIFO期末存貨與淨利最高、銷貨成本最低"},{"id":"FN-A-023","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":3,"q":"某公司期初存貨 80 萬元、本期進貨淨額 500 萬元、期末存貨 120 萬元，則本期「銷貨成本」為多少？","options":["540 萬元","700 萬元","420 萬元","460 萬元"],"answer":3,"explain":["錯誤。540萬元係加減方向錯誤（如期末改為加項）所致；正確公式為期初＋進貨−期末。","錯誤。700萬元非本題數值，可能為各項誤加所致。","錯誤。420萬元係期初與期末加減錯置所致；正確為80＋500−120＝460萬元。","正確答案。銷貨成本＝期初存貨＋本期進貨淨額−期末存貨＝80＋500−120＝460萬元。"],"src":"銷貨成本＝期初存貨＋進貨淨額−期末存貨；研究筆記第2章"},{"id":"FN-A-024","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":3,"q":"若本期「期末存貨遭高估」，在其他條件不變下，對本期損益之影響為何？","options":["本期銷貨成本高估、本期淨利低估","本期銷貨成本低估、本期淨利高估","本期銷貨成本與淨利均不受影響","本期淨利低估，且下期淨利亦低估"],"answer":1,"explain":["錯誤。期末存貨為銷貨成本之減項，期末存貨高估會使銷貨成本「低估」而非高估。","正確答案。銷貨成本＝期初＋進貨−期末，期末存貨高估→銷貨成本低估→本期淨利高估；且此誤差於下期會自動反向抵銷（下期期初存貨高估使下期淨利低估）。","錯誤。存貨錯誤會透過銷貨成本影響損益，並非不受影響。","錯誤。期末存貨高估使本期淨利「高估」而非低估；下期則反向為低估。"],"src":"研究筆記第2章、陷阱5：期末存貨高估→銷貨成本低估→淨利高估，下期反向抵銷"},{"id":"FN-A-025","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":2,"q":"依IFRS 9，企業對應收帳款估列壞帳（呆帳）時，下列敘述何者正確？","options":["應採直接沖銷法，於確定無法收回時始認列費用","應採備抵法估列，並以預期信用損失模型衡量","僅能以銷貨百分比法估列，不得採帳齡分析法","實際沖銷壞帳時應認列當期壞帳費用"],"answer":1,"explain":["錯誤。直接沖銷法不符IFRS，且無法及時反映預期損失。","正確答案。IFRS要求採「備抵法」，並依IFRS 9之「預期信用損失」模型衡量；估計方法可用銷貨百分比法或帳齡分析法。","錯誤。銷貨百分比法（損益表法）與帳齡分析法（資產負債表法）均可採用。","錯誤。實際「沖銷」係借記備抵、貸記應收帳款，不影響當期費用，亦不影響應收帳款淨額與流動比率。"],"src":"IFRS 9 預期信用損失、備抵法；研究筆記第2章、陷阱6"},{"id":"FN-A-026","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":3,"q":"某公司採帳齡分析法，估計期末「備抵損失（備抵呆帳）應有餘額」為 12,000 元。若調整前備抵呆帳為「貸方餘額 3,000 元」，則本期應認列之壞帳（呆帳）費用為多少？","options":["15,000 元","12,000 元","9,000 元","3,000 元"],"answer":2,"explain":["錯誤。15,000元係將調整前貸餘「加上」應有餘額，方向錯誤；貸餘應相減。","錯誤。12,000元為應有備抵餘額本身，非本期費用；尚須扣除既有貸餘。","正確答案。帳齡法下壞帳費用＝應有備抵餘額−調整前備抵貸餘＝12,000−3,000＝9,000元。","錯誤。3,000元為調整前既有備抵貸餘，非本期應認列之費用。"],"src":"帳齡分析法：壞帳費用＝應有餘額−調整前貸餘；研究筆記例15"},{"id":"FN-A-027","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":3,"q":"承帳齡分析法，若估計期末備抵呆帳「應有餘額」為 12,000 元，惟調整前備抵呆帳為「借方餘額 2,000 元」，則本期應認列之壞帳費用為多少？","options":["10,000 元","12,000 元","14,000 元","2,000 元"],"answer":2,"explain":["錯誤。10,000元係誤將借餘相減；當調整前為借餘時應「加回」。","錯誤。12,000元為應有備抵餘額，尚須加計既有借餘方為費用。","正確答案。調整前為借方餘額時，壞帳費用＝應有餘額＋調整前借餘＝12,000＋2,000＝14,000元（借餘須加回，屬倒扣型陷阱）。","錯誤。2,000元僅為調整前借餘，非本期應認列之費用。"],"src":"帳齡分析法：借餘要加回；研究筆記例15"},{"id":"FN-A-028","exam":"gaoye-fin","subject":"財務分析","topic":"流動性分析","difficulty":3,"q":"以前年度已提列存貨跌價損失之存貨，其淨變現價值於本期回升，依IAS 2應如何處理？","options":["不得迴轉，跌價損失一經認列即為永久","得於原沖減金額範圍內迴轉，列為當期銷貨成本之減少","迴轉利益全數列為業外收入且無金額上限","應追溯重編以前年度財務報表"],"answer":1,"explain":["錯誤。IAS 2允許存貨跌價之迴轉，並非永久不可迴轉（與商譽減損不得迴轉不同）。","正確答案。NRV回升時得認列迴轉利益，惟以「原沖減金額」為限，並列為當期銷貨成本之減少。","錯誤。迴轉金額以原沖減數為上限，並非無限額，且係沖減銷貨成本而非列業外收入。","錯誤。存貨跌價迴轉屬當期估計之調整，不追溯重編以前年度。"],"src":"IAS 2 存貨跌價迴轉以原沖減金額為限，列銷貨成本減少；研究筆記第2章"},{"id":"FN-A-029","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":1,"q":"依IAS 7，現金流量表將企業一定期間之現金流量劃分為下列哪三大類活動？","options":["營業活動、投資活動、籌資活動","本業活動、業外活動、非常活動","收入活動、成本活動、費用活動","短期活動、中期活動、長期活動"],"answer":0,"explain":["正確答案。IAS 7 將現金流量分為營業活動、投資活動及籌資（融資）活動三大類。","錯誤。本業/業外為損益分類概念，非現金流量表之活動分類。","錯誤。收入、成本、費用屬損益要素，非現金流量表之三大活動。","錯誤。現金流量表非以期間長短劃分活動類別。"],"src":"IAS 7 三大活動分類；研究筆記第3章"},{"id":"FN-A-030","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":2,"q":"依IAS 7及我國編製準則，公司「發放現金股利」於現金流量表通常應列為下列何種活動之現金流出？","options":["營業活動","投資活動","籌資活動","不影響現金流量表"],"answer":2,"explain":["錯誤。營業活動係與本業損益相關之現金收付，發放股利屬對股東之分配非本業損益。","錯誤。投資活動係取得或處分長期性資產與投資之現金流量，發放股利非屬之。","正確答案。發放現金股利係對股東之權益分配，屬「籌資（融資）活動」之現金流出。","錯誤。發放現金股利實際支付現金，屬籌資活動流出，會列入現金流量表。"],"src":"IAS 7；研究筆記第3章、陷阱12：支付股利列籌資"},{"id":"FN-A-031","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":2,"q":"下列何項現金流量，依IAS 7應歸類為「投資活動」？","options":["向銀行借入長期借款","發行普通股取得現金","處分不動產、廠房及設備收取之價款","支付供應商之貨款"],"answer":2,"explain":["錯誤。舉借長期借款係籌資活動之現金流入。","錯誤。發行普通股取得現金係籌資活動之現金流入。","正確答案。取得或處分不動產、廠房及設備（長期性營運資產）之現金收付屬「投資活動」；處分PP&E之價款全額列投資活動流入。","錯誤。支付供應商貨款係與本業存貨採購相關，屬營業活動之現金流出。"],"src":"IAS 7 投資活動；研究筆記第3章、陷阱13：處分設備價款列投資"},{"id":"FN-A-032","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":2,"q":"以「間接法」編製營業活動現金流量時，下列何項屬於「加回」稅前淨利之調整項目？","options":["折舊及攤銷費用","處分不動產、廠房及設備之利得","應收帳款之增加","存貨之增加"],"answer":0,"explain":["正確答案。折舊及攤銷為不涉及現金流出之費用（僅為分攤），已於計算淨利時扣除，故間接法須「加回」。","錯誤。處分PP&E之「利得」屬投資活動且非營業現金流入，於間接法中應自淨利「減除」。","錯誤。應收帳款增加代表尚未收現之收入，屬營運資產增加，應為「減項」。","錯誤。存貨增加係營運資產增加、佔用現金，應為「減項」。"],"src":"間接法調整；研究筆記第3章、陷阱13"},{"id":"FN-A-033","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":3,"q":"某公司本期稅後淨利 200 萬元，另有：折舊費用 50 萬元、處分資產利得 10 萬元、應收帳款增加 30 萬元、應付帳款增加 20 萬元。以間接法計算，其「營業活動之淨現金流量」為多少？","options":["250 萬元","190 萬元","310 萬元","230 萬元"],"answer":3,"explain":["錯誤。250萬元＝200＋50，僅加回折舊，未處理處分利得與營運資產負債變動。","錯誤。190萬元係將加減方向弄反（如把應付增加當減項）所致；正確為230萬元。","錯誤。310萬元係各項調整方向錯誤累加所致；折舊加、利得減、應收增加減、應付增加加，結果為230萬元。","正確答案。營業活動淨現金流量＝淨利200＋折舊50−處分利得10−應收增加30＋應付增加20＝230萬元。"],"src":"間接法：＋折舊−處分利得−應收增加＋應付增加；研究筆記例11"},{"id":"FN-A-034","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":2,"q":"某公司當年度營業活動淨現金流量 500 萬元、資本支出（購置PP&E）200 萬元。若以「營業活動現金流量減資本支出」定義自由現金流量（FCF），則其FCF為多少？","options":["700 萬元","300 萬元","200 萬元","500 萬元"],"answer":1,"explain":["錯誤。700萬元為兩者相加，方向錯誤；自由現金流量係營業現金流量「減」資本支出。","正確答案。自由現金流量＝營業活動淨現金流量−資本支出＝500−200＝300萬元，代表支應必要投資後可自由運用之現金。","錯誤。200萬元僅為資本支出金額，非自由現金流量。","錯誤。500萬元為營業活動淨現金流量，尚未扣除資本支出。"],"src":"自由現金流量＝營業現金流量−資本支出；研究筆記第3章"},{"id":"FN-A-035","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":2,"q":"某公司營業活動淨現金流量 230 萬元、流動負債 460 萬元，則其「現金流量比率」為多少？","options":["0.5","2.0","1.0","230 萬元"],"answer":0,"explain":["正確答案。現金流量比率＝營業活動淨現金流量÷流動負債＝230÷460＝0.5。","錯誤。2.0係分子分母顛倒（460÷230）之誤；現金流量比率以流動負債為分母。","錯誤。1.0非本題計算結果；230÷460＝0.5。","錯誤。現金流量比率為比值而非金額。"],"src":"現金流量比率＝營業活動淨現金流量÷流動負債；研究筆記公式22、例11"},{"id":"FN-A-036","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":3,"q":"依我國財務指標定義，「現金流量允當比率」係以「最近幾年」之營業活動淨現金流量與同期資本支出、存貨增加額及現金股利之合計數比較？","options":["最近 3 年","最近 1 年","最近 10 年","最近 5 年"],"answer":3,"explain":["錯誤。允當比率係以「最近5年」為計算基礎，非3年。","錯誤。允當比率之計算期間為最近5年，非1年。","錯誤。允當比率之期間為最近5年，非10年。","正確答案。現金流量允當比率＝最近5年營業活動淨現金流量÷最近5年（資本支出＋存貨增加額＋現金股利），比率≥100%表達到自給自足。"],"src":"現金流量允當比率（最近5年）；研究筆記公式23、第3章"},{"id":"FN-A-037","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":2,"q":"下列有關「不影響現金之重大投資及籌資活動」（如以發行普通股交換取得不動產、可轉換公司債轉換為普通股）之處理，何者正確？","options":["應列入現金流量表之投資或籌資活動主體","不列入現金流量表主體，惟應於附註中揭露","應列入營業活動現金流量","因不涉及現金故完全不必於財報表達"],"answer":1,"explain":["錯誤。此類交易未涉及現金收付，不應列入現金流量表之現金流量主體。","正確答案。不影響現金之重大投資及籌資活動不列入現金流量表主體，但因具重要性，應於「附註」中揭露以供資訊使用者參考。","錯誤。此類交易與本業損益無關且不涉現金，不列營業活動。","錯誤。雖不涉及現金，但仍屬重大且須於附註揭露，非完全不表達。"],"src":"IAS 7；研究筆記第3章、陷阱12：不入表、附註揭露"},{"id":"FN-A-038","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":3,"q":"以間接法編製營業活動現金流量時，下列調整方向何者「正確」？","options":["應收帳款增加為加項、應付帳款增加為減項","處分設備利得為加項、折舊為減項","預付費用增加為加項、應收帳款減少為減項","存貨減少為加項、應付帳款增加為加項"],"answer":3,"explain":["錯誤。應收帳款增加（營運資產增加）應為減項；應付帳款增加（營運負債增加）應為加項，方向皆相反。","錯誤。處分設備「利得」應為減項（移除非營業利得）；折舊為非現金費用應為加項，方向皆相反。","錯誤。預付費用增加（營運資產增加）應為減項；應收帳款減少（營運資產減少）應為加項，方向皆相反。","正確答案。存貨減少表示釋出現金為加項；應付帳款增加表示遞延付現為加項，二者方向皆正確。"],"src":"間接法調整方向；研究筆記陷阱13：應收/存貨增加為減、應付增加為加"},{"id":"FN-A-039","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":1,"q":"關於「財務預測」之編製，依我國公開發行公司相關規範，下列敘述何者正確？","options":["財務預測分為簡式與完整式，完整式須揭露編製所依據之基本假設","財務預測一經公告即不得更新（正）","簡式財務預測須逐項揭露所有基本假設","財務預測屬歷史資訊，與未來估計無關"],"answer":0,"explain":["正確答案。依公開發行公司公開財務預測資訊處理準則，財務預測分「簡式」與「完整式」，完整式須揭露編製所依據之重要基本假設。","錯誤。當財測發生重大變動時，應依規定公告「更新（正）」，並非不得更新。","錯誤。逐項揭露基本假設係完整式之要求，簡式財務預測揭露程度較低。","錯誤。財務預測係對未來之估計資訊，並非歷史資訊。"],"src":"公開財務預測資訊處理準則（簡式/完整式、基本假設、更新）；研究筆記第3章"},{"id":"FN-A-040","exam":"gaoye-fin","subject":"財務分析","topic":"現金流量分析","difficulty":2,"q":"下列有關間接法下「處分設備損益」與其現金流量分類之敘述，何者正確？","options":["處分設備之利得於間接法中應加回稅前淨利","處分設備價款應列為營業活動之現金流入","處分設備之損失於間接法中應自稅前淨利減除","處分設備之損失於間接法中應加回稅前淨利，而處分價款全額列投資活動流入"],"answer":3,"explain":["錯誤。處分「利得」於間接法中應自稅前淨利減除（非加回），以避免與投資活動重複計算。","錯誤。處分設備價款屬投資活動而非營業活動之現金流入。","錯誤。處分損失應「加回」稅前淨利而非減除；減除者為處分利得。","正確答案。處分「損失」為非營業之非現金項目，間接法中應加回稅前淨利；而處分所收取之價款全額列於「投資活動」之現金流入。"],"src":"間接法：＋處分損失、−處分利得；價款列投資；研究筆記陷阱13"},{"id":"FN-B-001","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":1,"q":"依IAS 16之規定，下列有關不動產、廠房及設備（PP&E）折舊之敘述，何者正確？","options":["折舊之目的在於使資產帳面金額等於其公允價值，屬評價程序","折舊為將資產成本按耐用年限有系統分攤至各期之成本分攤程序","折舊會使公司產生等額之現金流出，故屬營業活動現金支出","土地屬於PP&E，故亦應逐年提列折舊"],"answer":1,"explain":["錯誤。折舊係「成本分攤」而非「評價」程序，其目的在配合收入認列成本，並非使帳面金額趨近公允價值。","正確。IAS 16將折舊定義為將資產之可折舊金額（成本減殘值）於耐用年限內有系統分攤至各期的過程，屬成本分攤概念。","錯誤。折舊為非現金項目，僅是帳面上的費用分攤，並不產生現金流出；間接法編製現金流量表時反而要加回折舊。","錯誤。土地耐用年限無限，一般不提折舊；建築物等定著物才提折舊。"],"src":"IAS 16 不動產廠房及設備；研究筆記第4章折舊為成本分攤非評價"},{"id":"FN-B-002","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"某機器成本500,000元，估計殘值50,000元，耐用年限5年。若採「倍數餘額遞減法」提列折舊，則第一年之折舊費用為多少？","options":["200,000元","90,000元","180,000元","220,000元"],"answer":0,"explain":["正確。倍數餘額遞減率＝2/n＝2/5＝40%；第一年折舊＝期初帳面金額500,000×40%＝200,000元（第一年不減殘值直接乘率）。","錯誤。90,000元為直線法之年折舊〔(500,000−50,000)/5〕，非倍數餘額遞減法。","錯誤。180,000元係誤用(500,000−50,000)×40%〔倍數餘額遞減法第一年不應先減殘值〕。","錯誤。220,000元非任一標準折舊法之結果，為誤植數字。"],"src":"IAS 16；研究筆記倍數餘額遞減法率＝2/n、第一年不減殘值"},{"id":"FN-B-003","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"某設備成本220,000元，估計殘值20,000元，耐用年限4年，採「年數合計法」提列折舊，則第二年之折舊費用為多少？","options":["80,000元","50,000元","40,000元","60,000元"],"answer":3,"explain":["錯誤。80,000元為年數合計法「第一年」之折舊〔200,000×(4/10)〕，非第二年。","錯誤。50,000元為直線法年折舊〔200,000/4〕，非年數合計法。","錯誤。40,000元係第四年（最後一年）之折舊〔200,000×(1/10)〕，非第二年。","正確。年數合計＝4+3+2+1＝10；可折舊金額＝220,000−20,000＝200,000；第二年權數為3/10，折舊＝200,000×(3/10)＝60,000元。"],"src":"IAS 16；研究筆記年數合計法（可折舊金額×遞減年數/年數合計）"},{"id":"FN-B-004","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"某公司於X1年初以1,000,000元購入一機器，估計殘值100,000元、耐用年限10年，採直線法折舊。至X3年底止，該機器之累計折舊與帳面金額分別為何？","options":["累計折舊300,000元；帳面金額700,000元","累計折舊270,000元；帳面金額730,000元","累計折舊270,000元；帳面金額630,000元","累計折舊300,000元；帳面金額630,000元"],"answer":1,"explain":["錯誤。誤以成本1,000,000直接除以10年（未減殘值）得年折舊100,000，累計300,000，計算基礎有誤。","正確。年折舊＝(1,000,000−100,000)/10＝90,000；X1~X3共3年累計＝90,000×3＝270,000；帳面金額＝1,000,000−270,000＝730,000元。","錯誤。累計折舊270,000正確，但帳面金額應為成本1,000,000減累計折舊270,000＝730,000，非630,000（誤再減殘值）。","錯誤。累計折舊300,000未減殘值計算，帳面金額亦誤。"],"src":"IAS 16；直線法年折舊＝(成本−殘值)/耐用年限"},{"id":"FN-B-005","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"依IAS 36規定，判斷資產是否減損時所稱之「可回收金額」係指下列何者？","options":["公允價值減處分成本與使用價值，兩者取較「高」者","公允價值減處分成本與使用價值，兩者取較「低」者","帳面金額與公允價值，兩者取較低者","歷史成本減累計折舊後之帳面金額"],"answer":0,"explain":["正確。IAS 36規定可回收金額＝Max（公允價值減處分成本, 使用價值）；當帳面金額＞可回收金額時，就差額認列減損損失。","錯誤。取「低」者為常見誤解；準則明訂取兩者較「高」者，以反映企業實際可回收之最大利益。","錯誤。可回收金額之比較對象不是帳面金額與公允價值，而是「處分」與「繼續使用」兩種變現途徑取高者。","錯誤。此為帳面金額之定義，非可回收金額；減損係將帳面金額與可回收金額相比。"],"src":"IAS 36 資產減損；可回收金額＝公允價值減處分成本與使用價值孰高"},{"id":"FN-B-006","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"某資產帳面金額為800,000元，其公允價值減處分成本為620,000元，使用價值為700,000元。依IAS 36，本期應認列之減損損失為多少？","options":["0元（未發生減損）","180,000元","80,000元","100,000元"],"answer":3,"explain":["錯誤。可回收金額700,000＜帳面金額800,000，已發生減損，並非無減損。","錯誤。180,000係以帳面金額減公允價值減處分成本(800,000−620,000)計算，惟應以可回收金額（取高者700,000）為準。","錯誤。80,000係使用價值與公允價值減處分成本之差(700,000−620,000)，並非減損損失之定義。","正確。可回收金額＝Max(620,000, 700,000)＝700,000；減損損失＝帳面金額800,000−可回收金額700,000＝100,000元。"],"src":"IAS 36；減損損失＝帳面金額−可回收金額（取高者）"},{"id":"FN-B-007","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":1,"q":"依IAS 38規定，下列有關無形資產與商譽會計處理之敘述，何者正確？","options":["企業內部產生之商譽及品牌，符合條件即可認列為無形資產","研究階段之支出應予資本化，發展階段之支出則應費用化","商譽不予攤銷，但應每年（或有減損跡象時）進行減損測試","所有無形資產均應於耐用年限內攤銷，且商譽攤銷年限最長20年"],"answer":2,"explain":["錯誤。IAS 38明訂內部產生之商譽、品牌、客戶名單等不得認列為資產（因無法可靠衡量成本）。","錯誤。順序恰好相反：研究階段支出應「費用化」，發展階段支出符合六項條件才「資本化」。","正確。商譽屬非確定耐用年限之無形資產，不予攤銷，惟須每年或於有減損跡象時作減損測試，且商譽減損不得迴轉。","錯誤。有限耐用年限無形資產才攤銷；商譽（非確定耐用年限）不攤銷，並無20年攤銷之規定。"],"src":"IAS 38 無形資產；研究筆記商譽不攤銷、研究費用化發展資本化"},{"id":"FN-B-008","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"某公司發行面額100,000元之公司債，票面利率8%、每年付息一次，發行時市場利率為10%。有關其發行與後續衡量，下列敘述何者正確？","options":["票面利率低於市場利率，故公司債將以「溢價」發行","採有效利息法時，此折價債券之利息費用逐年遞減","公司債將以「折價」發行，且採有效利息法時利息費用逐年遞增","無論折溢價，每期折溢價攤銷額均逐年遞減"],"answer":2,"explain":["錯誤。票面利率(8%)低於市場利率(10%)時，投資人要求更高報酬，公司債將以「折價」而非溢價發行。","錯誤。折價債券帳面金額逐期升向面額，利息費用＝期初帳面金額×市場利率，故利息費用「逐年遞增」而非遞減。","正確。票面利率＜市場利率→折價發行；有效利息法下折價債券帳面金額漸增，利息費用（＝期初帳面金額×市場利率）逐年遞增。","錯誤。無論折價或溢價，每期折溢價「攤銷額」皆逐年遞「增」（因帳面金額基數變動所致），非遞減。"],"src":"研究筆記公司債：市場利率>票面利率→折價；折價利息費用逐年遞增、攤銷額皆遞增"},{"id":"FN-B-009","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":3,"q":"承上題設定：面額100,000元、票面利率8%、市場利率10%、發行價92,418元，採有效利息法。第一年之利息費用及折價攤銷數各為多少？","options":["利息費用8,000元；折價攤銷1,242元","利息費用9,242元；折價攤銷1,242元","利息費用10,000元；折價攤銷2,000元","利息費用9,242元；折價攤銷8,000元"],"answer":1,"explain":["錯誤。8,000元為「付現利息」(面額100,000×票面8%)，非利息費用；有效利息法之利息費用應以市場利率乘期初帳面金額。","正確。利息費用＝期初帳面金額92,418×市場利率10%＝9,242元；付現利息＝100,000×8%＝8,000元；折價攤銷＝9,242−8,000＝1,242元。","錯誤。10,000係誤以面額100,000×市場利率10%計算利息費用，應以「帳面金額」而非面額為基數。","錯誤。折價攤銷應為利息費用9,242減付現利息8,000＝1,242元，此處誤將付現利息8,000列為攤銷。"],"src":"研究筆記例14 有效利息法：利息費用＝期初帳面金額×市場利率，折價攤銷＝利息費用−付現利息"},{"id":"FN-B-010","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"依IFRS 16規定，承租人（除豁免項目外）對租賃之會計處理，下列敘述何者正確？","options":["承租人區分融資租賃與營業租賃，營業租賃僅按期認列租金費用","承租人採單一模式認列「使用權資產」及「租賃負債」，並就使用權資產提列折舊、租賃負債認列利息","所有租賃一律資本化，並無任何豁免規定","使用權資產之相關費用於租賃期間各年度均維持相等"],"answer":1,"explain":["錯誤。IFRS 16下「承租人」不再區分融資/營業租賃，而採單一模式；區分二者為「出租人」之處理。","正確。承租人採單一模式，於租賃開始日認列使用權資產與租賃負債，其後就使用權資產提列折舊、就租賃負債認列利息費用。","錯誤。IFRS 16設有豁免：短期租賃(≤12個月)及低價值標的資產，得選擇不資本化而按期直線認列費用。","錯誤。承租人費用＝折舊(通常直線、各年相等)＋利息(前高後低，隨負債遞減)，合計呈「前高後低」，並非各年相等。"],"src":"IFRS 16 租賃；研究筆記承租人單一模式、短期及低價值豁免、費用前高後低"},{"id":"FN-B-011","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":1,"q":"下列有關「投資性不動產」及「無形資產」之敘述，何者正確？","options":["投資性不動產係指為賺取租金或資本增值（或兩者）而持有之不動產","自用之廠房建築物應分類為投資性不動產","有限耐用年限之無形資產不得攤銷，僅作減損測試","商譽為確定耐用年限之無形資產，應逐年攤銷"],"answer":0,"explain":["正確。投資性不動產係為賺取租金收入、資本增值或兩者而持有之土地或建築物，而非供自用或正常營業出售者。","錯誤。自用之廠房、建築物屬IAS 16之PP&E，非投資性不動產；投資性不動產以出租或增值為目的。","錯誤。有限（確定）耐用年限之無形資產「應」於耐用年限內攤銷；非確定耐用年限者才不攤銷、僅作減損測試。","錯誤。商譽屬「非確定」耐用年限之無形資產，不予攤銷，僅每年作減損測試。"],"src":"IAS 40 投資性不動產；IAS 38 無形資產（有限年限攤銷、商譽不攤銷）"},{"id":"FN-B-012","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":1,"q":"依會計基本方程式，股東權益之組成不包含下列何項？","options":["股本","資本公積","應付公司債","保留盈餘"],"answer":2,"explain":["錯誤。股本為股東投入之法定資本，屬權益組成要素之一。","錯誤。資本公積（如股票發行溢價、庫藏股交易利益）屬權益之一部分。","正確。應付公司債係企業對債權人之「負債」，屬非流動負債，並非股東權益之組成項目。","錯誤。保留盈餘為歷年累積未分配盈餘，屬權益要素；權益＝股本＋資本公積＋保留盈餘＋其他權益−庫藏股。"],"src":"研究筆記會計方程式：權益＝股本＋資本公積＋保留盈餘＋其他權益−庫藏股"},{"id":"FN-B-013","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":2,"q":"某公司以成本法買回自家流通在外之普通股（庫藏股）。下列有關庫藏股交易影響之敘述，何者正確？","options":["買回庫藏股使股東權益總額增加、流通在外股數增加","買回庫藏股使股東權益總額不變，僅股本結構重分類","庫藏股以高於原買回成本再出售時，其價差應認列為處分利益列入損益","買回庫藏股使股東權益總額減少、流通在外股數減少"],"answer":3,"explain":["錯誤。買回庫藏股支付現金並收回股份，使股東權益總額「減少」、流通在外股數「減少」，方向恰相反。","錯誤。買回庫藏股支付現金，權益總額確實「減少」，並非不變之單純重分類。","錯誤。庫藏股再出售之價差應列入「資本公積」，不得認列為損益（公司買賣自家股票不產生損益）。","正確。成本法下買回庫藏股：借記庫藏股（權益減項）、貸記現金，故股東權益總額減少、流通在外股數減少（每股盈餘與每股帳面價值隨之變動）。"],"src":"研究筆記庫藏股採成本法，買回→總權益↓、流通股數↓；再出售價差入資本公積"},{"id":"FN-B-014","exam":"gaoye-fin","subject":"財務分析","topic":"非流動資產與負債權益","difficulty":1,"q":"某公司於宣告發放「現金股利」之宣告日，對其財務狀況表之影響為何？","options":["負債增加、保留盈餘減少","資產減少、負債減少","股東權益總額不變、僅保留盈餘與股本間重分類","資產增加、股東權益增加"],"answer":0,"explain":["正確。現金股利於「宣告日」認列應付股利（負債↑）並沖減保留盈餘（權益↓）；至「發放日」才資產↓、負債↓。","錯誤。資產減少、負債減少係「發放日」之影響，非宣告日；宣告日尚未支付現金。","錯誤。此為「股票股利」之特性（總權益不變、保留盈餘轉股本）；現金股利宣告會使權益總額減少。","錯誤。現金股利不會使資產或權益增加；宣告日負債增加、權益減少。"],"src":"研究筆記現金股利宣告日→負債↑、保留盈餘↓；發放日→資產↓負債↓"},{"id":"FN-B-015","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":1,"q":"下列有關「負債比率」與「權益比率」關係之敘述，何者正確？","options":["負債比率＝總負債÷總權益","負債比率與權益比率之和恆等於1","權益比率愈高代表財務槓桿程度愈高","負債比率＝總權益÷總資產"],"answer":1,"explain":["錯誤。此為「負債對權益比」之定義；負債比率應為總負債÷總資產。","正確。負債比率＝總負債/總資產、權益比率＝總權益/總資產，因總資產＝總負債＋總權益，故兩者之和恆為1。","錯誤。權益比率愈高代表自有資金比重愈高、財務槓桿愈「低」，財務結構愈穩健。","錯誤。此為「權益比率」之定義；負債比率應為總負債÷總資產。"],"src":"研究筆記公式5：負債比率＝總負債÷總資產；權益比率＝1−負債比率"},{"id":"FN-B-016","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":1,"q":"某公司總資產5,000,000元、總負債3,000,000元。則其負債比率、權益比率及負債對權益比分別為何？","options":["負債比率60%、權益比率40%、負債對權益比1.5","負債比率40%、權益比率60%、負債對權益比0.67","負債比率60%、權益比率40%、負債對權益比0.6","負債比率50%、權益比率50%、負債對權益比1.0"],"answer":0,"explain":["正確。權益＝5,000,000−3,000,000＝2,000,000；負債比率＝3,000,000/5,000,000＝60%；權益比率＝2,000,000/5,000,000＝40%；負債對權益比＝3,000,000/2,000,000＝1.5。","錯誤。負債比率與權益比率倒置；負債3,000,000大於權益2,000,000，負債比率應為60%。","錯誤。負債對權益比應為總負債/總權益＝3,000,000/2,000,000＝1.5，非0.6（誤用負債/資產）。","錯誤。負債與權益並不相等（3,000,000對2,000,000），比率非各50%。"],"src":"研究筆記公式5、6：負債比率、權益比率、負債對權益比＝總負債/總權益"},{"id":"FN-B-017","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":2,"q":"利息保障倍數（times interest earned）之計算，其分子應為下列何者？","options":["稅後淨利","本期淨利加計所得稅費用（即稅前淨利）","稅前息前利益（EBIT），即稅前淨利加計利息費用","營業活動淨現金流量"],"answer":2,"explain":["錯誤。以稅後淨利為分子會低估償債能力；利息屬稅前支付項目，且利息本身應加回。","錯誤。僅加回所得稅得稅前淨利仍不足，尚須「加回利息費用」才是分子EBIT。","正確。利息保障倍數＝稅前息前利益(EBIT)÷利息費用＝(稅前淨利＋利息費用)÷利息費用；因利息以稅前盈餘支付，故分子須為息前稅前之盈餘。","錯誤。利息保障倍數之標準定義以EBIT為分子，並非以營業現金流量計算（後者屬現金基礎之其他償債比率）。"],"src":"研究筆記公式7：利息保障倍數＝EBIT÷利息費用＝(稅前淨利＋利息費用)÷利息費用"},{"id":"FN-B-018","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":3,"q":"某公司本期稅後淨利120,000元、適用所得稅率20%、利息費用50,000元。則其利息保障倍數為多少？","options":["2.4倍","3.4倍","4.0倍","5.0倍"],"answer":2,"explain":["錯誤。2.4倍係誤以稅後淨利120,000直接除以利息50,000，未還原稅前並加回利息。","錯誤。3.4倍係以稅前淨利150,000直接除以利息50,000（分子漏加回利息費用）。","正確。稅前淨利＝120,000/(1−20%)＝150,000；EBIT＝150,000＋利息50,000＝200,000；利息保障倍數＝200,000/50,000＝4倍。","錯誤。5.0倍係以(稅後淨利120,000＋利息50,000＋所得稅另計)之錯誤組合，分子計算有誤。"],"src":"研究筆記例3：稅前淨利＝稅後淨利/(1−稅率)，EBIT＝稅前淨利＋利息，除以利息"},{"id":"FN-B-019","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":2,"q":"「長期資金占不動產廠房設備比率」之計算與判讀，下列敘述何者正確？","options":["其計算為（權益＋非流動負債）÷不動產廠房設備淨額，比率應大於100%較穩健","其計算為流動資產÷不動產廠房設備淨額，比率愈低愈好","比率小於100%代表以長期資金支應長期資產，屬穩健的資金配置","此比率專門用以衡量企業之短期流動性"],"answer":0,"explain":["正確。長期資金占PP&E比率＝(權益＋非流動負債)/PP&E淨額，代表以長期資金支應長期性資產（以長支長），比率應＞100%較穩健。","錯誤。分子應為長期資金（權益＋非流動負債）而非流動資產，且比率並非愈低愈好。","錯誤。比率＜100%表長期資產部分由「短期資金」支應（以短支長），流動性風險較高，並非穩健。","錯誤。此比率衡量「資金配置與長期償債」的結構穩健度，非短期流動性指標。"],"src":"研究筆記公式8：長期資金占PP&E比率＝(權益＋非流動負債)/PP&E淨額，應>100%以長支長"},{"id":"FN-B-020","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":2,"q":"某公司股東權益4,000,000元、非流動負債2,000,000元、不動產廠房設備淨額5,000,000元。其長期資金占不動產廠房設備比率為多少？","options":["80%","150%","40%","120%"],"answer":3,"explain":["錯誤。80%係僅以權益4,000,000/PP&E 5,000,000計算，漏計非流動負債。","錯誤。150%係誤以權益4,000,000＋非流動負債2,000,000除以錯誤基數，或分子分母顛倒，計算有誤。","錯誤。40%係僅以非流動負債2,000,000/PP&E 5,000,000計算，漏計權益。","正確。長期資金＝權益4,000,000＋非流動負債2,000,000＝6,000,000；比率＝6,000,000/5,000,000＝120%，＞100%屬以長支長之穩健配置。"],"src":"研究筆記公式8：(權益＋非流動負債)/PP&E淨額"},{"id":"FN-B-021","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":1,"q":"某公司總負債1,800,000元、股東權益1,200,000元。則其「負債對權益比」為多少？","options":["0.6","1.5","0.67","2.5"],"answer":1,"explain":["錯誤。0.6係負債比率(總負債/總資產＝1,800,000/3,000,000)，非負債對權益比。","正確。負債對權益比＝總負債/總權益＝1,800,000/1,200,000＝1.5。","錯誤。0.67係權益對負債之比(1,200,000/1,800,000)，方向顛倒。","錯誤。2.5為總資產3,000,000除以權益1,200,000（權益乘數概念），非負債對權益比。"],"src":"研究筆記公式6：負債對權益比＝總負債÷總權益"},{"id":"FN-B-022","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":3,"q":"「財務槓桿指數（financial leverage index）」係以權益報酬率（ROE）除以資產報酬率（ROA）而得。當該指數大於1時，代表下列何種意涵？","options":["公司舉債之效果為負，舉債反而降低股東報酬","舉債產生正的財務槓桿效果，運用負債提升了股東權益報酬率","公司完全未使用任何負債融資","公司之利息保障倍數必定小於1"],"answer":1,"explain":["錯誤。指數＞1代表財務槓桿為「正」效果，並非負效果；指數＜1時才表舉債拉低股東報酬。","正確。財務槓桿指數＝ROE/ROA＞1，表示運用負債使ROE高於ROA，即資產報酬率高於借款成本，槓桿發揮正效果。","錯誤。若完全無負債，ROE與ROA將趨於相等（指數約等於1），指數＞1恰表示有正向槓桿作用。","錯誤。財務槓桿指數與利息保障倍數係不同指標；指數＞1並不必然對應利息保障倍數＜1。"],"src":"研究筆記第5章財務結構；財務槓桿指數＝ROE/ROA，>1為正槓桿效果"},{"id":"FN-B-023","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":1,"q":"下列何項比率「上升」時，通常代表企業之長期償債能力與財務結構「愈趨穩健」？","options":["負債比率","負債對權益比","權益比率","財務槓桿度（DFL）"],"answer":2,"explain":["錯誤。負債比率上升代表舉債比重增加、財務結構風險升高，並非趨於穩健。","錯誤。負債對權益比上升表示相對於自有資金之負債愈多，財務風險升高。","正確。權益比率＝總權益/總資產，比率上升代表自有資金比重增加、對外舉債依賴降低，財務結構愈穩健、長期償債能力愈佳。","錯誤。DFL上升代表利息負擔相對盈餘之比重升高、盈餘對銷貨變動更敏感，財務風險增加而非降低。"],"src":"研究筆記第5章：權益比率愈高財務結構愈穩健"},{"id":"FN-B-024","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":2,"q":"甲、乙兩公司總資產相同且皆有獲利，甲公司負債比率70%、乙公司負債比率30%。在資產報酬率（ROA）高於借款利率之情況下，下列敘述何者正確？","options":["甲公司財務槓桿程度較高，其股東權益報酬率(ROE)之提升幅度通常大於乙公司","乙公司負債比率低，故其ROE必高於甲公司","負債比率高低與ROE無關","甲公司因負債高，其利息保障倍數必高於乙公司"],"answer":0,"explain":["正確。當ROA＞借款利率時，舉債愈多的甲公司財務槓桿愈大，透過權益乘數放大，其ROE之提升幅度通常大於低負債的乙公司（正的槓桿效果）。","錯誤。在ROA＞借款利率時，高負債反而透過槓桿放大ROE，乙公司ROE未必高於甲公司。","錯誤。杜邦分析中ROE＝ROA×權益乘數，負債比率透過權益乘數影響ROE，兩者密切相關。","錯誤。利息保障倍數取決於EBIT與利息之相對大小，甲公司負債高、利息費用大，利息保障倍數通常較「低」而非較高。"],"src":"研究筆記高頻考點16：ROA>借款利率時提高負債使ROE↑（財務槓桿正效果）"},{"id":"FN-B-025","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":2,"q":"某公司稅前淨利300,000元、利息費用60,000元。假設無其他營業外項目，其利息保障倍數為多少？","options":["5.0倍","4.0倍","0.2倍","6.0倍"],"answer":3,"explain":["錯誤。5.0倍係僅以稅前淨利300,000/利息60,000（分子漏加回利息費用）。","錯誤。4.0倍與正確之EBIT基礎不符，計算過程有誤。","錯誤。0.2倍係將利息60,000除以稅前淨利300,000，分子分母顛倒。","正確。EBIT＝稅前淨利300,000＋利息費用60,000＝360,000；利息保障倍數＝360,000/60,000＝6倍。"],"src":"研究筆記公式7：利息保障倍數＝(稅前淨利＋利息費用)÷利息費用"},{"id":"FN-B-026","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":3,"q":"由杜邦分析可知權益乘數＝總資產÷股東權益＝1÷(1−負債比率)。若某公司權益乘數為2.5，則其負債比率為多少？","options":["40%","50%","60%","150%"],"answer":2,"explain":["錯誤。40%係以1/2.5計算，此為「權益比率」，非負債比率。","錯誤。50%對應之權益乘數為2.0（＝1/(1−0.5)），非2.5。","正確。權益乘數＝1/(1−負債比率)＝2.5→1−負債比率＝1/2.5＝0.4→負債比率＝1−0.4＝60%。","錯誤。負債比率不會超過100%（負債不會大於總資產）；150%係誤將(2.5−1)當作比率。"],"src":"研究筆記公式16：權益乘數＝1/(1−負債比率)"},{"id":"FN-B-027","exam":"gaoye-fin","subject":"財務分析","topic":"資本結構與償債能力","difficulty":1,"q":"下列有關企業資本結構與償債能力分析之敘述，何者「錯誤」？","options":["過度舉債雖可享有利息之稅盾利益，但同時提高財務危機成本","利息保障倍數愈高，代表企業支付利息之能力愈強","長期資金占不動產廠房設備比率若小於100%，代表部分長期資產以短期資金支應，流動性風險較高","負債比率與權益比率兩者之和通常大於1"],"answer":3,"explain":["正確敘述（非答案）。舉債之利息可抵稅（稅盾），惟過度舉債將提高破產與財務危機成本，須權衡取捨。","正確敘述（非答案）。利息保障倍數＝EBIT/利息，倍數愈高表盈餘覆蓋利息之能力愈強、違約風險愈低。","正確敘述（非答案）。該比率＜100%表長期資產有部分以短期資金支應（以短支長），流動性與再融資風險升高。","錯誤敘述（本題答案）。負債比率＝總負債/總資產、權益比率＝總權益/總資產，因資產＝負債＋權益，兩者之和恆等於「1」，而非大於1。"],"src":"研究筆記公式5：負債比率＋權益比率＝1；第5章稅盾與財務危機成本權衡"},{"id":"FN-B-028","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":2,"q":"資產報酬率（ROA）之計算，下列公式何者正確（考量利息費用之稅後調整）？","options":["ROA＝稅後淨利÷平均股東權益","ROA＝〔稅後淨利＋利息費用×(1−稅率)〕÷平均總資產","ROA＝稅後淨利÷銷貨淨額","ROA＝稅前淨利÷期末總資產"],"answer":1,"explain":["錯誤。此為股東權益報酬率(ROE)之公式，分母為平均權益而非平均總資產。","正確。ROA衡量全部資產（不分債權或股權）之報酬，故分子須將稅後淨利加回「利息費用×(1−稅率)」以還原融資成本，分母用平均總資產。","錯誤。此為純益率（銷貨淨利率）之公式，非ROA。","錯誤。分子未作利息之稅後加回調整，分母應用「平均」總資產而非期末總資產，二者皆不符ROA標準定義。"],"src":"研究筆記公式14：ROA＝〔稅後淨利＋利息費用×(1−稅率)〕÷平均總資產"},{"id":"FN-B-029","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":3,"q":"某公司本期稅後淨利240,000元、利息費用100,000元、適用所得稅率25%、平均總資產4,000,000元。其資產報酬率（ROA）為多少？","options":["6.00%","8.50%","7.50%","7.875%"],"answer":3,"explain":["錯誤。6.00%係僅以稅後淨利240,000/平均總資產4,000,000，漏加回稅後利息。","錯誤。8.50%係以(稅後淨利240,000＋全額利息100,000)/4,000,000計算，利息未作稅後調整。","錯誤。7.50%與正確分子315,000不符，計算過程有誤。","正確。稅後利息＝100,000×(1−25%)＝75,000；ROA＝(240,000＋75,000)/4,000,000＝315,000/4,000,000＝7.875%。"],"src":"研究筆記公式14：ROA分子＝稅後淨利＋利息×(1−稅率)"},{"id":"FN-B-030","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":1,"q":"股東權益報酬率（ROE）之標準計算公式為下列何者？","options":["稅後淨利÷平均股東權益","稅後淨利÷平均總資產","銷貨淨額÷平均股東權益","稅前淨利÷期末股東權益"],"answer":0,"explain":["正確。ROE＝稅後淨利÷平均股東權益，衡量股東每投入一元自有資金所產生之稅後報酬（普通股ROE則以淨利減特別股股利、除以平均普通股權益）。","錯誤。分母為平均總資產者為ROA，非ROE。","錯誤。此為權益週轉率（銷貨/平均權益）之概念，非ROE。","錯誤。分子應為稅後淨利而非稅前淨利，分母慣以「平均」權益而非期末權益。"],"src":"研究筆記公式15：ROE＝稅後淨利÷平均權益"},{"id":"FN-B-031","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":1,"q":"杜邦分析（DuPont analysis）將股東權益報酬率（ROE）拆解為下列哪三項因子之乘積？","options":["毛利率 × 存貨週轉率 × 負債比率","純益率 × 總資產週轉率 × 權益乘數","流動比率 × 速動比率 × 利息保障倍數","營業利益率 × 應收帳款週轉率 × 財務槓桿度"],"answer":1,"explain":["錯誤。杜邦三因子不含毛利率、存貨週轉率與負債比率之組合；標準拆解為純益率、總資產週轉率與權益乘數。","正確。杜邦方程式：ROE＝純益率(獲利能力)×總資產週轉率(資產運用效率)×權益乘數(財務槓桿)，其中權益乘數＝總資產/權益。","錯誤。此三者屬流動性與償債能力指標，非ROE之杜邦拆解因子。","錯誤。標準杜邦拆解使用純益率、總資產週轉率、權益乘數，非此組合。"],"src":"研究筆記公式16：ROE＝純益率×總資產週轉率×權益乘數"},{"id":"FN-B-032","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":3,"q":"某公司純益率（銷貨淨利率）8%、總資產週轉率1.25次、權益乘數2.0。依杜邦分析，其股東權益報酬率（ROE）為多少？","options":["10%","16%","20%","12.5%"],"answer":2,"explain":["錯誤。10%係僅計純益率8%×總資產週轉率1.25（漏乘權益乘數）。","錯誤。16%係純益率8%×權益乘數2.0（漏乘總資產週轉率）。","正確。ROE＝純益率8%×總資產週轉率1.25×權益乘數2.0＝0.08×1.25×2.0＝0.20＝20%。","錯誤。12.5%與杜邦三因子乘積不符，計算有誤。"],"src":"研究筆記公式16、例6：ROE＝純益率×總資產週轉率×權益乘數"},{"id":"FN-B-033","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":1,"q":"計算「應收帳款週轉率」時，其分子與分母之選用，下列敘述何者正確？","options":["分子用銷貨成本、分母用平均存貨","分子用現銷金額、分母用期末應收帳款","分子用銷貨總額、分母用期末總資產","分子用賒銷淨額、分母用平均應收帳款"],"answer":3,"explain":["錯誤。此為「存貨週轉率」之分子分母（銷貨成本÷平均存貨），非應收帳款週轉率。","錯誤。應收帳款來自「賒銷」而非現銷；且分母應用平均應收帳款而非期末數。","錯誤。此接近總資產週轉率之概念；應收帳款週轉率分子應為賒銷淨額、分母為平均應收帳款。","正確。應收帳款週轉率＝賒銷（信用銷貨）淨額÷平均應收帳款；因應收帳款由賒銷產生，故分子應用賒銷淨額，分母用期初期末平均。"],"src":"研究筆記公式9、高頻考點2：應收帳款週轉率＝賒銷淨額÷平均應收帳款"},{"id":"FN-B-034","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":1,"q":"某公司本期賒銷淨額730,000元，期初應收帳款60,000元、期末應收帳款86,000元。其應收帳款週轉率及平均收現天數（一年以365天計）分別約為多少？","options":["週轉率10次；收現天數36.5天","週轉率8.5次；收現天數42.9天","週轉率12次；收現天數30.4天","週轉率10次；收現天數73天"],"answer":0,"explain":["正確。平均應收帳款＝(60,000＋86,000)/2＝73,000；週轉率＝730,000/73,000＝10次；平均收現天數＝365/10＝36.5天。","錯誤。8.5次係以期末應收86,000或其他基數計算，未採期初期末平均73,000。","錯誤。12次係誤用期初應收60,000為分母(730,000/60,000≈12.2)，應用平均數。","錯誤。週轉率10次正確，但收現天數應為365/10＝36.5天，非73天（73天對應約5次週轉）。"],"src":"研究筆記例4：平均應收＝(期初＋期末)/2，週轉率＝賒銷/平均應收，收現天數＝365/週轉率"},{"id":"FN-B-035","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":2,"q":"某公司本期銷貨成本600,000元，期初存貨80,000元、期末存貨120,000元。其存貨週轉率及平均售貨天數（一年以365天計）約為多少？","options":["週轉率5次；售貨天數73天","週轉率6次；售貨天數約60.8天","週轉率7.5次；售貨天數約48.7天","週轉率6次；售貨天數約73天"],"answer":1,"explain":["錯誤。5次係以銷貨成本600,000除以期末存貨120,000（未用平均存貨），計算基礎有誤。","正確。平均存貨＝(80,000＋120,000)/2＝100,000；存貨週轉率＝600,000/100,000＝6次；平均售貨天數＝365/6≒60.8天。","錯誤。7.5次係以期初存貨80,000為分母(600,000/80,000)，應採期初期末平均。","錯誤。週轉率6次正確，但售貨天數應為365/6≒60.8天，非73天。"],"src":"研究筆記例5、公式10：存貨週轉率＝銷貨成本÷平均存貨，售貨天數＝365/週轉率"},{"id":"FN-B-036","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":2,"q":"承前述設定：某公司平均收現天數36.5天、平均售貨天數60.8天。其「營業循環」約為多少天？","options":["24.3天","60.8天","97天","36.5天"],"answer":2,"explain":["錯誤。24.3天係兩者相減(60.8−36.5)，並非營業循環之定義。","錯誤。60.8天僅為售貨天數，未加計收現天數。","正確。營業循環＝存貨售貨天數＋應收帳款收現天數＝60.8＋36.5≒97天，代表自進貨至收回現金所需之期間。","錯誤。36.5天僅為收現天數，未加計售貨天數。"],"src":"研究筆記公式12：營業循環＝收現天數＋售貨天數"},{"id":"FN-B-037","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":1,"q":"某公司銷貨淨額6,000,000元，期初總資產3,500,000元、期末總資產4,500,000元。其總資產週轉率為多少？","options":["1.33次","1.71次","0.67次","1.5次"],"answer":3,"explain":["錯誤。1.33次係以銷貨6,000,000除以期末總資產4,500,000，應採期初期末平均。","錯誤。1.71次係以期初總資產3,500,000為分母，應採平均數。","錯誤。0.67次係將平均總資產4,000,000除以銷貨6,000,000（分子分母顛倒）。","正確。平均總資產＝(3,500,000＋4,500,000)/2＝4,000,000；總資產週轉率＝銷貨淨額6,000,000/平均總資產4,000,000＝1.5次。"],"src":"研究筆記公式11：總資產週轉率＝銷貨淨額÷平均總資產（平均＝(期初＋期末)/2）"},{"id":"FN-B-038","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":3,"q":"某公司ROE為20%、純益率8%、總資產週轉率1.25次。依杜邦分析反推，其權益乘數及負債比率分別約為多少？","options":["權益乘數2.0；負債比率50%","權益乘數1.6；負債比率37.5%","權益乘數2.5；負債比率60%","權益乘數2.0；負債比率60%"],"answer":0,"explain":["正確。權益乘數＝ROE/(純益率×總資產週轉率)＝0.20/(0.08×1.25)＝0.20/0.10＝2.0；又權益乘數＝1/(1−負債比率)＝2.0→負債比率＝1−0.5＝50%。","錯誤。1.6之權益乘數對應純益率×週轉率須為0.125，與本題0.10不符。","錯誤。2.5之權益乘數對應純益率×週轉率須為0.08，與本題0.10不符。","錯誤。權益乘數2.0正確，但對應之負債比率應為50%〔1−1/2.0〕，非60%。"],"src":"研究筆記公式16：ROE＝純益率×週轉率×權益乘數；權益乘數＝1/(1−負債比率)"},{"id":"FN-B-039","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":1,"q":"計算各項週轉率之「平均」數（如平均應收帳款、平均存貨、平均總資產）時，一般採下列何種方式較為適當？","options":["直接採用期末餘額","採用期初餘額","採用當期最大月份之餘額","採用（期初餘額＋期末餘額）÷2"],"answer":3,"explain":["錯誤。僅用期末餘額無法反映整期之平均水準，且分子（如全期銷貨）為流量、分母宜配合為平均存量。","錯誤。僅用期初餘額同樣無法反映期末變動，會使比率失真。","錯誤。以最大月份餘額計算並非通用方法，會低估週轉率且缺乏一致性。","正確。週轉率之分母通常採(期初餘額＋期末餘額)÷2之簡單平均，使流量型分子（全期銷貨/成本）與存量型分母（平均餘額）在期間上相配合。"],"src":"研究筆記公式11、高頻考點2：週轉率分母一律用期初期末平均"},{"id":"FN-B-040","exam":"gaoye-fin","subject":"財務分析","topic":"報酬率與經營效率","difficulty":2,"q":"下列有關報酬率與經營效率各項指標之敘述，何者「正確」？","options":["存貨週轉率之分子應採用銷貨收入（銷貨淨額）","總資產週轉率愈低，代表企業運用資產創造營收之效率愈高","應收帳款週轉率上升、平均收現天數縮短，通常代表收帳效率提升","ROE必定恆等於ROA，兩者並無差異"],"answer":2,"explain":["錯誤。存貨週轉率之分子應為「銷貨成本」而非銷貨收入（收入含毛利，會高估週轉率）。","錯誤。總資產週轉率愈「高」才代表以較少資產創造較多營收、資產運用效率愈佳；愈低表效率愈差。","正確。應收帳款週轉率＝賒銷/平均應收，週轉率上升代表應收回收較快，平均收現天數(365/週轉率)隨之縮短，反映收帳效率提升。","錯誤。ROE分母為權益、ROA分母為總資產（且分子作利息調整），在有負債時兩者通常不相等，透過財務槓桿ROE可高於ROA。"],"src":"研究筆記公式10、14、15；存貨週轉率用銷貨成本、收現天數＝365/週轉率"},{"id":"FN-C-001","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":1,"q":"依IFRS 15「客戶合約之收入」，認列收入的五步驟中，第一個步驟為何？","options":["決定交易價格","將交易價格分攤至各履約義務","於滿足履約義務時認列收入","辨認與客戶所簽訂之合約"],"answer":3,"explain":["錯誤。決定交易價格是第三步驟，須先辨認合約與履約義務後才進行。","錯誤。分攤交易價格至各履約義務是第四步驟，不是起點。","錯誤。滿足履約義務時認列收入是最後（第五）步驟，而非第一步。","正確。IFRS 15五步驟依序為：①辨認客戶合約→②辨認履約義務→③決定交易價格→④分攤交易價格→⑤滿足履約義務時認列收入，第一步為辨認合約。"],"src":"IFRS 15 收入認列五步驟；研究筆記第二章"},{"id":"FN-C-002","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":1,"q":"下列關於毛利率、營業利益率、純益率之敘述，何者正確？","options":["三者分母皆為銷貨成本","毛利率＝銷貨毛利÷銷貨淨額；純益率＝稅後淨利÷銷貨淨額","營業利益率之分子為稅前淨利","純益率之分子為銷貨毛利"],"answer":1,"explain":["錯誤。三者分母皆為「銷貨淨額」（銷貨收入淨額），而非銷貨成本。","正確。毛利率＝銷貨毛利÷銷貨淨額、營業利益率＝營業利益÷銷貨淨額、純益率＝稅後淨利÷銷貨淨額，三者同以銷貨淨額為分母。","錯誤。營業利益率之分子為「營業利益」（毛利減營業費用），非稅前淨利；稅前淨利尚含營業外損益。","錯誤。純益率之分子為「稅後淨利」，非銷貨毛利；銷貨毛利為毛利率之分子。"],"src":"研究筆記公式13：獲利能力比率"},{"id":"FN-C-003","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":2,"q":"某產品單價100元、單位變動成本60元、全年固定成本200,000元。其損益兩平點（BEP）之銷售數量為何？","options":["2,000個","3,333個","5,000個","8,000個"],"answer":2,"explain":["錯誤。2,000個係誤以固定成本200,000除以單價100所得，未使用單位邊際貢獻。","錯誤。3,333個係誤以固定成本除以單位變動成本60（200,000/60≈3,333），分母用錯。","正確。BEP數量＝固定成本÷（單價－單位變動成本）＝200,000÷（100－60）＝200,000÷40＝5,000個。","錯誤。8,000個非兩平點，該銷量係邊際貢獻已超過固定成本、產生營業利益之水準。"],"src":"研究筆記公式25：BEP數量；例12"},{"id":"FN-C-004","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":2,"q":"承上題（單價100、單位變動成本60、固定成本200,000元），以「銷貨額」表示之損益兩平點為何？","options":["500,000元","300,000元","800,000元","1,250,000元"],"answer":0,"explain":["正確。邊際貢獻率＝（100－60）÷100＝40%；BEP金額＝固定成本÷邊際貢獻率＝200,000÷40%＝500,000元（亦等於5,000個×100元）。","錯誤。300,000元低於兩平銷貨額，此水準邊際貢獻不足以回收固定成本。","錯誤。800,000元係銷量8,000個之銷貨額，屬有利潤水準而非兩平點。","錯誤。1,250,000元係誤以固定成本除以變動成本率60%（200,000/0.6）所得，用錯比率。"],"src":"研究筆記公式25：BEP金額＝固定成本÷邊際貢獻率；例12"},{"id":"FN-C-005","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":2,"q":"某公司單位邊際貢獻40元、固定成本200,000元，若目標稅前利潤為80,000元，須銷售多少數量方能達成？","options":["5,000個","6,000個","7,000個","8,000個"],"answer":2,"explain":["錯誤。5,000個僅為損益兩平銷量（利潤為零），未涵蓋目標利潤。","錯誤。6,000個係誤以（固定成本＋目標利潤÷2）計算，目標利潤未全額納入。","正確。目標利潤銷量＝（固定成本＋目標利潤）÷單位邊際貢獻＝（200,000＋80,000）÷40＝280,000÷40＝7,000個。","錯誤。8,000個對應之利潤為8,000×40－200,000＝120,000元，超過目標利潤80,000元。"],"src":"研究筆記公式25：目標利潤銷量；例12"},{"id":"FN-C-006","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":2,"q":"某公司本期邊際貢獻320,000元、營業利益（EBIT）120,000元。其營運槓桿度（DOL）約為多少？","options":["0.375","1.20","3.20","2.67"],"answer":3,"explain":["錯誤。0.375係將EBIT除以邊際貢獻（120,000/320,000）之倒數關係，分子分母顛倒。","錯誤。1.20為財務槓桿度（DFL）常見數值，非DOL；DFL之公式為EBIT÷（EBIT－利息）。","錯誤。3.20為總槓桿度（DCL＝DOL×DFL）之數值，非單獨之DOL。","正確。DOL＝邊際貢獻÷營業利益＝320,000÷120,000≈2.67，代表銷貨變動1%時EBIT約變動2.67%。"],"src":"研究筆記公式26：DOL＝邊際貢獻÷EBIT；例13"},{"id":"FN-C-007","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":2,"q":"某公司營業利益（EBIT）120,000元、利息費用20,000元。其財務槓桿度（DFL）為多少？","options":["1.00","1.20","1.67","6.00"],"answer":1,"explain":["錯誤。1.00表示無財務槓桿效果，僅在利息費用為零時成立，此處有利息20,000元。","正確。DFL＝EBIT÷（EBIT－利息）＝120,000÷（120,000－20,000）＝120,000÷100,000＝1.20。","錯誤。1.67係誤以邊際貢獻或其他數值計算；以本題EBIT與利息代入正解為1.20。","錯誤。6.00係誤以EBIT除以利息（120,000/20,000），非DFL之定義。"],"src":"研究筆記公式26：DFL＝EBIT÷（EBIT－利息）；例13"},{"id":"FN-C-008","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":3,"q":"某公司邊際貢獻320,000元、營業利益120,000元、利息費用20,000元。其總槓桿度（DCL）為多少？若銷貨額成長10%，稅前每股盈餘（EPS）約增加多少百分比？","options":["DCL＝2.67，EPS增加約26.7%","DCL＝3.20，EPS增加約32%","DCL＝1.20，EPS增加約12%","DCL＝5.33，EPS增加約53.3%"],"answer":1,"explain":["錯誤。2.67僅為DOL，未再乘以DFL；且DCL才是連結銷貨與EPS變動之總槓桿。","正確。DCL＝邊際貢獻÷（EBIT－利息）＝320,000÷（120,000－20,000）＝320,000÷100,000＝3.20（亦等於DOL 2.67×DFL 1.20）；銷貨增10%則稅前EPS約增10%×3.20＝32%。","錯誤。1.20僅為DFL，未反映營運槓桿；DCL須結合DOL與DFL。","錯誤。5.33係誤將DOL 2.67乘2或計算錯誤所得，與正確之3.20不符。"],"src":"研究筆記公式26：DCL＝邊際貢獻÷（EBIT－利息）＝DOL×DFL；例13"},{"id":"FN-C-009","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":3,"q":"下列關於營運槓桿度（DOL）性質之敘述，何者錯誤？","options":["固定成本占總成本比重越高，DOL越大","銷售量越接近損益兩平點，DOL越大，於兩平點時趨近無限大","DOL衡量銷貨額變動1%時，營業利益（EBIT）變動之百分比","在損益兩平點上，DOL等於1"],"answer":3,"explain":["正確敘述。固定成本比重越高，銷貨變動對EBIT之放大效果越強，DOL越大。","正確敘述。越接近BEP，營業利益趨近於零，DOL＝邊際貢獻÷EBIT之分母趨近0，故DOL趨近無限大。","正確敘述。DOL之定義即為EBIT變動率÷銷貨變動率，衡量銷貨變動1%時EBIT變動之百分比。","錯誤（為本題答案）。於損益兩平點EBIT＝0，DOL＝邊際貢獻÷0趨近無限大，而非等於1；DOL絕不會等於1（除非無固定成本）。"],"src":"研究筆記肆之17：槓桿度性質"},{"id":"FN-C-010","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":1,"q":"下列何者為造成銷貨毛利率上升之可能原因？","options":["單位售價下跌","單位進貨成本上升","高毛利產品之銷售組合比重提高","營業費用增加"],"answer":2,"explain":["錯誤。單位售價下跌會壓縮毛利，使毛利率下降。","錯誤。單位進貨（產品）成本上升會使銷貨成本增加，毛利率下降。","正確。毛利率上升之原因包括售價上升、單位成本下降，或高毛利產品組合比重提高（產品組合改善）。","錯誤。營業費用屬毛利以下之項目，影響營業利益率而非毛利率；毛利率之計算不含營業費用。"],"src":"研究筆記第七章：毛利變動之售價、數量、成本三因素分析"},{"id":"FN-C-011","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":1,"q":"損益兩平分析中之「邊際貢獻率」應如何計算？","options":["1－變動成本率","固定成本÷銷貨額","變動成本÷銷貨額","1－固定成本率"],"answer":0,"explain":["正確。邊際貢獻率＝邊際貢獻÷銷貨額＝（銷貨額－變動成本）÷銷貨額＝1－變動成本率。","錯誤。固定成本÷銷貨額並非邊際貢獻率之定義；邊際貢獻係銷貨額扣除變動成本後之餘額。","錯誤。變動成本÷銷貨額為「變動成本率」，其補數（1減之）才是邊際貢獻率。","錯誤。邊際貢獻率與固定成本率無關，係以變動成本率之補數計算。"],"src":"研究筆記公式25：邊際貢獻率＝1－變動成本率"},{"id":"FN-C-012","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":2,"q":"某公司實際銷貨額1,000,000元、損益兩平銷貨額600,000元。其安全邊際率為何？又其與DOL之關係為何？","options":["安全邊際率40%，等於DOL之倒數","安全邊際率60%，等於DOL","安全邊際率40%，等於DOL","安全邊際率166.7%，與DOL無關"],"answer":0,"explain":["正確。安全邊際率＝（實際銷貨－兩平銷貨）÷實際銷貨＝（1,000,000－600,000）÷1,000,000＝40%；且安全邊際率＝1÷DOL（互為倒數）。","錯誤。安全邊際率之分子應為「實際減兩平」而非兩平銷貨，故非60%；且安全邊際率是DOL之倒數而非等於DOL。","錯誤。安全邊際率數值40%正確，但其與DOL為「倒數」關係而非相等。","錯誤。166.7%係以實際除以兩平（1,000,000/600,000）誤算，且安全邊際率確與DOL有倒數關係。"],"src":"研究筆記公式25：安全邊際率＝(實際銷貨－兩平銷貨)/實際銷貨＝1/DOL"},{"id":"FN-C-013","exam":"gaoye-fin","subject":"財務分析","topic":"損益分析","difficulty":1,"q":"綜合損益表之結構，由上而下之順序，下列何者正確？","options":["營業利益→銷貨毛利→稅前淨利→本期淨利","銷貨毛利→營業利益→稅前淨利→本期淨利","本期淨利→稅前淨利→營業利益→銷貨毛利","銷貨毛利→稅前淨利→營業利益→本期淨利"],"answer":1,"explain":["錯誤。順序顛倒；營業利益係由銷貨毛利減營業費用而來，銷貨毛利應在營業利益之前。","正確。綜合損益表由上而下：銷貨毛利（銷貨淨額－銷貨成本）→營業利益（減營業費用）→稅前淨利（±營業外損益）→本期淨利（減所得稅）。","錯誤。此為完全倒置之順序；損益表係自銷貨毛利逐步扣減而向下計算至本期淨利。","錯誤。營業利益須在稅前淨利「之前」計算，稅前淨利＝營業利益±營業外損益，順序有誤。"],"src":"研究筆記第七章：損益結構"},{"id":"FN-C-014","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":1,"q":"依IAS 33，基本每股盈餘（基本EPS）之計算公式為何？","options":["本期淨利÷期末流通在外普通股股數","（本期淨利－特別股股利）÷加權平均流通在外普通股股數","本期淨利÷加權平均流通在外普通股股數","（本期淨利＋特別股股利）÷期初流通在外普通股股數"],"answer":1,"explain":["錯誤。分母應為「加權平均」流通股數（反映期中發行變動），非期末股數；分子亦應先扣特別股股利。","正確。基本EPS＝（本期淨利－特別股股利）÷加權平均流通在外普通股股數，分子須扣除歸屬特別股之股利，分母採加權平均。","錯誤。分子漏扣特別股股利；歸屬普通股之損益須先自淨利減除特別股股利。","錯誤。特別股股利應為「減項」而非加項，且分母應採加權平均而非期初股數。"],"src":"研究筆記公式20；IAS 33 基本EPS"},{"id":"FN-C-015","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":1,"q":"甲公司發行累積特別股，本年度董事會「未宣告」發放特別股股利。計算本年度基本EPS時，特別股股利應如何處理？","options":["因未宣告，不必自淨利中扣除","僅扣除實際發放之現金部分","改列為普通股股利處理","不論是否宣告，當年度應負擔之特別股股利均須扣除"],"answer":3,"explain":["錯誤。此為非累積特別股之處理；累積特別股即使未宣告，積欠股利仍須扣除。","錯誤。累積特別股扣除的是「當年度應累積」之股利，而非僅限實際發放之現金；非累積者才只扣已宣告者。","錯誤。特別股股利不會改列為普通股股利；兩者性質不同，計算EPS時特別股股利為減項。","正確。累積特別股不論當年是否宣告，其當年度應負擔之股利均須自淨利中扣除以計算歸屬普通股之損益。"],"src":"研究筆記第八章：累積特別股股利未宣告仍須扣除；肆之10"},{"id":"FN-C-016","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":1,"q":"乙公司1/1流通在外普通股100,000股，4/1辦理現金增資發行20,000股（不考慮股票股利）。計算基本EPS時，全年度加權平均流通股數為多少股？","options":["115,000股","120,000股","100,000股","105,000股"],"answer":0,"explain":["正確。加權平均＝100,000×12/12＋20,000×9/12＝100,000＋15,000＝115,000股（現金增資按流通月數加權，4/1至年底流通9個月）。","錯誤。120,000股係將增資20,000股全額計入未按月加權，高估了增資股數之權重。","錯誤。100,000股僅為期初股數，未計入4/1現金增資之20,000股於後續9個月之流通。","錯誤。105,000股係誤將增資20,000股僅以3/12加權（20,000×3/12＝5,000），月數方向用反。"],"src":"研究筆記第八章：現金增資按流通月數加權；例8"},{"id":"FN-C-017","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":3,"q":"丙公司1/1流通在外普通股100,000股，4/1現金增資發行20,000股，7/1發放10%股票股利。本年度加權平均流通在外普通股股數為多少股？","options":["115,000股","121,500股","126,500股","132,000股"],"answer":2,"explain":["錯誤。115,000股僅計現金增資之月數加權，漏未對股票股利進行追溯調整。","錯誤。121,500股係僅對期初股數乘1.1（100,000×1.1）並加增資原始股數，增資部分未同步乘1.1追溯調整。","正確。股票股利須追溯調整至期初：期初100,000×1.1＝110,000（流通12月）；增資20,000×1.1＝22,000（流通9個月，權重9/12）；加權＝110,000＋22,000×0.75＝110,000＋16,500＝126,500股。","錯誤。132,000股係將全部股數（100,000＋20,000）×1.1＝132,000未對增資部分按月加權，高估權重。"],"src":"研究筆記第八章：股票股利追溯至期初、現金增資按月加權；例8"},{"id":"FN-C-018","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":1,"q":"丁公司本期淨利379,500元，無特別股，加權平均流通在外普通股股數126,500股。其基本EPS為多少元？","options":["2元","3元","4元","5元"],"answer":1,"explain":["錯誤。2元係誤用較高之股數或計算錯誤所得；以本題數字應為3元。","正確。基本EPS＝（淨利－特別股股利）÷加權平均股數＝379,500÷126,500＝3元。","錯誤。4元對應之股數約為94,875股，與題給126,500股不符。","錯誤。5元對應之股數約為75,900股，與題給126,500股不符。"],"src":"研究筆記公式20；例8"},{"id":"FN-C-019","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":2,"q":"關於股票股利與股票分割於計算加權平均流通股數時之處理，下列敘述何者正確？","options":["股票股利按發放日起之流通月數加權","股票分割僅影響當期，比較期間EPS不需重算","現金增資與股票股利之處理方式完全相同","股票股利與股票分割均應追溯調整至期初（含比較期間重編）"],"answer":3,"explain":["錯誤。股票股利並非自發放日起按月加權，而是視為「自始存在」追溯調整至期初。","錯誤。股票分割須追溯調整，比較期間之每股盈餘亦應重新計算。","錯誤。兩者不同：現金增資有對價流入，按流通月數加權；股票股利無對價流入，追溯至期初。","正確。股票股利與股票分割不涉及對價流入、僅使股數依比例膨脹，故追溯調整至期初，且比較期間之EPS亦須一併重編以維持可比性。"],"src":"研究筆記第八章：股票股利/分割追溯調整；肆之10"},{"id":"FN-C-020","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":3,"q":"戊公司本期淨利500,000元、加權平均普通股100,000股、基本EPS 5元。另有可轉換公司債面額1,000,000元、票面利率5%、可轉換為20,000股普通股，稅率20%。其稀釋EPS為多少元？（該可轉債具稀釋性）","options":["4.17元","5.00元","4.50元","5.42元"],"answer":2,"explain":["錯誤。4.17元係分子未加回稅後利息、僅將分母加20,000股（500,000/120,000）所得，漏加回利息。","錯誤。5.00元為基本EPS；稀釋EPS因潛在普通股具稀釋性應低於基本EPS。","正確。採「如果轉換法」：分子加回稅後利息＝1,000,000×5%×(1－20%)＝50,000×0.8＝40,000；分母加轉換股數20,000。稀釋EPS＝（500,000＋40,000）÷（100,000＋20,000）＝540,000÷120,000＝4.5元。","錯誤。5.42元高於基本EPS 5元，屬反稀釋結果，計算方向錯誤；稀釋EPS必須≤基本EPS。"],"src":"研究筆記公式21：稀釋EPS（可轉債如果轉換法）；例9"},{"id":"FN-C-021","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":2,"q":"己公司發行認股權證10,000股，履約價每股20元，當期普通股平均市價每股25元。依庫藏股法計算，稀釋EPS所增加之普通股股數（增額股數）為多少股？","options":["10,000股","8,000股","0股（反稀釋不計入）","2,000股"],"answer":3,"explain":["錯誤。10,000股為認股權可認購之總股數，庫藏股法下應扣除以履約價款按市價可買回之股數。","錯誤。8,000股係以履約價款（10,000×20＝200,000）除以市價25所得之「假設買回股數」，該股數為減項而非增額股數。","錯誤。因平均市價25元＞履約價20元，認股權具稀釋性應計入；僅當市價≤履約價時才反稀釋不計入。","正確。增額股數＝認購股數×（市價－履約價）÷市價＝10,000×（25－20）÷25＝10,000×5/25＝2,000股（等於10,000認購股數減去可買回之8,000股）。"],"src":"研究筆記公式（庫藏股法）；例10"},{"id":"FN-C-022","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":3,"q":"庚公司認股權證10,000股、履約價每股28元，當期普通股平均市價每股25元。此認股權證對稀釋EPS之影響為何？","options":["應計入，增額股數為1,200股","應計入，增額股數為2,000股","不計入，因認股權證一律不影響EPS","不計入，因平均市價低於履約價，屬反稀釋"],"answer":3,"explain":["錯誤。因市價25元＜履約價28元，認股權證不具稀釋性，不應計入，故無1,200股之增額。","錯誤。市價低於履約價時無稀釋效果，不應計入任何增額股數。","錯誤。認股權證在市價＞履約價時具稀釋性、須計入；並非「一律」不影響EPS。","正確。庫藏股法下，僅當平均市價＞履約價時認股權證才具稀釋性；本題市價25元＜履約價28元，履約無利可圖，屬反稀釋，計算稀釋EPS時不予計入。"],"src":"研究筆記肆之11：認股權庫藏股法僅市價＞履約價才稀釋、反稀釋不計入"},{"id":"FN-C-023","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":1,"q":"某公司每股市價60元、每股盈餘（EPS）4元。其本益比（P/E）與盈餘報酬率（盈餘收益率）分別為何？","options":["本益比15倍、盈餘報酬率6.67%","本益比0.067倍、盈餘報酬率15%","本益比15倍、盈餘報酬率15%","本益比240倍、盈餘報酬率6.67%"],"answer":0,"explain":["正確。本益比＝每股市價÷EPS＝60÷4＝15倍；盈餘報酬率為本益比之倒數＝EPS÷市價＝4÷60≈6.67%。","錯誤。本益比與盈餘報酬率之數值對調；本益比應為15倍（大於1），盈餘報酬率約6.67%。","錯誤。本益比15倍正確，但盈餘報酬率應為本益比倒數（約6.67%）而非15%。","錯誤。240倍係將市價乘以EPS（60×4）誤算；本益比應為市價除以EPS＝15倍。"],"src":"研究筆記公式17：本益比＝每股市價÷EPS，倒數為盈餘收益率；例7"},{"id":"FN-C-024","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":2,"q":"下列關於稀釋每股盈餘（稀釋EPS）之敘述，何者錯誤？","options":["可轉換公司債採如果轉換法，分子加回稅後利息","認股權證採庫藏股法，僅在具稀釋性時計入","具反稀釋作用之潛在普通股仍應全部計入稀釋EPS","稀釋EPS必定小於或等於基本EPS"],"answer":2,"explain":["正確敘述。可轉換公司債採如果轉換法，假設期初轉換，分子加回稅後利息（利息×(1－稅率)），分母加轉換股數。","正確敘述。認股權證採庫藏股法，僅當平均市價＞履約價、具稀釋性時才計入增額股數。","錯誤（為本題答案）。具反稀釋作用（會使EPS上升）之潛在普通股「不得」計入稀釋EPS，僅具稀釋性者才納入。","正確敘述。因僅計入具稀釋性之項目、排除反稀釋者，故稀釋EPS必定小於或等於基本EPS。"],"src":"研究筆記第八章：反稀釋者不計入、稀釋EPS≤基本EPS；肆之11"},{"id":"FN-C-025","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":1,"q":"辛公司1/1流通在外普通股200,000股，10/1買回庫藏股24,000股。計算基本EPS時，本年度加權平均流通在外普通股股數為多少股？","options":["176,000股","194,000股","200,000股","197,000股"],"answer":1,"explain":["錯誤。176,000股（200,000－24,000）係將庫藏股全額扣除未按月加權，過度扣減。","正確。庫藏股自買回日起扣除：加權＝200,000×12/12－24,000×3/12＝200,000－6,000＝194,000股（10/1至年底3個月不流通）。","錯誤。200,000股未反映10/1買回庫藏股使流通股數減少之影響。","錯誤。197,000股係誤以庫藏股僅扣除24,000×1.5/12或計算月數錯誤所得；正確扣除3個月＝6,000股。"],"src":"研究筆記第八章：買回庫藏股自買回日起扣除；肆之10"},{"id":"FN-C-026","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":2,"q":"壬公司本期淨利1,000,000元，發行在外累積特別股股利應為120,000元（本年未宣告），加權平均普通股股數220,000股。其歸屬普通股之基本EPS為多少元？","options":["4.00元","4.55元","5.09元","3.20元"],"answer":0,"explain":["正確。累積特別股股利即使未宣告仍須扣除：基本EPS＝（1,000,000－120,000）÷220,000＝880,000÷220,000＝4元。","錯誤。4.55元係未扣除累積特別股股利（1,000,000÷220,000）所得；累積特別股股利未宣告仍須扣除。","錯誤。5.09元係誤將特別股股利加回（1,120,000÷220,000），方向相反；特別股股利應為減項。","錯誤。3.20元對應之分子約704,000元，與（1,000,000－120,000）＝880,000元不符。"],"src":"研究筆記公式20、肆之10：累積特別股股利未宣告仍須扣除"},{"id":"FN-C-027","exam":"gaoye-fin","subject":"財務分析","topic":"每股盈餘","difficulty":1,"q":"IAS 33「每股盈餘」規定，發行「普通股」及「潛在普通股」之公司，其綜合損益表至少應表達下列何者？","options":["僅基本EPS","僅稀釋EPS","加權平均市價","基本EPS及稀釋EPS"],"answer":3,"explain":["錯誤。發行潛在普通股者不能只揭露基本EPS，尚須揭露稀釋EPS以反映潛在稀釋效果。","錯誤。不能僅揭露稀釋EPS而省略基本EPS；兩者皆為使用者判斷之重要資訊。","錯誤。加權平均市價非EPS揭露之項目；IAS 33要求揭露之為每股盈餘數字。","正確。依IAS 33，有普通股及潛在普通股流通在外之公司，應於綜合損益表表達「基本EPS」及「稀釋EPS」兩者。"],"src":"研究筆記第八章；IAS 33 EPS揭露"},{"id":"FN-C-028","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":3,"q":"下列關於「應計項目（accruals）」與盈餘品質關係之敘述，何者最為適當？","options":["應計項目占盈餘比重越高，通常盈餘品質越低、持續性越差","應計項目越高代表現金收付越即時，盈餘品質越高","應計項目與盈餘品質無關，僅影響現金流量表","應計項目高必然表示公司舞弊"],"answer":0,"explain":["正確。盈餘＝現金部分＋應計部分；應計項目（如應收帳款、存貨變動）需較多估計與判斷，占比越高表示盈餘越依賴估計、越不易轉為現金，通常盈餘品質較低、持續性較差。","錯誤。應計項目高恰表示收入與現金收付「時點不一致」（如賒銷、未收現），並非現金收付即時。","錯誤。應計項目正是評估盈餘品質之核心指標（應計項目多→品質低），並非無關。","錯誤。應計項目高是品質偏低之訊號，但不必然等於舞弊；須結合其他證據判斷。"],"src":"研究筆記第九章、肆之20：應計項目少→盈餘品質高"},{"id":"FN-C-029","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":2,"q":"下列何者屬於「盈餘持續性較高（可重複發生）」之盈餘來源？","options":["處分不動產、廠房及設備之一次性利得","資產減損損失之迴轉","本業商品銷售之經常性營業利益","匯率大幅波動產生之兌換利益"],"answer":2,"explain":["錯誤。處分PP&E之利得屬一次性、非經常性項目，未來難以重複發生，持續性低。","錯誤。減損迴轉屬非經常性、一次性項目，持續性低，不宜據以推估未來盈餘。","正確。來自本業商品銷售之經常性營業利益可重複發生，持續性最高，是評估未來盈餘之主要依據。","錯誤。兌換利益隨匯率波動、方向不定，屬非經常性且波動大，持續性低。"],"src":"研究筆記第九章：營業利益＞營業外、經常性＞非經常性，持續性高"},{"id":"FN-C-030","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":3,"q":"依IAS 1，下列關於其他綜合損益（OCI）項目「後續能否重分類至損益」之配對，何者正確？","options":["確定福利計畫之再衡量數（精算損益）——可重分類","指定按FVOCI衡量之權益工具評價損益——可重分類","按FVOCI衡量之債務工具評價損益——不可重分類","國外營運機構換算之兌換差額——可重分類（處分時轉入損益）"],"answer":3,"explain":["錯誤。確定福利計畫之再衡量數（精算損益）屬「不可重分類」至損益之OCI項目，僅可於權益內移轉。","錯誤。指定按FVOCI衡量之權益工具，其評價損益「不可」重分類至損益，處分時僅於權益內移轉。","錯誤。按FVOCI衡量之債務工具，其累積OCI於除列時「可（應）」重分類至損益，屬可重分類項目。","正確。國外營運機構換算之兌換差額屬「可重分類」項目，於處分該國外營運機構時應轉列（重分類）至損益。"],"src":"研究筆記第四章、第一章：OCI可否重分類；IAS 1"},{"id":"FN-C-031","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":1,"q":"下列何者為常見之「盈餘預測方法」？","options":["以歷史財務資料與趨勢，結合對未來營運假設進行推估","僅以每股市價乘以本益比反推明年淨利","以庫藏股法推估未來股數","以有效利息法攤銷未來盈餘"],"answer":0,"explain":["正確。盈餘預測通常以歷史財務資料與趨勢為基礎，結合對未來銷貨、成本、費用等營運假設（如完整式財務預測揭露基本假設）進行推估。","錯誤。以市價乘本益比反推淨利係循環論證且以市價為輸入，並非盈餘預測之正規方法。","錯誤。庫藏股法是計算稀釋EPS增額股數之方法，與盈餘（獲利）預測無關。","錯誤。有效利息法是公司債溢折價攤銷之方法，與盈餘預測無關。"],"src":"研究筆記第三章、第九章：財務預測方法（基本假設推估）"},{"id":"FN-C-032","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":1,"q":"下列何者為「盈餘品質較高」之特徵？","options":["淨利遠高於營業活動現金流量","盈餘主要來自處分資產等一次性利得","營業活動現金流量與淨利相近或更高、應計項目少","期末放寬信用條件大量塞貨衝高營收"],"answer":2,"explain":["錯誤。淨利遠高於營業現金流量，表示盈餘未轉化為現金、應計項目偏高，屬盈餘品質「低」之訊號。","錯誤。盈餘來自一次性利得（如處分資產）缺乏持續性，屬品質低之特徵。","正確。盈餘品質高之特徵包括：盈餘由核心營業活動產生、應計項目少、營業活動現金流量與淨利相近或更高、盈餘波動低且可持續。","錯誤。期末塞貨（channel stuffing）以放寬信用衝高營收，係盈餘管理與品質低之典型訊號。"],"src":"研究筆記第九章：盈餘品質高低特徵；肆之20"},{"id":"FN-C-033","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":2,"q":"下列會計處理，何者傾向使公司之「盈餘品質提高」（會計政策較保守）？","options":["將可資本化之支出儘量費用化、採加速折舊、提足備抵","將研究支出資本化以美化當期損益","延後認列已發生之損失","放寬呆帳提列以降低費用"],"answer":0,"explain":["正確。保守之會計政策（如支出儘量費用化、採加速折舊、備抵充足）使當期盈餘較不虛增、資產不高估，盈餘品質較高。","錯誤。研究支出依IAS 38應「費用化」；將其資本化屬激進處理，反而降低盈餘品質。","錯誤。延後認列已發生之損失係遞延壞消息、虛增當期盈餘，屬激進而非保守之處理。","錯誤。放寬呆帳提列使費用低估、盈餘高估，屬激進處理，降低盈餘品質。"],"src":"研究筆記第九章：保守會計提高盈餘品質；肆之20"},{"id":"FN-C-034","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":2,"q":"下列何者屬於盈餘管理（盈餘操縱）之可能手法或訊號？","options":["盈餘主要來自本業且波動平穩","營業活動現金流量長期高於淨利","持續採用一致且保守之會計政策","期末大量塞貨、放寬信用以提前認列收入"],"answer":3,"explain":["錯誤。盈餘來自本業且波動平穩，是盈餘品質高之表現，非盈餘操縱訊號。","錯誤。營業現金流量長期高於淨利，表示盈餘有現金支撐、品質佳，非操縱訊號。","錯誤。持續採一致且保守之會計政策有助盈餘可比與品質，非操縱手法。","正確。期末塞貨、放寬信用條件以提前（虛增）認列收入，會使應收帳款異常暴增，是典型之盈餘管理／操縱手法。"],"src":"研究筆記第九章、肆之20：品質低訊號（放寬信用、期末塞貨）"},{"id":"FN-C-035","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":2,"q":"依IAS 1，其他綜合損益（OCI）之項目中，下列何者於「後續期間」原則上「不得」重分類至損益？","options":["國外營運機構財務報表換算之兌換差額","按FVOCI衡量之『債務』工具評價損益","指定按FVOCI衡量之『權益』工具評價損益","現金流量避險中屬有效避險部分之損益"],"answer":2,"explain":["錯誤。國外營運機構換算之兌換差額於處分該國外營運機構時「應」重分類至損益。","錯誤。按FVOCI衡量之債務工具，其累積於OCI之評價損益於除列時「應」重分類至損益。","正確。指定按FVOCI衡量之權益工具，其評價損益後續「不得」重分類至損益，處分時僅可於權益項目內移轉（不轉入損益）。","錯誤。現金流量避險有效部分之損益，於被避險項目影響損益時「應」重分類（轉出）至損益。"],"src":"研究筆記第四章：權益工具指定FVOCI處分利得不得重分類；IAS 1 OCI分類"},{"id":"FN-C-036","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":3,"q":"關於「停業單位」損益於綜合損益表之表達，下列敘述何者正確？","options":["停業單位損益與繼續營業單位損益合併列示，不需分開","停業單位之稅後損益應單獨列示（與繼續營業單位分開表達）","停業單位損益一律列為其他綜合損益（OCI）","停業單位不影響本期損益，僅於附註揭露"],"answer":1,"explain":["錯誤。停業單位損益不得與繼續營業單位損益合併列示；為利使用者評估持續性，兩者須分開表達。","正確。停業單位之稅後損益（含營運損益及處分或按公允價值減出售成本衡量之利益或損失）應於損益表「單獨列示」，與繼續營業單位分開，以彰顯其非持續性。","錯誤。停業單位損益屬本期損益之一部分而非OCI；OCI係指未實現評價、換算等特定項目。","錯誤。停業單位損益會影響本期損益並須於損益表單獨列示，不僅止於附註揭露。"],"src":"研究筆記第七章：停業單位損益單獨表達；IFRS 5/IAS 1"},{"id":"FN-C-037","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":1,"q":"評估企業盈餘之「持續性（可持續性）」時，下列敘述何者正確？","options":["非經常性損益之持續性高於經常性損益","營業外損益之持續性通常高於營業利益","經常性、核心營業之盈餘持續性較高","景氣循環股之盈餘持續性通常較高"],"answer":2,"explain":["錯誤。非經常性損益（如處分利得、減損迴轉）屬一次性，持續性低於經常性損益。","錯誤。營業外損益多屬非核心、波動大，持續性通常低於本業之營業利益。","正確。經常性、來自核心營業活動之盈餘可重複發生，持續性較高；營業利益之持續性高於營業外、經常性高於非經常性。","錯誤。景氣循環股盈餘隨景氣大幅起伏，循環性高、持續性低。"],"src":"研究筆記第九章：盈餘持續性（營業利益＞營業外、經常性＞非經常性）"},{"id":"FN-C-038","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":2,"q":"甲公司本期淨利遠高於營業活動現金流量，且應收帳款與存貨大幅增加。就盈餘品質分析而言，下列判斷何者最為適當？","options":["盈餘品質佳，因淨利成長強勁","盈餘品質存疑，淨利未獲現金流量支撐、應計項目偏高","應收與存貨增加代表營運效率提升，屬正面訊號","此現象與盈餘品質無關"],"answer":1,"explain":["錯誤。單看淨利成長無法判斷品質；淨利遠高於營業現金流量恰是品質存疑之警訊。","正確。淨利遠高於營業現金流量、且應收帳款與存貨大幅增加，代表盈餘多由應計項目形成、未轉化為現金，盈餘品質存疑（可能提前認列收入或塞貨）。","錯誤。應收與存貨大幅增加常反映收現變慢、存貨積壓，並非效率提升；配合淨利高於現金流量更是負面訊號。","錯誤。淨利與營業現金流量之差異及應計項目大小，正是評估盈餘品質之核心，兩者高度相關。"],"src":"研究筆記第九章、肆之20：淨利＞＞營業現金流量、應計項目大→品質低"},{"id":"FN-C-039","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":3,"q":"依我國「公開發行公司公開財務預測資訊處理準則」，關於財務預測之敘述，下列何者正確？","options":["財務預測僅有完整式一種，無簡式","完整式財務預測須揭露編製所依據之基本假設","財務預測一經公告即不得更新","簡式財務預測須逐項揭露所有重大會計假設"],"answer":1,"explain":["錯誤。財務預測分為「簡式」與「完整式」兩種，並非僅完整式一種。","正確。完整式財務預測須揭露其編製所依據之重要基本假設，供使用者評估預測之合理性。","錯誤。當影響財務預測之基本假設發生重大變動、致預測數與實際數有重大差異時，應公告「更新（正）」財務預測。","錯誤。逐項揭露完整基本假設係「完整式」之要求；簡式財務預測揭露程度較簡略。"],"src":"研究筆記第三章：財務預測分簡式與完整式、完整式揭露基本假設、重大變動應更新"},{"id":"FN-C-040","exam":"gaoye-fin","subject":"財務分析","topic":"盈餘評估與預測","difficulty":1,"q":"下列關於綜合損益表結構與「其他綜合損益（OCI）」之敘述，何者正確？","options":["綜合損益總額＝本期淨利＋其他綜合損益（OCI）","OCI項目一律於後續期間重分類至損益","本期淨利即為綜合損益總額，兩者恆相等","確定福利計畫之再衡量數（精算損益）後續應重分類至損益"],"answer":0,"explain":["正確。綜合損益總額＝本期淨利＋其他綜合損益（OCI）；OCI包含未實現評價、換算差額、精算損益等未認列於當期損益之項目。","錯誤。OCI項目分「可重分類」與「不可重分類」兩類，並非一律重分類；如指定FVOCI之權益工具評價損益即不得重分類。","錯誤。有OCI項目時，本期淨利與綜合損益總額不相等；綜合損益總額另加計OCI。","錯誤。確定福利計畫之再衡量數（精算損益）屬「不得重分類」至損益之OCI項目，僅可於權益內移轉。"],"src":"研究筆記第一章：完整財報綜合損益＝淨利＋OCI；IAS 1 OCI分類"},{"id":"FN-D-001","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":1,"q":"下列何者屬於資本預算評估方法中，「未考慮貨幣時間價值」的方法？","options":["淨現值法（NPV）","內部報酬率法（IRR）","（傳統）回收期間法","獲利能力指數法（PI）"],"answer":2,"explain":["NPV法將各期現金流量以資金成本折現後加總，已充分考慮貨幣時間價值，故不符題意。","IRR法求使NPV等於零之折現率，計算過程即以折現方式進行，已考慮貨幣時間價值，不符題意。","正確。傳統回收期間法只計算回收原始投資所需年數，未將現金流量折現，且忽略回收期間後的現金流量，是其兩大缺點。","獲利能力指數＝現金流入現值總和／原始投資，分子已折現，故有考慮貨幣時間價值，不符題意。"],"src":"研究筆記第十章資本預算；肆-高頻考點"},{"id":"FN-D-002","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":1,"q":"依淨現值法（NPV）之決策準則，當一獨立投資案的 NPV 計算結果為正值時，應如何決策？","options":["拒絕該投資案","接受該投資案","與回收期間法結果相同才接受","須待 IRR 大於零才可接受"],"answer":1,"explain":["NPV 為正代表投資案創造之現值大於成本，拒絕將放棄可增加企業價值的機會，故錯誤。","正確。NPV＞0 表示投資案帶來的現金流入現值超過原始投入，可增加股東財富，對獨立案應予接受。","獨立投資案之取捨僅依 NPV 是否大於零判斷，不需與回收期間法結果一致，故錯誤。","IRR 大於零並非接受準則；正確的 IRR 準則是 IRR 大於資金成本才接受，且此處以 NPV 為準則即可，故錯誤。"],"src":"研究筆記第十章：NPV＞0 接受"},{"id":"FN-D-003","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"某投資案原始投資 100 萬元，預期第 1、2 年年底各產生現金流入 60 萬元，若折現率（資金成本）為 10%，則該投資案之淨現值（NPV）最接近下列何者？（PV 因子：10% 第 1 年 0.909、第 2 年 0.826）","options":["約 4.1 萬元","約 20.0 萬元","約 –4.1 萬元","約 8.2 萬元"],"answer":0,"explain":["正確。現金流入現值＝60×0.909＋60×0.826＝54.54＋49.56＝104.1 萬元；NPV＝104.1－100＝4.1 萬元（為正，應接受）。","20 萬元為未折現淨流入（60＋60－100＝20），忽略了貨幣時間價值，故錯誤。","符號相反。折現後現金流入 104.1 萬大於成本 100 萬，NPV 應為正 4.1 萬而非負值，故錯誤。","8.2 萬約為僅折現一期兩筆金流之誤算；正確須各期分別以對應年度因子折現，故錯誤。"],"src":"研究筆記第十章 NPV；貨幣時間價值年金/現值"},{"id":"FN-D-004","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"關於內部報酬率法（IRR）的敘述，下列何者正確？","options":["IRR 是使投資案淨現值（NPV）等於零的折現率","IRR 小於資金成本時應接受該投資案","IRR 與 NPV 對「獨立」投資案的接受或拒絕結論必然相反","IRR 未考慮貨幣時間價值"],"answer":0,"explain":["正確。IRR 定義為使投資案 NPV 恰等於零的折現率，代表投資案本身的報酬率。","決策準則相反：IRR 大於（非小於）資金成本才接受；IRR 小於資金成本應拒絕，故錯誤。","對獨立投資案，IRR 與 NPV 的接受／拒絕結論通常一致（IRR＞資金成本等同 NPV＞0）；兩者可能衝突的情形限於互斥方案排序，故錯誤。","IRR 求解過程即以折現使 NPV 為零，本質上已考慮貨幣時間價值，故錯誤。"],"src":"研究筆記第十章：IRR＞資金成本接受"},{"id":"FN-D-005","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"甲公司之負債成本（稅前）為 8%，權益成本為 14%，資本結構中負債占 40%、權益占 60%，公司所得稅率為 25%。則其加權平均資金成本（WACC）最接近下列何者？","options":["12.4%","11.6%","11.2%","10.8%"],"answer":3,"explain":["12.4% 高於各成分成本合理加權結果，屬權數或稅盾套用錯誤，故錯誤。","11.6% 為權益與負債權數對調（負債 60%、權益 40%）之誤算，與題設結構不符，故錯誤。","11.2% 為未考慮負債稅盾（直接以 8%×0.4＋14%×0.6）之誤算，負債成本應乘以（1－稅率）後再加權，故錯誤。","正確。稅後負債成本＝8%×(1－25%)＝6%；WACC＝6%×0.4＋
