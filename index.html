"投資人若欲評估被投資公司在『社會風險』面向的表現，下列哪一項指標最為相關？","options":["高階經理人個人的慈善捐款金額","供應鏈是否訂有反奴役（禁止強迫勞動）政策","公司股價過去一年的Beta值","公司當年度的股東權益報酬率（ROE）"],"answer":1,"explain":["錯誤。高階經理人個人的捐款屬個人行為，並非衡量公司社會責任制度的適當指標，研究筆記特別指出不應看高管個人捐款。","正確。供應鏈是否訂有『反奴役（供應鏈奴役）政策』直接反映公司對供應鏈勞動人權的管理，是評估社會風險的適當指標。","錯誤。Beta值是衡量市場系統性風險的財務指標，與社會責任無關。","錯誤。ROE是財務績效指標，並非社會風險面向的衡量指標。"],"src":"研究筆記三(三)-8；社會風險應看供應鏈奴役政策"},{"id":"ESG-D-016","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"下列何者屬於『治理（Governance）』面向的風險管理議題？","options":["溫室氣體排放盤查與碳足跡","職業安全衛生與勞動條件","董事會結構、獨立董事與審計委員會運作","水資源使用與汙染防治"],"answer":2,"explain":["錯誤。溫室氣體排放盤查與碳足跡屬於『環境（E）』面向議題。","錯誤。職業安全衛生與勞動條件屬於『社會（S）』面向議題。","正確。董事會結構、獨立董事、審計委員會運作等屬於『治理（G）』面向的核心議題。","錯誤。水資源使用與汙染防治屬於『環境（E）』面向議題。"],"src":"研究筆記三(三)-9；治理風險（董事會結構與獨立董事）"},{"id":"ESG-D-017","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"我國主管機關為深化公司治理，於民國109年（2020）發布之政策藍圖名稱為下列何者？","options":["綠色金融行動方案3.0","上市櫃公司永續發展路徑圖","2050淨零排放路徑","公司治理3.0—永續發展藍圖"],"answer":3,"explain":["錯誤。綠色金融行動方案3.0（111年）著重整合金融資源支持淨零轉型，非公司治理專屬藍圖。","錯誤。上市櫃公司永續發展路徑圖（111年）著重分階段溫室氣體盤查與確信，屬環境面向時程。","錯誤。2050淨零排放路徑（111年國發會）為國家減碳路徑，非公司治理藍圖。","正確。『公司治理3.0—永續發展藍圖』於民國109年（2020）發布，為深化公司治理的政策藍圖，屬治理面向重要考點。"],"src":"研究筆記三(三)-9；公司治理3.0—永續發展藍圖（109年）"},{"id":"ESG-D-018","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"我國證券主管機關辦理之『公司治理評鑑』，其開始辦理的時間與頻率為下列何者？","options":["自民國103年起每年辦理","自民國100年起每兩年辦理一次","自民國109年起每季辦理","自民國113年起每半年辦理"],"answer":0,"explain":["正確。公司治理評鑑自民國103年（2014）起每年辦理，是評估上市櫃公司治理表現的重要機制。","錯誤。開始年度與頻率均不符，公司治理評鑑並非100年開辦、亦非每兩年一次。","錯誤。公司治理評鑑為每年辦理而非每季，起始年度亦非109年。","錯誤。公司治理評鑑起始於103年而非113年，頻率為每年而非每半年。"],"src":"研究筆記三(三)-9；公司治理評鑑（103年起每年辦理）"},{"id":"ESG-D-019","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"下列關於機構投資人參與被投資公司治理的機制，何者最能體現『盡職治理（stewardship）』與『股東行動主義』的精神？","options":["機構投資人被動持股，完全不參與公司決策","機構投資人依盡職治理守則，積極監督並與被投資公司議合、行使投票權","機構投資人僅追求短期買賣價差，不關注公司長期治理","機構投資人將所有表決權一律委由公司經營層代理行使"],"answer":1,"explain":["錯誤。被動持股、完全不參與，正是盡職治理所欲改善的消極態度，不符合股東行動主義精神。","正確。依『機構投資人盡職治理守則』積極監督、與被投資公司議合並行使投票權，正體現盡職治理與股東行動主義的精神。","錯誤。僅追求短期價差、不關注長期治理，與盡職治理強調長期價值的精神相悖。","錯誤。將表決權一律委由經營層代理，等同放棄監督，違背盡職治理與股東行動主義。"],"src":"研究筆記三(三)-9；股東行動主義、機構投資人盡職治理守則"},{"id":"ESG-D-020","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"許多公司近年將高階經理人薪酬與ESG績效指標連結。此作法主要目的為下列何者？","options":["降低公司當年度的所得稅負","使薪酬制度誘因與永續目標一致，強化ESG治理當責","規避溫室氣體盤查的法定義務","提高公司短期每股盈餘（EPS）"],"answer":1,"explain":["錯誤。薪酬連結ESG的目的並非節稅，與所得稅負無直接關聯。","正確。將薪酬與ESG績效連結，是使經理人誘因與公司永續目標一致、強化ESG當責（accountability）的治理機制。","錯誤。薪酬連結ESG無法規避法定盤查義務，兩者無關。","錯誤。薪酬連結ESG著眼長期永續，並非為衝高短期EPS。"],"src":"研究筆記三(三)-9；治理風險、薪酬連結ESG"},{"id":"ESG-D-021","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"金融機構管理ESG風險時，常使用多種風險管理工具。下列何者『不是』研究筆記所列的氣候/ESG風險管理工具？","options":["氣候情境分析與壓力測試","內部碳定價","投融資組合碳排放量測（PCAF）","公司債的到期殖利率曲線建構"],"answer":3,"explain":["錯誤（屬管理工具）。氣候情境分析與壓力測試（NGFS情境）是氣候風險管理的核心工具。","錯誤（屬管理工具）。內部碳定價可將碳成本內化，是ESG風險管理工具之一。","錯誤（屬管理工具）。投融資組合碳排放量測（PCAF，財務碳排放）用於衡量金融機構間接排放，屬管理工具。","正確（並非ESG風險管理工具）。建構公司債到期殖利率曲線是傳統利率/固定收益分析工具，並非研究筆記所列的氣候/ESG風險管理工具。"],"src":"研究筆記三(三)-10；風險管理工具（情境分析、內部碳定價、PCAF）"},{"id":"ESG-D-022","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"下列關於各主流ESG評比/評等結果解讀的敘述，何者正確？","options":["MSCI ESG評等分為AAA至CCC共七個等級","Sustainalytics的ESG風險分數越『高』代表風險越低、表現越好","CDP氣候問卷評等最高等級為CCC","DJSI道瓊永續指數的評分與企業ESG表現無關"],"answer":0,"explain":["正確。MSCI ESG評等由最高AAA至最低CCC，共分七個等級，是研究筆記明列的內容。","錯誤。Sustainalytics是『風險分數』，分數越『低』代表風險越低、表現越好，本敘述方向相反。","錯誤。CDP氣候問卷評等最高為A、最低約D-，並非以CCC為最高。","錯誤。DJSI是以企業永續表現為評選基礎的指數，與ESG表現高度相關，本敘述錯誤。"],"src":"研究筆記三(三)-11；MSCI（AAA-CCC七級）、Sustainalytics、CDP、DJSI"},{"id":"ESG-D-023","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"對於著眼企業長期價值的投資人而言，評估被投資公司永續體質時，下列何者最應優先參考？","options":["市場Beta值","股東權益報酬率（ROE）","ESG評比／評等結果","近一季的股價漲跌幅"],"answer":2,"explain":["錯誤。Beta值衡量的是短期市場系統性風險，無法反映長期永續體質。","錯誤。ROE屬短期財務績效指標，未涵蓋環境、社會、治理面向。","正確。研究筆記指出，長期投資人應優先參考『ESG評比/評等』，而非Beta、ROE等短期財務指標，以評估永續體質。","錯誤。近一季股價漲跌幅屬短期市場表現，非長期永續體質的適當指標。"],"src":"研究筆記三(三)-11；長期投資人應優先參考ESG評比"},{"id":"ESG-D-024","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"氣候變遷的科學評估工作，國際上主要由下列哪一機構負責？","options":["UNFCCC秘書處","IPCC（政府間氣候變遷專門委員會）","IFRS基金會","世界銀行"],"answer":1,"explain":["錯誤。UNFCCC秘書處負責氣候公約談判與行政事務，並非科學評估的主責機構。","正確。氣候變遷的科學評估由IPCC（政府間氣候變遷專門委員會）負責，研究筆記明確指出非UNFCCC秘書處。","錯誤。IFRS基金會負責永續財務揭露準則，與氣候科學評估無關。","錯誤。世界銀行為國際金融機構，非氣候科學評估主責機構。"],"src":"研究筆記三(三)-5；氣候科學評估由IPCC負責"},{"id":"ESG-D-025","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"依《臺灣氣候變遷科學報告2017》，關於未來西北太平洋與侵臺颱風的推估，下列敘述何者正確？","options":["颱風個數增加，且強度減弱","颱風個數減少，但強度增強","颱風個數與強度均維持不變","颱風個數與強度均大幅增加"],"answer":1,"explain":["錯誤。報告推估的是颱風個數『減少』而非增加，且強度是增強而非減弱。","正確。《臺灣氣候變遷科學報告2017》推估未來西北太平洋與侵臺颱風『個數減少、但強度增強』，是研究筆記明列的內容。","錯誤。報告推估個數與強度均有變化（個數減少、強度增強），並非維持不變。","錯誤。報告推估個數減少而非大幅增加，僅強度增強。"],"src":"研究筆記三(三)-5；臺灣氣候變遷科學報告2017"},{"id":"ESG-D-026","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"依瑞士再保險2013年以5項天然災害指標對全球616個都會區進行的風險研究，下列何者風險評比最高？","options":["東京都會區","臺北都會區","紐約都會區","上海都會區"],"answer":1,"explain":["錯誤。該研究結論指向臺北都會區風險最高，並非東京。","正確。瑞士再保險2013年的5項天災指標研究（全球616個都會區）指出『臺北都會區風險最高』，是研究筆記明列的內容。","錯誤。該研究結論指向臺北都會區風險最高，並非紐約。","錯誤。該研究結論指向臺北都會區風險最高，並非上海。"],"src":"研究筆記三(三)-5；瑞士再保險2013年天災指標研究"},{"id":"ESG-D-027","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"金融機構將氣候與環境風險納入整體風險管理時，下列敘述何者較為適當？","options":["氣候風險是全新風險，與既有的信用、市場、作業風險完全獨立，應另建互不相干的體系","氣候與環境風險可視為既有風險的驅動因子，透過信用、市場、流動性、作業等既有風險管道傳導並放大","氣候風險僅屬長期議題，短期內對金融機構沒有任何影響，可暫不納入管理","只要購買綠色債券即可完全對沖所有氣候風險"],"answer":1,"explain":["錯誤。氣候風險並非與既有風險完全獨立，而是作為驅動因子透過既有管道傳導，另建互不相干體系並不妥當。","正確。氣候與環境風險通常被視為既有風險的『驅動因子』，會透過信用、市場、流動性、作業等既有風險管道傳導並放大，這是主流的整合式風險管理觀點。","錯誤。氣候風險兼具短期（立即性實體、政策突變）與長期影響，不能認為短期毫無影響。","錯誤。購買綠色債券無法對沖所有氣候風險，此說法過度簡化且錯誤。"],"src":"研究筆記三(三)-1、6；氣候風險作為既有風險驅動因子之傳導"},{"id":"ESG-D-028","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"『DEI』是近年社會與治理面向的重要議題，其中文最適當的意涵為下列何者？","options":["資料、能源與基礎建設（Data, Energy, Infrastructure）","揭露、確信與整合（Disclosure, Assurance, Integration）","多元、公平與共融（Diversity, Equity, Inclusion）","負債、股權與投資（Debt, Equity, Investment）"],"answer":2,"explain":["錯誤。此為杜撰的對應，DEI並非指資料、能源與基礎建設。","錯誤。此為杜撰的對應，與DEI無關。","正確。DEI即Diversity（多元）、Equity（公平）、Inclusion（共融），是職場社會面向與治理面向的重要議題。","錯誤。此為杜撰的對應，DEI並非財務融資概念。"],"src":"研究筆記三(三)-8；社會風險（DEI多元共融）"},{"id":"ESG-D-029","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"下列何者屬於『社會（S）』面向的風險或議題，而非環境或治理面向？","options":["職業安全衛生與勞動權益保障","董事會多元化與獨立董事比例","溫室氣體範疇一、二排放盤查","內部碳定價機制的建立"],"answer":0,"explain":["正確。職業安全衛生與勞動權益保障是『社會（S）』面向的核心議題。","錯誤。董事會多元化與獨立董事比例屬於『治理（G）』面向。","錯誤。溫室氣體範疇一、二排放盤查屬於『環境（E）』面向。","錯誤。內部碳定價機制主要屬於『環境（E）』風險管理工具。"],"src":"研究筆記三(三)-8；社會風險（職業安全、勞動權益）"},{"id":"ESG-D-030","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"關於氣候情境分析中『情境』的性質，下列敘述何者最為正確？","options":["情境是對未來的精確預測，代表最可能發生的單一結果","情境是對未來各種可能發展路徑的假設性描述，用以評估風險，並非精確預測","只要採用最悲觀的情境即可，無須考慮其他情境","情境分析僅適用於環境風險，不適用於評估金融機構的財務韌性"],"answer":1,"explain":["錯誤。情境並非『精確預測』，也不代表單一最可能結果，此為對情境分析常見的誤解。","正確。情境是對未來各種可能發展路徑的假設性描述，用以評估在不同假設下的風險與韌性，本質上並非精確預測，這是情境分析的正確觀念。","錯誤。情境分析通常需涵蓋多種情境（如有序轉型、無序轉型、政策落後等NGFS情境），只採最悲觀情境並不完整。","錯誤。氣候情境分析正是用來評估金融機構財務韌性的工具，並非僅適用於環境風險。"],"src":"研究筆記三(三)-10；氣候情境分析與壓力測試"},{"id":"ESG-D-031","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"下列何者屬於企業『誠信經營』與治理風險控管的機制？","options":["建立檢舉（吹哨者）制度與誠信經營守則","增加燃煤發電以降低成本","擴大範疇三排放以提升營收","縮減獨立董事席次以加速決策"],"answer":0,"explain":["正確。建立檢舉（吹哨者）制度與訂定誠信經營守則，是防範舞弊、強化治理與誠信經營的重要機制。","錯誤。增加燃煤發電與誠信經營無關，且與減碳目標背道而馳。","錯誤。擴大排放不屬於治理誠信機制，且不利永續。","錯誤。縮減獨立董事席次會削弱監督機制，反而不利公司治理。"],"src":"研究筆記三(三)-9；誠信經營守則、檢舉制度"},{"id":"ESG-D-032","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"金融機構在管理ESG風險時，下列何者屬於針對『環境風險』的具體作為？","options":["訂定董事會席次性別比例目標","建立員工職業安全衛生管理系統","制定供應鏈反強迫勞動政策","進行投融資組合的碳排放盤查與量測（如PCAF）"],"answer":3,"explain":["錯誤。訂定董事會性別比例目標屬於『治理/社會』面向作為。","錯誤。員工職業安全衛生管理屬於『社會』面向作為。","錯誤。供應鏈反強迫勞動政策屬於『社會』面向作為。","正確。對投融資組合進行碳排放盤查與量測（如PCAF財務碳排放），是金融機構管理『環境風險』的具體作為。"],"src":"研究筆記三(三)-10；環境風險、投融資組合碳排（PCAF）"},{"id":"ESG-D-033","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"依研究筆記，金管會要求本國銀行與保險業自民國112年（2023）起，須就自身營運進行下列何項作業並申報？","options":["自身溫室氣體碳盤查","客戶個人資料外洩通報","董事酬勞的個別揭露","不動產逐筆重估價"],"answer":0,"explain":["正確。金管會要求銀行、保險業自112年起進行『自身溫室氣體碳盤查』並申報，屬於金融機構自身環境風險管理的一環。","錯誤。個資外洩通報屬資安/個資保護範疇，非本題所指112年起的碳盤查要求。","錯誤。董事酬勞揭露屬公司治理揭露事項，非本題所指自身碳盤查申報。","錯誤。不動產逐筆重估屬會計評價事項，與自身碳盤查無關。"],"src":"研究筆記三(三)-10；金融機構自身碳盤查（銀行、保險業112年起申報）"},{"id":"ESG-D-034","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"依NGFS的氣候情境架構，下列關於『有序轉型』與『無序轉型』的相對比較，何者最為正確？","options":["有序轉型因政策提早且漸進推動，整體轉型風險與實體風險通常相對較低","無序轉型因政策及早明確，轉型成本必然最低","有序轉型代表完全不採取任何減碳政策","無序轉型與有序轉型對經濟的影響完全相同"],"answer":0,"explain":["正確。有序轉型（orderly）指政策提早且循序推動，使經濟能平順調整，整體轉型風險與實體風險通常相對較低，這是NGFS情境的基本邏輯。","錯誤。無序轉型（disorderly）指政策延遲或突然收緊，轉型成本較高，並非最低。","錯誤。有序轉型是『積極且及早』推動減碳政策，並非不採取任何政策。","錯誤。不同情境對經濟的影響程度不同（有序衝擊較緩、無序衝擊較大），並非完全相同。"],"src":"研究筆記三(三)-10；情境分析與氣候壓力測試（NGFS情境）"},{"id":"ESG-D-035","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"關於金融機構的『漂綠（greenwashing）』風險，下列敘述何者正確？","options":["只要商品名稱含有『綠色』字樣，即可免除漂綠責任","全面且完整揭露正、負面影響本身即構成漂綠行為","漂綠風險已納入ESG風險治理，防漂綠內控與行銷審查屬金融機構的治理義務","漂綠僅是行銷手法，與風險治理無關，主管機關並不介入"],"answer":2,"explain":["錯誤。名稱含『綠色』字樣不能免除漂綠責任，反而更需名實相符，否則可能構成漂綠。","錯誤。全面且完整揭露正負面影響正是『防漂綠』的正確作法，而非漂綠行為，本敘述將觀念反轉。","正確。漂綠風險已納入ESG風險治理，建立防漂綠內控與加強行銷/商品審查是金融機構的治理義務，金管會113年並發布防漂綠參考指引。","錯誤。漂綠已是風險治理與監理重點，主管機關（金管會）有介入並發布指引，本敘述錯誤。"],"src":"研究筆記三(三)-12；漂綠風險已納入ESG風險治理"},{"id":"ESG-D-036","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"某金融控股公司董事會由15席董事組成，其中獨立董事僅1席，且成員性別、專業背景高度同質。就治理風險而言，下列評估何者最為適當？","options":["董事會人數眾多即代表治理良好，無須再檢視組成","董事會獨立性與多元性明顯不足，可能削弱監督制衡與決策品質，屬治理風險","獨立董事只要有1席即完全符合最佳實務，毋須增加","董事成員背景同質有助決策一致，對治理有正面幫助"],"answer":1,"explain":["錯誤。董事會人數多寡不等於治理良好，仍須檢視獨立性與多元性等組成品質。","正確。獨立董事席次過少、成員高度同質，代表獨立性與多元性不足，可能削弱監督制衡與決策品質，構成治理風險，符合董事會多元與獨立性的評估重點。","錯誤。獨立董事僅1席並不足以構成有效制衡，難謂符合最佳實務。","錯誤。成員背景高度同質易產生盲點與群體迷思，通常不利治理，並非正面幫助。"],"src":"研究筆記三(三)-9；董事會多元與獨立性"},{"id":"ESG-D-037","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"金融機構若要落實『責任投資』並管理ESG風險，就保險業而言，下列何者為研究筆記所指之典型責任投資方向？","options":["集中投資單一高碳排上游產業以追求高報酬","僅投資短期票券以規避所有風險","避免任何ESG資訊揭露以降低成本","投資再生能源和基礎建設產業"],"answer":3,"explain":["錯誤。集中投資單一高碳排產業與責任投資分散風險、支持永續的精神相悖。","錯誤。僅投資短期票券並非責任投資的定義，責任投資強調將ESG納入投資決策。","錯誤。避免ESG資訊揭露與責任投資強調透明揭露的原則相反。","正確。研究筆記明列保險業責任投資即『投資再生能源和基礎建設產業』，兼顧永續與長期穩定報酬。"],"src":"研究筆記三(三)、四-1；保險業責任投資＝投資再生能源和基礎建設產業"},{"id":"ESG-D-038","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"針對氣候變遷下與『和平及移民』相關風險的『調適』選項，下列何者最為相符？","options":["加裝碳捕捉與封存設備","以造林植樹增加碳匯","發展季節性就業與匯款流動、農村到城市的移民","擴大燃煤電廠裝置容量"],"answer":2,"explain":["錯誤。碳捕捉與封存屬於降低排放的『減緩』措施，非針對移民風險的調適。","錯誤。造林植樹增加碳匯屬於『減緩』措施，非針對移民風險的調適。","正確。研究筆記指出，針對和平與移民風險的『調適』選項即『季節性就業和匯款流動、農村到城市的移民』，用以降低衝擊。","錯誤。擴大燃煤裝置容量會增加排放，與減緩、調適方向皆相悖。"],"src":"研究筆記三(三)-3；針對和平與移民風險之調適選項"},{"id":"ESG-D-039","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"下列何者最能反映企業在『供應鏈管理』上落實社會責任與人權盡職調查？","options":["要求供應商遵守勞動與人權標準，並定期進行查核","僅以最低報價作為唯一選商標準，不問勞動條件","要求供應商墊付貨款以改善自身現金流","將所有生產外包以規避自身環境責任"],"answer":0,"explain":["正確。要求供應商遵守勞動與人權標準並定期查核，是供應鏈管理落實社會責任與人權盡職調查的具體作為。","錯誤。僅以最低報價選商、不問勞動條件，可能助長血汗勞動，未落實社會責任。","錯誤。要求供應商墊付貨款屬財務轉嫁，與社會責任、人權盡職調查無關。","錯誤。外包以規避環境責任是逃避責任的作法，並非落實供應鏈社會責任。"],"src":"研究筆記三(三)-8；供應鏈管理、人權盡職調查"},{"id":"ESG-D-040","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"綜合ESG風險概述，下列關於『ESG風險傳導』的敘述，何者最為正確？","options":["ESG風險只會影響企業聲譽，不會轉化為財務上的損失","ESG風險（環境、社會、治理面向）可透過營運、法遵、市場等管道，最終傳導並轉化為企業與金融機構的財務風險","ESG三面向彼此獨立，環境事件絕不會引發社會或治理問題","只要不揭露ESG資訊，ESG風險就不會發生"],"answer":1,"explain":["錯誤。ESG風險不僅影響聲譽，最終會透過還款能力、資產減損、罰款等轉化為財務損失，本敘述過於狹隘。","正確。ESG風險可透過營運、法遵、市場等多重管道傳導，最終轉化為企業與金融機構的信用、市場、作業等財務風險，這是ESG風險傳導的正確觀念。","錯誤。ESG三面向常相互關聯，例如環境汙染事件可能同時引發社會抗爭與治理課責，並非彼此獨立。","錯誤。不揭露資訊無法消除風險本身，反而可能因資訊不透明升高治理與漂綠風險。"],"src":"研究筆記三(三)-1、6；ESG風險概述與傳導"},{"id":"ESG-E-001","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"國際知名ESG評等機構MSCI對企業之ESG評等，下列敘述何者正確？","options":["評等由最高AAA至最低CCC，共分為七級","評等由最高A+至最低D-，共分為十級","評等分數越低，代表企業ESG表現越佳","評等僅衡量環境（E）單一構面之表現"],"answer":0,"explain":["正確。MSCI ESG評等由最高AAA至最低CCC共七級（AAA、AA、A、BBB、BB、B、CCC），綜合衡量企業在環境、社會、治理三構面之相對表現，等級越高代表ESG管理能力越佳。","錯誤。A+至D-並非MSCI之評等級距，MSCI係採AAA至CCC之七級制；以字母A至D-評分者為CDP氣候問卷之評級方式。","錯誤。「分數越低越好」係Sustainalytics ESG風險分數之解讀方式；MSCI採等級制，等級越接近AAA表現越佳，並無分數越低越好之概念。","錯誤。MSCI ESG評等涵蓋環境（E）、社會（S）、治理（G）三大構面，並非僅衡量環境單一構面。"],"src":"研究筆記（三）11：ESG評比—MSCI評等（AAA–CCC七級）"},{"id":"ESG-E-002","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"投資人參考不同ESG評等機構之評估結果時，下列關於各機構評等特性之敘述，何者正確？","options":["Sustainalytics之ESG風險分數，分數越高代表永續表現越佳","Sustainalytics之ESG風險分數，分數越低代表未被管理之ESG風險越低、表現相對越佳","CDP氣候變遷問卷之最高評級為AAA級","MSCI ESG評等之最高等級為A+級"],"answer":1,"explain":["錯誤。Sustainalytics採「ESG風險分數」概念，分數越高代表企業暴露且未被有效管理之ESG風險越高、表現越差，並非分數越高越好。","正確。Sustainalytics評估企業之ESG風險，風險分數越低代表風險越低、永續管理表現相對越佳；其解讀方向與MSCI「等級越高越好」相反，投資人比較不同機構評等結果時應特別留意方向差異。","錯誤。CDP氣候變遷問卷評級最高為A（級距為A至D-），並無AAA級；AAA為MSCI ESG評等之最高等級。","錯誤。MSCI ESG評等最高為AAA、最低為CCC，共七級，並無A+級。"],"src":"研究筆記（三）11：MSCI（AAA–CCC七級）、Sustainalytics（風險分數越低越好）、CDP（A–D-）"},{"id":"ESG-E-003","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"關於道瓊永續指數（DJSI），下列敘述何者正確？","options":["由臺灣證券交易所編製，成分股僅限臺灣上市公司","僅評估企業之公司治理單一構面","透過年度企業永續評估，選入各產業中永續績效相對領先之企業，屬國際知名之永續指數","企業只要自願申請即可自動納入成分股，無須經過評選"],"answer":2,"explain":["錯誤。DJSI（道瓊永續指數）為國際性永續指數，並非由臺灣證券交易所編製；由我國參與編製者為臺灣永續指數、公司治理100指數等國內指數。","錯誤。DJSI綜合評估企業於經濟／治理、環境、社會等多構面之永續績效，並非僅評估公司治理單一構面。","正確。DJSI透過年度企業永續評估（問卷調查），評選各產業中永續績效相對領先之企業納入成分股，體現「同類最佳」（Best-in-Class）之篩選精神，為國際上具代表性之永續指數，常被企業視為永續績效之重要指標。","錯誤。納入DJSI成分股須經企業永續評估並依結果擇優篩選，並非自願申請即自動納入。"],"src":"研究筆記（三）11、（四）9：DJSI道瓊永續指數；同類最佳篩選精神"},{"id":"ESG-E-004","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"我國於2017年發布之「臺灣永續指數」（FTSE4Good TIP Taiwan ESG指數），係與下列哪一國際指數機構合作編製？","options":["MSCI（明晟）","標準普爾道瓊指數公司（S&P DJI）","晨星（Morningstar）","富時羅素（FTSE Russell）"],"answer":3,"explain":["錯誤。MSCI為另一國際知名之ESG評等與指數機構，惟臺灣永續指數並非與MSCI合作編製。","錯誤。標準普爾道瓊指數公司屬道瓊永續指數（DJSI）體系之相關機構，與臺灣永續指數之編製無關。","錯誤。晨星（旗下有Sustainalytics）主要提供基金研究與ESG風險評等服務，並非臺灣永續指數之合作編製機構。","正確。臺灣永續指數（FTSE4Good TIP Taiwan ESG指數）於2017年發布，係與富時羅素（FTSE Russell）合作、採用其FTSE4Good永續指數系列之方法編製，用以衡量臺灣上市公司之ESG表現，可供機構投資人作為永續投資之選股與績效比較基準。"],"src":"研究筆記（四）9：臺灣永續指數（FTSE4Good TIP，2017）"},{"id":"ESG-E-005","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"關於我國「公司治理100指數」，下列敘述何者正確？","options":["成分股篩選以公司治理評鑑結果為重要依據，藉以鼓勵企業提升治理品質","成分股僅依公司市值大小排序選取前100家，與治理表現無關","該指數係由金融監督管理委員會自行編製發布","成分股一經納入即永久有效，之後不再定期審核調整"],"answer":0,"explain":["正確。公司治理100指數以公司治理評鑑結果作為成分股篩選之重要依據（我國公司治理評鑑自103年起每年辦理），自治理表現優良之上市公司中選取成分股，引導企業重視公司治理並落實永續發展。","錯誤。該指數並非單純以市值排序選股，公司治理評鑑結果為關鍵篩選條件；若僅依市值選取即與一般市值型指數無異，喪失鼓勵治理之意義。","錯誤。指數係由證券交易所及指數編製機構編製發布；金管會為證券市場之主管機關，並不直接編製指數。","錯誤。指數成分股須配合每年評鑑結果定期審核調整，治理表現變動之公司可能被納入或剔除，並非一經納入即永久有效。"],"src":"研究筆記（四）9、（三）9：公司治理100指數；公司治理評鑑103年起每年辦理"},{"id":"ESG-E-006","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"機構投資人運用外部ESG評等資料進行投資決策時，下列何項認知最為正確？","options":["各家ESG評等機構之方法學一致，同一公司在不同機構之評等結果必然相同","ESG評等越高，即代表主管機關保證該公司未來之股價報酬越高","不同評等機構之評估方法與權重存在分歧，同一公司之評等結果可能明顯不同，投資人宜了解其方法學並輔以自身分析","ESG評等已可完全取代財務分析，投資決策無須再考量財務資訊"],"answer":2,"explain":["錯誤。各評等機構之指標選取、權重設計與評分方法並不一致，方法學分歧為ESG評等之主要局限，同一公司在不同機構之評等結果經常出現落差。","錯誤。ESG評等係民間機構對企業永續表現之評估意見，並非主管機關背書，更不構成任何報酬保證；將評等與保證報酬連結係常見誤解。","正確。ESG評等之最大局限即在於各機構方法學分歧，同一公司評等結果可能明顯不同；投資人使用時應了解各機構之評估方法與範圍，並輔以自身之基本面與永續分析，不宜僅依單一評等結果作成決策。","錯誤。ESG評等係補充傳統財務分析之永續面資訊，兩者相輔相成，投資決策仍須綜合考量財務與非財務資訊，ESG評等無法完全取代財務分析。"],"src":"研究筆記（四）9：ESG評等用途與局限（方法學分歧）"},{"id":"ESG-E-007","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"某投資機構之投資政策明定：一律排除菸草、爭議性武器等特定產業之公司，不納入投資組合。此種責任投資策略屬於下列何者？","options":["影響力投資","負面排除法","ESG整合","永續主題投資"],"answer":1,"explain":["錯誤。影響力投資係在追求財務回報之同時，意圖創造「可衡量」之正面社會或環境影響；單純排除特定產業並不符合其定義。","正確。負面排除法（排除法篩選）係依特定價值觀或ESG標準，將菸草、爭議性武器、化石燃料等爭議性產業或不符標準之公司排除於投資組合之外，屬最早發展且最直觀之責任投資策略。","錯誤。ESG整合係將ESG因子系統性納入財務分析與投資決策流程，並不必然排除特定產業。","錯誤。永續主題投資係聚焦投資於特定永續主題（如再生能源、水資源、綠色科技）相關標的，與排除特定產業之作法方向不同。"],"src":"研究筆記（四）1：GSIA責任投資策略—負面排除"},{"id":"ESG-E-008","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"投資人於「各產業中」分別挑選ESG表現相對最佳之企業納入投資組合，此種責任投資策略稱為下列何者？","options":["規範基礎篩選","負面排除法","企業議合與股東行動","正面表列（同類最佳，Best-in-Class）"],"answer":3,"explain":["錯誤。規範基礎篩選係依聯合國全球盟約等國際規範，檢視企業是否違反最低行為標準據以篩選標的，與「各產業內擇優」之作法不同。","錯誤。負面排除法係將爭議性產業或不符標準之公司剔除於投資組合外，屬「剔除劣者」；題幹所述為「擇取優者」，方向相反。","錯誤。企業議合與股東行動係透過行使投票權、與經營階層對話等方式影響公司行為，屬積極所有權之運用，並非選股篩選方法。","正確。正面表列（同類最佳，Best-in-Class）係於各產業中挑選ESG表現相對領先之企業納入投資組合，不整體排除任何產業，而以產業內相對表現擇優；道瓊永續指數（DJSI）之成分股篩選即體現此精神。"],"src":"研究筆記（四）1：GSIA責任投資策略—正面表列（同類最佳）"},{"id":"ESG-E-009","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"下列何者最符合「影響力投資」（Impact Investing）之定義？","options":["在追求財務回報之同時，意圖創造可衡量之正面社會或環境影響，並追蹤衡量其影響成果","單純無償捐贈資金予公益團體，不要求任何財務回報","排除高碳排產業後，被動追蹤大盤指數之表現","僅投資股價動能強勁之熱門永續概念股，以賺取短線價差為目的"],"answer":0,"explain":["正確。影響力投資之核心特徵有二：一為「意圖性」，即有意圖地創造正面社會或環境影響；二為「可衡量性」，即須衡量並報告影響成果；同時仍追求財務回報，兼顧影響與報酬，與慈善捐贈有別。","錯誤。無償捐贈屬慈善行為，不追求財務回報；影響力投資係「投資」行為，須兼顧財務回報與正面影響。","錯誤。排除特定產業後被動追蹤指數屬負面排除策略之運用，欠缺主動創造並衡量正面影響之意圖，非影響力投資。","錯誤。以短線價差為目的之動能操作屬一般交易策略，未以創造可衡量之社會或環境影響為目標，與影響力投資無關。"],"src":"研究筆記（四）1：GSIA責任投資策略—影響力投資"},{"id":"ESG-E-010","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"某資產管理公司長期持有被投資公司之股票，透過出席股東會行使投票權、與經營階層持續議合對話等方式，促使該公司改善其氣候治理。此作法屬於下列何種責任投資策略？","options":["負面排除法","永續主題投資","企業議合與股東行動（盡職治理參與）","規範基礎篩選"],"answer":2,"explain":["錯誤。負面排除法係直接將不符標準之公司排除於投資組合外；題幹之投資人並未出售或排除持股，而係持續持有並積極影響公司行為。","錯誤。永續主題投資係投資於特定永續主題（如再生能源、水資源）之標的，與透過股東權利影響公司之作法不同。","正確。企業議合與股東行動（盡職治理參與）係投資人以「積極所有權人」角色，透過行使投票權、股東提案、與經營階層議合對話等方式，促使被投資公司改善ESG表現；此亦呼應PRI第二項原則（成為積極之所有權人）及機構投資人盡職治理守則之精神。","錯誤。規範基礎篩選係依國際規範之最低行為標準篩選投資標的，屬選股方法，並非透過股東權利影響公司行為。"],"src":"研究筆記（四）1：企業議合與股東行動；PRI原則二（積極所有權）、（三）9盡職治理守則"},{"id":"ESG-E-011","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"依全球永續投資聯盟（GSIA）之責任投資策略分類，下列何者「不屬於」責任投資策略？","options":["規範基礎篩選","ESG整合","影響力投資","高頻程式動能交易"],"answer":3,"explain":["規範基礎篩選屬GSIA責任投資策略之一，係依聯合國全球盟約等國際規範檢視企業行為，據以篩選投資標的。","ESG整合屬GSIA責任投資策略之一，係將ESG因子系統性納入財務分析與投資決策流程。","影響力投資屬GSIA責任投資策略之一，係追求可衡量之正面社會或環境影響並兼顧財務回報。","正確（此為不屬於者）。高頻程式動能交易僅為追求價差之交易技術，與ESG考量無關。GSIA責任投資策略共七類：負面排除、正面表列（同類最佳）、規範基礎篩選、ESG整合、永續主題投資、影響力投資、企業議合與股東行動。"],"src":"研究筆記（四）1：GSIA責任投資策略七分類"},{"id":"ESG-E-012","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"某基金經理人建構投資組合時，並未排除任何特定產業，而係將氣候風險、勞資關係、董事會品質等ESG因子，系統性納入財務預測與估值模型，與傳統財務分析結合後作成投資決策。此作法最符合下列何種責任投資策略？","options":["ESG整合","負面排除法","影響力投資","規範基礎篩選"],"answer":0,"explain":["正確。ESG整合之特徵在於將ESG因子「系統性、明確地」納入財務分析與投資決策流程（如調整盈餘預測、折現率或估值），與傳統財務分析結合，且不以排除特定產業為必要手段，題幹情境完全相符。","錯誤。負面排除法須將特定產業或公司排除於投資組合之外；題幹已明示「未排除任何特定產業」，故非負面排除。","錯誤。影響力投資須具備創造「可衡量之正面社會或環境影響」之意圖並追蹤成果；題幹僅將ESG因子納入分析以優化投資決策，未以創造可衡量影響為目標。","錯誤。規範基礎篩選係依國際規範（如聯合國全球盟約）之最低標準篩選或剔除違反者，題幹並非依規範標準篩選，而係將ESG納入估值分析。"],"src":"研究筆記（四）1：GSIA責任投資策略—ESG整合"},{"id":"ESG-E-013","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"下列何者屬於保險業實踐「責任投資」之具體作法？","options":["將資金集中投資於高碳排火力發電事業以追求最高收益","投資再生能源及基礎建設產業，發揮保險資金長期穩定之特性","全數資金僅從事短線股票進出以賺取價差","將資金全數存放活期存款，避免承作任何投資"],"answer":1,"explain":["錯誤。集中投資高碳排產業以追求收益，未將ESG因素納入投資考量，與責任投資之精神背道而馳。","正確。保險業資金具有長期、穩定之特性，投資再生能源及基礎建設產業既可支持永續發展與能源轉型，亦符合保險資金長期配置需求，為保險業實踐責任投資之代表性作法。","錯誤。短線價差交易未考量ESG因素，且與保險資金長期穩健運用之本質不符，非責任投資之實踐。","錯誤。責任投資係將ESG納入「投資」決策，並非消極不投資；全數存放活存既無法支持永續發展，亦不利保險資金之有效運用。"],"src":"研究筆記（四）1：保險業責任投資（投資再生能源和基礎建設產業）"},{"id":"ESG-E-014","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"關於「責任投資原則」（PRI），下列敘述何者錯誤？","options":["於2006年在聯合國支持下發布","由聯合國環境規劃署金融倡議（UNEP FI）與聯合國全球盟約共同支持推動","內容共計六項原則","僅適用於銀行辦理授信業務，資產管理機構不得簽署"],"answer":3,"explain":["正確之敘述。PRI於2006年在聯合國支持下發布，為全球責任投資最具代表性之國際倡議。","正確之敘述。PRI由UNEP FI（聯合國環境規劃署金融倡議）與聯合國全球盟約（UN Global Compact）共同支持推動。","正確之敘述。PRI共六項原則，內容涵蓋將ESG納入投資分析與決策、積極所有權、要求揭露、推廣原則、合作及報告等。","錯誤（本題答案）。PRI係針對「投資機構」之原則，簽署者為資產擁有者（如退休基金）、投資管理機構及服務提供者；針對銀行業之國際原則為責任銀行原則（PRB），針對保險業者為永續保險原則（PSI）。"],"src":"研究筆記（四）1：PRI（2006，UNEP FI＋UN Global Compact支持，六項原則）"},{"id":"ESG-E-015","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"下列何者「不是」責任投資原則（PRI）六項原則之內容？","options":["保證簽署機構之投資組合每年獲得最低固定報酬","將ESG議題納入投資分析與決策過程","成為積極之所有權人，將ESG議題納入所有權政策與實務","要求被投資之機構適當揭露ESG資訊"],"answer":0,"explain":["正確（此為不屬於者）。PRI係投資行為之原則性承諾，與投資報酬保證無關；任何「保證最低報酬」之敘述均非PRI內容，此為典型干擾選項。","此為PRI原則之一。將ESG議題納入投資分析與決策過程為PRI第一項原則，也是責任投資之核心。","此為PRI原則之一。成為積極之所有權人、將ESG納入所有權政策與實務為PRI第二項原則，即透過投票與議合發揮股東影響力。","此為PRI原則之一。要求被投資機構適當揭露ESG資訊為PRI第三項原則；其餘原則尚包括推廣責任投資原則、合作提升執行成效及報告執行進度。"],"src":"研究筆記（四）1：PRI六項原則（納入分析決策、積極所有權、要求揭露、推廣、合作、報告）"},{"id":"ESG-E-016","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"下列何者「不屬於」責任銀行原則（PRB）之六大架構？","options":["一致性（業務策略與SDGs及巴黎協定保持一致）","節能與減碳","治理與文化","透明度及當責"],"answer":1,"explain":["此為六大架構之一。「一致性」要求銀行之業務策略應與個人需求、社會目標一致，特別是與永續發展目標（SDGs）及巴黎協定保持一致。","正確（此為不屬於者）。「節能與減碳」並非PRB六大架構之項目；PRB六大架構為：一致性、影響與目標設定、與客戶合作（客戶與顧客）、利害關係人、治理與文化、透明度及當責。節能減碳僅為銀行可能採行之具體措施，非原則架構。","此為六大架構之一。「治理與文化」要求銀行透過有效之治理與責任銀行文化落實各項原則。","此為六大架構之一。「透明度及當責」要求銀行定期檢視並公開揭露落實原則之進展，對相關影響負責。"],"src":"研究筆記（四）2：PRB六大架構（不含節能與減碳）；115-2實測第71題題型"},{"id":"ESG-E-017","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"關於責任銀行原則（PRB），下列敘述何者錯誤？","options":["係由聯合國環境規劃署金融倡議（UNEP FI）於2019年發布","「一致性」係指銀行之業務策略應與永續發展目標（SDGs）及巴黎協定保持一致","六大架構包含影響與目標設定、與客戶合作、治理與文化等項目","對於利害關係人，銀行僅須被動接受外界意見，無須主動諮詢與合作"],"answer":3,"explain":["正確之敘述。PRB由UNEP FI於2019年發布，為銀行業將永續納入策略與營運之全球性框架。","正確之敘述。「一致性」為PRB第一項架構，要求銀行業務策略與SDGs、巴黎協定及相關國家與區域架構所展現之社會目標一致。","正確之敘述。PRB六大架構為一致性、影響與目標設定、與客戶合作（客戶與顧客）、利害關係人、治理與文化、透明度及當責。","錯誤（本題答案）。PRB要求銀行應「主動」且負責任地諮詢利害關係人、與其議合及合作，以達成社會目標；「被動接受意見」之敘述與原則精神相反，為常見之陷阱選項。"],"src":"研究筆記（四）2：PRB（2019，UNEP FI）—利害關係人應主動溝通合作；115-2實測第79題題型"},{"id":"ESG-E-018","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"某產物保險公司擬簽署聯合國環境規劃署金融倡議（UNEP FI）下專為「保險業」設計之國際永續原則，其應簽署下列何者？","options":["責任投資原則（PRI）","責任銀行原則（PRB）","永續保險原則（PSI）","赤道原則（EPs）"],"answer":2,"explain":["錯誤。PRI（2006年）係針對機構投資人之責任投資原則，雖保險公司亦可能以投資人身分參與，但其並非專為保險業設計之原則。","錯誤。PRB（2019年，UNEP FI）係專為銀行業設計之責任銀行原則，非保險業適用之原則。","正確。永續保險原則（PSI）由UNEP FI於2012年發布，共四項原則，係專為保險業設計之國際永續框架，引導保險業將ESG議題納入核保、商品設計、理賠與營運決策。國際原則與行業之對應為：PRI—投資機構、PSI—保險業、PRB—銀行業。","錯誤。赤道原則（EPs）係金融機構辦理「專案融資」時之環境與社會風險管理框架，與保險業務之永續原則無關。"],"src":"研究筆記（四）2：PSI永續保險原則（2012，UNEP FI，四原則）"},{"id":"ESG-E-019","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"關於赤道原則（Equator Principles, EPs），下列敘述何者正確？","options":["係針對專案融資之環境與社會影響所建立之風險管理框架，並將專案依風險程度分為A、B、C三類","僅規範氣候變遷議題，不涉及社會影響評估","係規範企業發行債券時資訊揭露義務之準則","由聯合國大會決議通過，對全球銀行具國際法上之強制拘束力"],"answer":0,"explain":["正確。赤道原則於2003年由多家國際銀行與國際金融公司（IFC）共同制定，現行版本為第四版（EP4），係金融機構辦理「專案融資」時辨識、評估及管理環境與社會風險之框架，將專案依潛在影響程度分為A（重大）、B（有限）、C（輕微）三類；國內多家銀行已採納，為永續授信之核心參考。","錯誤。赤道原則涵蓋「環境和社會」雙重影響之風險管理，包括社區、勞工、人權等社會面議題，並非僅限氣候變遷。","錯誤。赤道原則係授信（專案融資）端之風險管理框架，並非債券發行之資訊揭露準則；債券端另有綠色債券原則等規範。","錯誤。赤道原則係由銀行業自願採納之準則，並非聯合國決議之國際法，不具強制拘束力；金融機構係以自律方式承諾遵循。"],"src":"研究筆記（四）3：赤道原則EPs（2003年與IFC制定、現行EP4、專案分A/B/C三類）"},{"id":"ESG-E-020","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"「RE100」為全球性之企業再生能源倡議，加入之企業應承諾下列何項目標？","options":["每年營收成長達100%","資本額達新臺幣100億元以上","100%使用再生能源電力","每年投資100家綠能新創企業"],"answer":2,"explain":["錯誤。RE100與企業營收成長目標無關，「RE」係指再生能源（Renewable Energy），非營收（Revenue）。","錯誤。RE100並無資本額門檻之要求，「100」係指再生能源電力使用比率達100%，與資本額規模無關。","正確。RE100係全球性再生能源倡議，加入之企業須公開承諾於目標年前達成「100%使用再生能源電力」，並逐年揭露進度；其亦為檢驗企業（含金融機構）永續作為之重要外部標準之一。","錯誤。RE100之承諾內容為自身用電100%來自再生能源，並非投資特定家數之綠能新創企業。"],"src":"研究筆記（三）7：RE100（檢驗金融機構永續作為之外部標準；100%再生能源電力）"},{"id":"ESG-E-021","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"關於科學基礎減量目標倡議（SBTi）之核心精神，下列敘述何者正確？","options":["企業僅須承諾使用綠電，無須設定溫室氣體減量目標","企業依循氣候科學，設定符合巴黎協定溫升控制路徑之溫室氣體減量目標，並經該倡議審查認可","由各國政府統一為轄內企業訂定減碳目標，企業無須自行規劃","僅開放金融業參與，其他產業不得申請"],"answer":1,"explain":["錯誤。「承諾100%使用再生能源電力」係RE100倡議之內容；SBTi之核心為設定符合科學之溫室氣體減量目標，兩者不可混淆。","正確。SBTi（科學基礎減量目標倡議）要求企業依循氣候科學，設定與巴黎協定「控制升溫遠低於2°C並努力限制於1.5°C」路徑一致之溫室氣體減量目標，目標並須經倡議審查認可，以確保減碳承諾具科學基礎而非任意宣示。","錯誤。SBTi係企業「自願」參與之國際倡議，減量目標由企業自行研提後送審，並非由政府統一訂定。","錯誤。SBTi開放各產業企業參與，並非金融業專屬；金融機構亦可依其投融資組合特性設定科學基礎減量目標。"],"src":"研究筆記（一）3巴黎協定溫控目標；SBTi科學基礎減量目標倡議概念"},{"id":"ESG-E-022","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"2021年配合聯合國氣候變化大會（COP26）成立之「格拉斯哥淨零金融聯盟」（GFANZ），其主要性質為下列何者？","options":["各國中央銀行間之貨幣互換協議機制","規範上市公司財務報告編製之國際會計準則制定機構","集結全球銀行、保險、資產管理等金融機構，承諾以投融資支持全球淨零排放目標之金融聯盟平台","專為虛擬資產交易業者設立之自律組織"],"answer":2,"explain":["錯誤。貨幣互換協議屬中央銀行間之流動性安排，與GFANZ之淨零承諾性質完全不同。","錯誤。制定國際財務報導準則者為IFRS基金會（其下ISSB負責永續揭露準則），GFANZ並非會計準則制定機構。","正確。GFANZ（Glasgow Financial Alliance for Net Zero）係2021年配合COP26成立之全球性淨零金融聯盟，集結銀行、保險、資產管理與資產擁有者等各類金融機構之淨零倡議，承諾將投融資組合朝2050年淨零排放目標調整，動員金融資金支持經濟體之低碳轉型；我國「綠色及轉型金融行動方案」亦鼓勵金融業自發性參與國際永續組織與倡議。","錯誤。GFANZ與虛擬資產產業無關，其成員為承諾淨零之傳統金融機構。"],"src":"研究筆記（四）永續金融國際倡議；GFANZ（2021年COP26格拉斯哥淨零金融聯盟）概念、（一）10綠色及轉型金融行動方案"},{"id":"ESG-E-023","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"依櫃買中心「永續發展債券作業要點」，我國永續發展債券「不包含」下列何種債券？","options":["綠色債券","社會責任債券","可持續發展連結債券（SLB）","通貨膨脹連結債券"],"answer":3,"explain":["綠色債券屬永續發展債券四類之一，資金用途限投入綠色投資計畫。","社會責任債券屬永續發展債券四類之一，資金用途限投入具社會效益之投資計畫。","可持續發展連結債券（SLB）屬永續發展債券四類之一，其發行條件與永續績效目標連結、資金用途不限。","正確（此為不包含者）。通貨膨脹連結債券係將本息與物價指數連動之利率結構型債券，與永續發展無關。櫃買中心永續發展債券共四類：綠色債券、社會責任債券、可持續發展債券、可持續發展連結債券（SLB）。"],"src":"研究筆記（四）4：櫃買中心「永續發展債券作業要點」四類債券"},{"id":"ESG-E-024","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"下列何者「不屬於」綠色債券資金用途所定綠色投資計畫之範疇？","options":["再生能源發電設施之建置","工廠勞工職業安全衛生設備之改善","水資源節約、潔淨或汙染防治相關計畫","提升能源使用效率之設備汰換"],"answer":1,"explain":["再生能源（如太陽光電、離岸風電）為綠色投資計畫最典型之類別。","正確（此為不屬於者）。勞工職業安全衛生屬「社會」面向議題，非環境效益之綠色主題；綠色債券之資金用途限於具環境效益之綠色投資計畫，勞工安全相關支出應歸屬社會責任債券之範疇。","水資源節約、潔淨及汙染防治均屬綠色投資計畫範疇，具明確環境效益。","提升能源使用效率（節能）屬綠色投資計畫範疇，可直接減少能源消耗與碳排放。"],"src":"研究筆記（四）4：綠色債券資金用途（再生能源、能效、汙染防治、水資源、生物多樣性等；勞工安全不屬綠色主題）"},{"id":"ESG-E-025","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"關於社會責任債券之資金用途，下列何者「不屬於」其社會效益投資計畫之範疇？","options":["可負擔之基礎生活設施","就業創造（含因應社會經濟危機之就業支持）","再生能源及能源科技發展","糧食安全"],"answer":2,"explain":["可負擔之基礎生活設施（如潔淨飲水、衛生、交通、能源取得）屬社會責任債券之典型資金用途。","就業創造（含因應社會經濟危機所生之就業支持方案）屬社會責任債券之資金用途範疇。","正確（此為不屬於者）。再生能源及能源科技發展屬「環境（綠色）」效益之投資計畫，為綠色債券之資金用途；社會責任債券之資金應投入具「社會」效益之計畫。此為綠色與社會兩類資金用途之經典區辨考點。","糧食安全屬社會責任債券之資金用途範疇，旨在改善弱勢族群之基本生活條件。"],"src":"研究筆記（四）4：社會責任債券資金用途（可負擔基礎生活設施、就業創造、糧食安全、社經發展；再生能源及能源科技發展不屬之）"},{"id":"ESG-E-026","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"關於可持續發展連結債券（Sustainability-Linked Bond, SLB），下列敘述何者正確？","options":["募集資金之用途限定僅能投入綠色投資計畫","發行條件（如票面利率）與發行人預先設定之永續績效目標（SPT）達成情形連結，資金用途原則上不限特定計畫","與綠色債券完全相同，僅名稱不同","發行人無須設定任何關鍵績效指標或永續績效目標"],"answer":1,"explain":["錯誤。資金用途限投入綠色投資計畫者為「綠色債券」；SLB之特點正是資金用途不限特定計畫，以整體永續績效承諾取代資金用途限制。","正確。SLB屬「目標連結」型債券，發行人須設定關鍵績效指標（KPI）與永續績效目標（SPT），債券發行條件（如票面利率）與目標達成情形連結（未達標時通常調整票息），資金用途原則上不受限制，此為其與綠色債券最大之差異。","錯誤。SLB與綠色債券之架構本質不同：綠色債券為「資金用途」型、SLB為「目標連結」型，兩者並非僅名稱有異。","錯誤。設定KPI與SPT為SLB架構之核心要素，發行人必須設定並定期驗證揭露，否則無從連結發行條件。"],"src":"研究筆記（四）4：可持續發展連結債券SLB（資金用途不限、票息與SPT連結）"},{"id":"ESG-E-027","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"某上市公司擬發行債券，募集資金全數用於離岸風力發電廠之建置。依我國永續發展債券之分類，該公司最適合發行下列何種債券？","options":["社會責任債券","可持續發展連結債券（SLB）","綠色債券","可持續發展債券"],"answer":2,"explain":["錯誤。社會責任債券之資金應用於具社會效益之投資計畫（如可負擔基礎生活設施、就業創造、糧食安全等）；離岸風電屬環境（綠色）效益計畫，非社會責任債券之範疇。","錯誤。SLB係以KPI／SPT目標連結發行條件、資金用途不限之債券；本例資金已明確限定用於特定綠色計畫，採資金用途型之綠色債券架構最為適合。","正確。募集資金全數投入離岸風電（再生能源）建置，屬典型之綠色投資計畫，符合綠色債券「資金用途限綠色投資計畫」之定義，應發行綠色債券。","錯誤。可持續發展債券之資金須用於「兼具」綠色及社會效益之投資計畫；本例資金全數用於純綠色用途，逕以綠色債券發行即可。"],"src":"研究筆記（四）4：綠色債券資金用途限綠色投資計畫（再生能源）"},{"id":"ESG-E-028","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"目前全球永續相關債券市場中，發行量最大之債券類別為下列何者？","options":["綠色債券","社會責任債券","可持續發展連結債券（SLB）","巨災債券"],"answer":0,"explain":["正確。綠色債券發展最早、市場最成熟，為全球永續相關債券中發行量最大之類別，主要支應再生能源、節能、汙染防治等綠色投資計畫。","錯誤。社會責任債券雖於疫情後成長，惟整體發行規模仍不及綠色債券。","錯誤。SLB屬較新之目標連結型商品，發行量遠低於綠色債券。","錯誤。巨災債券係保險連結證券（將天災風險移轉予資本市場），並非永續發展債券之類別，發行規模亦非最大。"],"src":"研究筆記（四）4：全球發行量最大為綠色債券；115-2實測第63題題型"},{"id":"ESG-E-029","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"關於各類永續發展債券之架構差異，下列敘述何者錯誤？","options":["綠色債券與社會責任債券均屬「資金用途」型債券，募集資金須投入特定類型之投資計畫","可持續發展債券之募集資金係用於兼具綠色及社會效益之投資計畫","可持續發展連結債券（SLB）屬「目標連結」型債券，以關鍵績效指標（KPI）與永續績效目標（SPT）為核心，資金用途不限","可持續發展連結債券（SLB）之募集資金依規定僅限用於再生能源計畫"],"answer":3,"explain":["正確之敘述。綠色債券（限綠色投資計畫）與社會責任債券（限社會效益投資計畫）均以「資金用途」為架構核心，須追蹤資金流向並揭露。","正確之敘述。可持續發展債券之資金同時投入兼具綠色及社會效益之投資計畫，可視為綠色與社會責任債券之混合型。","正確之敘述。SLB以KPI／SPT為核心，發行條件與績效達成情形連結，資金用途原則上不受限制，屬「目標連結」型架構。","錯誤（本題答案）。SLB之資金用途「不限」特定計畫，係以發行人整體永續績效目標之達成作為架構核心；「僅限用於再生能源計畫」係對資金用途型綠色債券之描述，與SLB之架構相互矛盾。"],"src":"研究筆記（四）4：四類永續發展債券之資金用途型與KPI/SPT目標連結型架構差異"},{"id":"ESG-E-030","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"氣候債券倡議組織（CBI）之氣候債券分類標準涵蓋多項產業類別，下列何者「不在」其分類範疇內？","options":["能源","水資源","土地利用與海洋資源","文化創意產業"],"answer":3,"explain":["能源（如再生能源）為CBI氣候債券分類標準之核心產業類別。","水資源（水利基礎設施等）屬CBI氣候債券分類標準之產業類別。","土地利用與海洋資源屬CBI氣候債券分類標準之產業類別，涵蓋農林及海洋資源之永續管理。","正確（此為不在者）。文化創意產業與氣候減緩、調適無直接關聯，不在CBI氣候債券分類標準之產業範疇內；CBI分類聚焦於能源、水資源、土地利用與海洋資源、運輸、建築等與氣候目標相關之實體產業。"],"src":"研究筆記（四）4：CBI氣候債券分類標準（含能源、水資源、土地利用與海洋資源等；文創不在）"},{"id":"ESG-E-031","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"關於永續連結貸款（Sustainability-Linked Loan, SLL），下列敘述何者正確？","options":["貸款資金之用途限定僅能投入綠色專案","借款人達成約定之永續績效目標時，可獲得調降貸款利率等誘因，且資金用途不限特定目的","與一般貸款完全相同，銀行無須監控任何永續績效指標","借款人未達成永續績效目標時，銀行應立即收回全部貸款"],"answer":1,"explain":["錯誤。資金用途限投入綠色專案者為「綠色貸款」；SLL之資金用途不限特定目的，兩者不可混淆。","正確。SLL之核心機制係銀行與借款人約定ESG／永續績效指標（KPI／SPT），長期監控達成情形並與「貸款利率定價」連結，借款人達標可降低融資成本，藉此誘導企業改善永續表現。","錯誤。SLL須由銀行長期監控借款人之永續績效指標達成情形，此為其與一般貸款之關鍵差異。","錯誤。未達標之效果通常反映於利率定價（如無法享有利率減碼或利率上調），並非立即收回貸款；貸款收回涉及違約條款，與績效連結機制不同。"],"src":"研究筆記（四）5：永續連結貸款SLL（資金用途不限、與利率定價連結、達標降低融資成本）；115-2實測第69題題型"},{"id":"ESG-E-032","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"關於銀行永續授信商品之比較，下列敘述何者錯誤？","options":["綠色貸款之資金用途限用於綠色投資計畫","社會貸款之資金應全部用於社會關懷相關專案","永續連結貸款須長期監控借款人之ESG／永續績效指標，並與貸款利率定價連結","永續連結貸款即為綠色貸款，兩者之資金用途規範完全相同"],"answer":3,"explain":["正確之敘述。綠色貸款屬資金用途型授信商品，資金限用於再生能源、節能等綠色投資計畫。","正確之敘述。社會貸款之資金應全部用於社會關懷相關專案（如可負擔住宅、弱勢就業支持等），屬資金用途型商品。","正確之敘述。永續連結貸款（SLL）之核心即在長期監控借款人之KPI／SPT達成情形，並將結果反映於貸款利率定價，達標可降低融資成本。","錯誤（本題答案）。永續連結貸款「不等於」綠色貸款：綠色貸款之資金用途受限於綠色專案，SLL之資金用途則不限特定目的，改以借款人整體永續績效與利率連結作為機制，兩者架構明顯不同。"],"src":"研究筆記（四）5：綠色貸款、社會貸款、永續連結貸款之區分（SLL不等於綠色貸款）"},{"id":"ESG-E-033","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"關於銀行推出之「綠色存款」商品，下列敘述何者正確？","options":["銀行承諾將該等存款資金投入綠色投資專案","存款利息依法完全免納所得稅","存款資金主要用於承作一般個人房屋貸款","存款人須先取得永續相關證照始得承作"],"answer":0,"explain":["正確。綠色存款之特點在於銀行承諾將該等存款所收資金，對應投入綠色投資專案（如再生能源放款、綠色債券投資等），讓存款人之資金參與支持永續發展。","錯誤。綠色存款並無利息免稅之法定優惠，其利息所得仍依稅法規定課稅；「免稅」為常見之錯誤聯想。","錯誤。若資金用於一般房貸即與綠色用途無關；綠色存款之資金應對應投入綠色專案，此為其與一般存款之區別。","錯誤。綠色存款為一般性存款商品，存款人（多為企業戶）無須具備任何證照資格。"],"src":"研究筆記（四）7：綠色存款（資金投入綠色投資專案；非免稅、非用於一般房貸）"},{"id":"ESG-E-034","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"關於綠色保險商品中之「節能保險」，下列敘述何者正確？","options":["僅於節能專案之實際節能表現未達約定目標時，就其差額提供補償","承保範圍涵蓋企業所有類型之營運中斷損失","投保後即保證節能設備永不故障","屬於法律規定之強制投保政策性保險"],"answer":0,"explain":["正確。節能保險（節能績效保證保險）之承保範圍，僅限於節能專案之實際節能表現「未達約定目標」時，就未達標部分提供補償，藉以移轉節能績效不確定之風險、促進企業投入節能改造。","錯誤。節能保險僅針對節能績效未達標之風險，並非概括承保所有營運中斷損失；營業中斷另屬其他險種之承保範圍。","錯誤。保險係於損失發生時提供補償之風險移轉機制，無法保證設備不故障；設備故障風險亦非節能保險之承保標的。","錯誤。節能保險屬保險公司開發之商業性綠色保險商品，由企業自願投保，並非法定強制投保之政策性保險。"],"src":"研究筆記（四）8：節能保險（僅承保節能表現未達約定目標時之補償）"},{"id":"ESG-E-035","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"我國產險市場推出之「住家綠能升級附加條款」，依綠色保險商品之分類，屬於下列何種類型？","options":["再生能源保險","能源效率保險","節能保險","綠建築保險"],"answer":3,"explain":["錯誤。再生能源保險係承保再生能源設施（如風場、太陽能電廠）興建與營運相關風險之保險，與住家綠能升級附加條款之性質不同。","錯誤。能源效率保險係針對能源效率專案相關風險之保險安排，非本附加條款之歸類。","錯誤。節能保險係於節能表現未達約定目標時提供補償之績效保證型保險，與住家綠能升級之保障內容不同。","正確。「住家綠能升級附加條款」屬「綠建築保險」類型，其概念係於住宅發生承保事故受損後，支持以綠色、節能之方式修復或升級，鼓勵綠建築與綠色生活之普及。"],"src":"研究筆記（四）8：綠色保險分類（台灣「住家綠能升級附加條款」屬綠建築保險）"},{"id":"ESG-E-036","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"依金管會「金融機構防漂綠參考指引」，下列何者「不屬於」漂綠之態樣？","options":["永續聲明之內容過於誇大","永續聲明缺乏證據支持","全面且完整揭露對環境之正面與負面影響","僅選擇性揭露對自身有利之資訊"],"answer":2,"explain":["此為漂綠態樣之一。聲明內容過於誇大（如誇稱商品之環境效益）易誤導金融消費者與投資人，屬漂綠行為。","此為漂綠態樣之一。永續聲明若無充分證據或數據支持，即屬空泛不實之宣稱，為典型漂綠態樣。","正確（此為不屬於者）。全面且完整揭露正面「與」負面影響，正是誠實透明之揭露，為「防止」漂綠之正確作法而非漂綠態樣；本選項為經典陷阱。指引所列漂綠態樣包括：聲明內容過於誇大、缺乏證據、提供無法讓人清楚理解之訊息、選擇性揭露等。","此為漂綠態樣之一。僅揭露有利資訊、隱匿不利資訊之「選擇性揭露」，將使外界對永續表現產生錯誤認知，屬漂綠行為。"],"src":"研究筆記（四）10：金管會「金融機構防漂綠參考指引」漂綠態樣（誇大、缺乏證據、訊息不清、選擇性揭露）"},{"id":"ESG-E-037","exam":"esg","subject":"","topic":"永續金融","difficulty":3,"q":"某投信公司發行名稱冠有「ESG永續」字樣之基金，行銷文宣強調採行嚴格之永續篩選流程，惟實際持股內容與一般大盤型基金幾無差異，且未依其宣稱之ESG方法執行投資流程。下列敘述何者最正確？","options":["基金名稱僅為行銷用語，縱與實際投資不符亦無漂綠疑慮","此屬典型之漂綠行為；國際上已有基金因ESG聲明與實際投資不符遭主管機關裁罰之案例","金融商品之對外永續聲明不受任何監理規範","漂綠問題僅存在於製造業，金融商品不會發生漂綠"],"answer":1,"explain":["錯誤。基金名稱與行銷文宣屬對投資人之永續聲明，若與實際投資流程不符即構成誤導，具高度漂綠疑慮，不因「僅為行銷用語」而免責。","正確。宣稱之永續方法與實際投資「名實不符」係金融商品漂綠之典型態樣；國際上已有資產管理業者因基金ESG聲明與實際不符遭主管機關調查裁罰之案例。我國除金管會「金融機構防漂綠參考指引」外，ESG基金另受證期局審查監理原則規範（含ESG投資配置與資訊揭露要求），投信業者應確保言行一致。","錯誤。金融商品之永續聲明受監理規範拘束：我國ESG基金應依證期局監理原則揭露永續投資策略與相關資訊，金融機構之永續聲明並應符合防漂綠參考指引之精神。","錯誤。漂綠可發生於任何產業，金融商品（基金、債券、貸款等）之名實不符正是各國監理機關近年重點查處之漂綠領域。"],"src":"研究筆記（四）10：漂綠國際案例（基金ESG名實不符遭裁罰）；（四）6 ESG基金監理原則"},{"id":"ESG-E-038","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"為防範金融機構漂綠行為，我國金管會於113年（2024年）發布之規範為下列何者？","options":["金融機構防漂綠參考指引","本國銀行氣候風險財務揭露指引","上市上櫃公司永續發展實務守則","保險業資產管理自律規範"],"answer":0,"explain":["正確。金管會於113年發布「金融機構防漂綠參考指引」，列明漂綠態樣（聲明過於誇大、缺乏證據、訊息無法讓人清楚理解、選擇性揭露等），要求金融機構對外永續聲明應正確、有據且清楚，防範漂綠風險。","錯誤。「本國銀行氣候風險財務揭露指引」係110年發布之氣候相關財務「揭露」規範（112年6月底前首次揭露），並非防漂綠指引。","錯誤。「上市上櫃公司永續發展實務守則」係引導上市櫃公司落實永續發展之守則，適用對象與目的均與金融機構防漂綠不同。","錯誤。保險業資產管理相關自律規範係規範保險資金運用行為，並非金管會防漂綠之規範。"],"src":"研究筆記（四）10：金管會113年「金融機構防漂綠參考指引」；（二）13本國銀行氣候風險財務揭露指引（110年）"},{"id":"ESG-E-039","exam":"esg","subject":"","topic":"永續金融","difficulty":1,"q":"所謂「轉型金融」（Transition Finance），係指下列何者？","options":["僅提供資金予已達成淨零排放之企業","協助高碳排產業取得所需資金，支持其有序邁向低碳轉型","將銀行實體分行全面改造為數位分行之金融科技計畫","將所有高碳排產業一律排除於授信與投資往來之外"],"answer":1,"explain":["錯誤。若僅支持已達淨零之企業，高碳排產業將難以取得轉型所需資金；轉型金融之重點正是支持「尚未綠色但正在改善」之企業。","正確。轉型金融係指金融體系提供資金與金融服務，協助高碳排（棕色）產業有序推動減碳與低碳轉型，避免其因融資斷絕而無法轉型；我國「綠色及轉型金融行動方案」（113年10月發布）即將轉型金融納入新階段推動重點，並鼓勵金融業自發性參與國際永續倡議。","錯誤。分行數位化屬金融科技與通路轉型議題，與支持實體經濟低碳轉型之「轉型金融」概念無關。","錯誤。一律排除高碳排產業係負面排除之極端作法，反而使其失去轉型資金；轉型金融強調「支持而非切割」，透過資金引導高碳排產業逐步減碳。"],"src":"研究筆記（四）11：轉型金融概念；（一）10「綠色及轉型金融行動方案」（113年10月）"},{"id":"ESG-E-040","exam":"esg","subject":"","topic":"永續金融","difficulty":2,"q":"依證期局「ESG相關主題證券投資信託基金資訊揭露事項審查監理原則」，下列何者屬於對ESG基金之監理要求？","options":["基金之年報酬率不得低於5%","僅能投資於市值前100大之上市公司","ESG相關投資配置比例原則上至少達基金淨資產價值之60%，並應揭露ESG相關資訊及風險警語","基金經理人須具備10年以上永續投資年資"],"answer":2,"explain":["錯誤。監理原則規範資訊揭露與投資配置，並無任何報酬率保證或下限之要求；「年報酬率不得低於5%」為典型干擾選項。","錯誤。監理原則未限制投資標的須為市值前100大公司；ESG基金之選股依其揭露之永續投資策略與方法執行。","正確。依該監理原則（110年發布），ESG基金應說明永續投資策略與方法、定期揭露相關資訊，ESG相關投資配置比例原則上至少達基金淨資產價值之60%（六成），並必須揭露ESG相關資訊及風險警語，以防止基金名實不符（漂綠）。","錯誤。監理原則並無基金經理人永續投資年資之資格要求；「經理人須10年資歷」為虛構之干擾選項。"],"src":"研究筆記（四）6：ESG基金監理原則（配置至少六成、揭露ESG資訊及風險警語）；115-2實測第73、78題題型"}],"ethics":[{"id":"ETH-CA-001","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":1,"q":"下列何者並非金融市場的主要功能？","options":["提供投機炒作的場所","作為資金供給者與需求者之間的橋樑","提供交易場所使買賣雙方順利成交","提高資金運用效率、促進經濟發展"],"answer":0,"explain":["正確。金融市場的主要功能在於媒合資金供需、提供交易場所並提升資金運用效率，「提供投機場所」並非其設立宗旨，屬命題常見的反面排除選項。","錯誤。作為資金供給者與需求者之間的橋樑正是金融市場的核心功能之一。","錯誤。提供交易場所使買賣雙方順利成交是金融市場的基本功能。","錯誤。提高資金運用效率、促進經濟發展是金融市場存在的重要目的。"],"src":"研究筆記四之1：金融市場功能（提供投機場所非主要功能）"},{"id":"ETH-CA-002","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":1,"q":"企業發行股票或公司債直接向社會大眾募集資金，屬於下列何種型態的金融？","options":["政策金融","間接金融","直接金融","地下金融"],"answer":2,"explain":["錯誤。政策金融係指政府基於特定政策目的提供的融資，並非以是否透過金融中介區分。","錯誤。間接金融是指資金需求者透過銀行等金融中介機構取得資金（如向銀行借款），而非直接向大眾募資。","正確。發行股票、公司債、票券等有價證券直接向大眾募集資金，資金供需雙方直接往來，屬於直接金融。","錯誤。地下金融指未經合法許可的民間借貸，與本題透過證券市場公開募資無關。"],"src":"研究筆記四之1：直接金融vs間接金融"},{"id":"ETH-CA-003","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":2,"q":"下列何者並非金融監督管理委員會（金管會）所設置的業務局處？","options":["銀行局","證券期貨局","保險局","國庫局"],"answer":3,"explain":["錯誤。銀行局為金管會四個業務局之一，主管銀行業。","錯誤。證券期貨局為金管會四個業務局之一，主管證券與期貨市場。","錯誤。保險局為金管會四個業務局之一，主管保險業。","正確。金管會下設銀行局、證券期貨局、保險局、檢查局四局，並無「國庫局」；國庫業務係屬財政部，非金管會業務局。"],"src":"研究筆記四之1：金管會下設銀行局、證券期貨局、保險局、檢查局"},{"id":"ETH-CA-004","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":1,"q":"我國金融支付系統（清算系統）之主管機關為下列何者？","options":["中央銀行","金管會檢查局","財政部","金融消費評議中心"],"answer":0,"explain":["正確。金融支付系統（含同業資金清算）歸中央銀行主管，維持支付系統順暢運作為央行重要職掌之一。","錯誤。檢查局負責金融機構之檢查業務，並非支付系統主管機關。","錯誤。財政部主管國庫、賦稅等，非支付系統主管機關。","錯誤。金融消費評議中心負責處理金融消費爭議之評議，與支付系統主管無關。"],"src":"研究筆記四之1：金融支付系統歸中央銀行主管"},{"id":"ETH-CA-005","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":1,"q":"下列何種金融工具的到期期間在一年以內，屬於貨幣市場交易的標的？","options":["公司債","股票","國庫券","可轉換公司債"],"answer":2,"explain":["錯誤。公司債到期期間通常在一年以上，屬於資本市場工具。","錯誤。股票無到期日、屬長期資金，為資本市場工具。","正確。國庫券為政府發行、期限一年以內的短期債務工具，屬於貨幣市場標的。","錯誤。可轉換公司債仍為長期債券之一種，屬資本市場工具。"],"src":"研究筆記四之5：貨幣市場工具（國庫券、CP、BA、NCD）；貨幣市場1年以內"},{"id":"ETH-CA-006","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":1,"q":"有價證券首次公開發行、由發行公司對外募集資金的市場，稱為下列何者？","options":["次級市場","集中市場","初級市場","店頭市場"],"answer":2,"explain":["錯誤。次級市場是已發行證券的流通買賣市場，並非首次發行募資的場所。","錯誤。集中市場是指在證券交易所以競價方式集中撮合的交易場所，屬次級市場的一種型態。","正確。初級市場（發行市場）是發行公司首次將有價證券售予投資人以募集資金的市場。","錯誤。店頭市場是議價成交的流通市場，屬次級市場範疇。"],"src":"研究筆記四之1：初級（發行）市場vs次級（流通）市場"},{"id":"ETH-CA-007","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":1,"q":"依洗錢防制法及相關規定，金融機構受理達新台幣多少金額之單筆現金交易，應確認客戶身分並向法務部調查局申報？","options":["新台幣30萬元","新台幣100萬元","新台幣150萬元","新台幣50萬元"],"answer":3,"explain":["錯誤。門檻並非30萬元。","錯誤。100萬元非現行現金交易申報門檻。","錯誤。150萬元非現金交易申報門檻，此數字為住宅地震基本保險建築物賠償限額，屬易混淆數字。","正確。達新台幣50萬元（含）之單筆現金收付或換鈔交易，金融機構應確認客戶身分、留存紀錄並向法務部調查局申報。"],"src":"研究筆記四之1：洗錢防制法達NT$50萬單筆現金交易應申報"},{"id":"ETH-CA-008","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":2,"q":"依金融消費者保護法規定，金融消費爭議應由下列何機構受理評議？","options":["金融消費評議中心","中央存款保險公司","證券投資人及期貨交易人保護中心","金融聯合徵信中心"],"answer":0,"explain":["正確。金融消費者保護法設有金融消費評議中心，專責處理金融消費者與金融服務業間之爭議評議。","錯誤。中央存款保險公司負責存款保險與問題金融機構處理，非消費爭議評議機構。","錯誤。投保中心負責證券投資人及期貨交易人之保護與團體訴訟，非一般金融消費爭議評議機構。","錯誤。聯合徵信中心負責蒐集提供信用資料，非爭議評議機構。"],"src":"研究筆記四之1：金融消費者保護法，爭議由金融消費評議中心處理"},{"id":"ETH-CA-009","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":1,"q":"依存款保險制度，每一存款人在同一要保機構受到保障的存款本息，最高保額為新台幣多少元？","options":["新台幣100萬元","新台幣200萬元","新台幣300萬元","新台幣500萬元"],"answer":2,"explain":["錯誤。100萬元低於現行最高保額。","錯誤。200萬元非現行最高保額。","正確。中央存款保險對每一存款人在同一要保機構之存款本息，最高保障額度為新台幣300萬元。","錯誤。500萬元高於現行最高保額。"],"src":"研究筆記四之1：存款保險每一存款人同一機構最高保額NT$300萬"},{"id":"ETH-CA-010","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":2,"q":"依規定，金融機構建立內部控制制度並確保其有效運作，其最終負責者為下列何者？","options":["總稽核","董（理）事會","總經理","法令遵循主管"],"answer":1,"explain":["錯誤。總稽核負責稽核業務之執行與督導，但非內控制度之最終責任者。","正確。內部控制制度之建立與有效運作，其最終責任在於董（理）事會，此為公司治理之基本原則。","錯誤。總經理負責內控制度之執行，但最終責任仍歸屬董事會。","錯誤。法令遵循主管負責法遵事務，非內控最終責任者。"],"src":"研究筆記四之1：內部控制最終責任者＝董（理）事會"},{"id":"ETH-CA-011","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":2,"q":"下列有關「間接金融」的敘述，何者正確？","options":["投資人直接購買企業發行的股票","企業發行商業本票向貨幣市場籌資","存款人將錢存入銀行，銀行再放款給企業","企業在初級市場發行公司債募資"],"answer":2,"explain":["錯誤。投資人直接購買股票屬直接金融，資金供需雙方直接往來。","錯誤。企業發行商業本票向大眾籌資屬直接金融。","正確。存款人將資金存入銀行、銀行再轉貸給企業，中間透過銀行這一金融中介機構，屬於間接金融。","錯誤。企業在初級市場發行公司債募資屬直接金融。"],"src":"研究筆記四之1：直接金融vs間接金融（銀行為中介）"},{"id":"ETH-CA-012","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":3,"q":"下列有關我國金融市場分類與機構的敘述，何者錯誤？","options":["興櫃市場是未上市未上櫃股票的合法流通市場","資本市場交易的是到期日在一年以上的長期資金工具","集中保管結算機構辦理有價證券的結算交割與保管","貨幣市場的資金供需以一年以上的長期信用為主"],"answer":3,"explain":["錯誤（敘述正確）。興櫃市場確為尚未上市上櫃股票的合法流通場所，本選項敘述無誤。","錯誤（敘述正確）。資本市場交易一年以上的長期資金工具，敘述無誤。","錯誤（敘述正確）。集中保管結算機構確實辦理結算交割與保管業務，敘述無誤。","正確（此為錯誤敘述）。貨幣市場係以一年以內的短期信用工具調節資金，而非一年以上的長期信用；一年以上屬資本市場，故本選項敘述錯誤，為應選答案。"],"src":"研究筆記四之1：市場分類（貨幣市場1年以內、興櫃、集保結算所）"},{"id":"ETH-CA-013","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":2,"q":"銀行因資產無法及時變現以支應存款人提領或到期債務，而可能產生的風險，稱為下列何者？","options":["流動性風險","信用風險","市場風險","作業風險"],"answer":0,"explain":["正確。流動性風險係指銀行資產無法及時以合理成本變現，以支應資金需求（如存款提領、到期債務）所產生的風險。","錯誤。信用風險是指交易對手違約無法履約還款所致的風險，與變現時效無關。","錯誤。市場風險是指因利率、匯率、股價等市場價格變動而產生損失的風險。","錯誤。作業風險是指因內部流程、人員、系統缺失或外部事件所致的風險。"],"src":"研究筆記四之3：風險分類（信用、市場、流動性、作業、利率風險）"},{"id":"ETH-CA-014","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":2,"q":"下列有關次級市場（流通市場）的敘述，何者正確？","options":["發行公司可藉此首次取得募集的資金","提供投資人買賣已發行證券、增加證券流動性的場所","僅限政府公債才能在此交易","與初級市場為同一市場，並無區別"],"answer":1,"explain":["錯誤。發行公司首次取得資金是在初級市場（發行市場），非次級市場。","正確。次級市場提供投資人相互買賣已發行證券的場所，具有提高證券流動性、形成公平價格的功能。","錯誤。次級市場交易標的包含股票、公司債、公債等各類有價證券，並不限於政府公債。","錯誤。初級市場（發行）與次級市場（流通）功能不同，兩者有明確區別。"],"src":"研究筆記四之1：初級（發行）市場vs次級（流通）市場"},{"id":"ETH-CA-015","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":1,"q":"依規定，上市（櫃）公司的股東常會，原則上應於每會計年度終了後多久時間內召開？","options":["3個月內","6個月內","9個月內","1年內"],"answer":1,"explain":["錯誤。3個月為財務報告等其他期限，非股東常會召開期限。","正確。股東常會原則上應於每會計年度終了後6個月內召開，逾期未召開者主管機關得處分。","錯誤。9個月已逾越規定期限。","錯誤。1年已逾越規定期限。"],"src":"研究筆記四之1：股東常會（會計年度終了後6個月內）"},{"id":"ETH-CA-016","exam":"ethics","subject":"金融市場常識","topic":"金融體系與監理","difficulty":3,"q":"下列有關金融監理分工的敘述，何者正確？","options":["中央銀行負責核定商業銀行的存款利率","金融支付系統由金管會保險局主管","金管會檢查局負責金融機構之檢查業務","銀行的內部控制最終責任在總稽核"],"answer":2,"explain":["錯誤。商業銀行存款利率由銀行自行訂定，中央銀行並不核定各商銀存款利率。","錯誤。金融支付系統由中央銀行主管，非金管會保險局。","正確。金管會檢查局專責金融機構的金融檢查業務，本敘述正確。","錯誤。內部控制最終責任在董（理）事會，而非總稽核。"],"src":"研究筆記四之1、四之3：央行不核定商銀存款利率、支付系統歸央行、檢查局職掌、內控最終責任＝董事會"},{"id":"ETH-CA-017","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":1,"q":"在其他條件不變下，市場利率上升時，一般固定利率債券的價格會如何變動？","options":["上升","不變","先漲後跌","下跌"],"answer":3,"explain":["錯誤。利率與債券價格呈反向關係，利率上升時債券價格不會上升。","錯誤。利率變動會影響債券價格，並非不變。","錯誤。利率上升時債券價格為單向下跌，並非先漲後跌。","正確。債券殖利率（市場利率）與價格呈反向關係，利率上升則既有固定利率債券的相對吸引力下降，價格隨之下跌。"],"src":"研究筆記四之2：債券殖利率與價格反向"},{"id":"ETH-CA-018","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"下列有關零息債券（Zero Coupon Bond）的敘述，何者正確？","options":["以折價方式發行，到期依面額償還","按期支付高於面額的利息","發行價格一定高於面額","到期時本金與利息均不償還"],"answer":0,"explain":["正確。零息債券不附息票、發行期間不支付利息，故以折價（低於面額）方式發行，投資人到期時按面額領回，價差即為報酬。","錯誤。零息債券發行期間不按期支付利息。","錯誤。零息債券以折價發行，發行價格低於面額，而非高於面額。","錯誤。零息債券到期時仍須依面額償還本金，投資人領回的是面額。"],"src":"研究筆記四之2：零息債券折價發行、價格隨到期日趨近面值"},{"id":"ETH-CA-019","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"某公司股價為每股80元，每股盈餘（EPS）為4元，則其本益比（P/E）為何？","options":["10倍","16倍","32倍","20倍"],"answer":3,"explain":["錯誤。10倍計算有誤，非正確結果。","錯誤。16倍計算有誤，非正確結果。","錯誤。32倍係其他錯誤計算結果，並非本益比公式所得。","正確。本益比＝股價÷每股盈餘＝80÷4＝20（倍），故本益比為20倍。"],"src":"研究筆記四之2：本益比＝股價/每股盈餘（80/4＝20）"},{"id":"ETH-CA-020","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"下列四種期貨與選擇權交易人中，何者「不須」繳交保證金？","options":["期貨買方","期貨賣方","選擇權買方","選擇權賣方"],"answer":2,"explain":["錯誤。期貨買賣雙方均須繳交保證金以履行契約。","錯誤。期貨買賣雙方均須繳交保證金。","正確。選擇權買方僅須支付權利金即取得權利，無履約義務，故不須繳交保證金。","錯誤。選擇權賣方負有履約義務、風險較大，須繳交保證金。"],"src":"研究筆記四之2：選擇權買方不繳保證金（僅付權利金）、期貨買賣雙方皆繳"},{"id":"ETH-CA-021","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"開放型共同基金的申購與贖回價格，主要依據下列何者計算？","options":["集中市場收盤價","基金淨資產價值（NAV）","票面金額","發行時的承銷價格"],"answer":1,"explain":["錯誤。集中市場收盤價適用於封閉型基金或股票的次級市場交易，非開放型基金申贖依據。","正確。開放型基金可隨時向基金公司申購或贖回，其價格依每單位基金淨資產價值（NAV，即淨值）計算。","錯誤。票面金額非開放型基金申贖依據。","錯誤。承銷價格為發行時的價格，非日後申贖依據。"],"src":"研究筆記四之2：開放型基金按淨值申贖"},{"id":"ETH-CA-022","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":1,"q":"認購權證（Call Warrant）的發行人所持有的部位，相當於下列何者？","options":["賣出一個買權（Sell Call）","買進一個買權（Buy Call）","賣出一個賣權（Sell Put）","買進一個賣權（Buy Put）"],"answer":0,"explain":["正確。認購權證賦予持有人買進標的的權利，發行人則負有依約賣出標的的義務，相當於賣出一個買權（Sell Call）部位。","錯誤。買進買權是權證持有人（投資人）的部位，非發行人。","錯誤。賣出賣權部位與認購權證的權利義務結構不符。","錯誤。買進賣權是看跌標的的部位，與認購權證發行人無關。"],"src":"研究筆記四之2：認購權證發行人＝賣出買權（Sell Call）部位"},{"id":"ETH-CA-023","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":3,"q":"下列有關債券信用評等與價格關係的敘述，何者正確？","options":["評等被調降時，債券違約風險下降、價格上漲","信用評等與債券價格及風險均無關","評等愈低的債券，其殖利率通常愈低","評等被調降時，債券違約風險上升、價格下跌"],"answer":3,"explain":["錯誤。評等調降代表信用轉差，違約風險上升而非下降，價格應下跌。","錯誤。信用評等直接反映違約風險，與價格及風險密切相關。","錯誤。評等愈低代表風險愈高，投資人要求的殖利率愈高，而非愈低。","正確。信用評等被調降代表發行人違約風險升高，投資人要求更高的殖利率補償，債券價格因而下跌。"],"src":"研究筆記四之2：評等調降→違約風險升、價格跌"},{"id":"ETH-CA-024","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"下列有關證券承銷配售方式的敘述，何者正確？","options":["私募得對不特定社會大眾公開招募","一般散戶投資人參與新股承銷最常採用公開申購方式","競價拍賣不利於股權分散","公開申購僅限特定人始得參與"],"answer":1,"explain":["錯誤。私募限對特定人為之、人數受限，不得對不特定大眾公開招募。","正確。公開申購（公開抽籤）門檻低、程序簡便，是一般散戶投資人參與新股承銷最常採用的方式。","錯誤。競價拍賣有助於價格發現與股權分散，並非不利於股權分散。","錯誤。公開申購開放一般大眾參與，非僅限特定人；限特定人者為私募。"],"src":"研究筆記四之2：散戶最常用公開申購、競價拍賣具股權分散、私募限特定人"},{"id":"ETH-CA-025","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"下列有關信用交易（融資融券）擔保維持率的敘述，何者正確？","options":["每月計算一次即可","僅在客戶要求時才計算","以整戶及各筆為基礎逐日計算","擔保維持率愈低代表擔保愈充足"],"answer":2,"explain":["錯誤。擔保維持率非每月計算，而是每日計算。","錯誤。擔保維持率由券商逐日主動計算，非僅在客戶要求時計算。","正確。融資融券擔保維持率以整戶及各筆為基礎逐日（每日）計算，低於規定成數時將發出追繳通知。","錯誤。擔保維持率愈高代表擔保愈充足，愈低則須補繳擔保品。"],"src":"研究筆記四之2：融資融券擔保維持率每日計算（整戶與各筆）"},{"id":"ETH-CA-026","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"下列有關期貨交易制度的敘述，何者正確？","options":["期貨採每日結算（逐日洗價）制度","期貨僅買方須繳交保證金","期貨契約無到期日，可永久持有","期貨採議價方式逐筆撮合成交"],"answer":0,"explain":["正確。期貨採每日結算（逐日洗價，mark-to-market）制度，每日依結算價計算損益並調整保證金，以控制違約風險。","錯誤。期貨買賣雙方皆須繳交保證金，並非僅買方繳交。","錯誤。期貨契約有到期（交割）日，並非可永久持有。","錯誤。期貨在集中市場採集中競價方式撮合，而非議價逐筆撮合。"],"src":"研究筆記四之2：期貨集中競價、每日結算（逐日洗價）、保證金買賣雙方皆繳"},{"id":"ETH-CA-027","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":3,"q":"下列有關β（Beta）值的敘述，何者正確？","options":["β值衡量的是投資組合的個別（非系統）風險","β值等於1表示該基金波動與市場（大盤）一致","β值愈大代表相對市場波動愈小","β值僅適用於債券、不適用於股票基金"],"answer":1,"explain":["錯誤。β值衡量的是相對於市場的系統風險（市場風險），而非個別非系統風險。","正確。β值反映基金（或標的）相對於市場的波動程度，β值等於1表示其波動與市場（大盤）同步一致。","錯誤。β值愈大代表相對市場波動愈大（愈敏感），而非愈小。","錯誤。β值可用於衡量股票及股票型基金相對大盤的系統風險，並非僅適用於債券。"],"src":"研究筆記四之2：β值＝基金波動/市場波動"},{"id":"ETH-CA-028","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":1,"q":"投資人以「定期定額」方式長期投資共同基金，當基金淨值下跌時，同一固定金額所能買到的基金單位數會如何變化？","options":["買到的單位數較多","買到的單位數較少","買到的單位數不變","無法買進任何單位"],"answer":0,"explain":["正確。定期定額以固定金額扣款，淨值下跌（價格較低）時同一金額可買到較多單位數，具有平均成本、逢低多買的效果。","錯誤。淨值下跌時單位數增加而非減少。","錯誤。單位數會隨淨值高低變動，並非固定不變。","錯誤。只要基金持續運作，固定金額仍可買進單位，只是數量隨淨值變動。"],"src":"研究筆記四之2：定期定額股價跌買到較多單位"},{"id":"ETH-CA-029","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":2,"q":"隨著債券愈接近到期日，在無違約疑慮下，其市場價格會逐漸趨近於下列何者？","options":["發行時的折價金額","債券面額（面值）","市場最高成交價","票面利率乘以2"],"answer":1,"explain":["錯誤。折價金額是發行時價格與面額的差距，並非價格收斂的目標。","正確。無違約疑慮下，隨到期日趨近，債券市價會逐漸收斂趨近於面額（面值），到期時按面額償還。","錯誤。市場最高成交價非價格收斂的依歸。","錯誤。票面利率乘以2並無意義，非債券價格收斂目標。"],"src":"研究筆記四之2：債券價格隨到期日趨近面值"},{"id":"ETH-CA-030","exam":"ethics","subject":"金融市場常識","topic":"證券期貨市場","difficulty":3,"q":"下列有關選擇權買方與賣方權利義務的敘述，何者正確？","options":["選擇權買方須繳保證金、賣方僅付權利金","選擇權買方支付權利金取得權利、不負履約義務","選擇權賣方支付權利金、享有履約選擇權","選擇權買賣雙方均須繳交保證金"],"answer":1,"explain":["錯誤。恰好相反：買方僅付權利金、不繳保證金；賣方才須繳保證金。","正確。選擇權買方於訂約時支付權利金，取得將來要求履約的權利，但不負履約義務，最大損失為權利金。","錯誤。賣方是收取權利金、負履約義務，而非支付權利金並享有選擇權。","錯誤。選擇權僅賣方須繳保證金，買方不須繳，並非雙方皆繳。"],"src":"研究筆記四之2：選擇權買方不繳保證金（僅付權利金）、賣方繳"},{"id":"ETH-CA-031","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":1,"q":"下列何者「不是」貨幣市場的信用工具？","options":["國庫券","商業本票（CP）","可轉讓定期存單（NCD）","公司債"],"answer":3,"explain":["錯誤。國庫券為政府發行的短期票券，屬貨幣市場工具。","錯誤。商業本票（CP）為企業發行的短期票券，屬貨幣市場工具。","錯誤。可轉讓定期存單（NCD）為銀行發行的短期工具，屬貨幣市場工具。","正確。公司債為一年以上的長期債務工具，屬資本市場而非貨幣市場，故為應選答案。"],"src":"研究筆記四之5：貨幣市場工具含國庫券、CP、BA、NCD；公司債不是"},{"id":"ETH-CA-032","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":2,"q":"投資人與票券商承作「附買回交易（RP）」，其性質最接近下列何者？","options":["投資人賣出票券並約定日後買回","投資人永久持有該票券不得轉讓","投資人放棄票券所有權，無任何本利返還","投資人買進票券並約定由票券商日後買回，屬短期資金運用"],"answer":3,"explain":["錯誤。此描述接近附賣回（RS）中交易相對方的角度，非投資人承作RP的性質。","錯誤。RP為約定期間的短期交易，並非永久持有不得轉讓。","錯誤。RP到期時投資人可取回本金及約定利息，並非放棄所有權且無返還。","正確。附買回交易（RP）指投資人先買進票券、並約定由票券商於一定期間後以約定價格買回，等同投資人短期資金的運用（賺取利息）。"],"src":"研究筆記四之5：RP＝附買回協議、RS＝附賣回協議"},{"id":"ETH-CA-033","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":1,"q":"依銀行資本適足性規範，本國銀行資本適足率（BIS ratio）之法定最低標準為多少？","options":["2%","6%","8%","10%"],"answer":2,"explain":["錯誤。2%是「資本嚴重不足」的認定門檻，而非法定最低標準。","錯誤。6%非資本適足率之法定最低標準。","正確。銀行資本適足率之法定最低標準為8%，低於此標準將受主管機關監理措施。","錯誤。10%高於法定最低標準8%。"],"src":"研究筆記四之3：資本適足率法定最低8%"},{"id":"ETH-CA-034","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":2,"q":"依規定，銀行資本適足率低於多少時，屬於「資本嚴重不足」？","options":["低於2%","低於4%","低於6%","低於8%"],"answer":0,"explain":["正確。資本適足率低於2%者，認定為「資本嚴重不足」，主管機關得採取最嚴格的處置措施。","錯誤。4%非資本嚴重不足的認定門檻。","錯誤。6%非資本嚴重不足的認定門檻。","錯誤。低於8%代表未達法定最低標準（資本不足），但尚未達「嚴重不足」的2%門檻。"],"src":"研究筆記四之3：資本嚴重不足＝比率低於2%"},{"id":"ETH-CA-035","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":1,"q":"下列有關銀行逾期放款比率（逾放比）的敘述，何者正確？","options":["逾放比愈高，代表資產品質愈佳","逾放比與資產品質無關","逾放比高低僅反映銀行規模大小","逾放比愈低，代表資產品質愈佳"],"answer":3,"explain":["錯誤。逾放比愈高代表收不回的放款比重愈大，資產品質愈差而非愈佳。","錯誤。逾放比正是衡量放款資產品質的重要指標，兩者密切相關。","錯誤。逾放比反映的是放款品質，而非銀行規模大小。","正確。逾放比（逾期放款占總放款比率）愈低，代表放款品質良好、資產品質愈佳。"],"src":"研究筆記四之3：逾放比愈低資產品質愈佳"},{"id":"ETH-CA-036","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":2,"q":"下列何者「不是」銀行授信的五項基本原則之一？","options":["安全性","流動性","公開性","收益性"],"answer":2,"explain":["錯誤（屬五原則）。安全性是授信五原則之一，強調確保債權受償。","錯誤（屬五原則）。流動性是授信五原則之一，強調資金回收與變現能力。","正確（非五原則）。授信五原則為安全性、流動性、公益性、收益性、成長性，「公開性」並不在其中，為應選答案。","錯誤（屬五原則）。收益性是授信五原則之一，強調合理利潤。"],"src":"研究筆記四之3：授信原則＝安全性、流動性、公益性、收益性、成長性（公開性非）"},{"id":"ETH-CA-037","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":2,"q":"銀行以「利率敏感性缺口（Gap）」作為管理工具，主要用以衡量與管理下列何種風險？","options":["利率風險","作業風險","法律風險","匯率風險"],"answer":0,"explain":["正確。利率敏感性缺口衡量利率敏感資產與負債的差額，用以評估與管理市場利率變動對淨利息收入的影響，即利率風險。","錯誤。作業風險係指作業流程、人員或系統缺失所致之風險，非以利率敏感性缺口衡量。","錯誤。法律風險與契約、法令遵循有關，非以利率敏感性缺口衡量。","錯誤。匯率風險以外匯部位管理，非以利率敏感性缺口衡量。"],"src":"研究筆記四之3：利率風險以利率敏感性缺口管理"},{"id":"ETH-CA-038","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":2,"q":"依規定，可轉讓定期存單（NCD）的發行天期最長不得超過多久？","options":["3個月","6個月","3年","1年"],"answer":3,"explain":["錯誤。3個月並非NCD的最長發行天期上限。","錯誤。6個月並非NCD的最長發行天期上限。","錯誤。3年已屬長期，超過NCD最長1年的規定。","正確。可轉讓定期存單（NCD）屬貨幣市場短期工具，發行天期最長為1年。"],"src":"研究筆記四之3：可轉讓定期存單（NCD）發行天期最長1年"},{"id":"ETH-CA-039","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":3,"q":"下列有關票券商業務功能的敘述，何者正確？","options":["簽證業務包含代發行人洽定交易條件與價格","承銷之「包銷」係指承諾將未售出票券全數買入並給付價款","票券商不得從事自營買賣業務","經紀業務係指票券商以自有資金自行買賣票券"],"answer":1,"explain":["錯誤。簽證係核驗簽章及票面應記載要項，並不包含代為洽定交易條件與價格。","正確。承銷之包銷方式，係票券商承諾對未能售出的票券全數買入並給付價款，發行人可確定取得資金。","錯誤。票券商業務包含簽證、承銷、經紀及自營，得從事自營買賣。","錯誤。以自有資金自行買賣是自營業務；經紀業務是受託居間買賣、賺取手續費。"],"src":"研究筆記四之5：票券商功能（簽證、承銷含包銷、經紀、自營）"},{"id":"ETH-CA-040","exam":"ethics","subject":"金融市場常識","topic":"貨幣市場與銀行實務","difficulty":3,"q":"下列有關貨幣市場與央行角色的敘述，何者正確？","options":["公司債為典型的貨幣市場信用工具","中央銀行為貨幣市場的監督者及最後資金調節者","銀行同業拆款市場開放一般企業與個人參與","附賣回交易（RS）指投資人買進票券並約定日後由票券商買回"],"answer":1,"explain":["錯誤。公司債屬一年以上的資本市場工具，非貨幣市場工具。","正確。中央銀行是貨幣市場的監督者，並扮演最後資金調節者（最後貸款者）的角色，透過公開市場操作調節市場資金。","錯誤。銀行同業拆款市場限金融同業參與，一般企業與個人不得參與。","錯誤。此描述為附買回（RP）；附賣回（RS）方向相反，指投資人賣出票券並約定日後買回。"],"src":"研究筆記四之5：央行為貨幣市場最後資金調節者、拆款限金融同業、RP/RS定義"},{"id":"ETH-CB-001","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":1,"q":"信託法律關係中，構成信託的三方當事人（信託三要素）為下列何者？","options":["委託人、受託人、受益人","委託人、保證人、受益人","發行人、承銷商、投資人","要保人、保險人、被保險人"],"answer":0,"explain":["正確。信託係委託人將財產移轉予受託人，由受託人為受益人之利益或特定目的管理處分財產，三方為委託人、受託人、受益人，此即信託三要素。","錯誤。信託不以保證人為當事人，信託業更不得保證收益；正確之三方為委託人、受託人、受益人。","錯誤。發行人、承銷商、投資人屬證券承銷市場之角色，非信託關係當事人。","錯誤。要保人、保險人、被保險人屬保險契約之當事人與關係人，非信託三要素。"],"src":"信託法第1條；研究筆記四之4-1（信託三要素）"},{"id":"ETH-CB-002","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":2,"q":"依信託法規定，信託成立後信託財產在法律上應如何處理，以彰顯受託人取得管理處分權？","options":["仍登記為委託人名義，受託人僅代為保管","移轉並登記至受託人名義","登記為受益人名義由其自行處分","登記為信託監察人名義"],"answer":1,"explain":["錯誤。若仍登記為委託人名義，受託人無從對外行使管理處分權，不符信託移轉之本旨。","正確。信託財產須自委託人移轉並登記至受託人名義，由受託人以自己名義為受益人利益管理處分，此為信託成立之核心。","錯誤。受益人享有信託利益，但信託財產之管理處分權在受託人，並非登記為受益人名義自行處分。","錯誤。信託監察人係為監督受託人而設，非信託財產之名義所有人。"],"src":"信託法第1條、第4條；研究筆記四之4-1（財產移轉登記至受託人名義）"},{"id":"ETH-CB-003","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":2,"q":"依信託法，信託之設立方式不包括下列何者？","options":["契約信託","遺囑信託","宣言信託","法定信託"],"answer":3,"explain":["錯誤。契約信託係委託人與受託人以契約設立信託，為法定設立方式之一。","錯誤。遺囑信託係以遺囑於死後成立信託，為法定設立方式之一。","錯誤。宣言信託係委託人對外宣言自為受託人管理特定財產，為法定設立方式之一。","正確。信託之設立方式為契約、遺囑、宣言三種，並無所謂『法定信託』，此為虛構選項。"],"src":"信託法第2條、第71條；研究筆記四之4-2（設立方式三種）"},{"id":"ETH-CB-004","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":2,"q":"關於信託財產之獨立性，下列敘述何者正確？","options":["受託人死亡時信託財產應列入其遺產分配給繼承人","受託人破產時信託財產應列入其破產財團供債權人受償","信託財產得由受託人之個人債權人聲請強制執行","信託財產不屬於受託人之遺產，亦不屬於其破產財團"],"answer":3,"explain":["錯誤。信託財產具獨立性，受託人死亡時不屬其遺產，不列入繼承分配。","錯誤。受託人破產時信託財產不屬其破產財團，不供其個人債權人受償。","錯誤。原則上不得對信託財產強制執行；受託人個人債權人不得就信託財產聲請強制執行。","正確。信託財產具獨立性，與受託人之自有財產分離，不屬於受託人之遺產或破產財團，以保護受益人。"],"src":"信託法第10條至第12條、第24條；研究筆記四之4-4（信託財產獨立性）"},{"id":"ETH-CB-005","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":3,"q":"信託關係消滅時，若信託行為未另有訂定，信託財產之歸屬第一順位為下列何者？","options":["享有全部信託利益之受益人","委託人或其繼承人","受託人","國庫"],"answer":0,"explain":["正確。信託關係消滅時，信託財產歸屬第一順位為享有全部信託利益之受益人，其次才是委託人或其繼承人。","錯誤。委託人或其繼承人為次順位（第二順位）歸屬權利人，非第一順位。","錯誤。受託人僅負管理處分之責，信託財產不歸屬於受託人。","錯誤。國庫並非信託財產歸屬之順位對象。"],"src":"信託法第65條；研究筆記四之4-5（關係消滅財產歸屬順位）"},{"id":"ETH-CB-006","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":1,"q":"依信託業法，信託業辦理信託業務時，下列何者為法所禁止？","options":["向委託人收取信託報酬","將信託財產與自有財產分別管理","盡善良管理人之注意義務","對委託人保證本金或最低收益"],"answer":3,"explain":["錯誤。信託業得依約定收取信託報酬，此為合法之對價。","錯誤。分別管理係信託業應盡之義務，並非禁止行為。","錯誤。盡善良管理人之注意義務為信託業之法定義務，非禁止行為。","正確。信託業法明文禁止信託業對委託人為保證本金或最低收益之表示，投資風險由委託人自負。"],"src":"信託業法第31條；研究筆記四之4-6（信託業不得保證收益）"},{"id":"ETH-CB-007","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":2,"q":"依信託業法，信託業對信託財產應盡之義務不包括下列何者？","options":["忠實義務","善良管理人之注意義務","分別管理義務","保證獲利義務"],"answer":3,"explain":["錯誤。忠實義務係信託業應盡之基本義務，須為受益人之最大利益處理信託事務。","錯誤。善良管理人之注意義務為信託業處理信託事務應盡之注意程度。","錯誤。分別管理義務要求信託財產與自有財產及不同信託之財產分別管理。","正確。信託業不得保證獲利，並無所謂『保證獲利義務』，此與信託業法禁止保證收益之規定牴觸。"],"src":"信託業法第22條、第24條、第31條；研究筆記四之4-6（忠實善管分別管理義務）"},{"id":"ETH-CB-008","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":2,"q":"投資人常見之『特定金錢信託』（如委託投資國外共同基金），依規定應由下列何種機構辦理？","options":["經核准辦理信託業務之銀行及證券商","僅限保險公司","僅限投信投顧事業","任何公司行號皆可辦理"],"answer":0,"explain":["正確。特定金錢信託係由經主管機關核准辦理信託業務之銀行及證券商辦理，委託人指定運用標的、風險自負。","錯誤。保險公司非辦理特定金錢信託之機構。","錯誤。投信投顧事業辦理者為全權委託投資（代客操作）等，非特定金錢信託之受託機構。","錯誤。辦理信託業務屬特許事業，須經核准，非任何公司皆可辦理。"],"src":"信託業法；研究筆記四之4-7（特定金錢信託由核准銀行證券商辦理）"},{"id":"ETH-CB-009","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":3,"q":"在金融資產證券化架構中，創始機構（如銀行）與特殊目的機構（SPV）間就基礎資產之移轉，會計上通常認定為下列何者？","options":["以資產為擔保之借款","將資產出售移轉予特殊目的機構","單純委任代為收款","資產租賃"],"answer":1,"explain":["錯誤。若認定為擔保借款，資產仍留在創始機構帳上，非證券化真實出售之架構。","正確。金融資產證券化中，創始機構將基礎資產『出售』並移轉予特殊目的機構（SPV），會計上認列為真實出售，資產自創始機構移出。","錯誤。單純委任代收款並未移轉資產所有權，不符證券化真實出售之要件。","錯誤。資產租賃係使用權之讓與，非資產所有權之出售移轉。"],"src":"金融資產證券化條例；研究筆記四之4-8（創始機構出售資產予SPV）"},{"id":"ETH-CB-010","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":1,"q":"下列關於信託分類之敘述，何者正確？","options":["以土地為信託財產者屬金錢信託","以金錢為信託財產者屬不動產信託","信託財產僅限於現金一種","以船舶等動產為信託財產者屬動產信託"],"answer":3,"explain":["錯誤。以土地為信託財產者屬不動產信託，非金錢信託。","錯誤。以金錢為信託財產者屬金錢信託，非不動產信託。","錯誤。信託財產得為金錢、動產、不動產、有價證券等多種，並不限於現金。","正確。以船舶等動產為信託財產者屬動產信託；信託得依財產種類分為金錢信託、動產信託、不動產信託等。"],"src":"信託業法第16條；研究筆記四之4-3（信託分類）"},{"id":"ETH-CB-011","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":3,"q":"甲以其名下不動產設立信託，指定乙為受託人、丙為受益人。信託期間乙之個人債權人丁欲對該不動產求償，下列敘述何者正確？","options":["丁得逕就該信託不動產聲請強制執行","因不動產已登記為乙名義，故屬乙之責任財產可供丁求償","丙須以該不動產先清償丁之債權","該不動產具信託財產獨立性，原則上丁不得對之強制執行"],"answer":3,"explain":["錯誤。信託財產具獨立性，受託人乙之個人債權人丁原則上不得逕行對信託財產強制執行。","錯誤。信託不動產雖登記為受託人乙名義，但屬信託財產而與乙自有財產分離，不因登記名義而成為乙之責任財產。","錯誤。受益人丙享有信託利益，無以信託財產清償受託人個人債務之義務。","正確。信託財產具獨立性，與受託人自有財產分離，受託人個人債務之債權人原則上不得對信託財產聲請強制執行，以保護受益人丙之利益。"],"src":"信託法第12條、第24條；研究筆記四之4-4（信託財產獨立性不屬遺產破產財團）"},{"id":"ETH-CB-012","exam":"ethics","subject":"金融市場常識","topic":"信託實務","difficulty":2,"q":"委託人甲以遺囑指定其過世後將部分遺產成立信託照顧未成年子女，此種信託之設立方式屬於下列何者？","options":["契約信託","遺囑信託","宣言信託","強制信託"],"answer":1,"explain":["錯誤。契約信託係委託人生前與受託人以契約設立，非以遺囑於死後生效。","正確。以遺囑指定於委託人死亡後成立信託者，屬遺囑信託，為信託法所定設立方式之一。","錯誤。宣言信託係委託人對外宣言自為受託人管理特定財產，與以遺囑設立不同。","錯誤。信託法並無『強制信託』之設立方式，設立方式為契約、遺囑、宣言三種。"],"src":"信託法第2條；研究筆記四之4-2（設立三方式契約遺囑宣言）"},{"id":"ETH-CB-013","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":1,"q":"就保險原理而言，保險制度原則上僅承保下列何種風險？","options":["投機風險","純粹風險","市場風險","匯率風險"],"answer":1,"explain":["錯誤。投機風險（如買賣股票）同時具有損失與獲利之可能，不具可保性，非保險承保對象。","正確。保險僅承保純粹風險，即只有損失或無損失兩種結果、不會帶來獲利之風險（如火災、疾病、死亡）。","錯誤。市場風險屬投資領域之風險，非保險承保之純粹風險。","錯誤。匯率風險具漲跌兩面，屬投機性質風險，非保險承保對象。"],"src":"保險學風險分類；研究筆記四之6-1（保險只承保純粹風險）"},{"id":"ETH-CB-014","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":2,"q":"依風險管理理論，就損失『發生頻率低、但一旦發生損失幅度大』之風險，最適合採用下列何種風險管理方法？","options":["風險自留","損失預防","購買保險","完全忽略"],"answer":2,"explain":["錯誤。風險自留適合損失幅度小、可自行承擔並可預估之風險，不適合幅度大之風險。","錯誤。損失預防旨在降低發生頻率，對已屬低頻率之大幅度風險，仍需以保險移轉殘餘之鉅額損失。","正確。頻率低、幅度大之風險（如火災、重大意外）最適合以購買保險方式移轉，以小額保費換取大額保障。","錯誤。完全忽略將使鉅額損失無從因應，非適當之風險管理方法。"],"src":"風險管理矩陣（頻率×幅度）；研究筆記四之6-2（頻率小幅度大應投保）"},{"id":"ETH-CB-015","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":1,"q":"依我國保險法之分類，保險可分為下列哪兩大類？","options":["財產保險與人身保險","社會保險與商業保險","強制保險與任意保險","定值保險與不定值保險"],"answer":0,"explain":["正確。保險法將保險分為財產保險與人身保險兩大類，此為保險法之基本分類。","錯誤。社會保險與商業保險係依經營主體與目的區分，非保險法第13條之分類。","錯誤。強制與任意係依投保是否具強制性區分，非保險法之基本二分。","錯誤。定值與不定值係財產保險內保險金額約定方式之區分，非保險法之基本二分。"],"src":"保險法第13條；研究筆記四之6-3（保險法分財產與人身保險）"},{"id":"ETH-CB-016","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":2,"q":"下列關於保險契約當事人與關係人之敘述，何者正確？","options":["保險契約之當事人為被保險人與受益人","受益人為保險契約之當事人","被保險人為保險契約之當事人","保險契約之當事人為要保人與保險人"],"answer":3,"explain":["錯誤。被保險人與受益人屬保險契約之『關係人』，非當事人。","錯誤。受益人係享有賠償請求權之關係人，非契約當事人。","錯誤。被保險人為承保危險發生所在之關係人，非契約當事人。","正確。保險契約之當事人為要保人與保險人；被保險人與受益人則為關係人。"],"src":"保險法第3條至第5條；研究筆記四之6-3（當事人要保人加保險人、關係人被保險人加受益人）"},{"id":"ETH-CB-017","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":2,"q":"為配合房屋貸款隨本金逐年攤還、未償餘額遞減之特性，下列何種壽險商品最為適合搭配以保障貸款餘額？","options":["遞減型定期壽險","終身壽險","生死合險（養老保險）","變額萬能壽險"],"answer":0,"explain":["正確。遞減型定期壽險之保額隨時間遞減，恰可對應房貸未償餘額逐年減少之特性，保費相對經濟，最適合搭配房貸。","錯誤。終身壽險保額固定且保費較高，與房貸餘額逐年遞減之需求不完全契合。","錯誤。生死合險兼具工作期保障與晚年準備，保額固定，非專為房貸遞減設計。","錯誤。變額萬能壽險屬投資型保單，保額具彈性但不保證收益，非配合房貸餘額遞減之典型設計。"],"src":"人身保險商品實務；研究筆記四之6-4（房貸配遞減定期壽險）"},{"id":"ETH-CB-018","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":1,"q":"關於投資型保險商品，下列敘述何者正確？","options":["保險公司保證投資帳戶之最低報酬率","與傳統壽險相同，完全無投資風險","主管機關規定必須保證還本","投資盈虧由要保人自行承擔，不保證收益"],"answer":3,"explain":["錯誤。投資型保單之投資帳戶盈虧由要保人自負，保險公司不保證最低報酬率。","錯誤。投資型保單之分離帳戶具投資風險，與純保障型傳統壽險不同。","錯誤。並無規定投資型保單必須保證還本；其投資部分不保證收益。","正確。投資型保險連結投資標的，投資盈虧由要保人自行承擔，保險公司不保證投資收益。"],"src":"投資型保險商品管理規則；研究筆記四之6-4（投資型保單不保證收益）"},{"id":"ETH-CB-019","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":3,"q":"依人身保險相關規定，人壽保險之要保人於保險單送達後，得於一定期間內以書面檢還保險單行使契約撤銷權。該期間為下列何者？","options":["保單送達之當日起3日內","保單送達之翌日起10日內","保單送達之翌日起30日內","契約生效滿1年內"],"answer":1,"explain":["錯誤。撤銷權之起算為保單送達之翌日而非當日，期間亦非3日。","正確。人壽保險要保人得於保險單送達之翌日起算10日內，以書面檢還保單行使契約撤銷權，撤銷自始無效並退還保費。","錯誤。10日始為法定期間，30日並非人壽保險契約撤銷權之期間。","錯誤。契約撤銷權有明確之短期期間限制，非長達1年。"],"src":"人壽保險單示範條款；研究筆記四之6-5（保單送達翌日10日內撤回）"},{"id":"ETH-CB-020","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":1,"q":"我國勞工保險之中央主管機關為下列何者？","options":["金融監督管理委員會","衛生福利部","勞動部","國防部"],"answer":2,"explain":["錯誤。金管會主管金融保險業之監理，非勞工保險之中央主管機關。","錯誤。衛生福利部主管全民健康保險等，非勞工保險之中央主管機關。","正確。勞工保險屬社會保險，其中央主管機關為勞動部。","錯誤。國防部為軍人保險之主管機關，非勞工保險之主管機關。"],"src":"勞工保險條例第4條；研究筆記四之6-6（勞保主管機關勞動部）"},{"id":"ETH-CB-021","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":2,"q":"關於責任保險，下列敘述何者正確？","options":["責任保險承保被保險人對第三人依法應負之民事賠償責任","責任保險承保被保險人之刑事責任","責任保險有明確之保險價額，屬定值保險","責任保險僅承保被保險人自身之財產損失"],"answer":0,"explain":["正確。責任保險承保被保險人對第三人依法應負之民事損害賠償責任，於被保險人受賠償請求時由保險人負給付責任。","錯誤。刑事責任具人身專屬性且違反公序良俗，不得為保險標的，責任險不承保刑事責任。","錯誤。責任保險之損害金額於事故發生前無法確定，無保險價額之概念，非定值保險。","錯誤。責任保險係對第三人之賠償責任，非承保被保險人自身之財產損失。"],"src":"保險法第90條；研究筆記四之6-7（責任險承保民事責任、無保險價額）"},{"id":"ETH-CB-022","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":2,"q":"對於古董、藝術品、珠寶等難以於損失時客觀估定市價之標的物，財產保險實務上多採用下列何種保單？","options":["不定值保險單","定值保險單","責任保險單","強制保險單"],"answer":1,"explain":["錯誤。不定值保險單於損失時再估定實際價值，不適合價值難以客觀估定之古董藝術品。","正確。定值保險單於訂約時即約定保險標的之價值，適用於古董、藝術品等損失時難以客觀估價之標的，避免事後爭議。","錯誤。責任保險係承保對第三人之賠償責任，非承保特定財產標的之價值。","錯誤。強制保險係法律強制投保之保險（如強制車險），與標的估價方式無關。"],"src":"保險法第50條、第73條；研究筆記四之6-7（定值保單用於古董藝品）"},{"id":"ETH-CB-023","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":3,"q":"我國住宅火災保險採共保條款，其約定之共保比例為下列何者？","options":["共保80%","共保70%","共保60%","共保50%"],"answer":2,"explain":["錯誤。80%為商業火災保險共保附加條款之常見比例，非住宅火險。","錯誤。住宅火險共保比例並非70%。","正確。我國住宅火災保險採共保60%之設計；相對地，商業火災保險共保附加條款常見比例為80%。","錯誤。住宅火險共保比例並非50%。"],"src":"住宅火災及地震基本保險；研究筆記四之6-7（住宅火險共保60%、商業火險80%）"},{"id":"ETH-CB-024","exam":"ethics","subject":"金融市場常識","topic":"保險實務","difficulty":1,"q":"我國住宅火災及地震基本保險中，地震基本保險對每一住宅建築物之賠償限額為新台幣多少元？","options":["100萬元","120萬元","150萬元","300萬元"],"answer":2,"explain":["錯誤。地震基本保險建築物賠償限額並非100萬元。","錯誤。地震基本保險建築物賠償限額並非120萬元。","正確。住宅地震基本保險對每一建築物之賠償限額為新台幣150萬元（另有臨時住宿費用等）。","錯誤。300萬元為存款保險每一存款人同一機構之最高保額，非地震基本險限額。"],"src":"住宅地震基本保險條款；研究筆記四之6-8（住宅地震基本保險限額150萬）"},{"id":"ETH-CB-025","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":1,"q":"資訊安全的三大要素（CIA）指的是下列何者？","options":["機密性、完整性、可用性","機密性、一致性、可用性","正確性、完整性、隱密性","可用性、獲利性、安全性"],"answer":0,"explain":["正確。資訊安全三要素CIA為機密性（Confidentiality）、完整性（Integrity）、可用性（Availability）。","錯誤。第二要素為完整性（Integrity）而非『一致性』，一致性為常見誤植之干擾選項。","錯誤。資安三要素之標準用語為機密性、完整性、可用性，非正確性與隱密性之組合。","錯誤。獲利性並非資訊安全要素，此組合不符CIA之定義。"],"src":"資訊安全管理；研究筆記四之7-1（CIA機密完整可用）"},{"id":"ETH-CB-026","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":1,"q":"在資料儲存容量單位換算中，1 TB（Terabyte）等於多少 GB（Gigabyte）？","options":["100 GB","1000 GB","1024 GB","10240 GB"],"answer":2,"explain":["錯誤。1 TB並非100 GB。","錯誤。1000 GB為十進位近似值，資訊領域標準換算並非1000。","正確。資訊儲存容量以2的次方換算，1 TB等於1024 GB（1024 = 2的10次方）。","錯誤。10240 GB約為10 TB，非1 TB。"],"src":"資訊儲存單位換算；研究筆記四之7-2（1TB=1024GB）"},{"id":"ETH-CB-027","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":1,"q":"關於我國核准設立之純網路銀行，下列敘述何者正確？","options":["純網銀依規定應廣設實體分行以服務客戶","純網銀不受金管會監理，屬境外機構","我國核准之三家純網銀為連線（LINE Bank）、將來、樂天","純網銀僅能經營存款、不得辦理放款"],"answer":2,"explain":["錯誤。純網銀之特色為原則上無實體分行，透過數位通路提供服務（得有ATM合作），並非廣設實體分行。","錯誤。純網銀為我國依法設立並受金管會監理之本國銀行，非不受監理之境外機構。","正確。我國金管會核准設立之三家純網銀為連線商業銀行（LINE Bank）、將來商業銀行、樂天國際商業銀行。","錯誤。純網銀為完整之商業銀行，得辦理存款、放款等業務，非僅限存款。"],"src":"純網路銀行設立；研究筆記四之7-4（純網銀三家、無實體分行）"},{"id":"ETH-CB-028","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":2,"q":"關於比特幣等虛擬通貨，下列何者為主管機關關注之主要監理疑慮？","options":["可能被用於洗錢、資恐、逃稅及詐騙","為中央銀行發行之法定貨幣","價格由政府保證且不會波動","已全面取代新台幣成為法定支付工具"],"answer":0,"explain":["正確。比特幣等虛擬通貨因具匿名性與跨境流通特性，可能被用於洗錢、資恐、逃稅及詐騙，為主管機關關注之主要疑慮。","錯誤。比特幣非中央銀行發行，我國法定貨幣為新台幣，比特幣不具法償地位。","錯誤。比特幣價格波動劇烈且無政府保證。","錯誤。比特幣並未取代新台幣，亦非我國法定支付工具。"],"src":"虛擬通貨監理；研究筆記四之7-5（比特幣洗錢資恐逃稅疑慮）"},{"id":"ETH-CB-029","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":1,"q":"以人工智慧應用於金融服務之比喻中，AI 常被形容為機器人的哪一部分？","options":["手腳（執行動作）","大腦（分析與決策）","外殼（外觀造型）","電池（電力來源）"],"answer":1,"explain":["錯誤。手腳係執行實體動作之機構，AI主司運算判斷而非肢體執行。","正確。AI人工智慧被比喻為機器人的『大腦』，負責資料分析、學習與決策判斷。","錯誤。外殼僅為外觀造型，與AI之運算決策功能無關。","錯誤。電池為電力來源，非AI所比喻之運算決策核心。"],"src":"金融科技概論；研究筆記四之7-3（AI是機器人大腦）"},{"id":"ETH-CB-030","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":2,"q":"金融機構運用指紋、臉部或虹膜等生物特徵進行遠端身分驗證，主要屬於下列何種技術應用？","options":["區塊鏈技術","雲端儲存技術","量子加密技術","生物辨識技術"],"answer":3,"explain":["錯誤。區塊鏈為分散式帳本技術，用於資料不可篡改之紀錄，非以身體特徵驗證身分。","錯誤。雲端儲存係將資料儲存於遠端伺服器，與生物特徵驗證身分無直接關係。","錯誤。量子加密係利用量子特性保護通訊，非以生物特徵辨識身分。","正確。運用指紋、臉部、虹膜等身體特徵進行身分驗證屬生物辨識技術，可應用於遠端開戶與交易之身分確認。"],"src":"金融科技身分驗證；研究筆記四之7-3（生物辨識）"},{"id":"ETH-CB-031","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":3,"q":"某銀行為確保客戶交易資料在傳輸過程中未被竄改，其對應之資訊安全要素為下列何者？","options":["機密性（Confidentiality）","完整性（Integrity）","可用性（Availability）","擴充性（Scalability）"],"answer":1,"explain":["錯誤。機密性係防止資料被未授權者取得或窺視，對應之控制為加密與存取控制，非防止竄改。","正確。完整性（Integrity）確保資料在傳輸或儲存過程中未遭未授權之竄改，維持資料之正確與一致。","錯誤。可用性係確保系統與資料於需要時可正常存取，非防止竄改。","錯誤。擴充性並非資安三要素之一，與資料防竄改無關。"],"src":"資訊安全CIA原則；研究筆記四之7-1（CIA機密完整可用）"},{"id":"ETH-CB-032","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":2,"q":"下列關於金融科技相關概念之敘述，何者錯誤？","options":["資訊安全三要素為機密性、完整性、可用性","AI人工智慧可比喻為機器人的大腦","1 TB 等於 1024 GB","比特幣為我國中央銀行發行之法定貨幣"],"answer":3,"explain":["正確敘述。資安三要素為機密性、完整性、可用性（CIA），本敘述正確。","正確敘述。AI負責分析與決策，常被比喻為機器人的大腦，本敘述正確。","正確敘述。資訊容量以2的次方換算，1 TB等於1024 GB，本敘述正確。","此為錯誤敘述，即為本題答案。比特幣非中央銀行發行，我國法定貨幣為新台幣，比特幣不具法償地位且有洗錢資恐等疑慮。"],"src":"金融科技概論；研究筆記四之7-1、7-2、7-3、7-5"},{"id":"ETH-CB-033","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":3,"q":"某金融機構導入異地備援與備份機制，確保系統遭遇災害時服務仍能持續運作、資料可正常存取，此舉主要維護資訊安全三要素中的哪一項？","options":["機密性（Confidentiality）","完整性（Integrity）","可用性（Availability）","不可否認性（Non-repudiation）"],"answer":2,"explain":["錯誤。機密性係防止資料被未授權存取，異地備援之目的非在防止資料外洩。","錯誤。完整性係確保資料未遭竄改，與確保服務持續運作之目的不同。","正確。可用性（Availability）確保系統與資料於需要時可正常存取、服務不中斷，異地備援與備份即為維護可用性之措施。","錯誤。不可否認性並非資安三要素（CIA）之一。"],"src":"資訊安全CIA原則；研究筆記四之7-1（CIA可用性）"},{"id":"ETH-CB-034","exam":"ethics","subject":"金融市場常識","topic":"金融科技與資安","difficulty":1,"q":"金融業所稱之『大數據』（Big Data），其資料規模常以下列何種特性描述？","options":["資料量極為龐大（巨量、海量）","資料量極小且固定","僅限紙本文件資料","僅指單一客戶之交易明細"],"answer":0,"explain":["正確。大數據之首要特性為資料量極為龐大（巨量、海量），並具高速產生與多樣性等特徵。","錯誤。大數據強調資料量龐大，非極小且固定。","錯誤。大數據涵蓋數位化之結構與非結構資料，非僅限紙本文件。","錯誤。大數據係海量資料之整合分析，非僅指單一客戶之交易明細。"],"src":"金融科技大數據概念；研究筆記四之7-2（大數據=巨量海量）"},{"id":"ETH-CB-035","exam":"ethics","subject":"金融市場常識","topic":"ESG永續與普惠金融與金融詐騙","difficulty":1,"q":"金管會為引導金融業支持綠色及永續發展，於2020年推動之政策方案為下列何者？","options":["綠色金融行動方案","打炒房方案","證券市場全面電子化方案","金融挺農業方案"],"answer":0,"explain":["正確。金管會於2020年推動綠色金融行動方案（2.0版），從投資、授信及資訊揭露等面向引導金融業支持綠色與永續發展。","錯誤。打炒房方案屬不動產貸款管制措施，非綠色金融政策。","錯誤。證券市場電子化屬交易制度範疇，非綠色永續金融政策方案。","錯誤。金融挺農業係產業支持措施，非以綠色永續為核心之綠色金融行動方案。"],"src":"金管會綠色金融行動方案2.0；研究筆記四之10-2（綠色金融行動方案）"},{"id":"ETH-CB-036","exam":"ethics","subject":"金融市場常識","topic":"ESG永續與普惠金融與金融詐騙","difficulty":1,"q":"依據 Cressey 提出之舞弊三角（Fraud Triangle）理論，構成舞弊之三項要素為下列何者？","options":["資金、技術、通路","壓力（動機）、機會、合理化","市場、產品、價格","董事會、經理人、股東"],"answer":1,"explain":["錯誤。資金、技術、通路為企業經營要素，非舞弊三角之內涵。","正確。Cressey舞弊三角理論指出舞弊之發生源於壓力（動機）、機會與合理化三要素同時存在。","錯誤。市場、產品、價格屬行銷組合概念，非舞弊三角。","錯誤。董事會、經理人、股東為公司治理主體，非舞弊三角之三要素。"],"src":"Cressey舞弊三角理論；研究筆記四之9-1（舞弊三角壓力機會合理化）"},{"id":"ETH-CB-037","exam":"ethics","subject":"金融市場常識","topic":"ESG永續與普惠金融與金融詐騙","difficulty":3,"q":"依證券交易法規定，公司內部人於獲悉影響股價之重大消息後，原則上須待該消息公開後經過多少時間，始得買賣該公司股票？","options":["6小時","12小時","18小時","24小時"],"answer":2,"explain":["錯誤。並非6小時，此為干擾選項。","錯誤。並非12小時，此為干擾選項。","正確。依證券交易法第157條之1，內部人於重大消息明確後至公開後18小時內不得買賣，須待消息公開滿18小時後始得交易，以防內線交易。","錯誤。並非24小時，正確之沉澱期間為18小時。"],"src":"證券交易法第157條之1；研究筆記四之9-5及三之C138（內線交易消息公開後18小時）"},{"id":"ETH-CB-038","exam":"ethics","subject":"金融市場常識","topic":"ESG永續與普惠金融與金融詐騙","difficulty":2,"q":"金融機構於認識客戶（KYC）過程中，若客戶不尋常拖延提供文件、僅提供影本或身分明顯異常，從業人員應如何處理？","options":["為衝業績仍應儘速為其開戶","得婉拒建立業務關係或加強審查","代客戶填寫並偽造缺漏之文件","將該客戶轉介予同業以規避責任"],"answer":1,"explain":["錯誤。不得為衝業績而忽略異常態樣逕行開戶，此違反洗錢防制與KYC規範。","正確。KYC過程發現異常態樣（拖延、僅提供影本、身分不符）時，應提高警覺、加強審查，必要時婉拒建立業務關係並考量申報。","錯誤。代客戶偽造文件係違法行為，絕對禁止。","錯誤。將可疑客戶轉介同業以規避責任並不妥當，亦不得私自轉介客戶。"],"src":"洗錢防制法及KYC作業；研究筆記四之9-4（KYC異常婉拒）"},{"id":"ETH-CB-039","exam":"ethics","subject":"金融市場常識","topic":"ESG永續與普惠金融與金融詐騙","difficulty":1,"q":"依老人福利法之定義，並依普惠金融對高齡客戶之保護，所稱『高齡者（老人）』係指年滿幾歲以上之人？","options":["55歲","60歲","65歲","70歲"],"answer":2,"explain":["錯誤。55歲非老人福利法所定之高齡者年齡。","錯誤。60歲非老人福利法所定之高齡者年齡。","正確。依老人福利法第2條，所稱老人係指年滿65歲以上之人；普惠金融對高齡客戶之保護亦以此為準。","錯誤。70歲非老人福利法所定之高齡者起算年齡。"],"src":"老人福利法第2條；研究筆記四之8-1（高齡者65歲）"},{"id":"ETH-CB-040","exam":"ethics","subject":"金融市場常識","topic":"ESG永續與普惠金融與金融詐騙","difficulty":2,"q":"為提供經濟弱勢或特定身分族群基本保障，保費低廉、保障單純之保險商品稱為下列何者？","options":["投資型保險","團體年金保險","微型保險","再保險"],"answer":2,"explain":["錯誤。投資型保險連結投資標的、不保證收益，非為經濟弱勢設計之基本保障商品。","錯誤。團體年金保險為退休給付規劃商品，非微型保險。","正確。微型保險係為經濟弱勢或特定身分者提供之基本保障型商品，具保費低廉、保障單純之特性，屬普惠金融之一環。","錯誤。再保險係保險人將其承保危險移轉予他保險人，屬保險公司間之風險分散，非對弱勢者之保障商品。"],"src":"微型保險業務管理規則；研究筆記四之8-3（微型保險經濟弱勢）"},{"id":"ETH-EA-001","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":1,"q":"證券營業員小陳為衝業績，向客戶表示：「這檔股票我幫您操作，保證半年獲利兩成，若虧損算我的。」下列對其行為之敘述何者正確？","options":["保證獲利並約定分擔損失，違反職業道德，屬絕對禁止之招攬行為","只要事後真的達成獲利，即屬合法招攬","對熟客承諾分擔損失是合理的服務，並無不當","口頭承諾未書面化，故不構成違規"],"answer":0,"explain":["正確。職業道德絕對禁止對客戶作保證獲利或約定分擔損失之表示，此為招攬時之明文禁止行為，不論結果或是否書面化。","錯誤。是否合法看行為本身，保證獲利之表示一經作成即違規，與事後結果無關。","錯誤。無論生熟客，承諾分擔客戶損失均為禁止行為，並非合理服務。","錯誤。口頭或書面之保證獲利、分擔損失表示皆屬違規，未書面化不能免責。"],"src":"職業道德—業務推廣與招攬：絕對禁止保證獲利或約定分擔損失（官方題庫D41型）"},{"id":"ETH-EA-002","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":1,"q":"金融從業人員向客戶介紹投資商品時，下列何種做法最符合職業道德？","options":["只強調預期報酬，避免提及風險以免客戶卻步","說明可能獲利時，同時充分揭露該商品之相關風險","告知客戶此商品穩賺不賠、適合所有人","以「別人都買了」施壓客戶盡快下單"],"answer":1,"explain":["錯誤。僅報喜不報憂、只講獲利不講風險，違反充分揭露義務。","正確。談及獲利時必須同時說明風險，讓客戶在充分資訊下作決定，符合職業道德。","錯誤。宣稱穩賺不賠、適合所有人屬誇大不實，為禁止之招攬用語。","錯誤。以同儕壓力催促下單屬不當招攬手法，違反職業道德。"],"src":"職業道德—業務推廣與招攬：講獲利必講風險、不得誇大"},{"id":"ETH-EA-003","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":2,"q":"保險業務員甲將自己的保險招攬登錄證借給尚未取得資格的朋友乙使用，以乙名義招攬保險。依規定甲之行為將受何種處分？","options":["僅需口頭告誡，無實質處分","撤銷證照且終身不得再考","停止招攬行為6個月","停止招攬行為1年"],"answer":2,"explain":["錯誤。將登錄證借他人使用屬明確違規，非僅口頭告誡即可。","錯誤。借證使用之處分為停止招攬6個月，並非撤銷證照終身禁考。","正確。將登錄證借予他人使用者，依規定處停止招攬行為6個月。","錯誤。停止招攬1年係對散播不實言論毀謗同業、擾亂金融秩序之處分，與本題情形不同。"],"src":"職業道德—業務推廣與招攬：登錄證不得借他人使用，違者停止招攬6個月"},{"id":"ETH-EA-004","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":2,"q":"某業務員為搶客戶，在網路社群散播競爭同業「財務出問題、快倒了」等不實言論，藉以擾亂金融秩序。依規定其行為將受何種處分？","options":["停止招攬行為6個月","警告後即可繼續招攬","罰款後不影響招攬資格","停止招攬行為1年"],"answer":3,"explain":["錯誤。停止招攬6個月係針對借用登錄證等情形，非散播不實毀謗同業。","錯誤。散播不實言論毀謗同業屬重大違規，不能僅警告了事。","錯誤。此情形之處分為停止招攬1年，並非單純罰款而不影響資格。","正確。散播不實言論毀謗同業、擾亂金融秩序者，依規定停止招攬行為1年。"],"src":"職業道德—業務推廣與招攬：散播不實言論毀謗同業停止招攬1年"},{"id":"ETH-EA-005","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":1,"q":"關於金融商品之文宣廣告，下列敘述何者符合職業道德與相關規範？","options":["廣告內容經公司內部核准並標明公司名稱後始得使用","為吸引眼球，可宣稱「輕鬆獲利、穩賺不賠」","廣告只要業務員自己覺得沒問題即可對外發布","可省略公司名稱以節省版面"],"answer":0,"explain":["正確。文宣廣告須經核准之內容、標明公司名稱後始得使用，不得誇大。","錯誤。宣稱輕鬆獲利、穩賺不賠屬誇大不實用語，為禁止事項。","錯誤。廣告須經公司審查核准程序，不能由業務員個人逕自發布。","錯誤。廣告應標明公司名稱以利辨識負責主體，不得省略。"],"src":"職業道德—業務推廣與招攬：文宣廣告須經核准、標明公司、禁誇大"},{"id":"ETH-EA-006","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":2,"q":"下列招攬行為中，何者屬於「不當招攬」而違反職業道德？","options":["招攬時出示名片、表明所屬公司與身分","以恐嚇威脅之言語或提供不當贈品折讓誘使客戶投保","依客戶風險屬性推介合適之商品","說明商品風險與費用後由客戶自行決定"],"answer":1,"explain":["錯誤。出示名片、表明公司與身分是招攬時應有的正當做法。","正確。以恐嚇威脅言語、或以贈品、不當折讓誘使投保，屬不當招攬手段，違反職業道德。","錯誤。依客戶風險屬性推介合適商品符合商品適合度原則，並無不當。","錯誤。充分說明風險費用後由客戶自主決定，正是符合職業道德之做法。"],"src":"職業道德—業務推廣與招攬：禁恐嚇威脅、不當贈品折讓"},{"id":"ETH-EA-007","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":2,"q":"保險業務員小林發現客戶手上有一張仍在有效期間、保障良好的舊保單，為賺取新契約佣金，慫恿客戶解掉舊保單改買新保單。此行為之評價為何？","options":["有利公司業績成長，值得鼓勵","只要新保單保費較高即屬適當服務","慫恿解舊保單買新保單使客戶權益受損，屬不當招攬","解約與否是客戶決定，業務員完全無責任"],"answer":2,"explain":["錯誤。此舉犧牲客戶權益以賺佣金，不應鼓勵。","錯誤。以保費高低作為適當與否標準，反而顯示以佣金為導向，並不適當。","正確。慫恿客戶解除仍有效之舊保單改購新單，常使客戶損失既得權益並增加成本，屬不當招攬行為。","錯誤。業務員負有忠實與注意義務，主動慫恿不當轉換保單即有責任。"],"src":"職業道德—業務推廣與招攬：不當慫恿解舊保單買新保單"},{"id":"ETH-EA-008","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":3,"q":"一位高齡退休客戶只想要保本、每月領固定利息，理專卻極力推銷波動大、可能虧損本金的連動債，理由是「這樣佣金比較高」。依商品適合度原則，下列敘述何者正確？","options":["客戶有錢就應推銷高佣金商品，屬合理業績考量","只要客戶簽名同意，推銷任何商品都無違職業道德","高齡客戶反正不懂，推什麼都可以","應以商品適合度為優先，推介與客戶風險承受度及需求相符之商品"],"answer":3,"explain":["錯誤。以客戶有錢、佣金高作為推銷依據，違反商品適合度與客戶利益優先原則。","錯誤。取得簽名不能免除適合度義務，銷售不適合商品仍屬違規。","錯誤。對高齡或不熟悉商品之客戶更應審慎說明並確保適合度，不可便宜行事。","正確。應以商品適合度為優先，推介與客戶風險屬性、投資目標及需求相符之商品，不得以佣金為導向。"],"src":"職業道德—業務推廣與招攬：商品適合度優先、不得以佣金為導向"},{"id":"ETH-EA-009","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":2,"q":"保險業務員招攬保險時，下列敘述何者正確？","options":["應專為其所屬公司招攬保險","可同時替多家不同保險公司招攬以增加收入","只要客戶同意，替未登錄之公司招攬亦可","招攬時不須表明所屬公司名稱"],"answer":0,"explain":["正確。保險業務員之招攬應限於「為其所屬公司」為之，此為基本規範。","錯誤。保險業務員應專為所屬公司招攬，不得任意替多家公司招攬。","錯誤。替未經登錄或非所屬公司招攬違反規定，客戶同意不能使其合法。","錯誤。招攬時應表明身分及所屬公司名稱，以利客戶辨識。"],"src":"職業道德—業務推廣與招攬：保險招攬專為所屬公司"},{"id":"ETH-EA-010","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":1,"q":"金融從業人員在推廣業務時，下列何種說法違反職業道德？","options":["「此商品連結標的價格波動大，可能損及本金，請評估後再決定」","「這檔一定漲，保證獲利，您閉著眼睛買就對了」","「基金過去績效不代表未來表現，投資有風險」","「贖回時可能需負擔手續費，請留意相關費用」"],"answer":1,"explain":["錯誤。誠實揭露波動與本金風險，符合職業道德。","正確。宣稱「一定漲、保證獲利」屬誇大不實且為保證獲利之禁止用語，違反職業道德。","錯誤。提醒過去績效不代表未來、投資有風險，屬正確揭露。","錯誤。提醒贖回費用屬充分揭露費用資訊，符合規範。"],"src":"職業道德—業務推廣與招攬：禁保證獲利、禁誇大、講獲利必講風險"},{"id":"ETH-EA-011","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":3,"q":"下列關於金融商品廣告與招攬之敘述，何者違反職業道德或相關規範？","options":["廣告刊播前應經公司內部審查核准程序","招攬時應主動表明服務人員身分及發卡或所屬機構名稱","以「適合所有人、人人都賺」作為廣告訴求吸引客戶","對投資型商品應說明高報酬伴隨高風險"],"answer":2,"explain":["錯誤。廣告刊播前經內部審查核准，是正確且必要之程序。","錯誤。招攬時表明身分及所屬機構名稱，符合職業道德。","正確。以「適合所有人、人人都賺」為訴求屬誇大不實，忽略商品適合度與風險，違反規範。","錯誤。說明投資型商品高報酬高風險，屬充分揭露，正確。"],"src":"職業道德—業務推廣與招攬：禁誇大、須揭露風險、表明身分"},{"id":"ETH-EA-012","exam":"ethics","subject":"職業道德","topic":"業務推廣與招攬","difficulty":2,"q":"營業員在招攬時對客戶說：「若您本月不簽約，之前答應給您的優惠與VIP資格就取消，還會影響您在本公司的往來紀錄。」此種招攬方式之評價為何？","options":["屬正常業務促成，並無不妥","只要最後對客戶有利就沒有問題","客戶若真簽約即證明此法可行且正當","以威脅施壓方式促使客戶交易，屬不當招攬"],"answer":3,"explain":["錯誤。以取消優惠、影響往來紀錄相要脅並非正常促成，而是施壓。","錯誤。是否違規看招攬手段本身，不能以「結果有利」正當化威脅施壓。","錯誤。客戶因受壓而簽約，不代表手段正當，反而顯示招攬不當。","正確。以威脅、恐嚇或施壓言語促使客戶交易，屬不當招攬行為，違反職業道德。"],"src":"職業道德—業務推廣與招攬：禁恐嚇威脅、不當施壓"},{"id":"ETH-EA-013","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":1,"q":"客戶委託營業員執行交易時，關於執行結果之處理，下列何者符合職業道德？","options":["依委託確實執行，並誠實、即時回報執行結果予客戶","為免客戶擔心，虧損之成交結果可暫時隱瞞","獲利才回報，虧損不必主動告知","回報與否由營業員視心情決定"],"answer":0,"explain":["正確。受託執行業務應依客戶委託確實執行，並誠實、即時將執行結果回報客戶。","錯誤。隱瞞虧損之成交結果違反誠實回報義務。","錯誤。報喜不報憂違反充分告知與誠實回報義務。","錯誤。回報客戶委託執行結果是義務，非可隨意決定之事項。"],"src":"職業道德—受託執行業務：依約定執行、誠實回報"},{"id":"ETH-EA-014","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":2,"q":"某證券營業員因故無法承作某客戶的委託，便私下將該客戶轉介給另一家券商的朋友，並約定分佣。此行為之評價為何？","options":["互相幫忙介紹客戶，屬正常同業往來","不得私自將客戶轉介給同業或其他交易商，此舉違反職業道德","只要客戶不知情就沒有關係","有分佣即代表雙方合意，屬合法行為"],"answer":1,"explain":["錯誤。私自轉介客戶並非正常同業往來，而是違反受託本旨之行為。","正確。從業人員不得私自將客戶轉介給同業或其他交易商，此舉損及所屬公司及客戶權益，違反職業道德。","錯誤。是否違規與客戶是否知情無關，私自轉介本身即不當。","錯誤。私下分佣更凸顯利益輸送問題，並非因合意即合法。"],"src":"職業道德—受託執行業務：不得私自轉介客戶給同業"},{"id":"ETH-EA-015","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":1,"q":"客戶因長期出國，請營業員代為保管存摺、印鑑及有價證券以便隨時處理。營業員應如何處理最符合職業道德？","options":["基於服務精神，代客保管存摺印鑑並全權處理","只保管印鑑不保管存摺即可規避規定","婉拒代客保管存摺、印鑑及有價證券","收取保管費後即可合法代為保管"],"answer":2,"explain":["錯誤。代客保管存摺、印鑑並全權處理，違反規範且風險極高。","錯誤。分開保管仍屬代客保管，無法規避規定。","正確。從業人員不得代客保管存摺、印鑑及有價證券，應予婉拒，以免衍生挪用或糾紛。","錯誤。收費與否不影響其違規本質，代客保管仍為禁止行為。"],"src":"職業道德—受託執行業務：不得代客保管存摺印鑑"},{"id":"ETH-EA-016","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":2,"q":"客戶將帳戶密碼交給營業員，要求營業員「看盤時順便幫我操作，賺賠都算我的」。營業員正確之做法為何？","options":["既然賺賠客戶自負，即可代客操作","不得代客操作，應婉拒並請客戶自行下單","只要不收費就可以代客操作","有客戶書面同意就可長期代操"],"answer":1,"explain":["錯誤。縱使客戶自負盈虧，代客操作仍為禁止行為。","正確。從業人員不得代客操作，應婉拒並請客戶依規定自行下單或循合法全權委託管道辦理。","錯誤。是否收費不影響代客操作之違規性質。","錯誤。一般營業員代客操作為禁止行為，非以書面同意即可長期代操；全權委託須依法定管道由具資格機構辦理。"],"src":"職業道德—受託執行業務：不得代客操作"},{"id":"ETH-EA-017","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":2,"q":"開戶徵信時，某客戶自稱為高收入企業主。關於徵信與認識客戶（KYC）之處理，下列敘述何者正確？","options":["縱使客戶收入很高，仍應依規定確實徵信、了解客戶背景","高收入客戶可省略徵信程序，直接開戶","只要客戶願意多存錢，來源可以不問","KYC僅適用於小額客戶，大戶免辦"],"answer":0,"explain":["正確。認識客戶（KYC）應對所有客戶確實執行，縱使客戶高收入亦須徵信、了解其背景與資金來源。","錯誤。高收入不能成為省略徵信之理由，仍須依規定辦理。","錯誤。不問資金來源可能涉及洗錢防制疏失，屬錯誤做法。","錯誤。KYC適用於所有客戶，不因金額大小而免除，大戶更需留意。"],"src":"職業道德—受託執行業務：KYC徵信，高收入也要徵信"},{"id":"ETH-EA-018","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":3,"q":"營業員發現某客戶經常以多個不同帳戶、疑似人頭之名義下單，且交易金額與其身分明顯不符。依職業道德與洗錢防制觀念，營業員應如何處理？","options":["客戶下單量大，應積極配合以衝高業績","提高警覺，留意此種洗錢異常態樣並依規定辦理通報","只要有下單就照做，可疑與否與營業員無關","替客戶保密，不向公司或主管單位反映"],"answer":1,"explain":["錯誤。僅為衝業績而忽視可疑態樣，違反洗錢防制與職業道德。","正確。同一客戶以多帳戶、人頭下單且與身分不符，屬洗錢異常態樣，應提高警覺並依規定辦理審視與通報。","錯誤。可疑交易之辨識與通報是從業人員應盡義務，並非與其無關。","錯誤。對可疑交易應依法通報，替客戶隱匿反而觸法。"],"src":"職業道德—受託執行業務：注意洗錢異常態樣、多帳戶人頭下單"},{"id":"ETH-EA-019","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":2,"q":"下列何種受託執行業務之做法違反職業道德？","options":["依法令及與客戶之約定確實執行委託","超出自身專業能力之事項，婉拒或轉請專責單位處理","為方便替客戶保管印鑑並代為簽署文件","全權委託代操時，顧及客戶投資目標與財務狀況"],"answer":2,"explain":["錯誤。依法令及約定確實執行委託，符合職業道德。","錯誤。超出專業能力應婉拒或轉介專責單位，屬正確做法。","正確。代客保管印鑑並代為簽署文件，屬禁止行為，違反職業道德。","錯誤。全權委託代操應顧及客戶投資目標、限制與財務狀況，屬正確做法。"],"src":"職業道德—受託執行業務：不得代客保管印鑑、代簽文件"},{"id":"ETH-EA-020","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":1,"q":"從業人員受託執行客戶委託事項時，應依循之基本原則為何？","options":["依個人喜好調整客戶的委託內容","以自身佣金最大化為執行標準","可先斬後奏，事後再徵詢客戶同意","依法令規定與客戶約定忠實執行"],"answer":3,"explain":["錯誤。擅自依個人喜好變更委託內容，違反受託本旨。","錯誤。以自身佣金最大化為標準，違反客戶利益優先原則。","錯誤。先斬後奏擅自執行，違反事先約定與誠實回報之要求。","正確。受託執行業務應依法令規定及與客戶之約定忠實執行，並誠實回報。"],"src":"職業道德—受託執行業務：依法令與約定執行"},{"id":"ETH-EA-021","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":2,"q":"關於代客保管與代客操作，下列敘述何者正確？","options":["從業人員不得代客保管存摺、印鑑，亦不得代客操作","只要是熟識多年的老客戶，代客保管存摺印鑑並無不可","代客操作只要有獲利就代表做法正確","代為保管有價證券可增進客戶信任，值得推廣"],"answer":0,"explain":["正確。從業人員不得代客保管存摺、印鑑、有價證券，亦不得代客操作，以避免挪用與糾紛。","錯誤。無論交情深淺，代客保管存摺印鑑均為禁止行為。","錯誤。以獲利與否評價代客操作之對錯屬錯誤觀念，行為本身即禁止。","錯誤。代保管有價證券屬禁止行為，不應推廣。"],"src":"職業道德—受託執行業務：不得代客保管、不得代客操作"},{"id":"ETH-EA-022","exam":"ethics","subject":"職業道德","topic":"受託執行業務","difficulty":3,"q":"某銀行理專為衝理財業績，主動將本行往來客戶名單提供給外部保險經紀朋友，換取介紹費，並協助客戶轉往該朋友處交易。下列評價何者正確？","options":["屬跨業合作，能提升客戶服務，值得肯定","私自轉介客戶並收取介紹費，違反受託義務與保密原則","只要客戶最後獲利就不算違規","理專有權自由運用其客戶名單"],"answer":1,"explain":["錯誤。此非正當跨業合作，而是私自輸送客戶並圖利，損及所屬公司與客戶。","正確。私自將客戶轉介外部並收取介紹費，違反不得私自轉介客戶之受託義務，且外洩客戶名單違反保密原則。","錯誤。是否違規與客戶事後是否獲利無關，行為本身即不當。","錯誤。客戶名單屬公司與客戶之資訊，理專無權私自運用或外洩。"],"src":"職業道德—受託執行業務：不得私自轉介客戶（併保密原則）"},{"id":"ETH-EA-023","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":1,"q":"從業人員銷售投資商品時，關於商品資訊之揭露，下列何者符合職業道德？","options":["只說明可能的高報酬，隱藏管理費等成本與風險","客戶沒問就都不必主動說明風險","充分揭露商品之特性、風險及各項費用，不報喜不報憂","為促成交易，可誇大報酬、淡化風險"],"answer":2,"explain":["錯誤。隱藏費用與風險、只講報酬，違反充分揭露義務。","錯誤。風險與費用屬重要資訊，縱使客戶未問亦應主動告知。","正確。應充分揭露商品特性、風險與費用（如管理費等），不得僅報喜不報憂。","錯誤。誇大報酬、淡化風險屬違反告知義務與誠信之行為。"],"src":"職業道德—告知義務與通知：風險費用充分揭露、不得報喜不報憂"},{"id":"ETH-EA-024","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":2,"q":"客戶主動向營業員詢問某檔基金近期淨值下跌之原因及相關市場訊息，營業員應如何處理最符合職業道德？","options":["以「商業機密」為由拒絕提供任何資訊","僅提供對促成交易有利的片面訊息","故意含糊帶過以免客戶贖回","據實提供客戶所詢之商品資訊，不隱瞞市場訊息"],"answer":3,"explain":["錯誤。客戶所詢之商品資訊非商業機密，不得藉故拒絕提供。","錯誤。只提供片面有利訊息屬選擇性揭露，違反誠實告知義務。","錯誤。故意含糊、隱瞞以阻止贖回，違反告知義務與客戶利益優先原則。","正確。客戶詢問商品資訊時不得拒絕或隱瞞，應據實提供並揭露相關市場訊息。"],"src":"職業道德—告知義務與通知：客戶詢問不得拒絕或隱瞞商品資訊"},{"id":"ETH-EA-025","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":2,"q":"關於客戶交易之對帳單與成交回報，下列做法何者正確？","options":["對帳單與成交回報應通知客戶本人","為方便作業，可統一寄給營業員自行保管","客戶帳戶有異動不必即時通知，月底一起說即可","成交回報寄給客戶的親友代收即可"],"answer":0,"explain":["正確。對帳單、成交結果應通知客戶「本人」，確保客戶掌握帳戶狀況。","錯誤。對帳單寄由營業員保管將使客戶無從核對，易生弊端，屬錯誤做法。","錯誤。帳戶重要異動應即時通知本人，不得延宕。","錯誤。回報應送達客戶本人，未經授權交由親友代收並不妥當。"],"src":"職業道德—告知義務與通知：對帳單、成交回報通知本人"},{"id":"ETH-EA-026","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":2,"q":"保險業務員在招攬保險並協助客戶填寫要保書時，關於保單條款之說明，下列何者符合職業道德？","options":["為求成交，僅說明保障內容，避談除外責任","據實說明保單條款內容及除外不保事項","客戶反正看不懂條款，可略過不提","除外責任等到理賠被拒時再解釋即可"],"answer":1,"explain":["錯誤。刻意避談除外責任屬未充分告知，違反告知義務。","正確。應據實說明保單條款、除外不保事項，使要保人充分了解權益後投保。","錯誤。以客戶看不懂為由略過條款說明，違反充分揭露義務。","錯誤。除外責任應於投保前說明，事後才解釋將損及客戶權益並生爭議。"],"src":"職業道德—告知義務與通知：保險說明條款與除外責任據實說明"},{"id":"ETH-EA-027","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":3,"q":"銷售境外基金時，關於應提供予投資人之資訊，下列敘述何者正確？","options":["境外基金無須提供任何專屬說明文件","只要口頭介紹即可，書面資訊可省略","應提供境外基金投資人須知等載明基金專屬資訊之文件","投資人須知僅供公司內部參考，不必交付客戶"],"answer":2,"explain":["錯誤。境外基金銷售應提供投資人須知等說明文件，非可完全省略。","錯誤。口頭介紹不足以取代應交付之書面資訊，屬告知不足。","正確。銷售境外基金應提供投資人須知，其載明該基金之專屬資訊，供投資人了解後決定。","錯誤。投資人須知係為投資人揭露資訊而設，應交付客戶而非僅供內部參考。"],"src":"職業道德—告知義務與通知：境外基金投資人須知"},{"id":"ETH-EA-028","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":2,"q":"下列何者違反告知義務與通知之職業道德？","options":["向客戶充分說明結構型商品之連結標的與匯率風險","主動揭露商品之管理費、手續費等各項費用","帳戶發生重大異動時即時通知客戶本人","對客戶隱瞞商品的重大風險，只強調配息很高"],"answer":3,"explain":["錯誤。說明連結標的與匯率風險，屬充分揭露，正確。","錯誤。主動揭露各項費用，符合告知義務。","錯誤。重大異動即時通知本人，符合通知義務。","正確。隱瞞重大風險、只強調高配息屬報喜不報憂，違反告知義務。"],"src":"職業道德—告知義務與通知：風險費用充分揭露、不得報喜不報憂"},{"id":"ETH-EA-029","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":1,"q":"從業人員對客戶履行告知義務時，下列敘述何者正確？","options":["應將商品之報酬與風險、費用完整、據實告知","只需告知有利資訊，不利資訊可略過","風險告知會嚇跑客戶，故越少提越好","告知內容可依業績需要選擇性呈現"],"answer":0,"explain":["正確。告知義務要求將商品報酬、風險與費用完整、據實告知客戶。","錯誤。僅告知有利資訊屬選擇性揭露，違反告知義務。","錯誤。刻意淡化風險以免嚇跑客戶，違反充分揭露義務。","錯誤。依業績選擇性呈現資訊屬不實或誤導，違反誠信與告知義務。"],"src":"職業道德—告知義務與通知：充分揭露、據實告知"},{"id":"ETH-EA-030","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":3,"q":"某理專明知某連動債連結之標的近期大跌、風險升高，客戶主動來電詢問是否應處理，理專卻回答「沒事沒事，放著就好」，刻意不揭露不利訊息。下列評價何者正確？","options":["安撫客戶情緒，避免客戶恐慌性贖回，屬盡責","對客戶詢問隱瞞不利之市場訊息，違反告知義務","理專有權決定何時告知，客戶不必知道太多","只要事後標的反彈，就證明理專判斷正確"],"answer":1,"explain":["錯誤。以安撫為名隱瞞重大不利訊息，並非盡責，而是違反告知義務。","正確。客戶詢問時不得拒絕或隱瞞商品與市場資訊，刻意不揭露不利訊息違反告知義務。","錯誤。重大不利資訊攸關客戶決策，客戶有權知悉，理專不得片面決定隱瞞。","錯誤。是否違規看當下是否誠實揭露，與事後標的漲跌無關。"],"src":"職業道德—告知義務與通知：客戶詢問不得隱瞞、不得報喜不報憂"},{"id":"ETH-EA-031","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":2,"q":"投資型保險商品之招攬，關於報酬與風險之告知，下列何者符合職業道德？","options":["強調投資帳戶可能高報酬，並隱瞞不保證收益之事實","為促成，可將預期報酬說成保證報酬","明確告知投資型保單不保證收益，投資風險由要保人自負","僅提供有利之歷史績效，不提風險"],"answer":2,"explain":["錯誤。隱瞞不保證收益之事實，違反告知義務並構成誤導。","錯誤。將預期報酬說成保證報酬屬不實陳述，且涉及保證獲利之禁止行為。","正確。投資型保險不保證收益，投資盈虧由要保人自負，應明確告知客戶。","錯誤。只提有利績效不提風險屬選擇性揭露，違反充分告知。"],"src":"職業道德—告知義務與通知：投資型商品不保證收益、風險充分揭露"},{"id":"ETH-EA-032","exam":"ethics","subject":"職業道德","topic":"告知義務與通知","difficulty":1,"q":"客戶完成一筆委託交易後，關於成交結果之通知，下列做法何者正確？","options":["成交回報交由營業員代為保存即可","僅在客戶主動詢問時才告知成交與否","成交結果通知客戶之同事代收","將成交回報寄送給客戶本人"],"answer":3,"explain":["錯誤。回報交由營業員保存將使客戶無從核對，易生弊端。","錯誤。成交結果屬應主動通知事項，不應等客戶詢問才告知。","錯誤。未經授權交由同事代收並不妥當，通知對象應為客戶本人。","正確。成交結果應通知客戶本人，使其掌握交易狀況。"],"src":"職業道德—告知義務與通知：成交回報通知本人"},{"id":"ETH-EA-033","exam":"ethics","subject":"職業道德","topic":"誠實信用原則","difficulty":1,"q":"保險契約強調「最大誠信原則」，下列何者為要保人此一原則之具體展現？","options":["要保人就保險人書面詢問之重要事項據實說明","要保人可隱瞞病史以求順利承保","保險人可任意解釋條款對己有利","要保人簽名後即不受任何義務拘束"],"answer":0,"explain":["正確。要保人對保險人書面詢問之重要事項負有據實說明義務，即最大誠信原則之具體展現。","錯誤。隱瞞病史違反據實說明義務，與最大誠信原則背道而馳。","錯誤。任
