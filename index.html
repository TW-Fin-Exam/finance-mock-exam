<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>金融證照模擬測驗系統</title>
</head>
<body>
<title>金融證照模擬測驗系統</title>
<style>
/* ============ 設計 tokens：紙感灰綠底＋深墨青，主色深青綠（金融/可信賴） ============ */
:root{
  --ink:#17262B; --muted:#5D7370; --faint:#93A5A0;
  --paper:#F4F7F4; --card:#FFFFFF; --line:#DBE4DE; --line2:#C7D5CE;
  --pri:#0E5F50; --pri-deep:#0A473C; --pri-soft:#E2EFE9; --pri-soft2:#CFE5DB;
  --ok:#2E7D4F; --ok-soft:#E6F2E9;
  --bad:#C03B3B; --bad-soft:#FBEAEA;
  --flag:#A97B12; --flag-soft:#FBF3DC;
  --warn:#A94A17;
  --sh:0 1px 2px rgba(23,38,43,.05),0 4px 16px rgba(23,38,43,.07);
  --r:12px;
}
/* 各測驗辨識色：道德=靛藍、永續=葉綠、高業=赤銅 */
.hue-ethics{--hue:#3A5C96;--hue-soft:#E9EEF8}
.hue-esg{--hue:#2E7D4F;--hue-soft:#E6F2E9}
.hue-gaoye{--hue:#8A5230;--hue-soft:#F5EBE2}
html{background:var(--paper)}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Microsoft JhengHei UI","Microsoft JhengHei","PingFang TC","Noto Sans TC","Heiti TC","Segoe UI",system-ui,sans-serif;
  line-height:1.65;-webkit-font-smoothing:antialiased}
#app{max-width:1120px;margin:0 auto;padding:24px 20px 72px}
button{font:inherit;color:inherit;cursor:pointer;background:none;border:none;padding:0}
button:disabled{cursor:not-allowed;opacity:.45}
:focus-visible{outline:2px solid var(--pri);outline-offset:2px;border-radius:4px}
h1,h2,h3{line-height:1.35;text-wrap:balance;margin:0}
.num{font-variant-numeric:tabular-nums}
a{color:var(--pri-deep)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ 首頁 ============ */
.brand{display:flex;align-items:center;gap:14px;padding:6px 0 18px;border-bottom:2px solid var(--ink);margin-bottom:22px}
.brand .seal{flex:none}
.brand h1{font-size:24px;font-weight:800;letter-spacing:.04em}
.brand .sub{color:var(--muted);font-size:13px;margin-top:2px}
.resume{display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:var(--flag-soft);border:1px solid #E3CE96;border-radius:var(--r);padding:12px 16px;margin-bottom:20px}
.resume p{margin:0;font-size:14px}
.gtitle{font-size:13px;font-weight:700;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.gtitle::after{content:"";flex:1;height:1px;background:var(--line2)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.ecard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:18px 18px 16px;display:flex;flex-direction:column;gap:10px}
.ebadge{display:inline-block;align-self:flex-start;background:var(--hue-soft);color:var(--hue);border:1px solid color-mix(in srgb,var(--hue) 30%,transparent);font-size:12px;font-weight:700;letter-spacing:.08em;padding:2px 10px;border-radius:999px}
.ecard h3{font-size:17px;font-weight:800}
.ecard .admin{margin:0;color:var(--muted);font-size:12.5px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:12.5px;color:var(--muted)}
.chip b{color:var(--ink);font-weight:700}
.ecard .last{font-size:12.5px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px;margin-top:2px}
.ecard .acts{display:flex;gap:8px;margin-top:auto;padding-top:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:700;border:1px solid transparent;transition:background .15s,border-color .15s,transform .05s}
.btn:active{transform:translateY(1px)}
.btn-pri{background:var(--pri);color:#fff}
.btn-pri:hover{background:var(--pri-deep)}
.btn-ghost{background:var(--card);border-color:var(--line2);color:var(--ink)}
.btn-ghost:hover{border-color:var(--pri);color:var(--pri-deep)}
.btn-danger{background:var(--bad);color:#fff}
.btn-lg{padding:12px 26px;font-size:15.5px}
.btn-sm{padding:5px 12px;font-size:13px;border-radius:7px}
.hist{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;margin-top:26px}
.hist h3{font-size:14px;margin-bottom:8px}
.hist table{width:100%;border-collapse:collapse;font-size:13px}
.hist th{text-align:left;color:var(--muted);font-weight:600;padding:4px 8px;border-bottom:1px solid var(--line)}
.hist td{padding:5px 8px;border-bottom:1px solid var(--paper)}
.hist .pass-y{color:var(--ok);font-weight:700}
.hist .pass-n{color:var(--bad);font-weight:700}
.foot{margin-top:34px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line2);padding-top:14px}
.foot p{margin:4px 0}

/* ============ 考前說明／自訂練習 ============ */
.panel{max-width:720px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:26px 28px}
.panel h2{font-size:20px;font-weight:800;margin-bottom:2px}
.panel .admin{color:var(--muted);font-size:13px;margin:0 0 14px}
.rules{margin:14px 0;padding:14px 16px;background:var(--paper);border:1px solid var(--line);border-radius:10px}
.rules dt{font-weight:700;font-size:13.5px;margin-top:8px}
.rules dt:first-child{margin-top:0}
.rules dd{margin:1px 0 0;color:var(--muted);font-size:13.5px}
.notice{font-size:13px;color:var(--muted);margin:12px 0}
.notice li{margin:3px 0}
.seg{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 14px}
.seg button{border:1px solid var(--line2);background:var(--card);border-radius:8px;padding:7px 16px;font-size:14px;font-weight:600}
.seg button.on{background:var(--pri);border-color:var(--pri);color:#fff}
.tchips{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 4px}
.tchips button{border:1px solid var(--line2);background:var(--card);border-radius:999px;padding:4px 12px;font-size:13px}
.tchips button.on{background:var(--pri-soft);border-color:var(--pri);color:var(--pri-deep);font-weight:700}
.flabel{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--muted);margin-top:14px}
.subhead{font-size:12.5px;color:var(--faint);margin:8px 0 2px;font-weight:700}
.pactions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* ============ 應試畫面 ============ */
.exam-top{position:sticky;top:0;z-index:30;background:var(--card);border-bottom:2px solid var(--ink);margin:-24px -20px 18px;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.exam-top .ttl{font-size:14.5px;font-weight:800}
.exam-top .mode{font-size:11.5px;font-weight:700;color:var(--hue,#0E5F50);background:var(--hue-soft,#E2EFE9);border-radius:5px;padding:1px 7px;letter-spacing:.06em}
.exam-top .mid{margin-left:auto;display:flex;align-items:center;gap:14px}
.tmr{font-size:22px;font-weight:800;letter-spacing:.05em}
.tmr.low{color:var(--bad);animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:.55}}
.tmr-cap{font-size:11px;color:var(--muted);letter-spacing:.14em;display:block;line-height:1;margin-bottom:2px}
.prog{font-size:13px;color:var(--muted)}
.exam-wrap{display:grid;grid-template-columns:minmax(0,1fr) 296px;gap:18px;align-items:start}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:22px 24px}
.qhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.qno{font-size:19px;font-weight:800}
.qtag{font-size:12px;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:1px 8px}
.qflag{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--flag);border:1px solid transparent;border-radius:6px;padding:3px 9px}
.qflag.on{background:var(--flag-soft);border-color:#E3CE96}
.qtext{font-size:16.5px;font-weight:600;line-height:1.75;margin:0 0 16px;white-space:pre-wrap}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;background:var(--card);font-size:15px;line-height:1.6;transition:border-color .12s,background .12s}
.opt:hover:not(:disabled){border-color:var(--pri);background:#FBFDFC}
.opt .k{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line2);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted)}
.opt.sel{border-color:var(--pri);background:var(--pri-soft)}
.opt.sel .k{background:var(--pri);border-color:var(--pri);color:#fff}
.opt.is-ans{border-color:var(--ok);background:var(--ok-soft)}
.opt.is-ans .k{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.is-wrong{border-color:var(--bad);background:var(--bad-soft)}
.opt.is-wrong .k{background:var(--bad);border-color:var(--bad);color:#fff}
.fb{margin-top:16px;border-top:1px dashed var(--line2);padding-top:14px}
.fb .verdict{font-size:15px;font-weight:800;margin-bottom:8px}
.fb .verdict.ok{color:var(--ok)} .fb .verdict.bad{color:var(--bad)}
.fb ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.fb li{font-size:13.5px;color:var(--muted);display:flex;gap:8px}
.fb li b{flex:none;color:var(--ink)}
.fb li.hit b{color:var(--ok)}
.fb .src{margin-top:10px;font-size:12.5px;color:var(--faint)}
.qnav{display:flex;gap:10px;margin-top:16px}
.qnav .sp{flex:1}
.sheet{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:14px 14px 16px;position:sticky;top:64px}
.sheet h4{margin:0 0 8px;font-size:13px;letter-spacing:.1em}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--muted);margin-bottom:10px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;border:1px solid var(--line2);margin-right:4px;vertical-align:-1px;font-style:normal}
.legend .l-done i{background:var(--pri);border-color:var(--pri)}
.legend .l-flag i{background:var(--flag-soft);border-color:var(--flag)}
.gq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:6px}
.gq{position:relative;height:32px;border:1px solid var(--line2);border-radius:7px;background:var(--card);font-size:12.5px;font-weight:600;color:var(--muted)}
.gq.done{background:var(--pri);border-color:var(--pri);color:#fff}
.gq.flag::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--flag)}
.gq.cur{box-shadow:0 0 0 2.5px var(--paper),0 0 0 4.5px var(--pri)}
.sheet .subact{display:flex;gap:8px;margin-top:12px}
.sheet-toggle{display:none}
.mask{position:fixed;inset:0;background:rgba(23,38,43,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:14px;max-width:440px;width:100%;padding:24px 26px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.modal h3{font-size:17px;margin-bottom:8px}
.modal p{margin:6px 0;font-size:14px;color:var(--muted)}
.modal .macts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

/* ============ 成績單 ============ */
.result-hero{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:30px 28px;display:flex;align-items:center;gap:30px;flex-wrap:wrap}
.score-big{display:flex;align-items:baseline;gap:6px}
.score-big .v{font-size:72px;font-weight:800;line-height:1}
.score-big .d{color:var(--faint);font-size:18px;font-weight:600}
.stamp{display:inline-block;padding:8px 18px;border:3.5px solid;border-radius:10px;font-size:22px;font-weight:800;letter-spacing:.4em;text-indent:.4em;transform:rotate(-6deg);opacity:.92}
.stamp.pass{color:var(--pri);border-color:var(--pri)}
.stamp.fail{color:var(--bad);border-color:var(--bad)}
.rmeta{flex:1;min-width:220px}
.rmeta .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.rmeta h2{font-size:18px}
.rnote{font-size:12.5px;color:var(--muted);margin-top:10px}
.tstats{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:20px 24px;margin-top:16px}
.tstats h3{font-size:15px;margin-bottom:12px}
.trow{display:grid;grid-template-columns:minmax(120px,220px) 1fr 86px;gap:12px;align-items:center;margin:7px 0;font-size:13.5px}
.trow .lbl{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track{display:block;height:10px;background:var(--paper);border:1px solid var(--line);border-radius:999px;overflow:hidden}
.fill{display:block;height:100%;border-radius:999px}
.trow .pct{text-align:right;color:var(--muted)}
.racts{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

/* ============ 檢討 ============ */
.rev-top{position:sticky;top:0;z-index:30;background:var(--paper);margin:-24px -20px 14px;padding:12px 20px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tabs{display:flex;gap:6px}
.tabs button{border:1px solid var(--line2);background:var(--card);border-radius:8px;padding:6px 14px;font-size:13.5px;font-weight:600}
.tabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.rcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:20px 22px;margin-bottom:14px}
.rcard.correct-card{border-left:4px solid var(--ok)}
.rcard.wrong-card{border-left:4px solid var(--bad)}
.rhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.rhead .st{font-size:12px;font-weight:800;border-radius:5px;padding:1px 8px}
.rhead .st.ok{background:var(--ok-soft);color:var(--ok)}
.rhead .st.bad{background:var(--bad-soft);color:var(--bad)}
.rhead .st.skip{background:var(--paper);color:var(--muted);border:1px solid var(--line)}
.ropt{display:flex;gap:10px;border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;margin:7px 0;font-size:14px;background:var(--card)}
.ropt .k{flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line2);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--muted)}
.ropt.ans{border-color:var(--ok);background:var(--ok-soft)}
.ropt.ans .k{background:var(--ok);border-color:var(--ok);color:#fff}
.ropt.pickw{border-color:var(--bad);background:var(--bad-soft)}
.ropt.pickw .k{background:var(--bad);border-color:var(--bad);color:#fff}
.ropt .body{flex:1}
.ropt .tag{font-size:11px;font-weight:800;margin-left:8px;padding:1px 6px;border-radius:4px;vertical-align:1px}
.ropt .tag.t-ans{background:var(--ok);color:#fff}
.ropt .tag.t-you{background:var(--bad);color:#fff}
.ropt .why{display:block;font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.6}
.rcard .src{font-size:12.5px;color:var(--faint);margin-top:10px}

@media (max-width:900px){
  .exam-wrap{grid-template-columns:1fr}
  .sheet{position:fixed;left:12px;right:12px;bottom:12px;top:auto;z-index:40;max-height:52vh;overflow:auto;display:none;box-shadow:0 -8px 30px rgba(0,0,0,.2)}
  .sheet.open{display:block}
  .sheet-toggle{display:inline-flex}
  .score-big .v{font-size:56px}
  .exam-top{position:sticky}
}
</style>

<div id="app" lang="zh-Hant"></div>

window.__BANK__={"esg":[{"id":"ESG-A-001","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"1987年世界環境與發展委員會（WCED）發表《我們共同的未來》（布倫特蘭報告），其對「永續發展」之定義為下列何者？","options":["滿足當代的需求，同時不損及後代子孫滿足其本身需求能力之發展","在不增加政府財政負擔之前提下，追求經濟成長極大化之發展","全面停止使用自然資源，將環境完整保留給後代之發展","以企業獲利為優先，行有餘力再兼顧環境保護之發展"],"answer":0,"explain":["正確。布倫特蘭報告將永續發展定義為「滿足當代需求，同時不損及後代子孫滿足其自身需求能力之發展」，強調世代間公平，為國際社會最廣為引用之經典定義。","錯誤。永續發展並非單純追求經濟成長極大化，而是兼顧環境、社會與經濟三面向之均衡發展。","錯誤。永續發展並未要求完全停止使用自然資源，而是強調合理利用資源，使當代與後代之需求皆能獲得滿足。","錯誤。永續發展強調環境、社會與經濟並重，並非以企業獲利優先、環境保護次之。"],"src":"官方命題範圍（一）永續基本概念—永續介紹；布倫特蘭報告《我們共同的未來》（1987）"},{"id":"ESG-A-002","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"「永續發展」（Sustainable Development）一詞係因下列哪一份文件之發表而受到國際社會廣泛重視與採用？","options":["《京都議定書》","《我們共同的未來》","《格拉斯哥氣候協議》","《2030永續發展議程》"],"answer":1,"explain":["錯誤。《京都議定書》為1997年通過之溫室氣體減量國際條約，並非永續發展定義之出處。","正確。1987年世界環境與發展委員會（主席為布倫特蘭夫人）發表《我們共同的未來》，提出永續發展之經典定義，使該詞廣為國際社會採用。","錯誤。《格拉斯哥氣候協議》為2021年COP26之決議文件，重點在逐步減少燃煤發電，時間遠晚於永續發展概念之提出。","錯誤。《2030永續發展議程》為聯合國2015年通過、揭示17項SDGs之文件，係永續發展概念之後續落實，並非其定義來源。"],"src":"官方命題範圍（一）永續基本概念—永續介紹；布倫特蘭報告（1987）"},{"id":"ESG-A-003","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"下列何者不屬於ESG所涵蓋之三大面向？","options":["環境（Environmental）","社會（Social）","公司治理（Governance）","經濟（Economic）"],"answer":3,"explain":["環境（E）為ESG三大面向之一，涵蓋氣候變遷、污染防治、資源使用等議題，故非本題答案。","社會（S）為ESG三大面向之一，涵蓋勞工權益、人權、社區關係等議題，故非本題答案。","公司治理（G）為ESG三大面向之一，涵蓋董事會運作、股東權益、商業道德等議題，故非本題答案。","正確（不屬於）。ESG係指環境、社會與公司治理三面向，「經濟」並非ESG之一環；應注意UNEP對「永續金融」之定義則涵蓋環境、社會、經濟與治理四面向，兩者不可混淆。"],"src":"官方命題範圍（一）永續基本概念—永續介紹；ESG＝環境、社會、治理"},{"id":"ESG-A-004","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"有關利害關係人理論（Stakeholder Theory）之核心主張，下列敘述何者正確？","options":["企業應以股東短期報酬極大化作為經營之唯一目標","企業應綜合考量所有利害關係人之權益，為企業創造長期價值","利害關係人之範圍僅限於股東及債權人","企業對員工、客戶及社區之責任均非經營決策應考量之事項"],"answer":1,"explain":["錯誤。僅追求股東短期利益極大化係傳統股東至上理論之觀點，利害關係人理論正是對此觀點之修正。","正確。利害關係人理論主張企業經營應綜合考量股東、員工、客戶、供應商、社區、環境等所有利害關係人之權益，以創造企業長期價值，此為ESG理念之重要理論基礎。","錯誤。利害關係人之範圍廣泛，除股東與債權人外，尚包括員工、客戶、供應商、政府、社區與環境等。","錯誤。利害關係人理論認為企業對員工、客戶及社區之責任，正是經營決策應納入考量之重要事項。"],"src":"官方命題範圍（一）永續基本概念—永續介紹；利害關係人理論"},{"id":"ESG-A-005","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"聯合國於2015年通過「2030永續發展議程」，其揭示之永續發展目標（SDGs）包含幾項核心目標及細項目標？","options":["17項核心目標、169項細項目標","18項核心目標、169項細項目標","17項核心目標、196項細項目標","15項核心目標、169項細項目標"],"answer":0,"explain":["正確。2015年聯合國通過「2030永續發展議程」，包含17項核心目標（Goals）與169項細項目標（Targets），為全球2030年前之共同永續發展藍圖。","錯誤。18項為「臺灣永續發展目標」之核心目標數（我國另增列第18項非核家園目標），聯合國SDGs之核心目標為17項。","錯誤。細項目標為169項，並非196項。","錯誤。核心目標為17項，並非15項。"],"src":"官方命題範圍（一）永續基本概念—永續發展目標；聯合國2030永續發展議程（2015）"},{"id":"ESG-A-006","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"有關我國參考聯合國SDGs訂定之「臺灣永續發展目標」，下列敘述何者正確？","options":["完全沿用聯合國17項核心目標，未增列任何具本土特色之目標","共18項核心目標，其中第18項為逐步達成非核家園之目標","共17項核心目標，但刪除與海洋生態相關之目標","共19項核心目標，另增列非核家園與數位轉型二項目標"],"answer":1,"explain":["錯誤。臺灣永續發展目標並非完全沿用聯合國版本，而係於17項目標之外，增列具本土特色之第18項目標。","正確。臺灣永續發展目標共18項核心目標，第18項為「逐步達成環境基本法所訂非核家園目標」，係我國特有之目標。","錯誤。臺灣版目標為18項而非17項，且並未刪除海洋生態相關目標。","錯誤。臺灣版目標為18項，僅增列非核家園一項，並無「數位轉型」目標。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；臺灣永續發展目標（18項核心目標）"},{"id":"ESG-A-007","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"金融機構強化防範金融詐騙，並提升偏鄉與弱勢族群金融服務之可近性，此類普惠金融作為最直接有助於落實下列哪一項聯合國永續發展目標？","options":["SDG7「可負擔的潔淨能源」","SDG13「氣候行動」","SDG10「減少不平等」","SDG15「保育陸域生態」"],"answer":2,"explain":["錯誤。SDG7聚焦於確保人人可取得可負擔、可靠與永續之能源，與防詐及普惠金融無直接關聯。","錯誤。SDG13聚焦於因應氣候變遷及其衝擊之行動，與防詐及普惠金融無直接關聯。","正確。防範金融詐騙、提升弱勢族群金融服務可近性，可縮小群體間之經濟與機會差距，最直接對應SDG10「減少國內及國家間不平等」。","錯誤。SDG15聚焦於陸域生態系統之保育與永續利用，與防詐及普惠金融無直接關聯。"],"src":"官方命題範圍（一）永續基本概念—永續發展目標；SDGs對應應用（金融防詐→SDG10）"},{"id":"ESG-A-008","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"《聯合國氣候變化綱要公約》（UNFCCC）係於下列哪一場國際會議中通過？","options":["1997年日本京都第3屆締約方大會","2015年法國巴黎第21屆締約方大會","2021年英國格拉斯哥第26屆締約方大會","1992年巴西里約熱內盧地球高峰會"],"answer":3,"explain":["錯誤。1997年京都COP3通過者為《京都議定書》，係UNFCCC架構下之議定書，並非公約本身。","錯誤。2015年巴黎COP21通過者為《巴黎協定》。","錯誤。2021年格拉斯哥COP26通過者為《格拉斯哥氣候協議》。","正確。UNFCCC於1992年里約地球高峰會通過，為國際氣候治理之基礎架構公約，其後之京都議定書與巴黎協定均在其架構下發展。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；UNFCCC（1992年里約地球高峰會通過）"},{"id":"ESG-A-009","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"《京都議定書》為協助締約國以較具成本效益之方式達成減量承諾，設有三項彈性機制，下列何者不在其中？","options":["排放交易（Emissions Trading）","共同執行（Joint Implementation, JI）","清潔發展機制（Clean Development Mechanism, CDM）","國家自主貢獻（Nationally Determined Contributions, NDCs）"],"answer":3,"explain":["排放交易為京都議定書三彈性機制之一，允許締約國間買賣排放額度，故非本題答案。","共同執行（JI）為三彈性機制之一，指工業化國家間合作執行減量計畫並移轉減量單位，故非本題答案。","清潔發展機制（CDM）為三彈性機制之一，允許工業化國家於發展中國家執行減量計畫以取得減量額度，故非本題答案。","正確（不在其中）。國家自主貢獻（NDCs）係2015年《巴黎協定》建立之機制，由各締約國自主提出減量承諾並定期更新，並非1997年京都議定書（2005年生效）之彈性機制。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；京都議定書三彈性機制（排放交易、JI、CDM）"},{"id":"ESG-A-010","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"下列哪一項國際氣候協議，為第一個同時呼籲已開發國家與發展中國家共同參與減排之全球性協議？","options":["《京都議定書》","《巴黎協定》","《聯合國氣候變化綱要公約》","《利馬氣候行動呼籲》"],"answer":1,"explain":["錯誤。《京都議定書》僅課予工業化國家具拘束力之減排義務，發展中國家並無強制減量義務。","正確。2015年COP21通過之《巴黎協定》為第一個同時呼籲已開發與發展中國家共同減排之全球協議，各締約國均須提交國家自主貢獻（NDCs）。","錯誤。UNFCCC為1992年通過之綱要性公約，確立氣候治理之基本架構，本身未課予各國具體之減排目標。","錯誤。《利馬氣候行動呼籲》為2014年COP20之成果文件，屬巴黎協定談判過程之過渡性文件，並非全球減排協議。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；巴黎協定（2015，COP21）"},{"id":"ESG-A-011","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"有關2015年通過之《巴黎協定》，下列敘述何者錯誤？","options":["目標為將全球平均升溫控制在較工業化前水準遠低於2°C，並努力限制在1.5°C以內","各締約國應提交國家自主貢獻（NDCs），並定期檢討更新","僅課予工業化國家減排義務，發展中國家不須提出減量承諾","係於聯合國氣候變化綱要公約第21屆締約方大會（COP21）通過"],"answer":2,"explain":["敘述正確。巴黎協定之長期溫度目標即為「遠低於2°C、努力追求1.5°C」，故非本題答案。","敘述正確。NDCs為巴黎協定之核心機制，各締約國均須提交並定期更新，故非本題答案。","敘述錯誤（本題答案）。「僅課予工業化國家減排義務」係《京都議定書》之特徵；巴黎協定為第一個同時呼籲已開發與發展中國家共同減排之全球協議。","敘述正確。巴黎協定係於2015年在巴黎舉行之COP21通過，故非本題答案。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；巴黎協定與京都議定書之比較"},{"id":"ESG-A-012","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"2021年第26屆聯合國氣候變化綱要公約締約方大會（COP26）通過之《格拉斯哥氣候協議》，其代表性內容為下列何者？","options":["首度將「逐步減少」燃煤發電納入締約方大會決議文","創設清潔發展機制（CDM）","首次建立國家自主貢獻（NDCs）制度","宣布成立政府間氣候變遷專門委員會（IPCC）"],"answer":0,"explain":["正確。格拉斯哥氣候協議之代表性成果，係首度於締約方大會決議文中納入「逐步減少（phase down）燃煤發電」之內容，宣示全球減煤方向。","錯誤。清潔發展機制（CDM）係1997年《京都議定書》所創設之彈性機制。","錯誤。國家自主貢獻（NDCs）係2015年《巴黎協定》所建立之制度。","錯誤。IPCC係1988年由世界氣象組織（WMO）與聯合國環境規劃署（UNEP）共同成立，與COP26無關。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；格拉斯哥氣候協議（2021，COP26逐步減少燃煤）"},{"id":"ESG-A-013","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"政府間氣候變遷專門委員會（IPCC）於1988年由下列哪兩個國際機構共同成立？","options":["世界氣象組織（WMO）與聯合國環境規劃署（UNEP）","聯合國環境規劃署（UNEP）與世界銀行","世界氣象組織（WMO）與聯合國開發計畫署（UNDP）","聯合國教科文組織（UNESCO）與世界衛生組織（WHO）"],"answer":0,"explain":["正確。IPCC於1988年由世界氣象組織（WMO）與聯合國環境規劃署（UNEP）共同成立，從科學、技術與社會經濟觀點，綜合評估人為氣候變遷之相關資訊。","錯誤。此為常見誘答組合；IPCC之共同成立機構為WMO與UNEP，世界銀行並未參與成立。","錯誤。聯合國開發計畫署（UNDP）並非IPCC之成立機構。","錯誤。UNESCO與WHO均與IPCC之成立無關。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；IPCC（1988年，WMO＋UNEP共同成立）"},{"id":"ESG-A-014","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"依IPCC於2023年發布之第六次評估報告（AR6）綜合報告，全球溫室氣體排放量至2030年須減少多少，方有機會將升溫控制在目標範圍內？","options":["四分之一","三分之一","二分之一","五分之四"],"answer":2,"explain":["錯誤。AR6綜合報告揭示之2030年減量幅度為二分之一，並非四分之一。","錯誤。AR6綜合報告揭示之2030年減量幅度為二分之一，並非三分之一。","正確。IPCC AR6綜合報告（2023年）指出，2030年須將全球溫室氣體排放量減少約二分之一，此為測驗高頻考點數字。","錯誤。AR6綜合報告揭示之2030年減量幅度為二分之一，並非五分之四。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；IPCC AR6綜合報告（2023，2030年減半）"},{"id":"ESG-A-015","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"依IPCC《全球升溫1.5°C特別報告》，全球若欲將升溫控制於1.5°C以內，應於下列哪一年前後達成淨零排放？","options":["2030年","2035年","2070年","2050年"],"answer":3,"explain":["錯誤。2030年為AR6綜合報告所指全球排放量須「減半」之時點，並非達成淨零之年。","錯誤。2035年並非1.5°C特別報告所揭示之全球淨零時點。","錯誤。2070年並非1.5°C路徑之全球淨零時點，係部分發展中國家自行宣示之較晚淨零目標年。","正確。IPCC《全球升溫1.5°C特別報告》指出，欲將升溫控制於1.5°C以內，全球應於2050年左右達成淨零排放；此亦為各國提出2050淨零目標之科學依據。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；IPCC 1.5°C特別報告（2050淨零）"},{"id":"ESG-A-016","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"依IPCC「代表濃度途徑」（RCP）之情境分類，欲使21世紀末全球增溫低於2°C，應為下列何種情境？","options":["RCP8.5","RCP6.0","RCP4.5","RCP2.6"],"answer":3,"explain":["錯誤。RCP8.5為最悲觀之高排放情境，代表幾乎未採取減量措施，21世紀末增溫幅度最大。","錯誤。RCP6.0屬中高排放情境，不足以將世紀末增溫控制在2°C以下。","錯誤。RCP4.5屬中度減量情境，仍難以確保世紀末增溫低於2°C。","正確。RCP2.6為最積極減量之低排放情境，係能使21世紀末增溫低於2°C之代表濃度途徑。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；RCP代表濃度途徑（RCP2.6低於2°C）"},{"id":"ESG-A-017","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"IPCC氣候變遷情境分析中之「SSP」，係指下列何者？","options":["共享社會經濟路徑","標準排放情境預測","永續供應鏈計畫","社會安全保障路徑"],"answer":0,"explain":["正確。SSP（Shared Socioeconomic Pathways）即「共享社會經濟路徑」，以人口、經濟發展、技術等社會經濟假設描繪未來情境，為IPCC第六次評估報告採用之情境架構。","錯誤。SSP並非單純之排放量預測，其核心在於社會經濟發展路徑之假設，與RCP（代表濃度途徑）之概念亦不相同。","錯誤。SSP為氣候情境架構，與供應鏈管理無關。","錯誤。SSP與社會安全保障制度無關。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；SSP共享社會經濟路徑"},{"id":"ESG-A-018","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"國家發展委員會於民國111年3月30日公布「臺灣2050淨零排放路徑及策略總說明」，其中「四大轉型」不包括下列何者？","options":["能源轉型","科技轉型","生活轉型","社會轉型"],"answer":1,"explain":["能源轉型為四大轉型之一，故非本題答案。","正確（不包括）。四大轉型為能源轉型、產業轉型、生活轉型、社會轉型；「科技研發」與「氣候法制」係二大治理基礎，並非四大轉型之一，此為常見誘答。","生活轉型為四大轉型之一，故非本題答案。","社會轉型為四大轉型之一，故非本題答案。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；臺灣2050淨零排放路徑（111年3月30日，國發會）"},{"id":"ESG-A-019","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"「臺灣2050淨零排放路徑」以四大轉型搭配「二大治理基礎」推動，該二大治理基礎為下列何者？","options":["綠色金融、公正轉型","碳費徵收、碳權交易","科技研發、氣候法制","能源安全、區域均衡"],"answer":2,"explain":["錯誤。綠色金融與公正轉型均屬「十二項關鍵戰略」之項目，並非二大治理基礎。","錯誤。碳費與碳權交易為碳定價工具，並非該路徑所稱之治理基礎。","正確。臺灣2050淨零排放路徑以「科技研發」與「氣候法制」作為二大治理基礎，支撐能源、產業、生活、社會四大轉型之推動。","錯誤。能源安全與區域均衡並非該路徑所稱之二大治理基礎。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；臺灣2050淨零排放路徑（四大轉型＋二大治理基礎）"},{"id":"ESG-A-020","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"為落實2050淨零轉型目標，我國提出「十二項關鍵戰略」據以推動，下列何者屬十二項關鍵戰略之一？","options":["綠色金融","全民基本收入","都市更新","金融科技發展"],"answer":0,"explain":["正確。十二項關鍵戰略包含綠色金融、公正轉型、自然碳匯、資源循環零廢棄、節能、運具電動化及無碳化等項目，「綠色金融」為其中一項。","錯誤。全民基本收入並非十二項關鍵戰略之項目。","錯誤。都市更新並非十二項關鍵戰略之項目。","錯誤。金融科技發展屬金融創新政策範疇，並非十二項關鍵戰略之項目，不可與「綠色金融」戰略混淆。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；臺灣2050淨零十二項關鍵戰略"},{"id":"ESG-A-021","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"有關我國「氣候變遷因應法」，下列敘述何者正確？","options":["係由「空氣污染防制法」修正更名而來","將2030年達成淨零排放明定為國家長期減量目標","將2050年淨零排放目標正式入法","該法尚未建立徵收碳費之法源依據"],"answer":2,"explain":["錯誤。氣候變遷因應法係由「溫室氣體減量及管理法」（溫管法）修正更名而來，並非空氣污染防制法。","錯誤。入法之國家長期減量目標為「2050年溫室氣體淨零排放」，並非2030年；2030年為IPCC AR6所指全球排放應減半之時點。","正確。氣候變遷因應法於112年2月15日公布施行，將2050年淨零排放目標正式入法，並建立碳費制度、授權碳邊境調整機制。","錯誤。該法已明定徵收碳費之法源依據，並授權建立碳邊境調整機制。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；氣候變遷因應法（112年2月15日公布施行）"},{"id":"ESG-A-022","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"我國碳費制度之收費費率，下列敘述何者正確？","options":["一般費率每公噸新臺幣100元，優惠費率每公噸50元","一般費率每公噸新臺幣300元，優惠費率A、B分別為每公噸50元及100元","一般費率每公噸新臺幣500元，且未設優惠費率機制","一般費率每公噸新臺幣300元，優惠費率A、B分別為每公噸150元及200元"],"answer":1,"explain":["錯誤。一般費率為每公噸新臺幣300元，並非100元。","正確。碳費一般費率為每公噸CO2e新臺幣300元；符合規定之事業得適用優惠費率，優惠費率A為每公噸50元、優惠費率B為每公噸100元。","錯誤。一般費率為每公噸300元，且另設有優惠費率A（50元）與優惠費率B（100元）之機制。","錯誤。優惠費率A為每公噸50元、優惠費率B為每公噸100元，並非150元及200元。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；碳費費率（一般300元、優惠A 50元／B 100元）"},{"id":"ESG-A-023","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"有關我國碳費制度之實施，下列敘述何者錯誤？","options":["首波徵收對象為年排放量達2.5萬公噸CO2e以上之電力業及製造業","徵收對象涵蓋所有上市櫃公司，與其排放量規模無關","氣候變遷因應法並授權對高碳含量之進口產品實施碳邊境調整機制","115年（2026年）起首次依前一年度（114年）排放量申報繳費"],"answer":1,"explain":["敘述正確。碳費由年排放量達2.5萬公噸CO2e以上之電力業與製造業先行繳納，故非本題答案。","敘述錯誤（本題答案）。碳費徵收係以「排放量規模」及行業別（電力業、製造業）為認定標準，並非以是否為上市櫃公司為標準；未達排放門檻之公司不在首波徵收範圍。","敘述正確。氣候變遷因應法授權建立碳邊境調整機制，以因應碳洩漏風險，故非本題答案。","敘述正確。碳費於115年首次依114年排放量申報繳費，故非本題答案。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；碳費制度（2.5萬公噸CO2e門檻、115年首次申報繳費）"},{"id":"ESG-A-024","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"下列碳定價機制依政府強制介入程度「由低至高」排列，何者正確？","options":["課徵碳費/碳稅→總量管制與交易→自願性交易→企業內部碳定價","自願性交易→企業內部碳定價→課徵碳費/碳稅→總量管制與交易","企業內部碳定價→自願性交易→總量管制與交易→課徵碳費/碳稅","企業內部碳定價→總量管制與交易→自願性交易→課徵碳費/碳稅"],"answer":2,"explain":["錯誤。此排序恰為政府介入程度由高至低之相反順序。","錯誤。企業內部碳定價純屬企業自主管理工具，政府介入程度最低，應排在自願性交易之前。","正確。企業內部碳定價（企業自訂，無政府介入）→自願性交易（民間自願參與）→總量管制與交易（政府訂定排放總量，價格由市場決定）→課徵碳費/碳稅（政府直接訂價並強制徵收），政府強制介入程度依序遞增。","錯誤。總量管制與交易之政府介入程度高於自願性交易，兩者順序不應對調。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；碳定價四機制介入程度排序（115年第2次測驗考點）"},{"id":"ESG-A-025","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"有關臺灣碳權交易所之敘述，下列何者正確？","options":["於民國112年8月成立，總部設於高雄","於民國106年成立，總部設於臺北","係依巴黎協定由聯合國授權在臺設立之國際交易平台","其成立代表我國已全面實施總量管制與排放交易制度（ETS）"],"answer":0,"explain":["正確。臺灣碳權交易所於112年（2023年）8月成立，總部設於高雄，提供碳權交易與碳諮詢等服務。","錯誤。臺灣碳權交易所成立時間為112年8月，且總部設於高雄而非臺北；106年為綠色金融行動方案1.0發布之年度。","錯誤。臺灣碳權交易所為國內設立之交易平台，並非聯合國授權設立之國際機構。","錯誤。我國現行強制性碳定價工具為碳費，尚未實施總量管制與排放交易制度（ETS）；碳交所之成立不等同實施ETS。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；臺灣碳權交易所（112年8月成立、總部高雄）"},{"id":"ESG-A-026","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"有關碳權交易之功能與定位，下列敘述何者錯誤？","options":["有助於形成碳價格訊號，使排碳之外部成本內部化","可引導資金投入減碳技術與減量專案","企業只要購買足額碳權，即可完全取代自身之實質減碳作為","屬於碳定價機制之一種型態"],"answer":2,"explain":["敘述正確。碳交易透過市場供需形成碳價，使排碳成本內部化，故非本題答案。","敘述正確。碳價訊號可引導資源流向減碳活動與技術研發，故非本題答案。","敘述錯誤（本題答案）。碳權交易僅為輔助工具，企業仍應優先進行自身實質減碳；購買碳權不能完全取代實質減碳作為。","敘述正確。碳交易（含總量管制與交易、自願性交易）屬碳定價機制之一環，故非本題答案。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；碳交易之功能與限制（不能完全取代實質減碳）"},{"id":"ESG-A-027","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"我國再生能源發展政策係以下列何者為推動主軸？","options":["地熱發電與生質能","太陽光電與離岸風電","核能發電與水力發電","氫能發電與潮汐發電"],"answer":1,"explain":["錯誤。地熱與生質能屬前瞻能源之發展範疇，並非現階段再生能源推動主軸。","正確。我國再生能源政策以太陽光電（分屋頂型與地面型）及離岸風電為兩大推動主軸。","錯誤。核能並非再生能源，且臺灣永續發展目標第18項揭示逐步達成非核家園之方向。","錯誤。氫能與潮汐發電尚屬發展中之能源選項，並非我國再生能源推動主軸。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；再生能源政策（太陽光電＋離岸風電主軸）"},{"id":"ESG-A-028","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"我國離岸風電開發採三階段策略推動，其推動順序為下列何者？","options":["示範獎勵→潛力場址→區塊開發","潛力場址→示範獎勵→區塊開發","區塊開發→潛力場址→示範獎勵","示範獎勵→區塊開發→潛力場址"],"answer":0,"explain":["正確。我國離岸風電依「先示範、次潛力、後區塊」原則分三階段推動：第一階段示範獎勵、第二階段潛力場址、第三階段區塊開發。","錯誤。示範獎勵為最先辦理之階段，潛力場址居次，順序不應對調。","錯誤。此排序完全顛倒；區塊開發為第三階段。","錯誤。潛力場址為第二階段、區塊開發為第三階段，兩者順序不應對調。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；離岸風電三階段（示範獎勵、潛力場址、區塊開發）"},{"id":"ESG-A-029","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"有關我國綠色金融行動方案之推動沿革，下列敘述何者正確？","options":["綠色金融行動方案1.0（106年）之重點為推動永續金融評鑑","綠色金融行動方案2.0（109年）僅聚焦於綠能產業之投融資","綠色金融行動方案3.0（111年9月）之核心策略為「整合金融資源，支持淨零轉型」","迄今尚未有接續綠色金融行動方案3.0之新方案"],"answer":2,"explain":["錯誤。1.0（106年）之重點在鼓勵金融機構對「綠能產業」之投融資；永續金融評鑑係3.0時期推動之機制。","錯誤。2.0（109年）係將推動範圍自綠能產業「擴大」至整體綠色金融市場之發展，並非僅聚焦綠能投融資。","正確。3.0於111年9月發布，核心策略為「整合金融資源，支持淨零轉型」，並提出布局、資金、資料、培力、生態系五大推動面向。","錯誤。金管會已於113年10月發布「綠色及轉型金融行動方案」，接續3.0並納入轉型金融等新重點。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；綠色金融行動方案1.0→2.0→3.0沿革"},{"id":"ESG-A-030","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"「綠色金融行動方案3.0」規劃五大推動面向，下列何者不在其中？","options":["布局","資料","培力","碳費徵收"],"answer":3,"explain":["布局為五大面向之一（推動金融機構掌握及因應氣候相關風險），故非本題答案。","資料為五大面向之一（強化永續資料之整合與運用），故非本題答案。","培力為五大面向之一（培育永續金融人才，永續金融證照制度即據此面向規劃），故非本題答案。","正確（不在其中）。3.0五大面向為布局、資金、資料、培力、生態系；「碳費徵收」屬環境部依氣候變遷因應法辦理之事項，並非金管會綠色金融行動方案之推動面向。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；綠色金融行動方案3.0五大面向（布局、資金、資料、培力、生態系）"},{"id":"ESG-A-031","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"金管會於民國113年10月發布「綠色及轉型金融行動方案」，有關其新增重點，下列敘述何者正確？","options":["廢止綠色金融行動方案3.0之全部措施，重新建構制度","納入轉型金融概念，協助高碳排產業有序邁向低碳轉型","強制要求所有金融機構參與國際永續組織、倡議及ESG評比","將方案適用範圍限縮回綠能產業之投融資"],"answer":1,"explain":["錯誤。該方案係延續並擴充3.0之架構，並非廢止重來。","正確。「綠色及轉型金融行動方案」之新增重點包括納入轉型金融（支持高碳排產業有序轉型），並致力提升我國金融業之國際影響力及能見度。","錯誤。方案係鼓勵金融業「自發性」參與國際永續組織、倡議與ESG評比，並非強制要求，此為判斷關鍵字。","錯誤。限縮回綠能產業投融資係倒退回1.0之範圍，與方案持續擴大支持淨零轉型之方向相反。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；綠色及轉型金融行動方案（113年10月發布）"},{"id":"ESG-A-032","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"依金管會「上市櫃公司永續發展路徑圖」，「全體」上市櫃公司完成溫室氣體盤查與確信之期程分別為何？","options":["116年（2027年）完成盤查、118年（2029年）完成確信","112年（2023年）完成盤查、113年（2024年）完成確信","118年（2029年）完成盤查、116年（2027年）完成確信","114年（2025年）完成盤查、116年（2027年）完成確信"],"answer":0,"explain":["正確。路徑圖（111年3月發布）採分階段擴大適用，規劃全體上市櫃公司於116年（2027年）完成溫室氣體盤查、118年（2029年）完成確信。","錯誤。112年完成盤查、113年完成確信者為第一波對象（資本額100億元以上上市櫃公司及鋼鐵、水泥業），並非全體上市櫃公司。","錯誤。盤查在先、確信在後，兩年度不應顛倒。","錯誤。全體上市櫃公司完成盤查之期程為116年、完成確信為118年。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；上市櫃公司永續發展路徑圖（111年3月，金管會）"},{"id":"ESG-A-033","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"依「上市櫃公司永續發展路徑圖」，民國113年（2024年）應完成溫室氣體盤查「確信」之對象，不包括下列何者？","options":["資本額100億元以上之上市櫃公司","鋼鐵業上市櫃公司","水泥業上市櫃公司","資本額50億元以上未達100億元之上市櫃公司"],"answer":3,"explain":["資本額100億元以上之上市櫃公司為首波對象，112年完成個體盤查、113年完成確信，故非本題答案。","鋼鐵業與資本額100億元以上公司同列首波對象，113年須完成確信，故非本題答案。","水泥業亦屬首波對象，113年須完成確信，故非本題答案。","正確（不包括）。113年應完成確信者僅資本額100億元以上上市櫃公司及鋼鐵、水泥業；資本額50億元以上未達100億元者不在該年度確信範圍，此為115年第2次測驗之實際考點。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；永續發展路徑圖確信時程（113年：資本額100億以上＋鋼鐵＋水泥）"},{"id":"ESG-A-034","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"金管會等部會於民國112年3月發布「上市櫃公司永續發展行動方案」，其五大推動面向不包括下列何者？","options":["引領企業淨零","獨立董事制度改革","深化企業永續治理文化","強化利害關係人溝通"],"answer":1,"explain":["引領企業淨零為五大面向之一，故非本題答案。","正確（不包括）。五大面向為引領企業淨零、深化企業永續治理文化、精進永續資訊揭露、強化利害關係人溝通、推動ESG評鑑及數位化；「獨立董事制度改革」不在其中，為常見誘答項。","深化企業永續治理文化為五大面向之一，故非本題答案。","強化利害關係人溝通為五大面向之一，故非本題答案。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；上市櫃公司永續發展行動方案（112年3月）五大面向"},{"id":"ESG-A-035","exam":"esg","subject":"","topic":"永續基本概念","difficulty":1,"q":"依「上市櫃公司永續發展行動方案」之規劃，全體上市櫃公司自民國哪一年起均應編製永續報告書？","options":["112年","113年","114年","118年"],"answer":2,"explain":["錯誤。112年係永續報告書編製義務擴及實收資本額20億元以上上市櫃公司之年度，尚非全體適用。","錯誤。113年尚未擴及全體上市櫃公司。","正確。依行動方案之規劃，114年（2025年）起全體上市櫃公司均須編製永續報告書。","錯誤。118年為永續發展路徑圖中全體上市櫃公司完成溫室氣體「確信」之年度，與永續報告書編製義務不同。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；永續發展行動方案（114年起全體上市櫃編製永續報告書）"},{"id":"ESG-A-036","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"依「上市上櫃公司永續發展實務守則」，下列何者屬於「維護社會公益」相關章節所規範之事項？","options":["統計溫室氣體排放量","使用低環境負荷之再生物料","尊重消費者權益並強化供應鏈管理","設置環境管理專責單位或人員"],"answer":2,"explain":["錯誤。統計溫室氣體排放量屬「發展永續環境」（環境面）章節之規範事項，並非社會公益範疇，此為常見混淆點。","錯誤。使用低環境負荷之再生物料屬「發展永續環境」章節之具體作法。","正確。維護社會公益章節涵蓋尊重消費者權益、保障員工權益、強化供應鏈管理等社會面事項。","錯誤。設置環境管理專責單位或人員屬「發展永續環境」章節之規範事項。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；上市上櫃公司永續發展實務守則（環境／社會公益章節歸屬）"},{"id":"ESG-A-037","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"有關「上市上櫃公司永續發展實務守則」及相關規範之敘述，下列何者錯誤？","options":["公司宜遵循環境保護相關法規，並設置環境管理專責單位或人員","公司宜使用低環境負荷之再生物料，以發展永續環境","證交所訂定之「永續發展委員會組織規程參考範例」屬參考性質，非強制一體適用","「統計溫室氣體排放量」屬該守則「維護社會公益」章節之規範事項"],"answer":3,"explain":["敘述正確。發展永續環境章節要求公司遵循環保法規，並設置環境管理專責單位或人員，故非本題答案。","敘述正確。使用低環境負荷之再生物料為發展永續環境之具體作法，故非本題答案。","敘述正確。該參考範例僅供公司參考採用，並非強制所有上市櫃公司一體適用，故非本題答案。","敘述錯誤（本題答案）。統計溫室氣體排放量屬「發展永續環境」（環境面）之規範事項，並非「維護社會公益」章節之內容。"],"src":"官方命題範圍（一）永續基本概念—國內永續發展政策；上市上櫃公司永續發展實務守則"},{"id":"ESG-A-038","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"有關歐盟永續分類標準（EU Taxonomy），下列敘述何者正確？","options":["係用以判別「經濟活動」是否符合環境永續之分類工具","係用以評定金融機構信用評等之分級制度","於2015年與巴黎協定同時生效","我國迄今尚未發布對應之本土永續分類指引"],"answer":0,"explain":["正確。EU Taxonomy於2020年6月發布、同年7月12日生效，係判別「經濟活動」是否屬環境永續之分類標準，作為導引資金流向永續活動與防止漂綠之基礎。","錯誤。EU Taxonomy分類之對象為經濟活動，並非金融機構之信用評等制度。","錯誤。EU Taxonomy相關規則係於2020年發布生效，並非2015年。","錯誤。我國已於111年12月由金管會等跨部會發布「永續經濟活動認定參考指引」，為對應之本土指引。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；EU Taxonomy（2020年6月發布、7月12日生效）／永續經濟活動認定參考指引（111年12月）"},{"id":"ESG-A-039","exam":"esg","subject":"","topic":"永續基本概念","difficulty":3,"q":"歐盟永續分類標準（EU Taxonomy）揭示之六大環境目標，下列何者不在其中？","options":["氣候變遷減緩","轉型至循環經濟","汙染預防與控制","消除貧窮與飢餓"],"answer":3,"explain":["氣候變遷減緩為六大環境目標之一（與氣候變遷調適並列），故非本題答案。","循環經濟轉型為六大環境目標之一，故非本題答案。","汙染預防與控制（汙染防治）為六大環境目標之一，故非本題答案。","正確（不在其中）。六大環境目標為：氣候變遷減緩、氣候變遷調適、水及海洋資源之永續使用與保護、循環經濟轉型、汙染防治、生物多樣性與生態系統之保護及復育；「消除貧窮與飢餓」屬聯合國SDGs之社會性目標，並非EU Taxonomy之環境目標。"],"src":"官方命題範圍（一）永續基本概念—國際永續發展政策；EU Taxonomy六大環境目標"},{"id":"ESG-A-040","exam":"esg","subject":"","topic":"永續基本概念","difficulty":2,"q":"依聯合國環境規劃署（UNEP）之定義，「永續金融」所涵蓋之面向為下列何者？","options":["僅環境面向","環境與社會二面向","環境、社會與治理三面向","環境、社會、經濟與治理四面向"],"answer":3,"explain":["錯誤。UNEP定義之永續金融並不以環境面向為限，涵蓋範圍更廣。","錯誤。除環境與社會外，尚包含經濟與治理面向。","錯誤。「環境、社會、治理」為ESG三面向之概念；UNEP對永續金融之定義另納入「經濟」面向，共四面向，兩者為測驗常見混淆點。","正確。UNEP定義永續金融涵蓋環境、社會、經濟與治理四面向，此為115年第2次測驗之實際考點。"],"src":"官方命題範圍（一）永續基本概念—永續介紹；UNEP永續金融四面向（環境、社會、經濟、治理）"},{"id":"ESG-B-001","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"全球永續性報導協會（GRI）於2021年改版之通用準則由三號準則構成，GRI 1、GRI 2、GRI 3之主題依序為下列何者？","options":["基礎、一般揭露、重大主題","一般揭露、基礎、重大主題","重大主題、一般揭露、基礎","基礎、重大主題、一般揭露"],"answer":0,"explain":["正確。GRI通用準則2021由GRI 1「基礎」（報導原則與基本要求）、GRI 2「一般揭露」（組織概況、治理、策略、利害關係人等）、GRI 3「重大主題」（重大主題之鑑別與管理）組成，三者順序與主題為固定考點。","錯誤。GRI 1之主題為「基礎」而非「一般揭露」；「一般揭露」為GRI 2之主題，本選項將前二者對調。","錯誤。GRI 3才是「重大主題」、GRI 1為「基礎」，本選項順序完全顛倒。","錯誤。GRI 2為「一般揭露」、GRI 3為「重大主題」，本選項將後二者順序對調。"],"src":"GRI通用準則2021（GRI 1基礎／GRI 2一般揭露／GRI 3重大主題）；命題範圍（二）永續資訊揭露—國際永續資訊公開規範"},{"id":"ESG-B-002","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"GRI主題準則依系列編號區分主題類別，下列配對何者正確？","options":["200系列：環境主題","300系列：環境主題","400系列：經濟主題","200系列：社會主題"],"answer":1,"explain":["錯誤。200系列為「經濟」主題準則（如經濟績效、反貪腐等），並非環境主題。","正確。GRI主題準則分為200經濟、300環境、400社會三大系列；300系列對應環境主題（如能源、水、排放、廢棄物等），配對正確。","錯誤。400系列為「社會」主題準則（如勞雇關係、職業安全衛生等）；經濟主題為200系列。","錯誤。200系列為經濟主題；社會主題為400系列。"],"src":"GRI主題準則編號體系（200經濟／300環境／400社會）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-003","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"關於GRI 2「一般揭露」之涵蓋內容，下列敘述何者錯誤？","options":["涵蓋組織治理相關揭露","涵蓋策略、政策與實務相關揭露","涵蓋利害關係人議合相關揭露","人權評估與盡職調查未納入GRI 2之揭露範圍"],"answer":3,"explain":["敘述正確（非本題答案）。GRI 2一般揭露涵蓋治理事項，如治理結構、最高治理單位之組成與職責等。","敘述正確（非本題答案）。GRI 2涵蓋策略、政策與實務，包含永續發展策略聲明、政策承諾與法規遵循情形。","敘述正確（非本題答案）。GRI 2涵蓋利害關係人議合之作法與工會團體協約等資訊。","敘述錯誤，為本題答案。GRI通用準則2021改版已將「人權評估」與「盡職調查」納入GRI 2一般揭露之範圍，並非排除在外；此為2021年改版強化人權揭露之重點。"],"src":"GRI 2一般揭露2021（治理、策略、利害關係人、人權與盡職調查）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-004","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"GRI準則於鑑別與決定重大主題時，所依據之重大性觀點主要為下列何者？","options":["財務重大性","市場重大性","衝擊重大性","雙重重大性"],"answer":2,"explain":["錯誤。財務重大性（永續議題對企業財務之影響）為SASB準則與ISSB準則之核心觀點，非GRI之判準。","錯誤。「市場重大性」並非國際永續揭露準則之正式重大性概念，為干擾選項。","正確。GRI以「衝擊重大性」為核心，依組織對經濟、環境與人群（含人權）造成衝擊之顯著程度決定重大主題，屬「由內而外」之觀點。","錯誤。雙重重大性係「同時」考量財務重大性與衝擊重大性之概念（歐盟CSRD／ESRS採用）；GRI本身係以衝擊重大性為準，非雙重重大性。"],"src":"GRI 3重大主題—衝擊重大性；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-005","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依GRI準則鑑別組織之衝擊時，下列敘述何者正確？","options":["僅需考量實際已發生之衝擊","應同時考量實際已發生及潛在可能發生之衝擊","僅需考量尚未發生之潛在衝擊","僅需考量對公司股價之衝擊"],"answer":1,"explain":["錯誤。僅考量實際已發生之衝擊將遺漏未來可能發生之負面影響，不符GRI對衝擊鑑別之完整性要求。","正確。GRI要求鑑別衝擊時須同時涵蓋「實際（已發生）」及「潛在（可能發生）」之衝擊，衝擊對象為經濟、環境與人群（含人權），此為GRI 3之核心要求。","錯誤。僅考量潛在衝擊而忽略已實際發生之衝擊，同樣不符準則要求；二者缺一不可。","錯誤。GRI關注組織對外部（經濟、環境、人群）之衝擊，而非永續議題對公司股價或財務之影響；後者屬財務重大性（SASB／ISSB）之思維。"],"src":"GRI 3重大主題—實際及潛在衝擊之鑑別；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-006","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"GRI準則所稱組織之「衝擊」（impact），係指組織對下列何者造成之影響？","options":["經濟、環境與人群（包含人權）","僅限自然環境","僅限公司之財務績效","僅限股東與債權人"],"answer":0,"explain":["正確。GRI定義之衝擊涵蓋組織對「經濟、環境與人群（含其人權）」之影響，包含正面與負面、實際與潛在之衝擊，範圍不限於環境面。","錯誤。衝擊不僅限於自然環境，尚包含經濟面（如對供應商、地方經濟）與人群面（含人權）之影響。","錯誤。對公司自身財務績效之影響屬財務重大性之關注焦點（SASB／ISSB採用），非GRI所稱之衝擊。","錯誤。GRI之衝擊對象為廣泛之經濟、環境與人群，並非僅限於股東與債權人等資金提供者；後者為投資人導向準則之服務對象。"],"src":"GRI準則之衝擊定義（經濟、環境、人群含人權）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-007","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"關於GRI準則體系之組成，下列敘述何者正確？","options":["GRI主題準則依產業別共分為77個行業準則","GRI通用準則2021年改版後，200／300／400系列主題準則即停止適用","GRI僅發布通用準則，並無行業準則","GRI準則由通用準則、行業準則及主題準則組成"],"answer":3,"explain":["錯誤。「77個行業別準則」為SASB準則之特徵；GRI之行業準則係逐步發布，主題準則則依經濟／環境／社會分類，並非以77個行業區分。","錯誤。2021年改版更新者為通用準則（GRI 1／2／3），200經濟、300環境、400社會之主題準則仍持續適用，供組織依重大主題選用。","錯誤。GRI除通用準則外，亦發布行業準則（適用特定行業）與主題準則，體系並非僅有通用準則。","正確。GRI準則體系由三部分組成：通用準則（GRI 1／2／3，所有報導組織皆適用）、行業準則（特定行業適用）及主題準則（200經濟／300環境／400社會，依鑑別出之重大主題選用）。"],"src":"GRI準則體系（通用準則＋行業準則＋主題準則）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-008","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"某上市公司依GRI準則編製永續報告書，關於重大主題之鑑別，下列作法何者最符合GRI準則之精神？","options":["僅鑑別對公司獲利有重大影響之主題","直接沿用同業公司之重大主題清單","依組織對經濟、環境與人群（含人權）之實際及潛在衝擊之顯著性，決定重大主題","委由簽證會計師逕行決定重大主題"],"answer":2,"explain":["錯誤。僅考量對公司獲利之影響屬財務重大性觀點（SASB／ISSB採用）；GRI係以組織對外部造成之衝擊為判準，二者方向不同。","錯誤。重大主題應依組織自身之營運脈絡、活動與商業關係，並參酌利害關係人議合結果鑑別；逕行套用同業清單不符GRI 3之鑑別程序要求。","正確。GRI 3要求組織鑑別其對經濟、環境與人群（含人權）之實際及潛在衝擊，評估衝擊之顯著性並排序，據以決定重大主題，此即衝擊重大性之具體落實。","錯誤。重大主題之決定屬公司管理階層與治理單位之責任；會計師或確信機構僅對永續資訊執行確信程序，不得代為決定重大主題。"],"src":"GRI 3重大主題鑑別程序（衝擊顯著性評估）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-009","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"SASB（永續會計準則委員會）準則依其永續產業分類系統，共發布幾個行業別準則？","options":["77個","26個","11個","169個"],"answer":0,"explain":["正確。SASB針對各行業具財務重大性之永續議題，共發布77個行業別準則，「行業別、投資人導向」為其核心特色。","錯誤。26為SASB於五大構面下所涵蓋之「一般永續議題」數目，非行業別準則之數目。","錯誤。SASB行業別準則為77個；77個行業係歸類於11個產業部門之下，部門數並非行業別準則之計數。","錯誤。169為聯合國永續發展目標（SDGs）之細項目標數，與SASB準則無關。"],"src":"SASB準則（77個行業別準則、26項一般議題）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-010","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"SASB準則以下列何種重大性觀點為核心，篩選對投資人決策攸關之永續資訊？","options":["衝擊重大性","財務重大性","雙重重大性","規模重大性"],"answer":1,"explain":["錯誤。衝擊重大性為GRI準則之核心觀點，關注企業對經濟、環境與人群之衝擊，與SASB之定位不同。","正確。SASB以「財務重大性」為核心，聚焦可能影響企業財務狀況、營運績效與企業價值之永續議題，服務對象以投資人等資本市場參與者為主。","錯誤。雙重重大性係同時考量財務重大性與衝擊重大性之概念（歐盟CSRD／ESRS採用），非SASB單一準則之定位。","錯誤。「規模重大性」並非國際永續揭露準則之正式重大性概念，為干擾選項。"],"src":"SASB準則—財務重大性（投資人導向）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-011","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"下列何者「不」屬於SASB準則之五大構面？","options":["風險管理","社會資本","人力資本","商業模式與創新"],"answer":0,"explain":["正確（非SASB構面）。「風險管理」為TCFD四大核心要素之一，非SASB構面；SASB五大構面為環境、社會資本、人力資本、商業模式與創新、領導與治理，二套架構常互為誘答。","錯誤（屬SASB構面）。社會資本為五大構面之一，涵蓋客戶隱私、資訊安全、產品品質與安全等議題。","錯誤（屬SASB構面）。人力資本為五大構面之一，涵蓋勞工關係、員工健康與安全等議題。","錯誤（屬SASB構面）。商業模式與創新為五大構面之一，涵蓋產品設計與生命週期管理、供應鏈管理等議題。"],"src":"SASB五大構面（環境／社會資本／人力資本／商業模式與創新／領導與治理）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-012","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依SASB準則五大構面之分類，「商業道德」議題應歸屬於下列何構面？","options":["社會資本","人力資本","領導與治理","商業模式與創新"],"answer":2,"explain":["錯誤。社會資本構面之7項議題為人權與社區關係、客戶隱私、資訊安全、可近性與可負擔性、產品品質與安全、客戶福利、銷售實務與產品標示，不含商業道德。","錯誤。人力資本構面涵蓋勞工關係、員工敬業度等與員工直接相關之議題，不含商業道德。","正確。「商業道德」屬「領導與治理」構面；該構面另涵蓋「法規和監管環境的管理」、競爭行為等議題，此為官方試題常考之歸屬辨析。","錯誤。商業模式與創新構面涵蓋產品設計與生命週期管理、商業模式韌性等議題，不含商業道德。"],"src":"SASB構面歸屬—商業道德屬領導與治理構面；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-013","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列何者「不」屬於SASB準則「社會資本」構面所涵蓋之一般議題？","options":["客戶隱私","勞工關係","資訊安全","產品品質與安全"],"answer":1,"explain":["錯誤（屬社會資本）。客戶隱私為社會資本構面7項議題之一。","正確（非社會資本）。「勞工關係」屬「人力資本」構面；社會資本7項議題為人權與社區關係、客戶隱私、資訊安全、可近性與可負擔性、產品品質與安全、客戶福利、銷售實務與產品標示。","錯誤（屬社會資本）。資訊安全為社會資本構面議題之一。","錯誤（屬社會資本）。產品品質與安全為社會資本構面議題之一。"],"src":"SASB社會資本構面7項議題；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-014","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依SASB準則五大構面之分類，下列議題與構面之配對何者正確？","options":["法規和監管環境的管理—社會資本","商業道德—人力資本","客戶福利—領導與治理","生態衝擊—環境"],"answer":3,"explain":["錯誤。「法規和監管環境的管理」屬「領導與治理」構面，非社會資本。","錯誤。「商業道德」屬「領導與治理」構面，非人力資本。","錯誤。「客戶福利」屬「社會資本」構面7項議題之一，非領導與治理。","正確。「生態衝擊」屬「環境」構面，配對正確；本題型測驗SASB準則內部結構之精確記憶，為官方常見考法。"],"src":"SASB議題與構面歸屬（生態衝擊屬環境構面）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-015","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"關於SASB準則之敘述，下列何者錯誤？","options":["SASB準則要求所有行業揭露完全相同之指標，不因行業而異","SASB準則共涵蓋26項一般永續議題","SASB準則主要服務投資人，聚焦具財務重大性之永續資訊","SASB準則已納入ISSB準則體系，IFRS S2要求依SASB準則進行行業別揭露"],"answer":0,"explain":["敘述錯誤，為本題答案。SASB之核心特色即為「行業別」揭露，依77個行業別準則分別訂定各行業具財務重大性之揭露主題與指標，並非所有行業一體適用相同指標。","敘述正確。SASB於五大構面（環境、社會資本、人力資本、商業模式與創新、領導與治理）下共涵蓋26項一般議題，再對應至各行業擇定重大者。","敘述正確。SASB以財務重大性為核心，服務對象為投資人等資本市場參與者，協助其評估永續議題對企業價值之影響。","敘述正確。SASB經價值報導基金會（VRF）併入IFRS基金會後已納入ISSB體系；IFRS S2要求參考SASB準則進行行業別揭露，以確保行業揭露之一致性與可比較性。"],"src":"SASB準則特性（77行業別／26議題／財務重大性）與ISSB整併；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-016","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"TCFD（氣候相關財務揭露）建議之四大核心要素，下列何者正確？","options":["環境、社會、治理、經濟","治理、策略、風險管理、指標和目標","減緩、調適、轉型、韌性","盤查、查證、揭露、確信"],"answer":1,"explain":["錯誤。環境、社會、治理為ESG三大面向（UNEP永續金融定義另包含經濟面向），並非TCFD揭露架構。","正確。TCFD四大核心要素為治理（Governance）、策略（Strategy）、風險管理（Risk Management）、指標和目標（Metrics and Targets），其下共提出11項揭露建議。","錯誤。減緩與調適為因應氣候變遷之二大行動類型，轉型與韌性為氣候風險及情境分析用語，均非TCFD四大核心要素。","錯誤。盤查、查證、確信屬溫室氣體管理與第三方驗證之流程用語，與TCFD揭露架構無關。"],"src":"TCFD建議報告（2017）四大核心要素；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-017","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"關於TCFD之成立與發布沿革，下列敘述何者正確？","options":["由金融穩定委員會（FSB）於2015年成立，並於2017年發布建議報告","由聯合國環境規劃署（UNEP）於2015年成立","由IFRS基金會於2021年成立","由全球永續性報導協會（GRI）於2017年成立"],"answer":0,"explain":["正確。TCFD（氣候相關財務揭露工作小組）由金融穩定委員會（FSB）於2015年成立，並於2017年發布最終建議報告，提出四大核心要素與11項揭露建議，成為全球氣候揭露之主流框架。","錯誤。UNEP並非TCFD之成立機構；UNEP FI係支持責任投資原則（PRI）、責任銀行原則（PRB）、永續保險原則（PSI）等倡議之機構。","錯誤。IFRS基金會於2021年COP26宣布成立者為ISSB（國際永續準則理事會），非TCFD。","錯誤。GRI為永續性報導準則之制定機構，與TCFD之成立無關。"],"src":"TCFD沿革（FSB 2015年成立、2017年發布建議報告）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-018","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依TCFD建議，「描述管理階層在評估與管理氣候相關風險與機會中之角色」應歸屬於哪一核心要素之揭露項目？","options":["策略","風險管理","指標和目標","治理"],"answer":3,"explain":["錯誤。「策略」要素係揭露氣候相關風險與機會對組織業務、策略及財務規劃之實際與潛在影響，非管理階層角色之定位。","錯誤。「風險管理」要素係揭露組織鑑別、評估及管理氣候相關風險之流程，與管理階層角色之揭露分屬不同要素。","錯誤。「指標和目標」要素係揭露評估氣候風險與機會所使用之指標、溫室氣體排放量及所設定之目標。","正確。「治理」要素包含兩項揭露建議：董事會對氣候相關風險與機會之監督情形，以及管理階層在評估與管理氣候相關風險與機會中之角色；本題屬後者，為歷屆固定考型。"],"src":"TCFD治理要素揭露建議（董事會監督＋管理階層角色）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-019","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"TCFD四大核心要素之下，共包含幾項揭露建議？","options":["7項","9項","11項","17項"],"answer":2,"explain":["錯誤。7為IFRS S2「跨行業指標」之類別數目，非TCFD揭露建議數。","錯誤。TCFD揭露建議共11項，並非9項。","正確。TCFD於四大核心要素下共提出11項揭露建議：治理2項、策略3項、風險管理3項、指標和目標3項，合計11項。","錯誤。17為聯合國永續發展目標（SDGs）之核心目標數，與TCFD無關。"],"src":"TCFD 11項揭露建議（治理2／策略3／風險管理3／指標和目標3）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-020","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依TCFD建議，「描述組織在不同氣候相關情境（包含2°C或更嚴格情境）下，其策略之韌性」應歸屬於哪一核心要素？","options":["治理","策略","風險管理","指標和目標"],"answer":1,"explain":["錯誤。治理要素揭露董事會監督與管理階層角色，不包含情境分析。","正確。氣候情境分析屬「策略」要素之揭露建議，要求組織以包含2°C或更嚴格情境在內之不同氣候情境，檢視並描述其策略之韌性，係策略要素中難度最高之揭露項目。","錯誤。風險管理要素揭露氣候風險之鑑別、評估與管理流程，及其與整體風險管理之整合，不含情境分析下之策略韌性。","錯誤。指標和目標要素揭露所使用之指標、範疇一、二、三溫室氣體排放及目標，不含情境分析。"],"src":"TCFD策略要素—氣候情境分析（含2°C或更嚴格情境）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-021","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"TCFD將氣候相關「機會」分為五大類，下列何者「不」屬之？","options":["資源效率","能源來源","市場","商譽"],"answer":3,"explain":["錯誤（屬機會類別）。資源效率為五類機會之一，例如提升生產、運輸與建築物之能資源使用效率。","錯誤（屬機會類別）。能源來源為五類機會之一，例如採用低碳能源、參與再生能源市場。","錯誤（屬機會類別）。市場為五類機會之一，例如進入新市場、取得公部門誘因。","正確（非機會類別）。TCFD氣候相關機會五類為：資源效率、能源來源、產品和服務、市場、韌性；「商譽」並非機會類別——名譽（商譽）係屬轉型「風險」之類型，此為官方試題之典型誘答。"],"src":"TCFD氣候相關機會五類（資源效率／能源來源／產品和服務／市場／韌性）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-022","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"企業導入TCFD氣候相關財務揭露時，下列何者為成功推動之最關鍵因素？","options":["委由外部顧問全權主導導入專案","增加行銷預算對外宣傳","董事會之支持與監督","僅由永續部門單獨作業，避免涉入其他部門"],"answer":2,"explain":["錯誤。外部顧問僅能提供輔助，氣候治理之權責仍在公司董事會與管理階層；全權委外無法建立組織內部之氣候治理能力。","錯誤。TCFD之重點在治理架構與揭露品質，行銷宣傳與導入成效無直接關聯，且誇大宣傳反有漂綠疑慮。","正確。TCFD以「治理」為四大要素之首，導入成功之關鍵在於董事會之支持與監督，由上而下將氣候相關風險與機會納入公司策略、風險管理與績效指標。","錯誤。氣候風險與機會涉及策略、財務、風控等多部門，須跨部門協作並由高層督導推動，非永續部門單獨可竟其功。"],"src":"TCFD導入實務—關鍵在董事會之支持與監督；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-023","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"關於TCFD四大核心要素之內涵，下列敘述何者錯誤？","options":["「指標和目標」要素僅要求揭露財務報表會計數字，不包含溫室氣體排放量","「治理」要素包含董事會對氣候相關風險與機會之監督","「策略」要素要求描述氣候相關風險與機會對業務、策略與財務規劃之影響","「風險管理」要素包含組織鑑別、評估與管理氣候相關風險之流程"],"answer":0,"explain":["敘述錯誤，為本題答案。「指標和目標」要素明確要求揭露範疇一、範疇二及（如適當）範疇三之溫室氣體排放量與相關風險，以及組織評估氣候風險與機會所使用之指標與所設定之目標，並非僅揭露會計數字。","敘述正確。治理要素之揭露建議包含董事會對氣候相關風險與機會之監督情形。","敘述正確。策略要素要求揭露短、中、長期之氣候風險與機會，及其對業務、策略與財務規劃之影響，並描述不同情境下策略之韌性。","敘述正確。風險管理要素揭露氣候風險之鑑別、評估、管理流程，及該等流程如何整合至組織之整體風險管理。"],"src":"TCFD指標和目標要素（含範疇一、二、三排放揭露）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-024","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"國際永續準則理事會（ISSB）係由下列何機構於2021年COP26會議期間宣布成立？","options":["金融穩定委員會（FSB）","聯合國環境規劃署（UNEP）","IFRS基金會","全球永續性報導協會（GRI）"],"answer":2,"explain":["錯誤。FSB於2015年成立者為TCFD，非ISSB。","錯誤。UNEP為聯合國體系下之環境機構，與ISSB之成立無關。","正確。IFRS基金會於2021年11月英國格拉斯哥COP26會議期間宣布成立ISSB，以制定全球永續揭露基準準則，並陸續整併CDSB（氣候揭露標準委員會）與價值報導基金會（VRF，含SASB準則與整合性報導框架）。","錯誤。GRI為獨立之永續性報導準則制定機構，未成立ISSB；ISSB成立後GRI準則仍持續適用，二者觀點互補。"],"src":"IFRS基金會於COP26（2021年11月）宣布成立ISSB；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-025","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"ISSB於2023年6月正式發布之首二號IFRS永續揭露準則，其規範主題依序為下列何者？","options":["IFRS S1為永續相關財務資訊揭露之一般規定；IFRS S2為氣候相關揭露","IFRS S1為氣候相關揭露；IFRS S2為永續相關財務資訊揭露之一般規定","IFRS S1為溫室氣體盤查準則；IFRS S2為水資源揭露準則","IFRS S1為公司治理揭露；IFRS S2為社會議題揭露"],"answer":0,"explain":["正確。ISSB於2023年6月正式發布IFRS S1「永續相關財務資訊揭露之一般規定」與IFRS S2「氣候相關揭露」；S1為永續揭露之總綱、S2為氣候專門準則。","錯誤。本選項將S1與S2之主題對調；S1係一般規定、S2係氣候相關揭露。","錯誤。溫室氣體盤查另有GHG Protocol、ISO 14064-1等標準；IFRS S1、S2並非盤查或水資源準則。","錯誤。S1涵蓋永續相關財務資訊之一般揭露規定，S2專就氣候相關風險與機會之揭露，並非以公司治理或社會議題為名。"],"src":"IFRS S1與IFRS S2（2023年6月發布）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-026","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"關於ISSB永續揭露準則與既有國際框架之關係，下列敘述何者正確？","options":["ISSB準則為全新自創架構，與TCFD、SASB等既有框架無關","IFRS S2完整納入TCFD四大核心要素架構，並要求依SASB準則進行行業別揭露","ISSB成立後，GRI準則即告廢止","IFRS S1僅適用於金融業"],"answer":1,"explain":["錯誤。ISSB係奠基於既有框架而生，整併TCFD建議、SASB準則、CDSB框架等成果，目的即在整合分歧之揭露框架、建立全球基準。","正確。IFRS S2以TCFD之治理、策略、風險管理、指標和目標四大支柱為架構，並要求參考SASB準則進行行業別揭露，可確保行業揭露之一致性與可比較性。","錯誤。GRI為獨立之準則制定組織，並未因ISSB成立而廢止；GRI（衝擊重大性）與ISSB（投資人導向）觀點互補並存。","錯誤。IFRS S1為一般目的之永續相關財務資訊揭露規定，適用於各行業之企業，非僅金融業。"],"src":"IFRS S2整合TCFD四支柱並依SASB行業別揭露；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-027","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列何者「不」屬於IFRS S2規定之「跨行業指標」類別？","options":["內部碳價格","薪酬","能源總使用量","資本配置"],"answer":2,"explain":["錯誤（屬跨行業指標）。內部碳價格為IFRS S2七類跨行業指標之一，須揭露企業決策採用之內部碳價及其應用方式。","錯誤（屬跨行業指標）。薪酬為七類之一，須揭露氣候相關考量如何納入高階管理階層之薪酬政策。","正確（非跨行業指標）。IFRS S2跨行業指標七類為：溫室氣體排放（範疇一、二、三）、轉型風險、實體風險、氣候相關機會、資本配置、內部碳價格、薪酬；「能源總使用量」不在其中，為典型誘答選項。","錯誤（屬跨行業指標）。資本配置（投入於氣候相關風險與機會之資本支出、融資或投資金額）為七類之一。"],"src":"IFRS S2跨行業指標七類；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-028","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"依IFRS S2行業基礎施行指引（第16冊：商業銀行），「將ESG因素納入信用分析」對商業銀行而言屬於下列何種性質之揭露指標？","options":["跨行業指標","治理構面之揭露項目","自願性參考資訊，非屬指標","行業基礎指標"],"answer":3,"explain":["錯誤。跨行業指標為所有行業一體適用之七類指標（溫室氣體排放、轉型風險、實體風險、氣候相關機會、資本配置、內部碳價格、薪酬），「將ESG因素納入信用分析」非屬之。","錯誤。治理係TCFD／IFRS S2之支柱名稱；本題所問為指標之分類（跨行業指標與行業基礎指標之區分），非支柱歸屬。","錯誤。「將ESG因素納入信用分析」係行業基礎施行指引所列之揭露指標，並非單純之自願性參考資訊。","正確。IFRS S2之指標分為「跨行業指標」與「行業基礎指標」二類；行業基礎施行指引第16冊為商業銀行，「將ESG因素納入信用分析」即屬商業銀行之行業基礎指標。"],"src":"IFRS S2行業基礎施行指引第16冊（商業銀行）—行業基礎指標；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-029","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"關於IFRS S2氣候相關揭露之要求，下列敘述何者錯誤？","options":["企業應考量整條價值鏈之氣候相關風險與機會","跨行業指標包含範疇一、範疇二及範疇三溫室氣體排放","企業僅需揭露自身營運範圍之氣候風險，無須考量價值鏈上下游","依SASB準則進行行業別揭露，可確保行業揭露之一致性與可比較性"],"answer":2,"explain":["敘述正確。IFRS S2要求企業評估之氣候相關風險與機會須涵蓋整條價值鏈，包含上游供應商至下游客戶。","敘述正確。S2跨行業指標之首類即溫室氣體排放，涵蓋範疇一、範疇二及範疇三。","敘述錯誤，為本題答案。S2明確要求考量「整條價值鏈」之氣候相關風險與機會，僅揭露自身營運範圍並不符合準則要求。","敘述正確。S2要求參考SASB準則進行行業別揭露，可確保同行業間揭露之一致性與可比較性。"],"src":"IFRS S2—價值鏈考量與行業別揭露要求；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-030","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依金管會112年8月發布之「我國接軌IFRS永續揭露準則藍圖」，下列敘述何者正確？","options":["採「轉換為我國準則」方式接軌，內容得因地制宜調整","2026年會計年度起全體上市櫃公司一體適用","僅適用於金融業","採「直接採用」方式接軌，2026年會計年度起由資本額100億元以上之上市櫃公司首先適用"],"answer":3,"explain":["錯誤。我國採「直接採用」（而非轉換為國內準則）方式接軌IFRS永續揭露準則，以維持與國際準則之一致性。","錯誤。藍圖採分三階段適用，非一次全面適用：2026年資本額100億元以上上市櫃公司、2027年資本額50億至100億元、2028年全體上市櫃公司。","錯誤。適用對象為上市櫃公司，依資本額分階段適用於年報，並非僅限金融業。","正確。藍圖採直接採用方式，分三階段於年報揭露：首波為2026年會計年度資本額100億元以上之上市櫃公司，其後依序擴及50億至100億元（2027年）及全體上市櫃公司（2028年）。"],"src":"金管會「我國接軌IFRS永續揭露準則藍圖」（112年8月）—直接採用、三階段時程；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-031","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"我國接軌IFRS永續揭露準則藍圖中，主管機關規劃之前置行動「不」包含下列何者？","options":["將IFRS永續揭露準則全文翻譯","僅認可部分規範供企業自行選擇適用","成立工作小組","試作最佳實務範例"],"answer":1,"explain":["錯誤（屬前置行動）。主管機關規劃將IFRS永續揭露準則全文翻譯，以利國內企業遵循適用。","正確（非前置行動）。我國係採「直接採用」方式全面接軌，並非僅認可部分規範供企業選擇適用；本選項與藍圖之接軌方式相悖，為典型誘答選項。","錯誤（屬前置行動）。成立工作小組以推動接軌相關事宜，為前置行動之一。","錯誤（屬前置行動）。試作最佳實務範例供企業參考，為前置行動之一。"],"src":"金管會接軌IFRS永續揭露準則藍圖—前置行動（全文翻譯、工作小組、最佳實務範例）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-032","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"國際整合性報導（<IR>）框架提出組織價值創造所運用之「六大資本」，下列組合何者正確？","options":["財務資本、製造資本、智慧資本、人力資本、社會與關係資本、自然資本","財務資本、政治資本、文化資本、人力資本、社會資本、自然資本","貨幣資本、實體資本、技術資本、勞動資本、關係資本、環境資本","財務資本、製造資本、數位資本、人力資本、品牌資本、自然資本"],"answer":0,"explain":["正確。<IR>框架之六大資本為財務資本、製造資本、智慧資本、人力資本、社會與關係資本、自然資本，用以說明組織如何投入、轉化各類資本以創造價值。","錯誤。「政治資本」與「文化資本」均非六大資本之項目；正確項目應為製造資本與智慧資本等。","錯誤。所列名稱皆非<IR>框架之正式用語；正確為財務、製造、智慧、人力、社會與關係、自然資本。","錯誤。「數位資本」與「品牌資本」非六大資本項目；無形資產屬智慧資本，與利害關係人之關係屬社會與關係資本。"],"src":"國際整合性報導<IR>框架—六大資本；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-033","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"下列何者「不」屬於整合性報導（<IR>）框架所稱之六大資本？","options":["智慧資本","自然資本","政治資本","社會與關係資本"],"answer":2,"explain":["錯誤（屬六大資本）。智慧資本涵蓋專利、著作權、軟體、組織知識與制度等無形資產。","錯誤（屬六大資本）。自然資本涵蓋空氣、水、土地、礦產、森林、生物多樣性等環境資源與生態系統。","正確（非六大資本）。六大資本為財務、製造、智慧、人力、社會與關係、自然資本；「政治資本」非屬之。","錯誤（屬六大資本）。社會與關係資本涵蓋組織與利害關係人間之關係、共享之規範與價值、社會認同等。"],"src":"<IR>框架六大資本項目辨析；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-034","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"關於整合性報導（Integrated Reporting, <IR>）之敘述，下列何者正確？","options":["整合性報導僅揭露財務資訊，不涉及非財務資訊","整合性報導框架由金融穩定委員會（FSB）發布","整合性報導僅要求揭露自然資本之增減變化","整合性報導旨在說明組織如何於短、中、長期運用六大資本創造價值"],"answer":3,"explain":["錯誤。整合性報導之精神即在「整合」財務與非財務（永續）資訊，向資金提供者完整呈現組織之價值創造過程。","錯誤。<IR>框架係由國際整合性報導委員會（IIRC）發布；IIRC其後與SASB合併為價值報導基金會（VRF），並於2022年由IFRS基金會整併。FSB所成立者為TCFD。","錯誤。整合性報導涵蓋六大資本之投入、轉化與產出，並非僅揭露自然資本之變化。","正確。整合性報導以價值創造為核心，說明組織之商業模式如何於短、中、長期運用並轉化六大資本（財務、製造、智慧、人力、社會與關係、自然）以創造價值。"],"src":"IIRC國際整合性報導框架—價值創造與六大資本；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-035","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"國際環境資訊揭露平台CDP之氣候變遷問卷評級，其評級級距為下列何者？","options":["AAA至CCC","A至D-","0至100分之風險分數","一星至五星"],"answer":1,"explain":["錯誤。AAA至CCC（共七級）為MSCI ESG評級之級距，非CDP之評級方式。","正確。CDP評級由最高之A至最低之D-；A為領導等級，未回覆問卷或揭露資訊不足者則列為F。","錯誤。CDP不以風險分數呈現；「風險分數越低越佳」之設計為Sustainalytics ESG風險評級之特徵。","錯誤。CDP不採星等制評級。"],"src":"CDP氣候變遷問卷評級（A至D-）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-036","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"關於CDP（原碳揭露專案）之敘述，下列何者錯誤？","options":["CDP透過問卷蒐集企業環境資訊並予以評級","CDP問卷主題涵蓋氣候變遷、水安全與森林","評級「A」為CDP之最高等級","CDP評級係以風險分數呈現，分數越低代表評級越佳"],"answer":3,"explain":["敘述正確。CDP以年度問卷向企業蒐集環境管理資訊，據以評級，並提供投資人與供應鏈客戶參考。","敘述正確。CDP問卷三大主題為氣候變遷、水安全與森林。","敘述正確。CDP評級由A至D-，A為最高（領導等級）。","敘述錯誤，為本題答案。CDP採A至D-之字母評級制；「以風險分數呈現且分數越低越佳」為Sustainalytics ESG風險評級之特徵，兩者評級方式不可混淆。"],"src":"CDP問卷評級制度與各評比機構辨析；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-037","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"某機構投資人欲以國際評級評估被投資公司之氣候資訊揭露與管理品質，下列敘述何者正確？","options":["CDP氣候變遷問卷評級為「A」之公司，代表其揭露與管理表現達領導（Leadership）等級","「D-」為CDP評級之最高等級","CDP問卷僅評估公司治理績效，不涉及環境資訊","CDP與MSCI之ESG評級採用完全相同之評級符號體系"],"answer":0,"explain":["正確。CDP評級A（含A-）屬領導等級，代表企業在環境資訊揭露之完整性、風險管理與減量行動上居於領先地位；機構投資人常據以評估企業氣候管理品質。","錯誤。CDP評級由A（最高）至D-（最低），D-為最低等級而非最高。","錯誤。CDP之核心為環境資訊揭露（氣候變遷、水安全、森林三大主題），並非公司治理評鑑。","錯誤。CDP採A至D-之評級，MSCI則採AAA至CCC共七級，兩者評級符號體系不同。"],"src":"CDP評級等級意涵（A為領導等級）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-038","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"「雙重重大性」（double materiality）係指企業於永續資訊揭露時，應同時考量下列何二種重大性？","options":["環境重大性與社會重大性","質性重大性與量化重大性","財務重大性與衝擊重大性","內部重大性與外部重大性"],"answer":2,"explain":["錯誤。環境與社會為ESG之面向分類，並非雙重重大性之二個組成觀點。","錯誤。質性與量化係資訊性質之區分，非重大性觀點之分類。","正確。雙重重大性＝財務重大性（永續議題對企業財務狀況與價值之影響，「由外而內」）＋衝擊重大性（企業活動對經濟、環境與人群之衝擊，「由內而外」）；歐盟CSRD／ESRS即採此觀點。","錯誤。「內部重大性」與「外部重大性」並非國際永續揭露規範之正式概念，為干擾選項。"],"src":"雙重重大性概念（財務重大性＋衝擊重大性，CSRD／ESRS採用）；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-039","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"關於國際主要永續揭露準則所採之重大性觀點，下列配對何者正確？","options":["GRI採財務重大性；SASB採衝擊重大性","GRI採衝擊重大性；SASB採財務重大性","GRI與SASB皆僅採財務重大性","GRI與SASB皆採雙重重大性"],"answer":1,"explain":["錯誤。本選項恰好顛倒：GRI重視衝擊重大性，SASB重視財務重大性。","正確。GRI以衝擊重大性為核心（組織對經濟、環境與人群含人權之衝擊，由內而外）；SASB以財務重大性為核心（永續議題對企業財務之影響，由外而內），服務投資人決策；兩準則觀點互補。","錯誤。GRI並非採財務重大性，其以衝擊之顯著性決定重大主題。","錯誤。GRI與SASB各採單一側重之重大性觀點；同時採納二者係歐盟CSRD／ESRS之雙重重大性要求，非GRI或SASB個別準則之定位。"],"src":"GRI衝擊重大性與SASB財務重大性之對比；命題範圍（二）永續資訊揭露"},{"id":"ESG-B-040","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"關於財務重大性與衝擊重大性之敘述，下列何者錯誤？","options":["財務重大性關注永續議題對企業財務狀況及經營成果之影響","衝擊重大性關注企業活動對經濟、環境及人群（含人權）造成之衝擊","同時考量財務重大性與衝擊重大性，即為雙重重大性","衝擊重大性係指僅評估氣候變遷對企業財務造成之衝擊"],"answer":3,"explain":["敘述正確。財務重大性為「由外而內」之觀點，評估永續議題（如氣候風險）如何影響企業之財務狀況、經營成果與企業價值，為SASB及ISSB（IFRS S1／S2）之核心觀點。","敘述正確。衝擊重大性為「由內而外」之觀點，評估企業對外部（經濟、環境與人群含人權）之實際及潛在衝擊，為GRI準則之核心觀點。","敘述正確。雙重重大性即兼採財務重大性與衝擊重大性二觀點，歐盟CSRD／ESRS採之。","敘述錯誤，為本題答案。「氣候變遷對企業財務之衝擊」屬財務重大性（由外而內）之範疇；衝擊重大性之方向恰相反，係企業活動對外部經濟、環境與人群造成之衝擊，並非對企業自身財務之影響。"],"src":"財務重大性與衝擊重大性之方向性辨析；命題範圍（二）永續資訊揭露"},{"id":"ESG-C-001","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"依證交所「上市公司編製與申報永續報告書作業辦法」之分階段時程，自民國幾年起，全體上市（櫃）公司均應編製並申報永續報告書？","options":["114年","112年","106年","118年"],"answer":0,"explain":["正確。永續報告書編製申報採分階段擴大適用：106年起資本額50億以上、112年起擴及實收資本額20億以上、114年（2025）起全體上市櫃公司均須編製申報，故114年為全體適用之關鍵年份。","錯誤。112年是擴及實收資本額20億以上公司之時點，非全體適用。","錯誤。106年是最早要求資本額50億以上公司編製之起始年，適用對象最窄。","錯誤。118年是路徑圖中全體上市櫃公司完成溫室氣體『確信』之年份，與永續報告書全體編製起始年不同。"],"src":"證交所上市公司編製與申報永續報告書作業辦法；研究筆記二(二)7"},{"id":"ESG-C-002","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"依GHG Protocol（溫室氣體盤查議定書），企業自有鍋爐燃燒天然氣所產生之溫室氣體排放，應歸類於下列哪一範疇？","options":["範疇三（其他間接排放）","範疇一（直接排放）","範疇二（能源間接排放）","不列入盤查範圍"],"answer":1,"explain":["錯誤。範疇三為價值鏈上其他間接排放（如原料運輸、員工通勤、產品使用），非自有設施燃燒。","正確。範疇一係組織擁有或控制之排放源直接產生之排放，自有鍋爐燃燒化石燃料屬於固定燃燒源，歸類為範疇一直接排放。","錯誤。範疇二為外購電力、蒸汽、熱或冷等能源使用所產生之間接排放，自有鍋爐燃燒不屬之。","錯誤。自有設施燃燒之排放是最基本的直接排放源，必須列入範疇一盤查。"],"src":"GHG Protocol（WRI/WBCSD）；研究筆記二(二)9"},{"id":"ESG-C-003","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依我國上市櫃公司永續發展路徑圖，資本額100億元以上之上市櫃公司及鋼鐵、水泥業，最早應於民國幾年完成溫室氣體『個體』盤查？","options":["113年","116年","112年","118年"],"answer":2,"explain":["錯誤。113年是資本額100億以上及鋼鐵、水泥三類完成『確信』之年份，非個體盤查完成年。","錯誤。116年是全體上市櫃公司完成盤查之年份，非首波對象之盤查年。","正確。路徑圖規定112年（2023）資本額100億以上及鋼鐵、水泥業須完成個體（母公司）溫室氣體盤查，為首波盤查對象。","錯誤。118年是全體上市櫃公司完成確信之最終年份。"],"src":"上市櫃公司永續發展路徑圖（111年3月，金管會）；研究筆記二(一)11"},{"id":"ESG-C-004","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"某製造公司委外運輸原物料，該運輸車輛非公司所有、燃油亦由運輸商採購。此運輸過程之溫室氣體排放，對該製造公司而言應歸類於？","options":["範疇一，因與其生產活動直接相關","範疇二，因涉及能源使用","不需盤查，因非公司自有設備","範疇三，屬價值鏈之其他間接排放"],"answer":3,"explain":["錯誤。範疇一僅限公司擁有或控制之排放源直接排放，委外運輸車輛非公司所有或控制，不屬範疇一。","錯誤。範疇二專指外購電力、蒸汽、熱、冷等能源之間接排放，委外運輸使用燃油不屬範疇二。","錯誤。上游運輸屬價值鏈排放，GHG Protocol將其納入範疇三，並非免盤查。","正確。委外（上游）運輸之排放源非公司擁有或控制，屬價值鏈其他間接排放，歸類為範疇三。"],"src":"GHG Protocol範疇三（上游運輸配送）；研究筆記二(二)9"},{"id":"ESG-C-005","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列關於「有限確信」（limited assurance）與「合理確信」（reasonable assurance）之敘述，何者正確？","options":["合理確信之保證程度高於有限確信，確信程序更廣泛深入","有限確信之保證程度高於合理確信，故成本較高","兩者保證程度相同，僅名稱不同","有限確信會出具正面表述之結論，合理確信則出具負面表述之結論"],"answer":0,"explain":["正確。合理確信提供高度但非絕對之保證，須執行較廣泛深入之查核程序，保證程度高於有限確信；有限確信程序範圍較小，保證程度較低。","錯誤。方向顛倒，是合理確信保證程度較高、程序較廣、成本通常較高。","錯誤。兩者保證程度不同，合理確信明顯高於有限確信，並非僅名稱差異。","錯誤。結論表述方式與敘述相反：合理確信出具正面（積極）表述，有限確信出具負面（消極）表述之結論。"],"src":"ISAE 3000／確信準則公報；研究筆記二(二)11"},{"id":"ESG-C-006","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"會計師針對企業之溫室氣體排放聲明執行確信時，最主要依循下列哪一項準則？","options":["ISO 14067","ISAE 3410（溫室氣體聲明之確信）","GRI 通用準則","ISO 50001"],"answer":1,"explain":["錯誤。ISO 14067為產品碳足跡計算標準，非會計師確信準則。","正確。ISAE 3410（溫室氣體聲明之確信業務）是專為溫室氣體排放聲明設計之確信準則，會計師據以對排放量聲明提供確信。","錯誤。GRI通用準則為永續性資訊報導架構，並非溫室氣體之計算或確信衡量標準。","錯誤。ISO 50001為能源管理系統標準，與溫室氣體確信無直接關係。"],"src":"ISAE 3410；研究筆記二(二)9、11"},{"id":"ESG-C-007","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依證交所永續報告書作業辦法，下列哪一類（收入占比達50%以上）之上市櫃公司須加強揭露永續資訊並取得會計師之確信意見？","options":["電子零組件業","營建工程業","食品工業","觀光旅館業"],"answer":2,"explain":["錯誤。電子零組件業非作業辦法列示須加強揭露並取得會計師確信之特定行業。","錯誤。營建工程業非該加強揭露行業之列示對象。","正確。作業辦法規定食品工業，以及化工業、金融保險業，與餐飲收入占比達50%以上者，須加強揭露永續資訊並取得會計師確信意見。","錯誤。觀光旅館業非該辦法列示之加強揭露行業（餐飲收入占比50%以上者才是條件之一）。"],"src":"證交所永續報告書作業辦法（食品、化工、金融保險及餐飲收入占50%以上）；研究筆記二(二)7"},{"id":"ESG-C-008","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"依我國接軌IFRS永續揭露準則之藍圖（金管會112年8月公布），第一階段（2026年，即民國114會計年度）適用對象為下列何者？","options":["實收資本額20億元以上之上市櫃公司","全體上市櫃公司","實收資本額50億至100億元之上市櫃公司","實收資本額100億元以上之上市櫃公司"],"answer":3,"explain":["錯誤。20億以上是永續報告書112年擴大適用之門檻，非IFRS永續揭露準則首階段適用對象。","錯誤。全體上市櫃公司是藍圖第三階段（2028年）之適用對象，非第一階段。","錯誤。50億至100億元是藍圖第二階段（2027年）之適用對象。","正確。接軌藍圖採『直接採用』分三階段：2026年（114年度）資本額100億以上上市櫃公司先行、2027年50至100億、2028年全體上市櫃公司。"],"src":"我國接軌IFRS永續揭露準則藍圖（金管會112年8月）；研究筆記二(二)5"},{"id":"ESG-C-009","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"ISO 14064-1標準之主要適用範圍為下列何者？","options":["組織層級之溫室氣體排放與移除之量化及報告","單一產品生命週期之碳足跡計算","環境管理系統之建置與稽核","能源管理系統之持續改善"],"answer":0,"explain":["正確。ISO 14064-1:2018規範組織層級溫室氣體排放與移除之量化及報告原則與要求，是組織型盤查之國際標準。","錯誤。單一產品生命週期碳足跡計算是ISO 14067之範圍，非14064-1。","錯誤。環境管理系統之建置與稽核屬ISO 14001之範疇。","錯誤。能源管理系統持續改善屬ISO 50001之範疇。"],"src":"ISO 14064-1:2018；研究筆記二(二)9"},{"id":"ESG-C-010","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"專門用於產品「碳足跡」量化，且其環境衝擊類別僅聚焦於「氣候變遷」之國際標準為下列何者？","options":["ISO 14001","ISO 14067","ISO 14064-1","ISO 50001"],"answer":1,"explain":["錯誤。ISO 14001為環境管理系統標準，非產品碳足跡量化標準。","正確。ISO 14067規範產品碳足跡之量化與報告，其衝擊類別僅聚焦於『氣候變遷』單一類別，即產品全生命週期溫室氣體排放。","錯誤。ISO 14064-1是組織層級溫室氣體盤查標準，非產品層級碳足跡。","錯誤。ISO 50001為能源管理系統標準，與產品碳足跡無關。"],"src":"ISO 14067（產品碳足跡）；研究筆記二(二)9"},{"id":"ESG-C-011","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依我國上市櫃公司永續發展路徑圖，資本額100億元以上上市櫃公司及鋼鐵、水泥業，最早應於民國幾年完成溫室氣體盤查之『確信』？","options":["112年","116年","113年","118年"],"answer":2,"explain":["錯誤。112年是該三類對象完成個體盤查之年份，尚未進入確信階段。","錯誤。116年是全體上市櫃公司完成盤查之年份，非首波確信年。","正確。路徑圖規定113年（2024）資本額100億以上及鋼鐵、水泥業須完成溫室氣體盤查之確信（不含50至100億者）。","錯誤。118年是全體上市櫃公司完成確信之最終年份，非首波對象之確信年。"],"src":"上市櫃公司永續發展路徑圖；研究筆記二(一)11、二(二)代表題4"},{"id":"ESG-C-012","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"組織進行溫室氣體盤查時，將『組織實際掌握營運控制權之設施』全數納入盤查邊界之方法，稱為？","options":["股權比例法","財務控制法","地理疆界法","營運控制法"],"answer":3,"explain":["錯誤。股權比例法係依組織對各設施之持股比例分配排放量，非以控制權全數納入。","錯誤。財務控制法以組織是否對設施具財務控制權為判準，與營運控制法不同。","錯誤。並無以行政地理疆界劃定組織盤查邊界之標準方法名稱。","正確。營運控制法（operational control）係將組織具有營運控制權之設施排放量100%納入盤查邊界，是常用之組織邊界設定方法之一。"],"src":"GHG Protocol／ISO 14064-1組織邊界設定；研究筆記二(二)9、10"},{"id":"ESG-C-013","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"依規定，上市櫃公司之溫室氣體範疇一、範疇二排放量，應於下列何處揭露？","options":["股東會年報與永續報告書","僅財務報告附註","僅內部管理報表","公司官方網站之公關新聞稿"],"answer":0,"explain":["正確。上市櫃公司之範疇一、二（個體及合併）排放量應依規定於股東會年報（年報附表）與永續報告書揭露，並於公開資訊觀測站ESG專區申報。","錯誤。溫室氣體排放量之法定揭露處所為年報與永續報告書，非財務報告附註。","錯誤。內部管理報表非對外揭露文件，非法定揭露處所。","錯誤。官網公關新聞稿並非強制揭露處所，官網永續專區也非強制揭露處所。"],"src":"研究筆記二(二)8（年報附表2-2-3與永續報告書）"},{"id":"ESG-C-014","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依GHG Protocol範疇三之定義，下列何者最屬於範疇三（價值鏈其他間接排放）之範例？","options":["公司自有貨車配送產品所耗柴油之排放","員工通勤及商務差旅所產生之排放","公司外購電力供辦公室照明之排放","公司廠內天然氣鍋爐燃燒之排放"],"answer":1,"explain":["錯誤。公司自有貨車配送屬公司控制之移動源，為範疇一直接排放。","正確。員工通勤及商務差旅之排放源非公司擁有或控制，屬價值鏈上其他間接排放，為典型之範疇三項目。","錯誤。外購電力供自身使用之排放屬範疇二能源間接排放，非範疇三。","錯誤。廠內天然氣鍋爐燃燒屬公司自有固定源，為範疇一直接排放。"],"src":"GHG Protocol範疇三（員工通勤、商務差旅）；研究筆記二(二)9"},{"id":"ESG-C-015","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列何者『不是』計算或確信溫室氣體排放量之衡量／確信標準？","options":["GHG Protocol","ISO 14064-1","GRI 通用準則","ISAE 3410"],"answer":2,"explain":["錯誤（此為衡量標準）。GHG Protocol為溫室氣體盤查之國際計算標準，屬於溫室氣體衡量標準。","錯誤（此為衡量標準）。ISO 14064-1為組織層級溫室氣體量化與報告標準，屬於溫室氣體衡量標準。","正確。GRI通用準則是永續性資訊報導架構，並非用於計算或確信溫室氣體排放量之衡量／確信標準，故為正解。","錯誤（此為確信標準）。ISAE 3410為會計師對溫室氣體聲明執行確信之準則，屬確信標準。"],"src":"研究筆記二(二)9（GRI非溫室氣體計算/確信之衡量標準）"},{"id":"ESG-C-016","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"依ISO 14064-1，下列何種情況『不須』重新計算基準年之溫室氣體排放清冊？","options":["組織之報告邊界結構發生變化","發現前期清冊存在實質性錯誤","排放係數或計算方法發生變更","既有設施因生產水準改變（關閉或啟動產線）致排放量變動"],"answer":3,"explain":["錯誤（須重算）。組織或報告邊界結構變化會影響基準年可比性，須重新計算基準年清冊。","錯誤（須重算）。發現前期清冊之實質性錯誤時，須重新計算基準年以確保正確。","錯誤（須重算）。排放係數或量化方法變更會影響數據可比性，須重新計算基準年。","正確。單純因既有設施生產水準改變（如關閉或啟動產線）而使排放量變動，屬營運自然波動，不須重新計算基準年清冊。"],"src":"ISO 14064-1基準年重新計算；研究筆記二(二)10"},{"id":"ESG-C-017","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"依規定，證券期貨業（如證券商）自行辦理溫室氣體盤查揭露時，至少應揭露下列哪些範疇之排放量？","options":["範疇一及範疇二","僅範疇一","範疇一、範疇二及範疇三全部","僅範疇三"],"answer":0,"explain":["正確。證券期貨業應揭露範疇一（直接排放）及範疇二（能源間接排放）之排放量，此為法定最低揭露範疇。","錯誤。僅揭露範疇一不足，範疇二（外購電力）亦為證期業必須揭露之項目。","錯誤。現行規定證期業至少須揭露範疇一、二，範疇三並非一律強制全數揭露。","錯誤。僅揭露範疇三顯與規定不符，範疇一、二才是必須揭露之基本範疇。"],"src":"研究筆記二(二)8（證券期貨業應揭露範疇一及範疇二）"},{"id":"ESG-C-018","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"依證交所永續報告書作業辦法，永續報告書中有關『氣候相關資訊』之揭露章節，主要係參考下列哪一國際框架編製？","options":["GRI 準則","TCFD（氣候相關財務揭露）","SASB 準則","SFDR 規範"],"answer":1,"explain":["錯誤。GRI準則是永續報告書整體之通用報導架構，但氣候資訊章節特別參考之框架另有所指。","正確。永續報告書之氣候相關資訊揭露章節主要參考TCFD（治理、策略、風險管理、指標與目標四大核心）框架編製。","錯誤。SASB為行業別揭露準則，非永續報告書氣候章節指定參考之主框架。","錯誤。SFDR是歐盟針對金融市場參與者之揭露規範，非我國永續報告書氣候章節之參考框架。"],"src":"證交所永續報告書作業辦法（氣候資訊參考TCFD）；研究筆記二(二)7"},{"id":"ESG-C-019","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列關於溫室氣體查驗機構（第三方驗證）與會計師確信之敘述，何者正確？","options":["永續報告書之確信一律僅能由會計師執行，查驗機構不得參與","溫室氣體排放量之查證僅能由會計師依審計準則辦理","溫室氣體查驗機構多依ISO 14064-3辦理查證，會計師則依ISAE 3000/3410執行確信","查驗機構與會計師之確信結論效力完全等同，且皆屬強制合理確信"],"answer":2,"explain":["錯誤。溫室氣體排放量可由專業查驗機構（如依ISO 14064-3）執行查證，並非一律僅由會計師辦理。","錯誤。溫室氣體查證可由查驗機構依ISO 14064-3辦理，並非僅能由會計師依審計準則執行。","正確。溫室氣體查驗機構（如BSI、SGS）多依ISO 14064-3執行查證；會計師則依ISAE 3000（一般確信）與ISAE 3410（溫室氣體聲明確信）執行確信，兩者依循準則不同。","錯誤。兩者所依循準則與結論性質不同，且確信程度可為有限或合理，並非皆屬強制合理確信。"],"src":"ISO 14064-3、ISAE 3000/3410；研究筆記二(二)11"},{"id":"ESG-C-020","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"某上市公司實收資本額為80億元。依我國接軌IFRS永續揭露準則之藍圖，該公司最早應於哪一階段（年度）依IFRS S1、S2編製永續揭露資訊於年報？","options":["2026年（第一階段）","不適用，資本額未達門檻","2028年（第三階段，全體上市櫃）","2027年（第二階段）"],"answer":3,"explain":["錯誤。2026年第一階段適用對象為資本額100億以上，80億公司不在首階段。","錯誤。80億公司屬50至100億區間，仍在藍圖適用範圍內，並非不適用。","錯誤。80億公司於第二階段（2027年）即應適用，無須等到2028年全體適用階段。","正確。藍圖第二階段（2027年）適用對象為資本額50至100億元之上市櫃公司，80億正落於此區間，故最早於2027年適用。"],"src":"我國接軌IFRS永續揭露準則藍圖（分三階段）；研究筆記二(二)5"},{"id":"ESG-C-021","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"企業編製永續報告書時，用以決定應優先揭露哪些議題之核心原則，通常稱為？","options":["重大性（重大主題）原則","一致性原則","保守性原則","歷史成本原則"],"answer":0,"explain":["正確。重大性（materiality）原則用以鑑別對利害關係人及企業具重大影響之永續議題，據以決定重大主題並優先揭露，是永續報告書編製之核心原則。","錯誤。一致性原則強調不同期間衡量與揭露方法一致，並非決定議題揭露優先順序之原則。","錯誤。保守性（穩健性）為財務會計概念，非永續報告書決定重大主題之核心原則。","錯誤。歷史成本原則屬財務會計衡量基礎，與永續議題重大性判斷無關。"],"src":"GRI 3重大主題／重大性原則；研究筆記二(二)1、7"},{"id":"ESG-C-022","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依證交所規定之特別時程，實收資本額20億至50億元之證券商，最早應於民國幾年起編製永續報告書？","options":["112年","113年","114年","116年"],"answer":1,"explain":["錯誤。112年是資本額50億以上證券商編製永續報告書之起始年，非20至50億者。","正確。依證券商特別時程，上市櫃子公司之證券商及20至50億元證券商自113年起編製永續報告書。","錯誤。114年是全體上市櫃公司（一般公司）均須編製永續報告書之全面適用年，非20至50億證券商之起始年。","錯誤。116年是路徑圖中全體上市櫃公司完成溫室氣體盤查之年份，與證券商編製報告書時程無關。"],"src":"證券商編製永續報告書特別時程；研究筆記二(二)7"},{"id":"ESG-C-023","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"依GHG Protocol，京都議定書／溫室氣體盤查涵蓋之七種溫室氣體，下列何者『不』包含在內？","options":["甲烷（CH4）","氧化亞氮（N2O）","六氟化硫（SF6）","一氧化碳（CO）"],"answer":3,"explain":["錯誤（屬七種之一）。甲烷（CH4）為受管制之七種溫室氣體之一。","錯誤（屬七種之一）。氧化亞氮（N2O）為受管制之七種溫室氣體之一。","錯誤（屬七種之一）。六氟化硫（SF6）為受管制之七種溫室氣體之一。","正確。七種溫室氣體為CO2、CH4、N2O、HFCs、PFCs、SF6、NF3；一氧化碳（CO）並不在其中，故為正解。"],"src":"七種溫室氣體（CO2、CH4、N2O、HFCs、PFCs、SF6、NF3）；研究筆記二(二)9"},{"id":"ESG-C-024","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"依我國上市櫃公司永續發展路徑圖，全體上市（櫃）公司最遲應於民國幾年完成溫室氣體盤查之『確信』？","options":["114年","112年","116年","118年"],"answer":3,"explain":["錯誤。114年是全體上市櫃公司開始編製永續報告書之年，非全體完成確信之年。","錯誤。112年僅資本額100億以上及鋼鐵、水泥業完成個體盤查，離全體確信甚遠。","錯誤。116年是全體上市櫃公司完成『盤查』之年，尚非完成『確信』之年。","正確。路徑圖規定盤查與確信分階段推進：116年全體完成盤查、118年（2029）全體完成確信，故118年為全體確信之最終期限。"],"src":"上市櫃公司永續發展路徑圖；研究筆記二(一)11"},{"id":"ESG-C-025","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"下列何者為專門規範「能源管理系統」建置與持續改善之國際標準？","options":["ISO 50001","ISO 14064-1","ISO 14067","ISO 14001"],"answer":0,"explain":["正確。ISO 50001為能源管理系統（EnMS）標準，協助組織建立、實施並持續改善能源績效與能源管理制度。","錯誤。ISO 14064-1為組織層級溫室氣體盤查標準，非能源管理系統標準。","錯誤。ISO 14067為產品碳足跡標準，與能源管理系統無關。","錯誤。ISO 14001為環境管理系統標準，涵蓋整體環境面向而非專門之能源管理系統。"],"src":"ISO 50001（能源管理系統）；研究筆記二(二)9"},{"id":"ESG-C-026","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"關於溫室氣體盤查之文件化（documentation）要求，下列敘述何者正確？","options":["僅須保留盤查會議之會議紀錄即可，無須其他文件","邊界設定、排放源鑑別、量化方法及數據品質管理等均須文件化，紙本、硬碟或雲端保存皆可","盤查文件僅供內部參考，不得提供外部查證機構","文件化資料必須以紙本正本保存，不接受電子檔"],"answer":1,"explain":["錯誤。僅保留會議紀錄並不足夠，盤查各環節之過程與方法均須文件化。","正確。盤查之邊界設定、排放源鑑別、量化方法、數據品質管理等皆須文件化，保存方式紙本、硬碟或雲端皆可，供內部紀錄及外部查證使用。","錯誤。盤查文件除供內部紀錄外，正是供外部查證機構查核之依據，並非不得提供。","錯誤。文件化資料之保存形式不限紙本，電子檔（硬碟、雲端）同樣可接受。"],"src":"ISO 14064-1盤查文件化要求；研究筆記二(二)10"},{"id":"ESG-C-027","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"綠色金融相關行動方案自2024年（113年）起，為提升永續資訊品質，對上市櫃公司永續報告書之確信採取下列何種措施？","options":["改由主管機關代為執行全部確信工作","取消永續報告書之確信要求","抽查確信機構之工作底稿","要求所有公司一律改採合理確信"],"answer":2,"explain":["錯誤。確信工作由確信機構執行，主管機關並非代為執行全部確信。","錯誤。行動方案係強化而非取消永續報告書之確信要求。","正確。為提升永續資訊品質，行動方案自2024年起抽查確信機構之工作底稿，以強化確信品質與監理。","錯誤。並未一律要求全面改採合理確信；確信程度仍可為有限確信，措施重點在抽查工作底稿。"],"src":"研究筆記二(二)11（2024年起抽查確信工作底稿）"},{"id":"ESG-C-028","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"某金控之證券投資信託事業依主管機關指引揭露氣候變遷資訊。下列敘述何者正確？","options":["可逕行聲明範疇三排放免予盤查及揭露","僅需揭露範疇三，範疇一及範疇二可免揭露","投融資（投資組合）之排放與其本業無關，無須處理","應揭露範疇一及範疇二排放，並宜提供歷史數據，且應盡力處理投資組合排放"],"answer":3,"explain":["錯誤。指引不允許逕稱範疇三免盤查揭露，投融資組合排放仍應盡力處理。","錯誤。範疇一、二為應揭露之基本項目，不得以僅揭露範疇三取代。","錯誤。投資組合（投融資）排放正是資產管理業氣候揭露之核心，並非與本業無關。","正確。依證券投資信託事業氣候變遷資訊揭露指引，應揭露範疇一、二排放並宜提供歷史數據，且不得逕稱範疇三免盤查、應盡力處理投融資組合排放。"],"src":"證券投資信託事業氣候變遷資訊揭露指引；研究筆記二(二)13"},{"id":"ESG-C-029","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"下列何者是專門規範「環境管理系統」（EMS）之國際標準，協助組織以系統化方式管理其環境衝擊？","options":["ISO 14001","ISO 50001","ISO 14067","ISAE 3410"],"answer":0,"explain":["正確。ISO 14001為環境管理系統（EMS）國際標準，提供組織建立、實施與持續改善環境管理制度之架構。","錯誤。ISO 50001為能源管理系統標準，聚焦能源績效，非整體環境管理系統。","錯誤。ISO 14067為產品碳足跡標準，非環境管理系統標準。","錯誤。ISAE 3410為會計師溫室氣體聲明確信準則，與環境管理系統無關。"],"src":"ISO 14001（環境管理系統）；研究筆記二(二)9"},{"id":"ESG-C-030","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"依證交所永續報告書作業辦法之分階段時程，實收資本額20億元以上之上市櫃公司，最早應自民國幾年起編製並申報永續報告書？","options":["106年","112年","114年","116年"],"answer":1,"explain":["錯誤。106年是資本額50億以上公司開始編製永續報告書之起始年，非20億以上者。","正確。作業辦法規定112年（2023）起擴及實收資本額20億以上之上市櫃公司編製申報永續報告書。","錯誤。114年是全體上市櫃公司均須編製之全面適用年，非20億門檻之起始年。","錯誤。116年為路徑圖中全體上市櫃公司完成溫室氣體盤查之年份，與永續報告書20億門檻無關。"],"src":"證交所永續報告書作業辦法（112年擴及20億以上）；研究筆記二(二)7"},{"id":"ESG-C-031","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列何者最屬於溫室氣體範疇二（能源間接排放）之範例？","options":["公司自有柴油發電機發電之排放","公司銷售產品後消費者使用階段之排放","公司向台電外購電力供廠房使用之排放","公司自有天然氣鍋爐產生蒸汽之排放"],"answer":2,"explain":["錯誤。公司自有柴油發電機燃燒發電屬自有固定源之直接排放，為範疇一。","錯誤。產品售出後消費者使用階段之排放屬下游價值鏈，為範疇三。","正確。向外部電力公司（如台電）外購電力供自身使用所對應之發電端排放，屬能源間接排放，歸類為範疇二。","錯誤。公司自有天然氣鍋爐燃燒產生蒸汽屬自有固定源直接排放，為範疇一。"],"src":"GHG Protocol範疇二（外購電力）；研究筆記二(二)9"},{"id":"ESG-C-032","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"關於IFRS S2（氣候相關揭露）之敘述，下列何者正確？","options":["S2完全取代TCFD，與TCFD四大支柱毫無關聯","S2僅要求揭露企業自身營運之排放，無須考量價值鏈","S2之跨行業指標涵蓋『能源總使用量』作為必要指標","S2整合TCFD四支柱，要求考量整條價值鏈之氣候風險與機會，並依SASB做行業別揭露"],"answer":3,"explain":["錯誤。S2係整合並延續TCFD四大支柱（治理、策略、風險管理、指標與目標），並非與TCFD毫無關聯。","錯誤。S2要求考量整條價值鏈之氣候風險與機會，不限於企業自身營運排放。","錯誤。S2跨行業指標七類為溫室氣體排放、轉型風險、實體風險、氣候機會、資本配置、內部碳價格、薪酬，『能源總使用量』並不在其中。","正確。S2整合TCFD四支柱，要求企業考量整條價值鏈之氣候風險與機會，並依SASB準則進行行業別揭露以確保一致性與可比較性。"],"src":"IFRS S2；研究筆記二(二)4"},{"id":"ESG-C-033","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"下列何者為專門規範「產品碳足跡」量化之標準，與規範「組織溫室氣體盤查」之ISO 14064-1相區別？","options":["ISO 14067","ISO 14001","ISO 50001","ISAE 3000"],"answer":0,"explain":["正確。ISO 14067為產品碳足跡量化標準，衡量對象為單一產品全生命週期之溫室氣體排放，與ISO 14064-1之組織層級盤查相區別。","錯誤。ISO 14001為環境管理系統標準，非產品碳足跡量化標準。","錯誤。ISO 50001為能源管理系統標準，與產品碳足跡量化無關。","錯誤。ISAE 3000為會計師一般確信準則，非產品碳足跡量化標準。"],"src":"ISO 14067 vs ISO 14064-1；研究筆記二(二)9"},{"id":"ESG-C-034","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"金管會於2024年修正「公開發行公司建立內部控制制度處理準則」，將永續資訊之管理納入內部控制。其主要政策目的為下列何者？","options":["放寬永續資訊之揭露要求，減輕公司負擔","強化永續資訊之管理，提升其可靠性、及時性與透明性","僅要求揭露財務資訊，排除永續資訊","將永續資訊揭露完全交由外部顧問決定"],"answer":1,"explain":["錯誤。修正目的為強化而非放寬永續資訊揭露要求。","正確。將永續資訊之管理納入內部控制，目的在強化永續資訊管理、提升其可靠性、及時性與透明性。","錯誤。修正正是要把永續資訊納入內控管理，並非排除永續資訊。","錯誤。內控制度係由公司建立並負責，並非把揭露完全交由外部顧問決定。"],"src":"公開發行公司建立內部控制制度處理準則（2024修正）；研究筆記二(一)15、二(二)15"},{"id":"ESG-C-035","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列何者為溫室氣體『查證』（查驗）常用之國際標準，係查驗機構據以對組織排放清冊進行第三方查證？","options":["ISO 14064-1","ISO 14067","ISO 14064-3","ISO 14001"],"answer":2,"explain":["錯誤。ISO 14064-1是組織進行溫室氣體『盤查與報告』之標準，非查證機構執行查證之依據標準。","錯誤。ISO 14067為產品碳足跡標準，非組織排放查證標準。","正確。ISO 14064-3規範溫室氣體聲明之查證與驗證，查驗機構（如BSI、SGS）據以對組織排放清冊執行第三方查證。","錯誤。ISO 14001為環境管理系統標準，非溫室氣體查證標準。"],"src":"ISO 14064-3（查證）；研究筆記二(二)9、11"},{"id":"ESG-C-036","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"下列關於上市櫃公司溫室氣體盤查與確信推動時程之敘述，何者正確？","options":["112年即要求全體上市櫃公司完成個體盤查","113年資本額50至100億元之上市櫃公司即須完成確信","116年才開始要求資本額100億以上公司進行盤查","112年首波盤查對象為資本額100億以上及鋼鐵、水泥業"],"answer":3,"explain":["錯誤。112年僅要求資本額100億以上及鋼鐵、水泥業完成個體盤查，並非全體上市櫃公司。","錯誤。113年完成確信之對象為資本額100億以上及鋼鐵、水泥業，並不含50至100億者。","錯誤。資本額100億以上公司112年即須完成個體盤查，並非116年才開始盤查。","正確。路徑圖首波（112年）盤查對象為資本額100億元以上上市櫃公司及鋼鐵、水泥業，須完成個體溫室氣體盤查。"],"src":"上市櫃公司永續發展路徑圖；研究筆記二(一)11、二(二)代表題4"},{"id":"ESG-C-037","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":1,"q":"我國接軌IFRS永續揭露準則之藍圖，其採用方式為下列何者？","options":["直接採用（adopt）IFRS永續揭露準則","僅認可部分規範，其餘自行另訂","完全不採用，改採本國自創準則","僅供參考，企業得自由選擇是否適用"],"answer":0,"explain":["正確。我國接軌藍圖採『直接採用（adopt）』IFRS永續揭露準則，而非轉換或另訂，並分階段適用於年報。","錯誤。藍圖係直接採用全套準則，並非僅認可部分規範、其餘另訂。","錯誤。我國並非自創準則取代IFRS，而是直接採用IFRS S1、S2。","錯誤。藍圖係分階段強制適用於符合門檻之上市櫃公司，並非僅供參考自由選擇。"],"src":"我國接軌IFRS永續揭露準則藍圖（直接採用）；研究筆記二(二)5"},{"id":"ESG-C-038","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"會計師依ISAE 3000對永續資訊執行『合理確信』時，相較於『有限確信』，下列敘述何者正確？","options":["合理確信之查核程序範圍較小、投入較少","合理確信須執行更廣泛、深入之程序，以取得高度（但非絕對）保證","合理確信之保證程度低於有限確信","合理確信與有限確信之查核程序完全相同"],"answer":1,"explain":["錯誤。合理確信之查核程序範圍較大、投入較多，並非較小較少。","正確。合理確信須執行較有限確信更廣泛、深入之程序，以取得高度但非絕對之保證，保證程度高於有限確信。","錯誤。合理確信之保證程度高於有限確信，敘述方向相反。","錯誤。兩者查核程序之範圍與深度不同，合理確信明顯更廣更深，並非完全相同。"],"src":"ISAE 3000（合理確信 vs 有限確信）；研究筆記二(二)11"},{"id":"ESG-C-039","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":2,"q":"下列何者『不屬於』上市櫃公司溫室氣體排放量之法定強制揭露處所？","options":["股東會年報","永續報告書","公司官方網站之『永續發展專區』","公開資訊觀測站之ESG專區"],"answer":2,"explain":["錯誤（屬法定處所）。股東會年報（年報附表）為範疇一、二排放量之法定揭露處所之一。","錯誤（屬法定處所）。永續報告書為溫室氣體排放量之法定揭露處所之一。","正確。公司官網『永續發展專區』並非強制揭露處所，故為正解；法定處所為年報、永續報告書與公開資訊觀測站ESG專區。","錯誤（屬法定處所）。公開資訊觀測站ESG專區為排放量之法定申報／揭露處所之一。"],"src":"研究筆記二(二)8（官網永續專區非強制揭露處所）"},{"id":"ESG-C-040","exam":"esg","subject":"","topic":"永續資訊揭露","difficulty":3,"q":"某上市公司實收資本額為120億元。綜合我國相關規範，下列關於該公司永續資訊揭露義務之敘述，何者『錯誤』？","options":["應編製並申報永續報告書","依路徑圖屬112年首波完成個體溫室氣體盤查之對象","依接軌藍圖，屬2028年第三階段始須適用IFRS永續揭露準則之對象","依路徑圖屬113年應完成溫室氣體盤查確信之對象"],"answer":2,"explain":["錯誤敘述？否，此為正確義務。資本額120億公司當然屬須編製申報永續報告書之對象（114年前資本額100億以上早已納入）。","錯誤敘述？否，此為正確義務。資本額100億以上公司屬112年首波完成個體盤查之對象，120億符合。","正確（即為題目所求之錯誤敘述）。接軌藍圖第一階段（2026年）適用對象即為資本額100億以上上市櫃公司，120億公司應於2026年第一階段適用，而非2028年第三階段，故此敘述錯誤。","錯誤敘述？否，此為正確義務。資本額100億以上公司屬113年應完成盤查確信之對象，120億符合。"],"src":"永續報告書作業辦法、路徑圖、接軌IFRS藍圖綜合；研究筆記二(一)11、二(二)5、7"},{"id":"ESG-D-001","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"依氣候相關風險之分類，氣候風險可分為哪兩大類？","options":["實體風險與轉型風險","信用風險與市場風險","立即性風險與作業風險","政策風險與名譽風險"],"answer":0,"explain":["正確。氣候相關風險二大類即『實體風險』（因氣候與極端天氣事件造成的直接損害）與『轉型風險』（因轉向低碳經濟過程產生的政策、技術、市場、名譽風險），此為TCFD與各主管機關指引的基礎分類。","錯誤。信用風險與市場風險是氣候風險『傳導至金融機構』後所形成的傳統金融風險類別，並非氣候風險本身的兩大分類。","錯誤。立即性（acute）風險是實體風險的子類，作業風險則是傳導後的金融風險，兩者不屬於同一層級的分類。","錯誤。政策法規風險與名譽風險都只是『轉型風險』底下的子類，並列不構成氣候風險的兩大類。"],"src":"研究筆記三(三)-1；TCFD氣候風險分類"},{"id":"ESG-D-002","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"下列何者屬於氣候『實體風險』中的『長期性（chronic）』風險？","options":["颱風造成廠房淹水停工","森林大火燒毀營運據點","海平面上升導致沿海資產價值下降","碳費開徵使生產成本增加"],"answer":2,"explain":["錯誤。颱風造成的淹水停工屬於突發性的『立即性（acute）』實體風險，而非長期性風險。","錯誤。森林大火屬於突發性極端事件，是『立即性』實體風險。","正確。海平面上升是氣候型態長期漸進改變所致，屬於『長期性（chronic）』實體風險，是研究筆記明列的代表案例。","錯誤。碳費開徵導致成本增加是因政策法規改變產生的『轉型風險』，不屬於實體風險。"],"src":"研究筆記三(三)-1；實體風險立即性/長期性區分"},{"id":"ESG-D-003","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"某企業營運據點因法令變更，鄰近地區被劃為生態保護區而必須遷廠，導致成本大幅提升。此情形最適合歸類為下列何種氣候風險？","options":["立即性實體風險","市場風險（轉型風險）","政策與法規風險（轉型風險）","長期性實體風險"],"answer":2,"explain":["錯誤。立即性實體風險指颱風、洪水等突發天災造成的直接損害，本題並非天災所致。","錯誤。市場風險（轉型風險）指市場供需、消費偏好或原物料價格變動，本題肇因於法令而非市場需求變化。","正確。因『法令改變』使企業必須遷廠而增加成本，屬於轉型風險中的『政策與法規風險』，此為研究筆記明列的判斷題型。","錯誤。長期性實體風險指海平面上升等漸進的氣候型態改變，本題與氣候型態無關，而是法規因素。"],"src":"研究筆記三(三)-2；轉型風險政策法規類判斷題"},{"id":"ESG-D-004","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"某公司因破壞當地自然環境遭媒體大幅報導，導致企業形象受損、消費者抵制而營收下滑。此情形最適合歸類為下列何種轉型風險？","options":["技術風險","政策與法規風險","立即性實體風險","名譽（聲譽）風險"],"answer":3,"explain":["錯誤。技術風險指低碳技術替代既有技術、既有資產提前淘汰所生的風險，與形象受損無關。","錯誤。政策與法規風險肇因於法令或政策改變，本題並非法令變更，而是形象與輿論問題。","錯誤。立即性實體風險為突發天災造成的直接損害，本題並非天災，且屬轉型風險而非實體風險。","正確。企業因破壞環境致形象受損、影響收入，屬於轉型風險中的『名譽（聲譽）風險』，是研究筆記明列的判斷題型。"],"src":"研究筆記三(三)-2；轉型風險名譽類判斷題"},{"id":"ESG-D-005","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"轉型風險（transition risk）通常包含下列四大類，何者『不屬於』轉型風險的類別？","options":["政策和法規風險","技術風險","市場風險","立即性天災風險"],"answer":3,"explain":["錯誤。政策和法規風險（如碳定價、排放限制）是轉型風險的核心類別之一。","錯誤。技術風險（如低碳技術取代高碳技術、資產擱淺）是轉型風險的類別之一。","錯誤。市場風險（如消費偏好轉向、原物料價格波動）是轉型風險的類別之一。","正確。立即性天災（颱風、洪水等突發事件）屬於『實體風險』，並非轉型風險；轉型風險四類為政策法規、技術、市場、名譽。"],"src":"研究筆記三(三)-1；轉型風險四大類"},{"id":"ESG-D-006","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"氣候風險會透過各種管道傳導至金融機構，進而轉化為傳統金融風險。下列敘述何者『錯誤』？","options":["借款企業因轉型成本上升導致還款能力下降，會提高銀行的信用風險","高碳排資產因政策改變而價格重挫，會影響金融機構持有部位的市場風險","極端氣候事件造成系統中斷、據點受損，屬於作業風險","氣候風險僅影響保險業，對銀行與證券業沒有傳導效果"],"answer":3,"explain":["錯誤（敘述本身正確）。借款企業還款能力下降確實會透過違約提高銀行『信用風險』，這是氣候風險傳導的主要管道。","錯誤（敘述本身正確）。高碳排資產（擱淺資產）價格重挫確實會影響金融機構持有部位的『市場風險』。","錯誤（敘述本身正確）。極端氣候造成系統中斷、營運據點受損確實屬於『作業風險』。","正確（此為錯誤敘述）。氣候風險會傳導至銀行（信用/市場/流動性/作業）、證券與保險（核保）等各類金融機構，並非僅影響保險業，故此敘述錯誤。"],"src":"研究筆記三(三)-6；氣候風險對金融機構之傳導"},{"id":"ESG-D-007","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"針對氣候變遷，企業常採取『減緩（mitigation）』與『調適（adaptation）』兩類策略。下列何者屬於『減緩』措施？","options":["加高海岸堤防以防範淹水","制定熱浪來襲之緊急應變行動計畫","推動造林植樹與碳捕捉技術以降低排放","農村人口向城市遷移以分散風險"],"answer":2,"explain":["錯誤。加高堤防是降低氣候衝擊的『調適』措施，並未減少溫室氣體排放。","錯誤。熱浪應變行動計畫是降低衝擊的『調適』措施。","正確。造林植樹、碳捕捉、太陽能發電等旨在『降低溫室氣體排放』，屬於『減緩（mitigation）』措施，是研究筆記明列的區分。","錯誤。農村到城市的移民是針對衝擊的『調適』選項（如季節性就業和匯款流動），非減緩。"],"src":"研究筆記三(三)-3；減緩vs調適"},{"id":"ESG-D-008","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"下列關於氣候『調適（adaptation）』措施的敘述，何者正確？","options":["增高堤防、制定熱浪行動計畫屬於調適措施","調適的目的是直接減少溫室氣體的排放量","太陽能發電與碳捕捉技術是典型的調適措施","調適與減緩本質相同，兩者可互相取代"],"answer":0,"explain":["正確。增高堤防、熱浪行動計畫等旨在降低氣候變遷造成的衝擊，屬於典型的『調適（adaptation）』措施。","錯誤。『減少排放量』是『減緩（mitigation）』的目的；調適的目的是降低氣候變遷帶來的『衝擊』。","錯誤。太陽能發電與碳捕捉是降低排放的『減緩』措施，非調適。","錯誤。減緩（降低排放）與調適（降低衝擊）目的不同、措施不同，不能互相取代。"],"src":"研究筆記三(三)-3；減緩vs調適"},{"id":"ESG-D-009","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"下列哪一組產業一般被歸類為『高碳排產業』，也是我國永續發展路徑圖首波盤查/確信及碳費徵收的主要對象？","options":["食品業、餐飲業、觀光業","金融保險業、證券業、投信業","電力供應業、鋼鐵業、水泥業","文創產業、資訊服務業、零售業"],"answer":2,"explain":["錯誤。食品業並不屬於高碳排產業，研究筆記特別指出食品業不在其中。","錯誤。金融保險、證券、投信業並非高碳排『排放源』產業，而是需管理『投融資組合』間接排放的金融業。","正確。電力供應業、鋼鐵業、水泥業為研究筆記明列的高碳排產業，亦為路徑圖首波盤查/確信對象及碳費徵收對象。","錯誤。文創、資訊服務、零售並非高碳排產業。"],"src":"研究筆記三(三)-4；高碳排產業"},{"id":"ESG-D-010","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"金融機構在進行氣候風險『情境分析與壓力測試』時，國際上常參考哪一組織所發展的氣候情境？","options":["IFRS基金會","GRI全球永續性報導協會","NGFS（綠色金融體系網絡）","IOSCO國際證券管理機構組織"],"answer":2,"explain":["錯誤。IFRS基金會負責發布ISSB永續揭露準則（S1、S2），並非提供氣候壓力測試情境的機構。","錯誤。GRI是永續資訊『報導』準則制定機構，非提供氣候情境者。","正確。NGFS（Network for Greening the Financial System，綠色金融體系網絡）發展的氣候情境，是金融機構進行氣候情境分析與壓力測試最常參考的標準情境。","錯誤。IOSCO為證券監理機構的國際組織，非氣候壓力測試情境提供者。"],"src":"研究筆記三(三)-10；氣候情境分析與壓力測試（NGFS情境）"},{"id":"ESG-D-011","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"下列何者『不是』檢驗或查核金融機構永續作為時可採用的外部標準或機制？","options":["ISO 14064-1 溫室氣體盤查","赤道原則（Equator Principles）","責任投資原則（PRI）","IFRS 17 保險合約會計準則"],"answer":3,"explain":["錯誤（可作為查核標準）。ISO 14064-1是組織層級溫室氣體盤查標準，可用於檢驗金融機構的盤查作為。","錯誤（可作為查核標準）。赤道原則是專案融資環境與社會風險管理的外部框架。","錯誤（可作為查核標準）。責任投資原則（PRI）是檢驗機構投資人永續投資作為的國際倡議。","正確（不屬於）。IFRS 17是規範保險合約『會計處理』的財務會計準則，與永續查核無關，研究筆記明確指出其與永續查核無關。"],"src":"研究筆記三(三)-7；檢驗金融機構永續作為之外部標準"},{"id":"ESG-D-012","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":"某產險公司評估『海平面上升』對其承保之沿海不動產所帶來的長期損失風險。就氣候風險傳導而言，此最主要屬於下列何者？","options":["長期性實體風險傳導至核保（保險）風險","立即性實體風險傳導至市場風險","技術轉型風險傳導至信用風險","名譽轉型風險傳導至作業風險"],"answer":0,"explain":["正確。海平面上升屬『長期性實體風險』，對產險業承保標的造成的損失會傳導為『核保（保險）風險』，是研究筆記明列的傳導案例。","錯誤。海平面上升是長期性而非立即性風險，且對產險業主要影響核保風險而非市場風險。","錯誤。海平面上升屬實體風險而非技術轉型風險，影響對象亦非信用風險。","錯誤。海平面上升非名譽風險，且不動產承保損失主要屬核保風險而非作業風險。"],"src":"研究筆記三(三)-6；產險業海平面上升→長期實體風險→核保風險"},{"id":"ESG-D-013","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":3,"q":"依研究筆記，銀行建立『氣候風險評估方法及流程』之主要目的，下列何者『並非』其主要目的？","options":["辨識並評估各項氣候風險的高低","針對風險排定處理的優先次序","定義氣候風險的重大性（重要性）","劃分內部三道防線的職責分工"],"answer":3,"explain":["錯誤（屬主要目的）。辨識並評估風險高低是氣候風險評估方法及流程的核心目的之一。","錯誤（屬主要目的）。依風險高低排定處理優先次序是其目的之一。","錯誤（屬主要目的）。定義風險的重大性（重要性）是其目的之一。","正確（並非主要目的）。研究筆記明確指出『劃分三道防線職責』並非氣候風險評估方法及流程的主要目的，該流程重在辨識、評估與排序風險。"],"src":"研究筆記三(三)-6；銀行氣候風險評估方法及流程之目的"},{"id":"ESG-D-014","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":1,"q":"依聯合國相關指導原則，企業於『社會風險』面向進行『人權盡職調查』時，其國際主要參考依據為下列何者？","options":["巴塞爾資本協定（Basel III）","國際財務報導準則（IFRS）","國際證券管理機構組織原則（IOSCO）","聯合國工商企業與人權指導原則（UNGPs）"],"answer":3,"explain":["錯誤。巴塞爾資本協定規範銀行資本適足，與人權盡職調查無關。","錯誤。IFRS為財務報導準則，非人權盡職調查依據。","錯誤。IOSCO為證券監理國際組織原則，與人權盡職調查無關。","正確。聯合國工商企業與人權指導原則（UNGPs）是企業進行人權盡職調查的主要國際參考依據，屬社會風險管理範疇。"],"src":"研究筆記三(三)-8；人權盡職調查（UNGPs）"},{"id":"ESG-D-015","exam":"esg","subject":"","topic":"永續風險管理與治理","difficulty":2,"q":
