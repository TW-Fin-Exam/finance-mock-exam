14%×0.6＝2.4%＋8.4%＝10.8%。"],"src":"研究筆記第十章：WACC＝各來源成本加權；Kd×(1−t)"},{"id":"FN-D-006","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"依資本資產定價模型（CAPM）估計權益資金成本。已知無風險利率 2%、市場預期報酬率 10%、該公司股票之 Beta 值為 1.25，則其權益資金成本為何？","options":["10.0%","12.5%","12.0%","14.5%"],"answer":2,"explain":["10.0% 為市場預期報酬率本身，未帶入公司 Beta 調整風險溢酬，故錯誤。","12.5% 為 2%＋10%×1.25 之誤算（將市場報酬率而非市場風險溢酬乘以 Beta），公式套用錯誤，故錯誤。","正確。CAPM：Ke＝Rf＋β×(Rm－Rf)＝2%＋1.25×(10%－2%)＝2%＋1.25×8%＝2%＋10%＝12%。","14.5% 為 2%＋1.25×10%（誤用 Beta 乘市場報酬率再加無風險利率）之錯算，故錯誤。"],"src":"研究筆記第十章：CAPM 估權益成本"},{"id":"FN-D-007","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":1,"q":"依貨幣時間價值觀念，下列敘述何者正確？","options":["其他條件相同下，折現率越高，未來現金流量之現值越高","一筆固定金額的終值必定小於其現值","普通年金是指每期期初收付的年金","在複利計算下，投資期間越長，同一本金的終值越大"],"answer":3,"explain":["折現率與現值呈反向關係：折現率越高，現值越低，故錯誤。","在正利率下，終值（含複利利息）必定大於現值，敘述方向相反，故錯誤。","普通年金（ordinary annuity）為每期「期末」收付；每期期初收付者為期初年金（annuity due），故錯誤。","正確。複利下終值＝本金×(1＋i)^n，n（期數）越大，終值越高，故投資期間越長終值越大。"],"src":"研究筆記參：貨幣時間價值（現值/終值/年金）"},{"id":"FN-D-008","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"投資人現在存入銀行 10,000 元，年利率 8%，每年複利一次，經過 3 年後之終值最接近下列何者？（(1.08)^3 ≈ 1.2597）","options":["12,400 元","12,597 元","10,800 元","13,605 元"],"answer":1,"explain":["12,400 元為單利計算（10,000×(1＋0.08×3)＝12,400），未計入利息再生利息之複利效果，故錯誤。","正確。複利終值＝10,000×(1.08)^3＝10,000×1.2597＝12,597 元。","10,800 元僅為 1 年後之終值（10,000×1.08），非 3 年，故錯誤。","13,605 元約為 4 年期複利終值（10,000×1.08^4），期數多算一年，故錯誤。"],"src":"研究筆記參：貨幣時間價值（終值）"},{"id":"FN-D-009","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"某公司計畫連續 4 年於每年年底各存入 20,000 元，年利率 6%，則此普通年金於第 4 年底之終值最接近下列何者？（6% 4 期普通年金終值因子 FVIFA ≈ 4.3746）","options":["80,000 元","74,726 元","87,492 元","85,272 元"],"answer":2,"explain":["80,000 元為單純本金加總（20,000×4），完全未計利息，故錯誤。","74,726 元為 4 期年金「現值」（20,000×3.4651）之結果，題目問終值而非現值，故錯誤。","正確。普通年金終值＝每期金額×FVIFA＝20,000×4.3746＝87,492 元。","85,272 元非本題正確因子計算結果，屬因子誤植，故錯誤。"],"src":"研究筆記參：貨幣時間價值（年金終值）"},{"id":"FN-D-010","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":1,"q":"關於股份有限公司發放「現金股利」的相關日期，下列敘述何者正確？","options":["於「宣告日（董事會或股東會決議日）」認列股利負債，保留盈餘減少","股利宣告後至發放前，公司總資產即已減少","現金股利之發放屬於企業之投資活動現金流出","於「除息基準日（發放日）」認列應付股利負債並沖減保留盈餘"],"answer":0,"explain":["正確。現金股利於宣告日即成立法律義務，借記保留盈餘、貸記應付股利（負債增加、保留盈餘減少）；發放日再以現金沖銷該負債。","宣告日僅使負債增加、保留盈餘減少，資產尚未變動；要到實際發放日支付現金時總資產才減少，故錯誤。","發放現金股利屬於「籌資活動」現金流出，而非投資活動，故錯誤。","負債與保留盈餘之變動發生在宣告日，而非發放日；發放日是以現金清償既有負債（資產與負債同減），故錯誤。"],"src":"研究筆記第四章：現金股利宣告日負債↑保留盈餘↓；分類為籌資"},{"id":"FN-D-011","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"關於「股票股利」、「股票分割」與「庫藏股買回」對財務報表之影響，下列敘述何者正確？","options":["股票分割與股票股利均會造成現金流出，列為籌資活動","發放股票股利會使股東權益總額減少","股票分割會使流通在外股數增加，且股本總額同額增加","公司以現金買回庫藏股（成本法）會使股東權益總額減少、流通在外股數減少"],"answer":3,"explain":["股票股利與股票分割均不涉及現金收付，不會出現在現金流量表主體，更非籌資活動現金流出，故錯誤。","發放股票股利只是將保留盈餘轉入股本（權益項目間移轉），股東權益「總額」不變，故錯誤。","股票分割僅調降每股面額並增加股數，股本「總額」不變（例如面額減半、股數加倍），故錯誤。","正確。成本法下買回庫藏股使現金（資產）減少、庫藏股為權益減項，股東權益總額因而下降，同時流通在外股數減少。"],"src":"研究筆記第四章：股票股利/分割總權益不變；庫藏股買回→總權益↓、流通股數↓"},{"id":"FN-D-012","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":1,"q":"下列何者屬於企業「營運資金管理」所關注的項目？","options":["長期公司債的發行條件","不動產、廠房及設備的折舊方法選擇","應收帳款、存貨與應付帳款等短期資產負債的管理","發行新股籌措長期資金"],"answer":2,"explain":["長期公司債屬於長期資金（資本結構）決策，不在營運資金管理範疇，故錯誤。","PP&E 折舊方法屬長期資產會計處理，非營運資金（流動資產與流動負債）之管理，故錯誤。","正確。營運資金＝流動資產－流動負債；營運資金管理即在管理現金、應收帳款、存貨等流動資產與應付帳款等流動負債。","發行新股籌措長期資金屬長期籌資決策，不屬於營運資金管理，故錯誤。"],"src":"研究筆記第十章：營運資金政策；參：營運資金＝流動資產－流動負債"},{"id":"FN-D-013","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":3,"q":"甲公司採較「保守」之營運資金政策（以長期資金支應大部分流動資產需求）。相較於採「積極（以短支長）」政策之公司，下列敘述何者正確？","options":["保守政策通常「風險較低、預期獲利較低」","保守政策會使公司持有的流動資產相對減少","積極政策的資金成本必然低於保守政策，故風險亦較低","保守政策以短期資金支應長期資產，流動性風險最高"],"answer":0,"explain":["正確。保守政策以較多長期資金支應流動資產，流動性充裕、再融資風險低（風險低），但長期資金成本較高且閒置資產較多，故預期獲利也較低。","保守政策通常持有相對「較多」的流動資產（如較高現金與存貨緩衝），而非較少，故錯誤。","積極政策雖短期資金成本可能較低，但以短支長使再融資與利率風險升高，風險並非較低，故錯誤。","以短期資金支應長期資產（以短支長）是「積極」政策的特徵，非保守政策，敘述張冠李戴，故錯誤。"],"src":"研究筆記第十章：營運資金政策，以短支長風險高；保守政策獲利低風險低"},{"id":"FN-D-014","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"某投資案原始投資 300,000 元，未來各年年底現金流入分別為：第 1 年 100,000 元、第 2 年 120,000 元、第 3 年 150,000 元。以「（傳統）回收期間法」計算，其回收期間最接近下列何者？（假設現金流量於年度內均勻發生）","options":["2.0 年","2.53 年","3.0 年","1.87 年"],"answer":1,"explain":["2.0 年僅回收 100,000＋120,000＝220,000 元，尚未達 300,000 元，回收未完成，故錯誤。","正確。前 2 年累積回收 220,000 元，尚差 80,000 元；第 3 年流入 150,000 元，需 80,000／150,000≈0.53 年，故回收期間≈2＋0.53＝2.53 年。","3.0 年時累積回收 370,000 元已超過原始投資，回收其實在第 3 年中途即完成，非滿 3 年，故錯誤。","1.87 年時累積回收不足 300,000 元（第 2 年底才 220,000），時點過早，故錯誤。"],"src":"研究筆記第十章：回收期間法決策準則"},{"id":"FN-D-015","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":3,"q":"甲公司稅後淨利 90 萬元、流通在外普通股 30 萬股，董事會宣告並發放「10% 股票股利」（無現金流出）。不考慮其他因素，此股票股利對甲公司之影響，下列敘述何者正確？","options":["公司現金減少，屬籌資活動現金流出","股東權益總額增加 10%","保留盈餘增加、股本減少","每股盈餘（EPS）因流通股數增加而下降，股東權益總額不變"],"answer":3,"explain":["股票股利不涉及現金收付，公司現金並未減少，也不會列為籌資活動現金流出，故錯誤。","股票股利僅在權益項目間移轉（保留盈餘轉股本），股東權益總額不變，並非增加 10%，故錯誤。","方向相反：股票股利是「保留盈餘減少、股本增加」（轉增資），而非保留盈餘增加、股本減少，故錯誤。","正確。發放 10% 股票股利後流通股數增為 33 萬股，淨利不變下 EPS 由 3 元降至約 2.73 元（90 萬／33 萬股）；因不涉現金且屬權益內移轉，股東權益總額不變。"],"src":"研究筆記第四章及第八章：股票股利總權益不變、EPS 追溯調整；不影響現金流量表"},{"id":"FN-D-016","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":2,"q":"公司欲降低加權平均資金成本（WACC），且假設 ROA（資產報酬率）大於稅後負債利率、財務結構仍屬安全範圍。下列作法何者「較可能」使 WACC 下降？","options":["發行高股利率的特別股取代原有的長期借款","於安全範圍內適度提高負債比重，運用負債之利息稅盾","將原有低利率長期借款全數以權益（發行新股）取代","減少負債、完全以保留盈餘及發行新股支應資金需求"],"answer":1,"explain":["以股利率高的特別股取代成本較低且具稅盾的長期借款，通常會拉高整體資金成本，故錯誤。","正確。負債成本（稅後 Kd＝Kd×(1－t)）通常低於權益成本，且利息可抵稅產生稅盾；在安全範圍內適度增加負債，可降低加權平均資金成本。","以權益完全取代低利率借款，會以較高的權益成本取代較低的負債成本，通常使 WACC 上升，故錯誤。","完全以權益支應會提高權益比重、喪失負債稅盾，一般使 WACC 上升而非下降，故錯誤。"],"src":"研究筆記第十章：WACC、負債稅盾 Kd×(1−t)；杜邦分析財務槓桿正效果"},{"id":"FN-D-017","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":3,"q":"甲、乙兩投資案為「互斥方案」，投資規模相同。若以資金成本 8% 折現，甲案 NPV 為 120 萬元、乙案 NPV 為 95 萬元；但乙案之 IRR（18%）高於甲案（15%）。在資金成本 8% 之下，公司應如何抉擇最為適當？","options":["應同時執行甲、乙兩案","選乙案，因為 IRR 較高","選甲案，因為在既定資金成本下 NPV 較大，較能極大化股東財富","兩案 NPV 均為正，任選其一皆可"],"answer":2,"explain":["題示為互斥方案，僅能擇一執行，不可同時執行兩案，故錯誤。","在互斥方案下，IRR 排序可能與股東財富最大化衝突；不應僅因 IRR 高而選乙案，故錯誤。","正確。互斥方案評估以 NPV 為優先準則，NPV 直接衡量增加之股東財富；在資金成本 8% 下甲案 NPV（120 萬）大於乙案（95 萬），故選甲案。","互斥方案只能擇一，且應選 NPV 較大者以極大化股東財富，並非任選皆可，故錯誤。"],"src":"研究筆記第十章：NPV＞0 接受、互斥方案以 NPV 為決策依據"},{"id":"FN-D-018","exam":"gaoye-fin","subject":"","topic":"財務管理","difficulty":1,"q":"公司「買回並註銷（或持有）庫藏股」對每股盈餘（EPS）及每股帳面價值以外的影響，下列敘述何者正確？","options":["股東權益總額增加","屬營業活動之現金流入","流通在外股數增加","在其他條件不變下，流通在外普通股股數減少，使每股盈餘（EPS）上升"],"answer":3,"explain":["以現金買回庫藏股使資產與權益同時減少，股東權益總額下降而非增加，故錯誤。","買回庫藏股是動用現金，屬「籌資活動」現金流「出」，而非營業活動現金流入，故錯誤。","買回庫藏股使流通在外股數「減少」而非增加，故錯誤。","正確。買回庫藏股後流通在外普通股股數減少，在淨利不變下 EPS（＝淨利／流通股數）上升。"],"src":"研究筆記第四章：庫藏股買回→流通股數↓、EPS↑；籌資活動"},{"id":"FN-D-019","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":1,"q":"依我國公司法「關係企業」專章，下列何者為推定「控制與從屬關係」的情形之一？","options":["甲公司持有乙公司已發行有表決權股份總數過半數者","甲公司持有乙公司股份達 10%","甲公司與乙公司位於同一產業","甲公司為乙公司之主要供應商"],"answer":0,"explain":["正確。公司法規定，公司持有他公司「有表決權股份或出資額超過半數（過半數）」者，推定為控制公司與從屬公司關係。","持股 10% 遠低於過半數門檻，不足以推定控制從屬關係，故錯誤。","位於同一產業僅為競爭或同業關係，與控制從屬無涉，故錯誤。","單純的供應商與客戶交易關係並非公司法所稱之控制從屬關係，故錯誤。"],"src":"研究筆記第十一章：公司法§369-2、369-3 控制從屬推定（過半數持股）"},{"id":"FN-D-020","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":2,"q":"依公司法關係企業專章關於「三書表」之編製，下列敘述何者正確？","options":["關係報告書應由控制公司編製","從屬公司應編製合併財務報表","從屬公司應造具「關係報告書」，控制公司應編製「合併營業報告書」及「合併財務報表」","合併營業報告書應由從屬公司編製"],"answer":2,"explain":["關係報告書應由「從屬公司」編製（載明其與控制公司間之法律行為及資金往來），非由控制公司編製，故錯誤。","合併財務報表應由「控制公司」編製，而非從屬公司，故錯誤。","正確。公司法第369-12條：從屬公司應造具「關係報告書」；控制公司應編製「關係企業合併營業報告書」及「合併財務報表」。","合併營業報告書由控制公司編製，非從屬公司，故錯誤。"],"src":"研究筆記第十一章：公司法§369-12 三書表；從屬編關係報告書、控制編合併營業報告書及合併財報"},{"id":"FN-D-021","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":2,"q":"依 IAS 28，投資者對被投資公司具有「重大影響力」時應採權益法。一般而言，直接或間接持有被投資公司多少比例之表決權時，「推定」具有重大影響力？","options":["10% 以上","20% 以上","過半數（50% 以上）","三分之一以上"],"answer":1,"explain":["10% 一般僅屬單純的財務性投資，尚不足以推定具重大影響力，故錯誤。","正確。IAS 28 規定，投資者直接或間接持有被投資公司 20% 以上（含）之表決權時，除非有明確反證，推定具有重大影響力，應採權益法。","持有過半數（50% 以上）通常構成「控制」，應編製合併報表，而非僅具重大影響採權益法，故錯誤。","三分之一是公司法相互投資通知門檻，並非 IAS 28 重大影響力之推定比例，故錯誤。"],"src":"研究筆記第四章及十一章：IAS 28 重大影響 20%"},{"id":"FN-D-022","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":3,"q":"甲公司以權益法評價對乙公司之投資，持股 30%。乙公司本年度稅後淨利 200 萬元，並於年度中發放現金股利合計 50 萬元（甲公司按持股比例分得）。不考慮其他調整，甲公司本年度應如何處理？","options":["認列投資收益 60 萬元；收到之現金股利 15 萬元沖減（貸記）投資帳面金額","認列投資收益 50 萬元；收到現金股利 15 萬元列為投資收益","不認列投資收益；收到現金股利 15 萬元列為股利收入","認列投資收益 60 萬元；收到現金股利 15 萬元列為股利收入"],"answer":0,"explain":["正確。權益法投資收益＝200 萬×30%＝60 萬元（借投資、貸投資收益）；收到現金股利 50 萬×30%＝15 萬元應「借現金、貸投資（沖減投資帳面金額）」，不認列為收入。","投資收益應按被投資公司「淨利」×持股計算＝60 萬，非 50 萬（50 萬為股利總額）；且現金股利不列投資收益，故錯誤。","權益法下應按持股比例認列被投資公司淨利為投資收益（60 萬），並非不認列；現金股利也非股利收入，故錯誤。","投資收益 60 萬正確，但權益法下收到現金股利不得再列為股利收入（否則重複計算），故錯誤。"],"src":"研究筆記第四章高頻陷阱：權益法投資收益＝淨利×持股%，收現金股利貸記投資"},{"id":"FN-D-023","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":2,"q":"編製合併財務報表時，母公司持有子公司股權未達 100%，對於子公司權益中「不屬於母公司」的部分，於合併資產負債表應如何表達？","options":["自合併淨利中全數扣除後不予表達","列為合併負債","列為合併商譽","列為「非控制權益」，於權益項下單獨表達"],"answer":3,"explain":["非控制權益是權益的組成部分，應予表達而非扣除消失；合併綜合損益也須分別歸屬母公司與非控制權益，故錯誤。","非控制權益屬於「權益」而非負債，不得列為合併負債，故錯誤。","合併商譽是收購成本超過所取得可辨認淨資產公允價值份額之部分，與非控制權益概念不同，故錯誤。","正確。子公司權益中不歸屬母公司股東的部分稱為「非控制權益（少數股權）」，在合併資產負債表之權益項下單獨列示。"],"src":"研究筆記第十一章：合併報表基本概念（非控制權益）"},{"id":"FN-D-024","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":2,"q":"依公司法關於「相互投資公司」之規定，下列敘述何者正確？","options":["公司持有他公司股份或出資額超過其資本總額三分之一者，即為相互投資公司","相互投資公司間得無限制行使全部表決權","相互投資之認定門檻為超過他公司資本額之半數","相互投資公司無任何通知義務"],"answer":0,"explain":["正確。公司法規定，公司與他公司「相互投資各達對方有表決權股份總數或資本總額三分之一以上」者為相互投資公司，且達此門檻負有通知義務。","為防止資本虛增與經營權操縱，相互投資公司行使表決權受有限制（通常不得超過被投資公司已發行有表決權股份總數三分之一），並非無限制，故錯誤。","相互投資之門檻為「三分之一」而非半數，故錯誤。","公司持有他公司股份達一定比例時負有「通知」義務，並非毫無通知義務，故錯誤。"],"src":"研究筆記第十一章：相互投資持股超過1/3、通知義務、表決權限制"},{"id":"FN-D-025","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":3,"q":"母子公司間發生存貨「順流交易」（母公司出售存貨予子公司），至期末子公司尚未將該批存貨對外出售。編製合併財務報表時，對於此交易中「尚未實現」的銷貨損益應如何處理？","options":["列為合併報表的營業外收入","全數認列為合併淨利","於合併時將該未實現損益予以「銷除」，不得列入合併損益","僅認列一半於合併損益"],"answer":2,"explain":["此為內部交易之未實現「銷貨」損益，須銷除，並非改列營業外收入即可保留，故錯誤。","集團內部交易之利潤，在存貨尚未對「集團外部」出售前並未真正實現，若全數認列將虛增合併淨利，故錯誤。","正確。合併報表視母子公司為單一經濟個體，內部交易產生而期末尚未對外實現之損益，應予「全額銷除」，直到存貨售予集團外部才認列。","未實現損益應「全額」銷除，而非僅銷除一半（順流交易之未實現損益全歸母公司），故錯誤。"],"src":"研究筆記第十一章：合併報表內部交易須銷除（順流/逆流未實現損益）"},{"id":"FN-D-026","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":2,"q":"下列關於「權益法」下收到被投資公司「股票股利」之處理，何者正確？","options":["按面額認列為投資收益","按市價認列為投資收益","不認列損益，僅作備忘記錄（股數增加、每股單位成本降低）","貸記（減少）投資帳面金額"],"answer":2,"explain":["被投資公司發放股票股利，投資公司持股比例與投資帳面金額不變，不得認列投資收益，故錯誤。","股票股利並不使投資者實質獲益，不論按面額或市價均不應認列為收益，故錯誤。","正確。權益法下收到被投資公司之股票股利，僅使持有股數增加、每股平均成本下降，只作備忘記錄，不認列損益、投資總帳面金額不變。","貸記投資帳面金額是收到「現金股利」的處理；股票股利不涉及帳面金額之減少，故錯誤。"],"src":"研究筆記第四章高頻陷阱：被投資公司發股票股利→僅備忘（股數增、單位成本降）"},{"id":"FN-D-027","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":1,"q":"依公司法關係企業專章，下列何者「不」屬於推定控制與從屬關係的情形？","options":["直接或間接控制他公司之人事、財務或業務經營","他公司之董事有半數以上係由本公司所派任或相同","本公司與他公司之董事長為同一自然人所擔任，但持股與董事席次均低於半數且無實質控制","本公司持有他公司已發行有表決權股份總數過半數"],"answer":2,"explain":["直接或間接控制他公司之人事、財務或業務經營，屬公司法明定推定控制從屬之情形，並非不屬於，故本項不選。","董事半數以上相同（相同董事過半）為推定控制從屬之情形之一，並非不屬於，故本項不選。","正確（此為「不」屬於控制從屬之情形）。僅董事長為同一人，但持股與董事席次均未過半且無實質控制人事財務業務時，未達公司法推定控制從屬之要件。","持有他公司有表決權股份總數過半數，是最典型的推定控制從屬情形，並非不屬於，故本項不選。"],"src":"研究筆記第十一章：控制從屬推定（過半持股、控制人事財務業務、董事過半相同）"},{"id":"FN-D-028","exam":"gaoye-fin","subject":"","topic":"關係企業","difficulty":2,"q":"甲公司（控制公司）與其從屬公司乙公司間有大量內部進銷貨往來。關於關係企業合併財務報表之編製，下列敘述何者正確？","options":["內部交易之銷貨與銷貨成本應全數保留於合併損益中","合併財務報表僅需列示控制公司單獨之財務資訊","合併報表應由乙公司（從屬公司）負責編製","母子公司間之內部應收應付款項於合併時應相互沖銷（銷除）"],"answer":3,"explain":["內部交易之銷貨收入與銷貨成本屬集團內部往來，於合併時應予銷除，不得全數保留，否則虛增營收與成本，故錯誤。","合併財務報表須涵蓋母公司與所有子公司之財務資訊並經沖銷後合併表達，非僅列示控制公司單獨資訊，故錯誤。","合併財務報表應由「控制公司（母公司）」編製，而非從屬公司，故錯誤。","正確。合併時視母子公司為單一個體，彼此間之內部應收與應付款項、內部投資與權益等須相互沖銷（銷除），以免虛增資產負債。"],"src":"研究筆記第十一章：控制公司編合併財報、內部交易須銷除"},{"id":"FN-D-029","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":2,"q":"甲公司流動比率為 2（流動資產大於流動負債）。若公司「以現金償還一筆應付帳款」，在其他條件不變下，對其流動比率與速動比率之影響為何？","options":["流動比率上升、速動比率上升","流動比率下降、速動比率下降","流動比率上升、速動比率下降","流動比率下降、速動比率上升"],"answer":0,"explain":["正確。以現金償還應付帳款使流動資產與流動負債「等額同減」；當比率＞1 時，分子分母同減同一數會使比率上升。速動資產（含現金）與流動負債亦同額同減，速動比率＞1 時同樣上升，故兩者皆上升。","流動比率＞1 時分子分母等額同減會使比率上升而非下降；此交易不會使兩比率下降，故錯誤。","現金為速動資產，償還應付帳款使速動資產與流動負債等額同減，速動比率（若＞1）上升而非下降，故錯誤。","流動比率＞1 時等額同減使比率上升而非下降，方向判斷錯誤，故錯誤。"],"src":"研究筆記參例2、肆高頻考點3：比率>1 等額同減→比率上升"},{"id":"FN-D-030","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":2,"q":"甲公司目前流動比率為 1.5，速動比率為 0.9。若公司「以現金購入存貨（現購）」，在其他條件不變下，對兩項比率之影響為何？","options":["流動比率與速動比率均上升","流動比率不變、速動比率下降","流動比率上升、速動比率上升","流動比率下降、速動比率不變"],"answer":1,"explain":["現購存貨僅為流動資產內部調整，不會使兩比率同時上升，故錯誤。","正確。現金換存貨屬流動資產內部項目對調，流動資產總額與流動負債均不變，故流動比率「不變」；但現金（速動資產）減少、存貨（非速動）增加，使速動資產下降，在流動負債不變下速動比率「下降」。","此交易未增加流動資產總額，流動比率不會上升；速動資產減少也不會使速動比率上升，故錯誤。","流動資產總額不變，流動比率不會下降；且速動資產減少會使速動比率下降而非不變，故錯誤。"],"src":"研究筆記肆高頻考點3：現購存貨→速動↓、流動不變"},{"id":"FN-D-031","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":2,"q":"甲公司賒銷淨額為 1,460,000 元，期初應收帳款 180,000 元、期末應收帳款 220,000 元。以一年 365 天計算，其應收帳款「平均收現天數」最接近下列何者？","options":["45.6 天","50.0 天","36.5 天","73.0 天"],"answer":1,"explain":["45.6 天為以期末應收（220,000）而非平均應收計算之誤差結果，分母應用期初期末平均，故錯誤。","正確。平均應收帳款＝(180,000＋220,000)/2＝200,000；應收帳款週轉率＝1,460,000/200,000＝7.3 次；收現天數＝365/7.3＝50 天。","36.5 天對應週轉率 10 次，本題週轉率為 7.3 次，數值不符，故錯誤。","73.0 天對應週轉率 5 次，與本題 7.3 次不符，故錯誤。"],"src":"研究筆記參公式9：應收帳款週轉率＝賒銷淨額/平均應收；收現天數＝365/週轉率"},{"id":"FN-D-032","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":3,"q":"甲公司稅後純益率為 4%、總資產週轉率為 2 次、負債比率為 60%。以杜邦分析法計算，其股東權益報酬率（ROE）最接近下列何者？","options":["12%","8%","4.8%","20%"],"answer":3,"explain":["12% 為誤以權益乘數 1.5（即 1/(1－0.4)）計算，但負債比率為 60%、權益比率 40%，權益乘數應為 2.5，故錯誤。","8% 僅為純益率×總資產週轉率（＝ROA 4%×2＝8%），未再乘上權益乘數以反映財務槓桿，故錯誤。","4.8% 屬權數套用錯誤之結果，未正確計算權益乘數 2.5，故錯誤。","正確。權益乘數＝1/(1－負債比率)＝1/(1－0.6)＝2.5；ROE＝純益率×總資產週轉率×權益乘數＝4%×2×2.5＝20%。"],"src":"研究筆記參公式16：ROE＝純益率×總資產週轉率×權益乘數；權益乘數＝1/(1−負債比率)"},{"id":"FN-D-033","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":2,"q":"甲公司稅後淨利 240,000 元、利息費用 100,000 元、所得稅率 20%。其「利息保障倍數」最接近下列何者？","options":["2.4 倍","3.4 倍","4.0 倍","3.0 倍"],"answer":2,"explain":["2.4 倍為直接以稅後淨利除以利息（240,000/100,000）之誤算，分子應為稅前息前利益（EBIT），故錯誤。","3.4 倍為僅將稅後淨利加回利息（240,000＋100,000＝340,000）再除以利息，卻漏還原所得稅之誤算，故錯誤。","正確。稅前淨利＝240,000/(1－0.2)＝300,000；EBIT＝稅前淨利＋利息＝300,000＋100,000＝400,000；利息保障倍數＝400,000/100,000＝4.0 倍。","3.0 倍為以稅前淨利（300,000）直接除以利息而未加回利息費用之誤算，分子須為息前稅前利益，故錯誤。"],"src":"研究筆記參公式7、例3：利息保障倍數＝EBIT/利息，稅後淨利須先除(1−稅率)再加利息"},{"id":"FN-D-034","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":3,"q":"甲公司相關資料如下：銷貨淨額 3,000,000 元、稅後淨利 150,000 元、平均總資產 2,000,000 元、平均股東權益 1,000,000 元。下列針對其純益率、總資產週轉率與 ROE 的計算，何者「正確」？","options":["純益率 10%、總資產週轉率 1.0 次、ROE 15%","純益率 5%、總資產週轉率 1.5 次、ROE 15%","純益率 5%、總資產週轉率 1.5 次、ROE 7.5%","純益率 15%、總資產週轉率 2.0 次、ROE 30%"],"answer":1,"explain":["純益率應為 150,000/3,000,000＝5%（非 10%），總資產週轉率應為 3,000,000/2,000,000＝1.5 次（非 1.0），數值有誤，故錯誤。","正確。純益率＝150,000/3,000,000＝5%；總資產週轉率＝3,000,000/2,000,000＝1.5 次；ROE＝150,000/1,000,000＝15%（亦可由 5%×1.5×權益乘數2 驗證＝15%）。","純益率與週轉率正確，但 ROE 應以淨利除以平均權益＝150,000/1,000,000＝15%，非 7.5%（誤用平均總資產為分母），故錯誤。","純益率、週轉率、ROE 數值均與資料不符（分母或分子誤用），故錯誤。"],"src":"研究筆記參公式13、14、15、16：純益率、總資產週轉率、ROE 與杜邦分析"},{"id":"FN-D-035","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":2,"q":"甲公司銷貨成本 1,200,000 元、期初存貨 180,000 元、期末存貨 220,000 元。以一年 365 天計，其存貨「平均售貨天數」最接近下列何者？","options":["約 61 天","約 67 天","約 30 天","約 55 天"],"answer":0,"explain":["正確。平均存貨＝(180,000＋220,000)/2＝200,000；存貨週轉率＝銷貨成本/平均存貨＝1,200,000/200,000＝6 次；售貨天數＝365/6≈60.8 天≈61 天。","約 67 天對應週轉率約 5.5 次，與本題 6 次不符，故錯誤。","約 30 天對應週轉率約 12 次，與本題 6 次相差一倍，故錯誤。","約 55 天對應存貨週轉率約 6.6 次，與本題週轉率 6 次不符，故錯誤。"],"src":"研究筆記參公式10、例5：存貨週轉率＝銷貨成本/平均存貨；售貨天數＝365/週轉率"},{"id":"FN-D-036","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":3,"q":"甲公司於年底「賒購一批存貨」（尚未付款）。已知交易前流動比率為 2、速動比率為 1.2。在其他條件不變下，此交易對兩比率之影響為何？","options":["流動比率不變、速動比率下降","流動比率上升、速動比率不變","流動比率上升、速動比率上升","流動比率下降、速動比率下降"],"answer":3,"explain":["賒購存貨使流動負債增加，流動比率並非不變而是下降（＞1 時等額同增下降），故錯誤。","此交易使流動比率下降（非上升），且速動比率因分母增加而下降（非不變），故錯誤。","賒購存貨使流動資產（存貨）與流動負債（應付帳款）等額同增；當比率＞1 時分子分母同增會使比率下降，故兩者不會同時上升，選項錯誤。","正確。存貨與應付帳款等額同增：流動比率＞1 時等額同增使流動比率下降；速動資產不含存貨（分子不變）但流動負債增加，故速動比率也下降。兩者皆下降。"],"src":"研究筆記肆高頻考點3：比率>1 等額同增→比率下降；賒購存貨"},{"id":"FN-D-037","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":2,"q":"甲公司稅後淨利 300,000 元、利息費用 50,000 元、所得稅率 20%、平均總資產 2,500,000 元。其「總資產報酬率（ROA）」最接近下列何者？（ROA 分子須加回稅後利息）","options":["12.0%","13.6%","14.0%","12.8%"],"answer":1,"explain":["12.0% 僅以稅後淨利除以平均總資產（300,000/2,500,000），漏未加回稅後利息費用，屬標準陷阱選項，故錯誤。","正確。ROA＝〔稅後淨利＋利息費用×(1－稅率)〕/平均總資產＝〔300,000＋50,000×(1－0.2)〕/2,500,000＝(300,000＋40,000)/2,500,000＝340,000/2,500,000＝13.6%。","14.0% 為加回「稅前」全額利息（300,000＋50,000）之誤算，利息應以稅後（×0.8）加回，故錯誤。","12.8% 非本題正確計算結果，屬加回金額誤植，故錯誤。"],"src":"研究筆記參公式14、肆高頻考點19：ROA＝〔淨利＋利息×(1−t)〕/平均總資產"},{"id":"FN-D-038","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":1,"q":"就財務比率與產業特性之關聯，下列敘述何者最為適當？","options":["財務比率具絕對標準，任何產業的理想流動比率均應等於 2","不同產業因營運模式差異，比率之合理區間不同，跨產業直接比較恐失真","超市（量販）等現金銷售為主的零售業，其應收帳款週轉率通常低於機械設備製造業","資本密集的產業（如電廠）通常固定資產占比低、總資產週轉率高"],"answer":1,"explain":["財務比率並無放諸四海皆準的絕對標準，理想流動比率因產業而異，並非一律等於 2，故錯誤。","正確。比率分析的重要限制之一即產業差異：不同產業營運模式（如資本密集度、信用政策、存貨性質）不同，比率合理區間各異，跨產業直接比較容易失真，宜與同業或歷史比較。","以現金銷售為主的量販零售業幾乎沒有賒銷、應收帳款極少，其應收帳款週轉率通常「高於」需大量賒銷的機械設備製造業，方向相反，故錯誤。","資本密集產業（如電廠）固定資產占比「高」、資產金額龐大，總資產週轉率通常「低」，敘述與事實相反，故錯誤。"],"src":"研究筆記第一章：比率分析限制（產業差異）；財務比率與產業特性"},{"id":"FN-D-039","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":3,"q":"甲公司本年度「宣告」現金股利（尚未發放）。單就宣告當日之影響，在其他條件不變下，對其「流動比率」與「負債比率」之影響為何？（假設宣告前流動比率大於 1）","options":["流動比率下降、負債比率上升","流動比率與負債比率均不變","流動比率上升、負債比率上升","流動比率上升、負債比率下降"],"answer":0,"explain":["正確。宣告日借記保留盈餘、貸記應付股利：流動負債增加使流動比率（＞1 時分母增加）下降；同時總負債增加且股東權益（保留盈餘）減少，使負債比率（總負債/總資產）上升。","宣告現金股利會使流動負債與保留盈餘同時變動，流動比率與負債比率均會改變，並非不變，故錯誤。","負債比率因總負債增加、權益減少而上升，這部分正確；但流動比率在＞1 時因流動負債增加而「下降」，並非上升，故整體錯誤。","宣告現金股利使流動負債（應付股利）增加，流動比率＞1 時分母增加會使比率下降，並非上升；同時負債增加、權益（保留盈餘）減少會使負債比率上升而非下降，故錯誤。"],"src":"研究筆記第四章：現金股利宣告日負債↑、保留盈餘↓；參例2 比率方向"},{"id":"FN-D-040","exam":"gaoye-fin","subject":"","topic":"綜合分析","difficulty":2,"q":"甲公司年底「以現金償還一筆長期借款（一年內到期部分已列流動負債）中已到期之流動負債」。若償還前負債比率為 55%、流動比率為 0.8（小於 1）。單就此償還交易，對「流動比率」的影響為何？","options":["流動比率不變","無法判斷，因缺少總資產資料","流動比率上升","流動比率下降"],"answer":3,"explain":["此交易使流動資產與流動負債同減，流動比率會變動而非不變，故錯誤。","本題僅需流動資產與流動負債之相對關係即可判斷方向（＜1 時同減下降），不需總資產資料，故錯誤。","流動比率小於 1 時，以現金償還流動負債使分子分母等額同減，會使比率「下降」而非上升，故錯誤。","正確。以現金償還流動負債，流動資產與流動負債等額同減；當原流動比率小於 1（分子小於分母）時，等額同減會使比率進一步下降（例：流動資產 80、流動負債 100，各減 20 後為 60/80＝0.75＜0.8）。"],"src":"研究筆記參例2、肆高頻考點3：比率<1 時等額同減→比率下降"}],"gaoye-invest":[{"id":"IV-A-001","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"下列何者屬於資本市場（capital market）工具，而非貨幣市場工具？","options":["國庫券","商業本票（CP）","公司債","可轉讓定期存單（NCD）"],"answer":2,"explain":["錯誤。國庫券雖由政府發行，但到期期間在一年以內，屬於貨幣市場工具，是常見陷阱。","錯誤。商業本票（CP）為企業發行之短期票券，到期一年以內，屬貨幣市場工具。","正確。公司債為到期期間一年以上之長期債務工具，屬資本市場工具；資本市場指到期一年以上之證券市場。","錯誤。可轉讓定期存單（NCD）為銀行發行之短期存款憑證，到期一年以內，屬貨幣市場工具。"],"src":"研究筆記第1章：貨幣市場vs資本市場（一年為界）"},{"id":"IV-A-002","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"依資金供需雙方是否透過金融中介機構撮合，下列敘述何者正確？","options":["企業直接發行公司債向投資人募資屬於直接金融","存款戶將錢存入銀行、銀行再放款給企業屬於直接金融","直接金融必然由銀行承擔違約風險","間接金融是指資金需求者直接向大眾發行證券"],"answer":0,"explain":["正確。直接金融指資金需求者（如企業）直接發行股票、債券等證券向資金供給者（投資人）取得資金，未透過金融中介的信用中介。","錯誤。存款戶存錢、銀行再放款是典型的間接金融，銀行居於信用中介地位。","錯誤。直接金融下投資人自行承擔證券的信用風險，並非由銀行承擔。","錯誤。此為直接金融之描述；間接金融是透過銀行等中介機構完成資金移轉。"],"src":"研究筆記第1章：直接vs間接金融"},{"id":"IV-A-003","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":2,"q":"關於股價指數的編製方式，下列敘述何者正確？","options":["道瓊工業指數（DJIA）採市值加權編製","台灣加權股價指數（TAIEX）採價格加權編製","市值加權指數中，成分股市值愈大對指數影響愈大，最能模擬市場投資組合","價格加權指數中，成分股市值愈大影響愈大"],"answer":2,"explain":["錯誤。道瓊工業指數採價格加權（price-weighted），以成分股價格加總計算，並非市值加權。","錯誤。台灣加權股價指數採市值加權（value-weighted），並非價格加權。","正確。市值加權指數以各成分股流通市值為權數，市值愈大者影響愈大，最能代表整體市場投資組合，如TAIEX、S&P500。","錯誤。價格加權指數以股價高低決定影響力，股價愈高影響愈大，與市值大小無關。"],"src":"研究筆記第1章：股價指數市值加權vs價格加權"},{"id":"IV-A-004","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":2,"q":"投資人以每股100元買進某股票1張（1,000股），持有一年間獲配股票股利5元（每股），期末股價為120元。其持有期間報酬率為何？","options":["20%","50%","80%","100%"],"answer":2,"explain":["錯誤。20%僅計算股價由100漲至120的價差，忽略股票股利使股數增加的效果。","錯誤。50%為配股率（5/10）的數值，並非報酬率。","正確。股票股利5元即配股率5/10=0.5，1,000股變1,500股；期末市值=1,500×120=180,000；報酬率=(180,000−100,000)/100,000=80%。","錯誤。100%高估，並無此計算依據。"],"src":"研究筆記例2：股票股利報酬率（面額10元，配股率=股票股利/10）"},{"id":"IV-A-005","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":2,"q":"某投資標的過去三年報酬率分別為+50%、−50%、+50%。下列關於算術平均報酬率與幾何平均報酬率的敘述，何者正確？","options":["算術平均報酬率等於幾何平均報酬率","算術平均報酬率恆大於或等於幾何平均報酬率","幾何平均報酬率恆大於算術平均報酬率","報酬率有正有負時無法計算幾何平均"],"answer":1,"explain":["錯誤。僅當各期報酬率完全相同時兩者才相等，本例報酬率有波動故不相等。","正確。算術平均=(50%−50%+50%)/3=16.67%；幾何平均=[(1.5)(0.5)(1.5)]^(1/3)−1≈3.6%。只要報酬率存在波動，算術平均恆大於或等於幾何平均。","錯誤。方向相反，幾何平均恆小於或等於算術平均。","錯誤。幾何平均以(1+報酬率)連乘再開根號，報酬率有正負仍可計算。"],"src":"研究筆記第1章：算術vs幾何平均"},{"id":"IV-A-006","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"下列何者不屬於衡量風險的指標？","options":["標準差","變異數","算術平均數","全距（全距）"],"answer":2,"explain":["錯誤。標準差衡量報酬率相對期望值的離散程度，是總風險指標。","錯誤。變異數為離差平方的期望值，是衡量風險的指標。","正確。算術平均數衡量的是報酬的集中趨勢（中心位置），並非離散程度，不能作為風險指標，此為官方實考題眼。","錯誤。全距為最大值與最小值之差，可粗略衡量風險的離散範圍。"],"src":"研究筆記第1章：風險衡量（算術平均數不是風險指標，114-3實考）"},{"id":"IV-A-007","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":2,"q":"甲、乙兩投資方案：甲期望報酬率10%、標準差5%；乙期望報酬率20%、標準差8%。若以變異係數（CV）作為每單位報酬所承擔風險的比較基準，下列敘述何者正確？","options":["甲的變異係數為0.5，乙為0.4，乙相對較佳","甲的變異係數為0.4，乙為0.5，甲相對較佳","甲乙變異係數相同","變異係數愈大代表每單位報酬承擔的風險愈小"],"answer":0,"explain":["正確。CV=σ/E(R)。甲=5%/10%=0.5；乙=8%/20%=0.4。CV愈小代表每單位報酬承擔的風險愈小，故乙相對較佳。","錯誤。數值算反：甲應為0.5、乙應為0.4，且CV小者較佳為乙而非甲。","錯誤。甲0.5、乙0.4並不相同。","錯誤。CV愈大代表每單位報酬承擔的風險愈大（愈差），敘述方向相反。"],"src":"研究筆記公式5：變異係數CV=σ/E(R)，愈小愈好"},{"id":"IV-A-008","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"下列何者屬於系統風險（systematic risk）？","options":["某公司廠房發生火災","某公司遭競爭對手提起專利訴訟","央行升息導致市場利率全面上揚","某公司發生勞資糾紛而罷工"],"answer":2,"explain":["錯誤。廠房火災屬公司特有事件，為非系統風險，可經由分散投資消除。","錯誤。個別公司的訴訟屬公司特有的非系統風險。","正確。利率變動、通貨膨脹、戰爭、政治等屬影響整體市場的系統風險（市場風險），無法透過分散投資消除。","錯誤。個別公司罷工屬非系統（公司特有）風險。"],"src":"研究筆記第6章：系統風險（利率通膨戰爭）vs非系統風險（罷工火災訴訟）"},{"id":"IV-A-009","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":2,"q":"關於分散投資與風險的關係，下列敘述何者正確？","options":["增加持股家數可同時消除系統風險與非系統風險","單一國家型基金的風險分散效果優於全球型基金","持股充分分散後，投資組合報酬率會等於無風險利率","持股充分分散後，投資組合仍存在系統風險"],"answer":3,"explain":["錯誤。增加持股僅能消除非系統（公司特有）風險，系統風險無法藉分散消除。","錯誤。分散效果為全球型優於區域型、優於單一國家型，敘述相反。","錯誤。充分分散後組合仍承擔系統風險，故其期望報酬高於無風險利率，不等於Rf。","正確。充分分散只能消除非系統風險，市場整體的系統風險仍然存在，因此組合報酬率不會降至無風險利率。"],"src":"研究筆記第6章：充分分散之組合仍有系統風險；全球型>區域型>單一國家"},{"id":"IV-A-010","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"某風險趨避（risk-averse）投資人面對兩個期望報酬率相同的投資方案，下列敘述何者正確？","options":["會選擇風險（標準差）較大的方案","會選擇風險（標準差）較小的方案","對兩方案無差異，隨機挑選","效用只取決於報酬，與風險無關"],"answer":1,"explain":["錯誤。風險趨避者厭惡風險，不會在報酬相同下選擇風險較大者。","正確。風險趨避者在期望報酬率相同時，會選擇風險（標準差）較小的方案，以獲得較高的預期效用。","錯誤。兩方案風險不同，對風險趨避者而言效用不同，並非無差異。","錯誤。風險趨避者的效用同時受報酬（正向）與風險（負向）影響，並非只取決於報酬。"],"src":"研究筆記第6章：風險趨避與效用（Markowitz模型假設）"},{"id":"IV-A-011","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"下列何者為貨幣市場工具？","options":["政府公債（10年期）","存託憑證（GDR）","上市公司普通股","銀行承兌匯票（BA）"],"answer":3,"explain":["錯誤。10年期政府公債到期一年以上，屬資本市場工具。","錯誤。存託憑證屬資本市場的權益性工具。","錯誤。普通股無到期日、屬長期權益工具，歸類為資本市場工具。","正確。銀行承兌匯票（BA）到期期間在一年以內，屬貨幣市場工具，與國庫券、CP、NCD同類。"],"src":"研究筆記第1章：貨幣市場工具（國庫券、CP、BA、NCD）"},{"id":"IV-A-012","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":3,"q":"下列關於報酬率計算的敘述，何者正確？","options":["持有期間報酬率僅包含資本利得，不含現金股利","持有期間報酬率同時包含資本利得與現金收益","計算含股票股利之報酬率時，期末股數不需調整","名目報酬率扣除通膨後即為變異係數"],"answer":1,"explain":["錯誤。持有期間報酬率（HPR）=(P₁−P₀+D)/P₀，包含資本利得(P₁−P₀)與現金收益D。","正確。HPR同時涵蓋資本利得（價差）與現金收益（股利、利息），為完整的持有期間報酬衡量。","錯誤。含股票股利時期末股數須乘以(1+配股率)後再計算市值，否則會低估報酬。","錯誤。名目報酬扣除通膨得到的是實質報酬率（Fisher），與變異係數無關。"],"src":"研究筆記公式1：HPR=(P₁−P₀+D)/P₀，含股票股利須調整股數"},{"id":"IV-A-013","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":3,"q":"名目報酬率為8%、當年通貨膨脹率為4%，依Fisher方程式精確計算，實質報酬率最接近下列何者？","options":["4.00%","2.00%","12.32%","3.85%"],"answer":3,"explain":["錯誤。4.00%為近似值（8%−4%），當選項提供精確值時應採Fisher精確公式。","錯誤。2.00%無計算依據。","錯誤。12.32%為誤加（8%+4%再加乘積）之結果，並非實質報酬率。","正確。1+r實質=(1+R名目)/(1+π)，r=1.08/1.04−1=0.03846≈3.85%。"],"src":"研究筆記公式2、例1：Fisher r=(1+R)/(1+π)−1"},{"id":"IV-A-014","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":3,"q":"某資產在景氣好（機率0.5）時報酬率為20%，景氣差（機率0.5）時報酬率為−4%。其期望報酬率與標準差分別為何？","options":["期望報酬8%、標準差12%","期望報酬8%、標準差24%","期望報酬16%、標準差12%","期望報酬8%、標準差6%"],"answer":0,"explain":["正確。E(R)=0.5×20%+0.5×(−4%)=8%；σ²=0.5×(20%−8%)²+0.5×(−4%−8%)²=0.5×144+0.5×144=144(%²)；σ=√144=12%。","錯誤。期望報酬8%正確，但標準差非24%（24%為兩情境報酬率的全距，非標準差）。","錯誤。期望報酬應為8%而非16%。","錯誤。期望報酬8%正確，但標準差為12%而非6%。"],"src":"研究筆記公式3、4：E(R)=ΣpᵢRᵢ；σ²=Σpᵢ[Rᵢ−E(R)]²"},{"id":"IV-A-015","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"關於ETF與ETN的敘述，下列何者正確？","options":["ETN由券商發行，理論上無追蹤誤差，但具發行人信用風險","ETF與ETN皆可實物申購與贖回","ETN因由券商發行，故完全沒有任何風險","2倍槓桿型ETF的漲跌幅限制與一般股票相同為10%"],"answer":0,"explain":["正確。ETN由券商發行、承諾給付連結指數報酬，理論上無追蹤誤差，但投資人須承擔發行券商的信用風險，且僅能現金申贖。","錯誤。ETN不能實物申贖，僅ETF可以一籃子股票實物申購贖回。","錯誤。ETN仍有發行人（券商）信用風險與市場風險，並非毫無風險。","錯誤。2倍槓桿ETF漲跌幅為標的指數10%的2倍，即20%。"],"src":"研究筆記第1章、陷阱18：ETN無追蹤誤差但有券商信用風險、僅現金申贖；2倍槓桿20%"},{"id":"IV-A-016","exam":"gaoye-invest","subject":"","topic":"投資與市場概念","difficulty":1,"q":"下列關於β係數與標準差衡量風險的敘述，何者正確？","options":["標準差衡量系統風險，β衡量總風險","β較大必然代表標準差較大","標準差較大必然代表β較大","β衡量系統風險，標準差衡量總風險"],"answer":3,"explain":["錯誤。兩者角色顛倒：標準差衡量總風險、β衡量系統風險。","錯誤。β大也不必然標準差大，兩者衡量的風險範疇不同。","錯誤。標準差大不必然β大，因總風險中含大量可分散的非系統風險，與系統風險無必然關係。","正確。β係數僅衡量與市場連動的系統風險；標準差（變異數）衡量含系統與非系統的總風險。"],"src":"研究筆記第7章、陷阱6：β衡量系統風險、σ衡量總風險"},{"id":"IV-A-017","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"當債券之票面利率（coupon rate）低於市場殖利率（YTM）時，該債券之市價相對於面額為何？","options":["溢價（高於面額）","折價（低於面額）","平價（等於面額）","無法判斷"],"answer":1,"explain":["錯誤。溢價發生於票面利率大於殖利率時。","正確。票面利率＜殖利率時，債券以折價（低於面額）交易，因票息不足以提供市場要求的報酬，須以低於面額買進補足。","錯誤。平價發生於票面利率等於殖利率時。","錯誤。票面利率與殖利率的高低關係已足以判斷折溢價。"],"src":"研究筆記公式16、第2章：票面利率<殖利率→折價"},{"id":"IV-A-018","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"某公司債面額1,000元、票面利率6%、每年付息一次、剩餘期間2年，市場殖利率為8%。其理論價格最接近下列何者？（1.08=1.08，1.08²=1.1664）","options":["1,000元","1,120元","1,035.7元","964.3元"],"answer":3,"explain":["錯誤。1,000元為平價，僅在票面利率等於殖利率時成立，本題殖利率8%>票面6%應為折價。","錯誤。1,120元遠高於面額，計算無依據。","錯誤。1,035.7為溢價，方向相反，僅在票面利率>殖利率時成立。","正確。P=60/1.08+1,060/1.08²=55.56+908.78≈964.3元。票面利率6%<殖利率8%，故折價低於面額。"],"src":"研究筆記公式16：P=ΣC/(1+y)^t+F/(1+y)^n"},{"id":"IV-A-019","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"依馬凱爾（Malkiel）債券五大定理，債券價格與市場殖利率之間的關係為何？","options":["正向關係","反向關係","無關係","先正向後反向"],"answer":1,"explain":["錯誤。正向關係違反第一定理，殖利率上升時價格應下跌。","正確。第一定理：債券價格與殖利率呈反向關係。殖利率上升則現值下降、價格下跌；殖利率下降則價格上漲。","錯誤。兩者存在明確的反向關係，並非無關。","錯誤。兩者關係在全區間皆為反向，並無先正後反的轉折。"],"src":"研究筆記第2章：馬凱爾五大定理第1條（反向關係）"},{"id":"IV-A-020","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"依債券五大定理，下列敘述何者正確？","options":["到期期間愈長，債券價格對殖利率變動的敏感度愈小","票面利率愈高，債券價格對殖利率變動的敏感度愈大","相同幅度的殖利率變動，殖利率下跌使價格上漲的幅度大於殖利率上升使價格下跌的幅度","到期期間延長時，價格敏感度增加的幅度呈遞增"],"answer":2,"explain":["錯誤。第二定理指到期期間愈長，價格對殖利率變動的敏感度愈大，方向相反。","錯誤。第五定理指票面利率愈低敏感度愈大，故票面利率愈高敏感度愈小。","正確。第四定理（凸性、不對稱性）：相同幅度殖利率變動，殖利率下跌使價格上漲的幅度，大於殖利率上升使價格下跌的幅度。","錯誤。第三定理指敏感度增加的幅度隨到期延長而遞減，並非遞增。"],"src":"研究筆記第2章：馬凱爾五大定理（反、長敏大、遞減、凸、票低敏大）"},{"id":"IV-A-021","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"關於馬凱爾債券五大定理中票面利率的影響，下列敘述何者正確？","options":["票面利率愈高，價格對殖利率變動的敏感度愈大","零息債券的價格敏感度最小","票面利率與價格敏感度無關","票面利率愈低，價格對殖利率變動的敏感度愈大"],"answer":3,"explain":["錯誤。方向相反；票面利率高者現金流較早回收，敏感度較低。","錯誤。零息債券票面利率為零、敏感度最大，並非最小。","錯誤。票面利率與敏感度有明確反向關係，並非無關。","正確。第五定理：票面利率愈低，價格對殖利率變動的敏感度愈大，因低票息使現金流回收較慢、存續期間較長。"],"src":"研究筆記第2章：五大定理第5條（票面利率愈低敏感度愈大）"},{"id":"IV-A-022","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"關於麥考利存續期間（Macaulay Duration），下列敘述何者正確？","options":["付息債券的存續期間等於其到期年限","零息債券的存續期間等於其到期年限","永續債券的存續期間等於其到期年限","存續期間與利率風險無關"],"answer":1,"explain":["錯誤。付息債券因期間有票息回收，存續期間小於到期年限。","正確。零息債券在到期前無任何現金流，全部本利在到期日一次回收，故存續期間恰等於到期年限。","錯誤。永續債券的存續期間為(1+y)/y，並非到期年限（永續債無到期日）。","錯誤。存續期間正是衡量債券利率風險的重要指標。"],"src":"研究筆記第2章：零息債D=到期年限；永續債D=(1+y)/y"},{"id":"IV-A-023","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"其他條件不變下，下列何種情況會使債券的麥考利存續期間變長？","options":["票面利率提高","市場殖利率上升","到期期限延長","付息頻率增加"],"answer":2,"explain":["錯誤。票面利率提高使早期回收現金增加，存續期間縮短。","錯誤。殖利率上升使遠期現金流現值折減較多，存續期間縮短。","正確。到期期限延長使現金流回收平均年限拉長，存續期間增加（存續期間與到期期限正向）。","錯誤。付息頻率增加使現金流提前，存續期間縮短。"],"src":"研究筆記第2章：存續期間三反一正（票面、殖利率、付息頻率反向；到期期限正向）"},{"id":"IV-A-024","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":3,"q":"某債券之麥考利存續期間為4.2年，市場殖利率為5%。若市場殖利率上升1%（100個基點），依修正存續期間估計，該債券價格約下跌多少百分比？","options":["下跌4.2%","下跌8.4%","下跌5.0%","下跌4.0%"],"answer":3,"explain":["錯誤。4.2%誤用了麥考利存續期間，未先除以(1+y)轉為修正存續期間。","錯誤。8.4%為4.2乘以2的誤算，殖利率僅變動1%。","錯誤。5.0%與存續期間及殖利率變動無對應關係。","正確。修正存續期間MD=D/(1+y)=4.2/1.05=4.0；ΔP/P≈−MD×Δy=−4.0×1%=−4.0%。"],"src":"研究筆記公式17：MD=D/(1+y)；ΔP/P≈−MD×Δy"},{"id":"IV-A-025","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"永續債券（consol）每年支付固定利息，市場殖利率為8%。其麥考利存續期間最接近下列何者？","options":["8.00年","12.50年","13.50年","無限大"],"answer":2,"explain":["錯誤。8.00年並非永續債存續期間的公式結果。","錯誤。12.50年為1/y=1/0.08，並非永續債存續期間公式。","正確。永續債存續期間D=(1+y)/y=1.08/0.08=13.5年。","錯誤。永續債雖無到期日，但存續期間有限，為(1+y)/y=13.5年，並非無限大。"],"src":"研究筆記第2章：永續債券D=(1+y)/y"},{"id":"IV-A-026","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":3,"q":"關於債券凸性（convexity）的敘述，下列何者正確？","options":["僅以存續期間估計價格變動，會高估債券的漲幅、低估跌幅","凸性愈大對投資人愈不利","價格-殖利率曲線凸向原點，凸性使債券漲多跌少，對投資人有利","凸性只在殖利率上升時才存在"],"answer":2,"explain":["錯誤。僅用存續期間（直線近似）會低估漲幅、高估跌幅，因實際曲線凸向原點，方向相反。","錯誤。凸性愈大代表殖利率下跌時漲更多、上升時跌更少，對投資人愈有利。","正確。價格-殖利率曲線凸向原點，凸性使得同幅度利率變動下漲多跌少，對投資人有利；價格變動=−MD·Δy+½·C·(Δy)²。","錯誤。凸性是曲線的固有幾何特性，殖利率上升或下降時皆存在。"],"src":"研究筆記公式18、第2章：凸性使漲多跌少；僅用存續期間會高估跌幅、低估漲幅"},{"id":"IV-A-027","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"關於債券的利率風險（價格風險）與再投資風險，下列敘述何者正確？","options":["兩者變動方向相同，殖利率上升時皆增加","兩者變動方向相反：殖利率上升使價格下跌（價格風險），但票息再投資報酬提高（再投資風險降低）","再投資風險是指債券發行公司違約無法還本付息的風險","價格風險與再投資風險皆可透過提高信用評等消除"],"answer":1,"explain":["錯誤。兩者方向相反而非相同，這正是免疫策略的基礎。","正確。殖利率上升時，債券價格下跌（價格風險上升），但同時票息可以更高利率再投資（再投資報酬提高、再投資風險下降），兩者方向相反。","錯誤。違約無法還本付息屬信用（違約）風險，非再投資風險；再投資風險指票息與到期本金以何種利率再投資的不確定性。","錯誤。提高信用評等降低的是違約風險，無法消除利率風險與再投資風險。"],"src":"研究筆記第2章：利率（價格）風險與再投資風險方向相反"},{"id":"IV-A-028","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"投資人在一年投資期間內，連續滾動買進90天期國庫券（到期後再買新券），此策略主要面臨下列何種風險？","options":["違約（信用）風險","流動性風險","匯率風險","再投資風險"],"answer":3,"explain":["錯誤。國庫券由政府發行，幾乎無違約風險，並非主要風險來源。","錯誤。國庫券次級市場流動性佳，流動性風險並非主要考量。","錯誤。以本國貨幣投資國庫券並無匯率風險。","正確。連續滾動買進短期票券，每次到期後需以當時的市場利率再投資，未來利率的不確定性即為再投資風險。"],"src":"研究筆記第2章、陷阱4：滾動投資短票面臨再投資風險"},{"id":"IV-A-029","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"某溢價債券之票面利率為6%，下列關於票面利率、當期收益率（CY）與到期殖利率（YTM）三者大小關係，何者正確？","options":["票面利率＞當期收益率＞YTM","YTM＞當期收益率＞票面利率","三者相等","當期收益率＞票面利率＞YTM"],"answer":0,"explain":["正確。溢價債券市價高於面額，當期收益率=年利息/市價會小於票面利率（分母變大），而YTM又反映溢價逐年攤回而更低，故票面利率＞當期收益率＞YTM。","錯誤。此為折價債券的順序；溢價債應為票面＞CY＞YTM。","錯誤。三者相等僅發生於平價債券（票面利率=殖利率）。","錯誤。溢價債的當期收益率小於票面利率，因市價大於面額。"],"src":"研究筆記公式19：溢價債票面利率>CY>YTM"},{"id":"IV-A-030","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"某債券面額1,000元，每年付息80元，目前市價為1,000元。其當期收益率（current yield）為何？","options":["6.0%","10.0%","8.0%","8.5%"],"answer":2,"explain":["錯誤。6.0%無對應計算，年利息80元對市價1,000元非6%。","錯誤。10.0%高估，年利息除以市價不等於10%。","正確。當期收益率=年利息/債券市價=80/1,000=8.0%。","錯誤。8.5%無計算依據。"],"src":"研究筆記公式19：CY=年利息/債券市價"},{"id":"IV-A-031","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":3,"q":"依殖利率曲線的純粹預期理論（pure expectations theory），下列敘述何者正確？","options":["長期利率等於預期未來各期短期利率的幾何平均","長期利率必然高於短期利率，因含流動性溢酬","長短期市場各自獨立，利率由各自供需決定","長期利率恆低於短期利率"],"answer":0,"explain":["正確。純粹預期理論認為長期利率等於當期及預期未來各期短期利率的幾何平均，殖利率曲線形狀反映市場對未來短率的預期。","錯誤。含流動性溢酬使曲線偏上揚是流動性貼水理論的主張，非純粹預期理論。","錯誤。長短期市場各自供需決定是市場區隔理論的觀點。","錯誤。純粹預期理論下長期利率視預期短率走勢而定，可高可低，並非恆低。"],"src":"研究筆記第2章：純粹預期理論（長率=未來短率之幾何平均）"},{"id":"IV-A-032","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"下列關於殖利率曲線各理論的配對，何者正確？","options":["流動性貼水理論主張長率含流動性溢酬，殖利率曲線通常偏上揚","市場區隔理論主張長率等於未來短率的幾何平均","純粹預期理論主張長短期市場完全區隔","利率期限結構通常以含違約風險的公司債導出"],"answer":0,"explain":["正確。流動性貼水理論認為投資人偏好流動性、需長率提供流動性溢酬補償，故殖利率曲線通常偏向上揚。","錯誤。長率=未來短率幾何平均是純粹預期理論的主張，非市場區隔理論。","錯誤。長短期市場完全區隔是市場區隔理論，非純粹預期理論。","錯誤。利率期限結構應以無違約風險的零息公債導出，以排除信用風險干擾。"],"src":"研究筆記第2章：殖利率曲線四理論；期限結構以無風險零息公債導出"},{"id":"IV-A-033","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"某可轉換公司債面額100,000元，轉換價格為50元，標的股票市價為60元。其轉換價值（conversion value）為何？","options":["100,000元","60,000元","83,333元","120,000元"],"answer":3,"explain":["錯誤。100,000元為債券面額，非轉換價值。","錯誤。60,000元未正確計算轉換比率。","錯誤。83,333元為以股價60反除面額的錯誤算法。","正確。轉換比率=面額/轉換價格=100,000/50=2,000股；轉換價值=轉換比率×股價=2,000×60=120,000元。"],"src":"研究筆記公式20：轉換比率=面額/轉換價格；轉換價值=比率×股價"},{"id":"IV-A-034","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":3,"q":"某可轉換公司債之轉換價值為120,000元，若該可轉債目前市價為135,000元，其轉換溢價率（conversion premium）為何？","options":["11.11%","12.50%","15.00%","25.00%"],"answer":1,"explain":["錯誤。11.11%係誤以市價135,000為分母（15,000/135,000）的算法，溢價率分母應為轉換價值。","正確。轉換溢價率=(CB市價−轉換價值)/轉換價值=(135,000−120,000)/120,000=15,000/120,000=12.5%。","錯誤。15.00%為溢價金額15,000除以面額100,000的誤算，分母用錯。","錯誤。25.00%無合理計算依據。"],"src":"研究筆記公式20：溢價率=(CB價−轉換價值)/轉換價值"},{"id":"IV-A-035","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"關於可贖回債券（callable bond）與可賣回債券（putable bond），下列敘述何者正確？","options":["可贖回債券是發行公司持有買權，對投資人不利，票面利率通常較高以補償","可贖回債券是投資人持有買權，對投資人有利","可賣回債券是發行公司持有賣權，對投資人不利","可轉換與可贖回條款皆對債權人有利"],"answer":0,"explain":["正確。可贖回債券賦予發行公司在利率下跌時提前贖回的買權，對投資人不利，故發行時票面利率通常較高以補償此不利條款。","錯誤。可贖回債券的買權在發行公司手上，非投資人；對投資人不利。","錯誤。可賣回債券是投資人持有賣權（可要求提前賣回），對投資人有利。","錯誤。可轉換條款對債權人有利，但可贖回條款對債權人不利，兩者不同。"],"src":"研究筆記第2章、陷阱5：可贖回債=公司握有買權，對投資人不利、票面利率較高"},{"id":"IV-A-036","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":1,"q":"下列債券契約條款中，何者對債權人（投資人）有利？","options":["可贖回（callable）條款","可轉換（convertible）條款","發行公司可提前贖回的權利","限制投資人轉讓的條款"],"answer":1,"explain":["錯誤。可贖回條款讓發行公司於利率下跌時提前贖回，對債權人不利。","正確。可轉換條款讓投資人可在股價上漲時將債券轉換為股票，享有股價上漲利益，屬對債權人有利的甜頭條款（附認股權亦同）。","錯誤。發行公司提前贖回權即可贖回條款，對債權人不利。","錯誤。限制轉讓降低流動性，對債權人不利。"],"src":"研究筆記第2章：對債權人有利之條款為可轉換、附認股權；可贖回對債權人不利"},{"id":"IV-A-037","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"關於零息債券（zero-coupon bond）的特性，下列敘述何者正確？","options":["零息債券在到期前每期支付固定票息","相同到期年限下，零息債券的利率敏感度最小","零息債券的存續期間小於其到期年限","零息債券以折價發行，到期以面額償還，且無再投資風險"],"answer":3,"explain":["錯誤。零息債券在到期前不支付任何票息，故名「零息」。","錯誤。零息債券存續期間最長，相同到期年限下利率敏感度最大而非最小。","錯誤。零息債券存續期間恰等於到期年限，並非小於。","正確。零息債券以低於面額的折價發行、到期以面額償還，因期間無票息故無票息再投資風險，投資報酬鎖定。"],"src":"研究筆記第2章：零息債D=到期年限、無再投資風險、利率敏感度最大"},{"id":"IV-A-038","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":3,"q":"某1年期債券面額10,000元，半年付息一次，第一次利息300元、到期時（第二期）收到本息合計10,500元（含利息500元），市場年殖利率為10%（半年5%）。其目前理論價格最接近下列何者？（1.05=1.05，1.05²=1.1025）","options":["9,809.5元","10,000.0元","9,523.8元","9,901.9元"],"answer":0,"explain":["正確。P=300/1.05+10,500/1.05²=285.71+9,523.81=9,809.52元。以每半年5%折現兩期現金流。","錯誤。10,000元為面額，非依殖利率折現後的現值。","錯誤。9,523.8元僅為第二期現金流的現值，漏計第一期利息300元的現值。","錯誤。9,901.9元為殖利率降至9%後的價格，非目前10%殖利率下的價格。"],"src":"研究筆記例14：半年付息債券折現計算"},{"id":"IV-A-039","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"某投資組合由兩檔債券構成：A債券市值600萬元、存續期間3年；B債券市值400萬元、存續期間8年。此投資組合的存續期間最接近下列何者？","options":["5.0年","5.5年","4.0年","11.0年"],"answer":0,"explain":["正確。組合存續期間=各債券存續期間的市值加權平均=(600/1000)×3+(400/1000)×8=0.6×3+0.4×8=1.8+3.2=5.0年。","錯誤。5.5年為兩存續期間的簡單平均(3+8)/2，未依市值加權。","錯誤。4.0年低估，未正確加權。","錯誤。11.0年為兩存續期間直接相加，並非加權平均。"],"src":"研究筆記第2章：投資組合存續期間=各債券存續期間之市值加權平均"},{"id":"IV-A-040","exam":"gaoye-invest","subject":"","topic":"固定收益證券","difficulty":2,"q":"下列關於「存續期間與利率風險」的敘述，何者正確？（此為歷屆連續兩屆實考原題型）","options":["存續期間愈短，利率風險愈高","存續期間愈長，利率風險愈高","票面利率愈低，利率風險愈低","到期期限愈短，利率風險愈大"],"answer":1,"explain":["錯誤。存續期間愈短代表現金流回收愈快、對利率變動愈不敏感，利率風險愈低，敘述相反。","正確。存續期間是利率風險的衡量指標，存續期間愈長，價格對殖利率變動愈敏感（ΔP/P≈−MD×Δy），利率風險愈高，為官方連續兩屆原題。","錯誤。票面利率愈低使存續期間愈長，利率風險應愈高而非愈低。","錯誤。到期期限愈短使存續期間愈短，利率風險應愈小而非愈大。"],"src":"研究筆記陷阱1、2：存續期間愈長利率風險愈高（114-3、115-1連續實考）"},{"id":"IV-B-001","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"依資本資產定價模型（CAPM）之證券市場線（SML），下列何者為模型之截距與斜率？","options":["截距為無風險利率Rf，斜率為市場風險溢酬E(Rm)−Rf","截距為市場報酬E(Rm)，斜率為無風險利率Rf","截距為0，斜率為(E(Rm)−Rf)/σm","截距為無風險利率Rf，斜率為市場標準差σm"],"answer":0,"explain":["正確。SML為E(Ri)=Rf+βi×(E(Rm)−Rf)，橫軸為β；當β=0時E(Ri)=Rf故截距為Rf，斜率即市場風險溢酬(E(Rm)−Rf)。","錯誤。截距應為Rf（β=0時之報酬），並非市場報酬E(Rm)；市場報酬對應β=1之點。","錯誤。(E(Rm)−Rf)/σm是CML（資本市場線）之斜率，其橫軸為總風險σ，不是SML的斜率。","錯誤。SML斜率為市場風險溢酬(E(Rm)−Rf)而非市場標準差σm；以σm為斜率者屬CML。"],"src":"公式9 CAPM/SML；研究筆記第七章"},{"id":"IV-B-002","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"某證券β值為1.2，無風險利率為3%，市場預期報酬率為8%，依CAPM該證券之要求報酬率為何？","options":["8%","9%","10%","6%"],"answer":1,"explain":["錯誤。8%為市場預期報酬率E(Rm)，僅在β=1時要求報酬才等於此值。","正確。E(Ri)=Rf+β×(E(Rm)−Rf)=3%+1.2×(8%−3%)=3%+1.2×5%=3%+6%=9%。","錯誤。10%來自誤把風險溢酬算成7%再加Rf等錯誤組合，正解為9%。","錯誤。6%為風險溢酬β×(E(Rm)−Rf)=1.2×5%本身，尚未加回無風險利率Rf=3%。"],"src":"公式9 CAPM；研究筆記例5"},{"id":"IV-B-003","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"某股票期望報酬率為12.5%，β=1.15，市場預期報酬率為10%，無風險利率為5%，依CAPM判斷此股票之評價為何？","options":["價格高估，應賣出","期望報酬恰等於要求報酬，價格合理","價格低估，應買進","無法判斷，須另計算標準差"],"answer":2,"explain":["錯誤。高估係期望報酬落在SML下方（期望＜要求），本題期望12.5%高於要求10.75%，屬低估非高估。","錯誤。要求報酬=5%+1.15×(10%−5%)=5%+5.75%=10.75%，與期望12.5%不相等，並非合理價。","正確。SML要求報酬=5%+1.15×5%=10.75%，期望報酬12.5%＞10.75%，落在SML上方，代表價格低估應買進。","錯誤。CAPM以β衡量系統風險即可判斷高低估，不需標準差；標準差衡量總風險與此判斷無關。"],"src":"公式9 CAPM；研究筆記例7"},{"id":"IV-B-004","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"關於資本市場線（CML）與證券市場線（SML）之比較，下列敘述何者正確？","options":["CML橫軸為β，SML橫軸為總風險σ","CML與SML之橫軸皆為β值","CML橫軸為總風險σ且僅效率投資組合落於線上；SML橫軸為β且適用於所有資產","SML僅適用於效率投資組合，個別證券不適用"],"answer":2,"explain":["錯誤。恰好說反了：CML橫軸為總風險σ，SML橫軸才是β。","錯誤。只有SML橫軸為β；CML橫軸為總風險σ，兩者橫軸不同。","正確。CML以總風險σ為橫軸、僅效率組合落於線上；SML以β為橫軸、適用於所有資產（含個股與無效率組合）。口訣「C總S貝」。","錯誤。SML適用所有資產，個別證券在均衡時亦落於SML上；受此限制者為CML。"],"src":"研究筆記第七章、陷阱9"},{"id":"IV-B-005","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"若市場預期通貨膨脹率上升，使無風險利率Rf與市場預期報酬率E(Rm)同幅上升，則證券市場線（SML）將如何變動？","options":["斜率變大，高β證券要求報酬提高幅度較大","斜率變小，僅低β證券受影響","向下平移，所有證券要求報酬率下降","平行上移，所有證券要求報酬率提高，斜率與β不變"],"answer":3,"explain":["錯誤。斜率=市場風險溢酬=(E(Rm)−Rf)，兩者同幅上升故差額不變，斜率不會變大。","錯誤。SML為平行上移，全體證券皆受影響，並非僅低β證券，斜率也未改變。","錯誤。通膨預期上升使利率上升，SML向上（非向下）平移，要求報酬率提高而非下降。","正確。Rf與E(Rm)同幅上升時，市場風險溢酬(E(Rm)−Rf)不變，故SML斜率不變、僅截距上移，SML平行上移，所有證券要求報酬同幅提高。"],"src":"研究筆記第七章、陷阱8"},{"id":"IV-B-006","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"某證券之Cov(Ri,Rm)=0.036，市場報酬變異數σm²=0.04，則該證券之β值為何？","options":["0.72","1.44","1.11","0.90"],"answer":3,"explain":["錯誤。0.72來自0.036/0.05等分母取錯之誤算，正確分母為σm²=0.04。","錯誤。1.44約為0.036/0.025之結果，分母用錯，並非本題正解。","錯誤。1.11約為0.04/0.036之倒數，將分子分母顛倒；β定義為Cov除以σm²。","正確。β=Cov(Ri,Rm)/σm²=0.036/0.04=0.9。"],"src":"公式8 Beta；研究筆記第七章"},{"id":"IV-B-007","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"已知某證券與市場報酬之相關係數ρ=0.6，該證券標準差σi=20%，市場標準差σm=15%，則其β值最接近下列何者？","options":["0.45","0.80","1.20","0.90"],"answer":1,"explain":["錯誤。0.45約為0.6×0.15/0.2之結果，將σi與σm的位置對調了。","正確。β=ρ×σi/σm=0.6×20%/15%=0.6×1.333=0.8。","錯誤。1.20約為0.6×0.2/0.1之誤算（σm誤取10%），本題σm為15%。","錯誤。0.90為σi/σm=20/15之值，漏乘相關係數ρ=0.6。"],"src":"公式8 β=ρ×σi/σm；研究筆記第七章"},{"id":"IV-B-008","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":3,"q":"股價由200元經一年後預期為222元（期望報酬11%），已知無風險利率Rf=2%、該股β=1.5，若CAPM成立，市場預期報酬率E(Rm)為何？","options":["8%","11%","6%","9.5%"],"answer":0,"explain":["正確。11%=2%+1.5×(E(Rm)−2%)→(E(Rm)−2%)=9%/1.5=6%→E(Rm)=8%。","錯誤。11%為該股之期望報酬率，不是市場報酬率；市場報酬對應β=1。","錯誤。6%為市場風險溢酬(E(Rm)−Rf)之值，尚未加回Rf=2%得出E(Rm)。","錯誤。9.5%為(2%+11%×若干)之錯誤組合，正確解方程得E(Rm)=8%。"],"src":"公式9 CAPM反推；研究筆記例6"},{"id":"IV-B-009","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"依CAPM，所謂「市場投資組合（market portfolio）」之β值為何，且其涵蓋範圍為何？","options":["β=0，僅包含無風險資產","β=1，且包含市場上所有風險性證券","β大於1，僅包含高風險股票","β=1，但僅包含大型權值股"],"answer":1,"explain":["錯誤。β=0者為無風險資產或zero-beta資產；市場組合β=1，且包含風險性證券而非僅無風險資產。","正確。市場投資組合為所有風險性證券依市值加權組成，其β定義上等於1，是SML上β=1的基準點。","錯誤。市場組合β恰為1（非大於1），且涵蓋所有證券而非僅高風險股票。","錯誤。市場組合須包含市場上所有證券，不限於大型權值股；β=1的敘述正確但涵蓋範圍錯誤。"],"src":"研究筆記第七章、陷阱7"},{"id":"IV-B-010","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"在CAPM架構下，關於β值與標準差σ之敘述，下列何者正確？","options":["σ較大之證券，其β必較大","σ衡量系統風險，β衡量總風險","zero-beta資產之期望報酬率等於市場報酬E(Rm)","β衡量系統風險，σ衡量總風險；σ大不必然β大或期望報酬高"],"answer":3,"explain":["錯誤。σ含系統與非系統風險，σ大者其β（僅系統風險部分）未必大，兩者無必然正向關係。","錯誤。恰好說反：β衡量系統風險，σ（標準差）衡量總風險。","錯誤。zero-beta資產（β=0）之期望報酬等於無風險利率Rf，並非市場報酬E(Rm)。","正確。β僅衡量系統（不可分散）風險，σ衡量總風險；σ大不代表β大或期望報酬高，但CAPM下β高則期望報酬必高。"],"src":"研究筆記第七章、陷阱6"},{"id":"IV-B-011","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"依CAPM，某證券之β=1.2、市場預期報酬率E(Rm)=8%、無風險利率Rf=3%，則該證券之「風險溢酬（risk premium）」為何？","options":["9%","3%","5%","6%"],"answer":3,"explain":["錯誤。9%為該證券之要求報酬率E(Ri)=Rf+風險溢酬=3%+6%，非風險溢酬本身。","錯誤。3%為無風險利率Rf，非風險溢酬。","錯誤。5%為市場風險溢酬(E(Rm)−Rf)，尚未乘上該證券β=1.2。","正確。個別證券風險溢酬=β×(E(Rm)−Rf)=1.2×(8%−3%)=1.2×5%=6%。"],"src":"公式9；研究筆記例5"},{"id":"IV-B-012","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":3,"q":"某投資組合由三檔股票組成，權重與β分別為：甲50%（β=0.9）、乙30%（β=1.3）、丙20%（β=0.5），則此組合之β值為何？","options":["0.90","0.94","1.06","1.30"],"answer":1,"explain":["錯誤。0.90為甲之β值，非整體組合之加權β。","正確。組合β=Σwiβi=0.5×0.9+0.3×1.3+0.2×0.5=0.45+0.39+0.10=0.94。","錯誤。1.06約為三檔β之單純算術平均(0.9+1.3+0.5)/3，未依權重加權。","錯誤。1.30為乙之β值，非整體組合之加權β。"],"src":"公式8 組合β=Σwiβi；研究筆記第七章"},{"id":"IV-B-013","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"關於套利定價理論（APT），下列敘述何者正確？","options":["APT為單因子模型，僅以市場報酬為唯一風險因子","APT須假設報酬呈常態分配且投資人皆持有市場投資組合","APT主張任何資產之期望報酬皆等於無風險利率","APT為多因子線性模型，以無套利原則推導，假設較CAPM寬鬆"],"answer":3,"explain":["錯誤。APT為多因子模型，可納入通膨、利率、工業生產等多個因子；單因子（市場）者為CAPM。","錯誤。APT不需常態分配假設，也不需持有市場組合；此為CAPM之較強假設。","錯誤。僅對所有因子皆無敏感度之資產期望報酬才等於Rf；一般資產須加計各因子風險溢酬。","正確。APT為E(Ri)=Rf+Σβijλj之多因子線性模型，以無套利（no-arbitrage）原則推導，假設較CAPM寬鬆（不需市場組合、不需常態分配）。"],"src":"公式11 APT；研究筆記第七章"},{"id":"IV-B-014","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"依效率市場假說（EMH），若市場為「弱式效率」，則下列敘述何者正確？","options":["股價已充分反映歷史價量資訊，技術分析無效，但基本分析仍可能獲超額報酬","股價已反映所有公開與非公開資訊，內線交易亦無法獲取超額報酬","股價已反映所有公開資訊，基本分析無效","市場價格完全不可預測，任何分析皆無意義"],"answer":0,"explain":["正確。弱式效率下股價已反映歷史價量資訊，故技術分析無效；但基本分析與內線資訊仍可能取得超額報酬。口訣「弱技、半基、強內」。","錯誤。此為強式效率之描述（反映所有公開與非公開資訊、內線亦無效），非弱式。","錯誤。此為半強式效率之描述（反映所有公開資訊、基本分析無效），弱式僅反映歷史價量。","錯誤。弱式效率僅指技術分析無效，基本分析仍可能有效，並非任何分析皆無意義。"],"src":"研究筆記第七章 EMH、陷阱11"},{"id":"IV-B-015","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"檢定「半強式效率市場假說」最常採用之研究方法為下列何者？","options":["濾嘴法則檢定","隨機漫步檢定","事件研究法（event study）","內部人交易研究"],"answer":2,"explain":["錯誤。濾嘴法則檢定屬弱式效率之檢定方法，測試依歷史價格買賣能否獲利。","錯誤。隨機漫步檢定屬弱式效率之檢定方法，測試價格是否具序列相關。","正確。半強式效率檢定股價對公開消息（如盈餘宣告、併購）之反應速度，採事件研究法（event study）觀察宣告前後之異常報酬。","錯誤。內部人交易研究用於檢定強式效率（未公開資訊是否已反映），非半強式。"],"src":"研究筆記第七章 EMH檢定"},{"id":"IV-B-016","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"下列何者屬於效率市場假說中所觀察到的「市場異常現象（anomalies）」？","options":["買賣價差擴大","除權除息造成股價下跌","一月效應、規模效應、本益比效應","央行升息造成債券價格下跌"],"answer":2,"explain":["錯誤。買賣價差為交易成本與流動性之表現，非EMH所討論之報酬異常現象。","錯誤。除權除息使股價依公式調整為除權息參考價，屬正常機制而非市場異常。","正確。一月效應、規模效應（小公司報酬較高）、本益比效應與過度反應等，皆為與效率市場相悖之著名異常現象。","錯誤。升息使債券價格下跌是利率與債券價格反向之正常關係，非市場異常現象。"],"src":"研究筆記第七章 EMH異常現象"},{"id":"IV-B-017","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"投資人傾向於「急於賣出帳面獲利之股票，卻緊抱帳面虧損之股票」，此種行為在行為財務學中稱為？","options":["過度自信（overconfidence）","定錨效應（anchoring）","處分效果（disposition effect）","從眾行為（herding）"],"answer":2,"explain":["錯誤。過度自信指高估自身判斷能力、導致過度交易，與賣賺抱賠之現象不同。","錯誤。定錨效應指決策過度依賴最初取得之參考資訊（如買進成本），與此處賣賺抱賠之描述不同。","正確。處分效果即投資人急於實現獲利（賣出賺錢股）、卻不願實現虧損（緊抱賠錢股）之心理偏誤。","錯誤。從眾行為指盲目跟隨群體買賣，與個別投資人對自身持股獲利／虧損之處理傾向無關。"],"src":"研究筆記第七章 行為財務、陷阱12"},{"id":"IV-B-018","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"行為財務學中，「投資人對同等金額的損失所感受之痛苦，大於相同金額利得所帶來之快樂」，此現象稱為？","options":["可取性捷思（availability heuristic）","小數法則（law of small numbers）","定錨效應（anchoring）","損失規避（loss aversion）"],"answer":3,"explain":["錯誤。可取性捷思指容易聯想、印象深刻之事件被高估其發生機率，與損失痛感無關。","錯誤。小數法則指誤以小樣本代表母體、過度推論，與損失與利得之感受不對稱無關。","錯誤。定錨效應指決策過度依賴初始參考點，非描述損益感受之不對稱。","正確。損失規避指損失之痛大於等額利得之樂，是展望理論的重要發現，投資人因而對損失特別敏感。"],"src":"研究筆記第七章 行為財務、陷阱12"},{"id":"IV-B-019","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"投資人因近期媒體大幅報導某類災難事件，便高估該事件未來發生之機率，此屬於下列何種行為偏誤？","options":["過度自信","處分效果","損失規避","可取性捷思（availability heuristic）"],"answer":3,"explain":["錯誤。過度自信指高估自身能力與判斷正確率，與依可得印象高估機率不同。","錯誤。處分效果指賣賺抱賠之交易傾向，與機率判斷偏誤無關。","錯誤。損失規避描述損益感受之不對稱，非對事件機率之高估。","正確。可取性捷思指人們依「容易被聯想或記起」之程度來判斷事件發生機率，媒體大幅報導使人高估其機率即為典型例子。"],"src":"研究筆記第七章 行為財務"},{"id":"IV-B-020","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"某投資人僅觀察連續數期之短期績效，即斷定某明星經理人「必有選股實力」，忽略樣本過小之統計問題，此屬於下列何種行為偏誤？","options":["定錨效應","從眾行為","小數法則（law of small numbers）","損失規避"],"answer":2,"explain":["錯誤。定錨效應指決策過度依賴最初的參考數值，與以小樣本妄下結論不同。","錯誤。從眾行為指跟隨群體決策，本題強調的是以少數觀察值過度推論，非跟風。","正確。小數法則指誤以為小樣本即能代表母體、據以過度推論；僅憑少數幾期績效即斷定實力，正是此偏誤。","錯誤。損失規避描述對損失之過度敏感，與樣本推論之錯誤無關。"],"src":"研究筆記第七章 行為財務"},{"id":"IV-B-021","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":1,"q":"下列何者屬於「系統風險（systematic risk）」，即無法藉由分散投資消除之風險？","options":["個別公司罷工事件","公司遭訴訟之法律風險","市場利率與通貨膨脹之變動","單一公司廠房火災"],"answer":2,"explain":["錯誤。罷工屬公司特有之非系統風險，可透過分散持股消除。","錯誤。個別公司之訴訟屬公司特有非系統風險，可分散消除。","正確。利率、通貨膨脹、戰爭、政治等總體因素影響所有證券，屬系統（市場、不可分散）風險，增加持股家數亦無法消除。","錯誤。單一公司廠房火災屬公司特有之非系統風險，可藉分散投資消除。"],"src":"研究筆記第六章 系統與非系統風險、口訣"},{"id":"IV-B-022","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":3,"q":"關於CAPM之基本假設，下列何者「並非」其假設之一？","options":["投資人具同質預期","可以無風險利率無限借入或貸出","個別投資人可透過交易影響市場價格","無交易成本與稅負，資訊免費取得"],"answer":2,"explain":["錯誤（此為真的假設）。CAPM假設投資人具同質預期，對報酬與風險有一致看法。","錯誤（此為真的假設）。CAPM假設投資人可以無風險利率自由借貸。","正確（此為非假設，即本題答案）。CAPM假設個別投資人是價格接受者（price taker），無法影響市場價格；「可透過交易影響價格」並非其假設。","錯誤（此為真的假設）。CAPM假設無稅無交易成本、資訊免費且同時取得。"],"src":"研究筆記第七章 CAPM假設"},{"id":"IV-B-023","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":3,"q":"某效率投資組合位於資本市場線（CML）上，已知市場組合E(Rm)=12%、σm=20%，無風險利率Rf=4%。若該組合標準差σp=15%，則其期望報酬率為何？","options":["9%","10%","12%","8%"],"answer":1,"explain":["錯誤。9%約為以σp=12.5%代入之結果，本題σp為15%。","正確。CML：E(Rp)=Rf+[(E(Rm)−Rf)/σm]×σp=4%+[(12%−4%)/20%]×15%=4%+0.4×15%=4%+6%=10%。","錯誤。12%為市場組合E(Rm)（對應σ=20%之點），本題σp僅15%，報酬應低於市場組合。","錯誤。8%約為市場風險溢酬部分之相關誤算，正確代入CML得10%。"],"src":"公式10 CML；研究筆記第七章"},{"id":"IV-B-024","exam":"gaoye-invest","subject":"","topic":"資本市場理論","difficulty":2,"q":"最適風險投資組合之E(R)=12%、σ=26%，無風險利率Rf=5%，則資本市場線（CML）之斜率最接近下列何者？","options":["0.27","0.19","0.46","0.65"],"answer":0,"explain":["正確。CML斜率=(E(Rm)−Rf)/σm=(12%−5%)/26%=7%/26%≈0.27，代表市場風險價格。","錯誤。0.19約為(12%−7%)/26%等分子取錯之誤算，正確分子為(12%−5%)。","錯誤。0.46約為12%/26%之值，未扣除無風險利率Rf=5%。","錯誤。0.65約為將分母誤用其他數值之結果，正解為7/26≈0.27。"],"src":"公式10 CML斜率；研究筆記例10"},{"id":"IV-B-025","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":1,"q":"依Markowitz平均數—變異數（mean-variance）投資組合理論，投資人選擇投資組合時所依據之兩項參數為何？","options":["期望報酬E(R)與標準差（或變異數）σ","本益比與股利殖利率","β值與α值","市值與成交量"],"answer":0,"explain":["正確。Markowitz模型假設投資人為風險趨避者，僅以期望報酬E(R)與風險（標準差σ／變異數σ²）兩參數作為選擇投資組合之依據。","錯誤。本益比與股利殖利率屬個股基本面評價指標，非Markowitz平均數—變異數架構之參數。","錯誤。β與α為CAPM／績效評估之概念，Markowitz模型以E(R)與σ為核心參數。","錯誤。市值與成交量屬市場交易面資訊，非Markowitz模型選擇組合之依據。"],"src":"研究筆記第六章 Markowitz模型"},{"id":"IV-B-026","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":1,"q":"關於「效率前緣（efficient frontier）」之定義，下列敘述何者正確？","options":["相同期望報酬下，風險最高之投資組合所連成之曲線","相同風險水準下，能提供最高期望報酬之投資組合所連成之集合","所有可能投資組合之集合","僅由無風險資產構成之直線"],"answer":1,"explain":["錯誤。效率前緣是效率組合之集合，指相同報酬下風險最低（非最高）者。","正確。效率前緣為在相同風險下報酬最高（或相同報酬下風險最低）之投資組合所構成之集合，是理性投資人的選擇範圍。","錯誤。所有可能組合構成的是可行集合（feasible set），效率前緣只是其上緣的效率部分。","錯誤。效率前緣由風險性資產組合構成之曲線，非僅由無風險資產構成之直線（後者為含無風險資產之配置線）。"],"src":"研究筆記第六章 效率前緣"},{"id":"IV-B-027","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":1,"q":"投資組合中甲資產權重60%、期望報酬10%；乙資產權重40%、期望報酬15%，則此投資組合之期望報酬率為何？","options":["12.5%","11.5%","12.0%","13.0%"],"answer":2,"explain":["錯誤。12.5%為兩資產報酬之單純平均(10%+15%)/2，未依權重60%、40%加權。","錯誤。11.5%非本題加權結果；正確依權重計算見下一選項。","正確。E(Rp)=w甲×E(R甲)+w乙×E(R乙)=0.6×10%+0.4×15%=6%+6%=12%。","錯誤。13.0%為權重取反(0.4×10%+0.6×15%)之結果，本題甲權重為60%。"],"src":"公式6 兩資產組合報酬；研究筆記第六章"},{"id":"IV-B-028","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":2,"q":"甲資產權重30%、期望報酬8%；乙資產權重70%、期望報酬14%，則此投資組合之期望報酬率為何？","options":["12.2%","11.0%","13.0%","10.4%"],"answer":0,"explain":["正確。E(Rp)=0.3×8%+0.7×14%=2.4%+9.8%=12.2%。","錯誤。11.0%為兩資產報酬之單純平均(8%+14%)/2，未依權重30%、70%加權。","錯誤。13.0%約為權重取反(0.7×8%+0.3×14%)之結果，本題乙權重為70%。","錯誤。10.4%為權重顛倒之另一種誤算，正確加權和為12.2%。"],"src":"公式6 兩資產組合報酬；研究筆記第六章"},{"id":"IV-B-029","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":3,"q":"甲資產權重60%、標準差10%；乙資產權重40%、標準差20%，若兩資產報酬之相關係數ρ=−1（完全負相關），則投資組合之標準差為何？","options":["14%","0%","6%","2%"],"answer":3,"explain":["錯誤。14%為ρ=+1時σp=0.6×10%+0.4×20%=6%+8%之結果，本題ρ=−1不適用。","錯誤。0%須w甲σ甲=w乙σ乙才成立（完全避險），本題6%≠8%故σp=2%非0。","錯誤。6%為w甲σ甲之值(0.6×10%)，未完成兩項相減取絕對值。","正確。ρ=−1時σp=|w甲σ甲−w乙σ乙|=|0.6×10%−0.4×20%|=|6%−8%|=2%。"],"src":"公式7 ρ=−1；研究筆記例8"},{"id":"IV-B-030","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":3,"q":"甲資產權重50%、標準差20%；乙資產權重50%、標準差20%，若兩資產報酬之相關係數ρ=0（不相關），則投資組合之標準差最接近下列何者？","options":["20%","14.14%","10%","0%"],"answer":1,"explain":["錯誤。20%為ρ=+1時σp=0.5×20%+0.5×20%之結果；ρ=0有分散效果，σp應低於20%。","正確。ρ=0時σp²=w甲²σ甲²+w乙²σ乙²=0.25×0.04+0.25×0.04=0.02，σp=√0.02≈0.1414=14.14%。","錯誤。10%約為σ/2之誤算；正確為√0.02≈14.14%。","錯誤。0%須ρ=−1且權重風險相等才可能完全避險；ρ=0時仍有正的組合風險14.14%。"],"src":"公式7 σp²=w1²σ1²+w2²σ2²+2w1w2ρσ1σ2；研究筆記第六章"},{"id":"IV-B-031","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":2,"q":"關於兩資產投資組合之「相關係數ρ」與「風險分散效果」之關係，下列敘述何者正確？","options":["ρ=+1時風險分散效果最佳，可使組合風險降為零","ρ愈接近+1，風險分散效果愈好","ρ=0時完全無風險分散效果","只要ρ小於+1即具風險分散效果，且ρ愈低（愈接近−1）分散效果愈好"],"answer":3,"explain":["錯誤。ρ=+1時σp=w1σ1+w2σ2為權重加權，完全無分散效果，更不可能降為零。","錯誤。方向相反：ρ愈接近+1分散效果愈差，愈接近−1才愈好。","錯誤。ρ=0時σp小於加權平均值，已有明顯風險分散效果，並非完全無效。","正確。只要ρ＜+1即具風險分散效果，ρ愈低（愈接近−1）效果愈佳；ρ=−1時甚至可能完全避險使σp=0。"],"src":"公式7；研究筆記第六章 相關係數與分散"},{"id":"IV-B-032","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":1,"q":"兩資產投資組合中，當兩資產報酬之相關係數ρ=+1（完全正相關）時，下列關於組合標準差之敘述何者正確？","options":["σp=w₁σ₁+w₂σ₂，無任何風險分散效果","σp=|w₁σ₁−w₂σ₂|，可完全避險","σp必等於零","σp小於個別資產標準差之加權平均"],"answer":0,"explain":["正確。ρ=+1時σp=w₁σ₁+w₂σ₂，等於個別標準差之加權平均，代表完全沒有風險分散效果。","錯誤。σp=|w₁σ₁−w₂σ₂|是ρ=−1（完全負相關）時之公式，可能完全避險，非ρ=+1之情形。","錯誤。ρ=+1時σp為加權平均值（正數），一般不為零；σp可為零者為ρ=−1且w₁σ₁=w₂σ₂之特例。","錯誤。σp小於加權平均是ρ＜+1才有的分散效果；ρ=+1時σp恰等於加權平均而非小於。"],"src":"公式7 ρ=+1；研究筆記第六章"},{"id":"IV-B-033","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":1,"q":"下列關於「充分分散投資可消除之風險」之敘述，何者正確？","options":["可消除非系統風險（如公司特有之罷工、訴訟、火災風險）","可消除系統風險（如利率、通膨風險）","可同時消除系統與非系統風險，使總風險為零","僅能消除市場整體之下跌風險"],"answer":0,"explain":["正確。增加持股家數（分散投資）僅能消除非系統（公司特有）風險，如個別公司之罷工、訴訟、火災等。","錯誤。系統風險（利率、通膨、戰爭等）影響所有證券，無法藉分散消除。","錯誤。分散只能消除非系統風險，系統風險仍在，總風險無法降為零。","錯誤。市場整體下跌屬系統風險，正是分散投資無法消除的部分。"],"src":"研究筆記第六章 系統與非系統風險"},{"id":"IV-B-034","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":2,"q":"在Markowitz架構下，投資人之「最適投資組合（optimal portfolio）」係如何決定？","options":["效率前緣與縱軸之交點","效率前緣之最高報酬端點","效率前緣之最低風險點（全域最小變異數組合）","投資人無差異曲線（效用曲線）與效率前緣之切點"],"answer":3,"explain":["錯誤。效率前緣與縱軸並不必然相交，且該處也非效用最大之點；最適組合須以無差異曲線相切決定。","錯誤。最高報酬端點風險亦最高，對風險趨避程度較高者並非效用最大之最適組合。","錯誤。全域最小變異數組合僅是效率前緣起點，對能承受較多風險者未必為最適選擇。","正確。最適投資組合為投資人無差異曲線（反映其風險偏好之效用曲線）與效率前緣相切之點，此點在可達到之效率組合中提供最高效用。"],"src":"研究筆記第六章 最適組合與無差異曲線"},{"id":"IV-B-035","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":1,"q":"關於「無風險資產」之特性，下列敘述何者正確？","options":["其標準差為正，但與其他資產相關係數為零","其標準差為零，且與任何風險性資產之共變異數為零","其標準差為零，但報酬率會隨市場波動","其β值等於1"],"answer":1,"explain":["錯誤。無風險資產之標準差為零（非正值），報酬確定不波動。","正確。無風險資產報酬確定，標準差σ=0，因無變動故與任何資產之共變異數（及相關係數）皆為零。","錯誤。標準差為零即代表報酬確定、不隨市場波動，兩者敘述互相矛盾。","錯誤。無風險資產不含系統風險，其β=0而非1；β=1者為市場投資組合。"],"src":"研究筆記第六章 含無風險資產之配置"},{"id":"IV-B-036","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":3,"q":"某投資人將資金65%投入無風險資產（Rf=4%），35%投入某風險性資產（E(R)=18%、變異數=0.10），則此投資組合之期望報酬率E(Rp)最接近下列何者？","options":["0.089","0.180","0.126","0.063"],"answer":0,"explain":["正確。E(Rp)=0.65×0.04+0.35×0.18=0.026+0.063=0.089。","錯誤。0.180為風險性資產本身之期望報酬，未依權重與無風險資產加權。","錯誤。0.126約為兩者報酬單純平均或權重誤植之結果，正確加權為0.089。","錯誤。0.063僅為風險性資產貢獻部分(0.35×0.18)，漏加無風險資產貢獻0.026。"],"src":"公式 含無風險資產E(Rp)=wf·Rf+wr·E(Rr)；研究筆記例9"},{"id":"IV-B-037","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":3,"q":"承上題，某投資人將資金65%投入無風險資產、35%投入某風險性資產（變異數=0.10、標準差約0.3162），則此投資組合之標準差σp最接近下列何者？","options":["0.316","0.111","0.205","0.100"],"answer":1,"explain":["錯誤。0.316為風險性資產本身之標準差，未乘上其權重0.35。","正確。無風險資產σ=0，故σp=wr×σr=0.35×√0.10=0.35×0.3162≈0.111。","錯誤。0.205非本題正確結果；正確為0.35×0.3162≈0.111。","錯誤。0.100為風險性資產之變異數（非標準差），且未乘權重；σp應先開根號再乘0.35。"],"src":"公式 含無風險資產σp=wr·σr；研究筆記例9"},{"id":"IV-B-038","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":3,"q":"甲資產權重70%、標準差15%；乙資產權重30%、標準差25%，若兩資產報酬之相關係數ρ=+1（完全正相關），則投資組合之標準差為何？","options":["18.0%","12.0%","20.0%","6.0%"],"answer":0,"explain":["正確。ρ=+1時σp=w甲σ甲+w乙σ乙=0.7×15%+0.3×25%=10.5%+7.5%=18%。","錯誤。12.0%約為某項權重取錯之誤算，ρ=+1時應為加權平均18%。","錯誤。20.0%約為權重顛倒(0.3×15%+0.7×25%)之結果，本題甲權重為70%。","錯誤。6.0%約為|w甲σ甲−w乙σ乙|=|10.5%−7.5%|之值，該式為ρ=−1時使用，非ρ=+1。"],"src":"公式7 ρ=+1；研究筆記第六章"},{"id":"IV-B-039","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":2,"q":"下列關於Markowitz投資組合理論之基本假設，何者正確？","options":["假設投資人為風險愛好者，追求風險極大","假設所有投資人風險偏好完全相同","假設投資人只看報酬、不考慮風險","假設投資人為風險趨避者，在相同報酬下偏好較低風險"],"answer":3,"explain":["錯誤。Markowitz假設投資人為風險趨避（risk-averse）者，並非追求風險極大。","錯誤。各投資人風險偏好可不同（反映為不同無差異曲線），故最適組合因人而異，並非完全相同。","錯誤。投資人同時考量報酬E(R)與風險σ兩者，並非只看報酬。","正確。Markowitz模型假設投資人風險趨避，在相同期望報酬下偏好風險（標準差）較低之組合，據此形成效率前緣。"],"src":"研究筆記第六章 Markowitz模型"},{"id":"IV-B-040","exam":"gaoye-invest","subject":"","topic":"投資組合","difficulty":2,"q":"下列關於全球分散投資之敘述，何者正確？","options":["全球股市連動性愈高，國際分散投資之效果愈好","全球型基金之分散效果通常優於區域型基金、單一國家型基金","增加持股家數可完全消除投資組合之系統風險","單一國家型基金之風險分散效果最佳"],"answer":1,"explain":["錯誤。全球股市連動性（相關性）愈高，代表分散效果愈差；連動性低才有較佳分散效果。","正確。投資標的涵蓋範圍愈廣、相關性愈低，分散效果愈好，故全球型基金分散效果通常優於區域型、再優於單一國家型。","錯誤。分散投資僅能消除非系統風險，系統風險（市場整體）無法藉增加持股消除。","錯誤。單一國家型基金標的集中於同一市場，分散效果最差而非最佳。"],"src":"研究筆記第六章 系統風險與國際分散"},{"id":"IV-C-001","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":1,"q":"甲公司股利政策穩定，預期未來每年均配發現金股利3元且維持不變，該股票之β係數為1.2。若投資人之必要報酬率為12%，依零成長股利折現模型，該股票之合理價格為何？","options":["25元","28元","30元","36元"],"answer":0,"explain":["正確。零成長股利折現模型下，股票視同永續年金評價：P₀＝D／k＝3÷0.12＝25元。β係數為干擾條件，零成長模型之計算用不到β。","錯誤。28元係誤將股利先乘(1＋12%)再折現（3×1.12÷0.12）；零成長模型之股利不成長，分子直接使用固定股利D即可。","錯誤。30元相當於以10%折現（3÷0.10）；題目給定之必要報酬率為12%，折現率不可任意更換。","錯誤。36元係誤把必要報酬率當乘數（3×12）；評價應以股利「除以」必要報酬率，折現觀念完全顛倒。"],"src":"零成長股利折現模型 P₀＝D/k；證基會《投資學》題庫第3章普通股分析"},{"id":"IV-C-002","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":2,"q":"乙公司今年「剛發放」每股現金股利2元，預期未來股利每年固定成長5%，投資人必要報酬率為10%。依Gordon固定成長模型，該股票目前之合理價格為何？","options":["40元","42元","21元","20元"],"answer":1,"explain":["錯誤。40元（2÷0.05）係誤將「今年已發放」之D₀直接當成D₁使用；Gordon模型之分子須為下一期股利D₁＝D₀×(1＋g)。","正確。今年已發放之股利為D₀＝2元，明年股利D₁＝2×(1＋5%)＝2.1元；P₀＝D₁／(k−g)＝2.1÷(10%−5%)＝2.1÷0.05＝42元。題目寫「已發放」即暗示給的是D₀，此為高頻陷阱。","錯誤。21元（2.1÷0.10）係分母誤用k而未扣除成長率g；固定成長模型之分母應為(k−g)。","錯誤。20元（2÷0.10）同時犯了分子未乘(1＋g)、分母未扣g兩項錯誤。"],"src":"Gordon固定成長模型 P₀＝D₀(1+g)/(k−g)；證基會《投資學》題庫第3章"},{"id":"IV-C-003","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":1,"q":"丙公司「預期明年」將配發現金股利2.4元，其後股利每年固定成長4%，投資人必要報酬率為10%。依Gordon固定成長模型，該股票之合理價格為何？","options":["41.6元","24元","60元","40元"],"answer":3,"explain":["錯誤。41.6元係將D₁再多乘一次(1＋g)（2.4×1.04÷0.06）；題目給的已是「明年股利D₁」，直接代入分子即可，只有題目給「今年已發放之D₀」時才須乘(1＋g)。","錯誤。24元（2.4÷0.10）係分母漏未扣除成長率g；分母應為(k−g)＝10%−4%＝6%。","錯誤。60元（2.4÷0.04）係誤以成長率g作為折現分母；g是成長率，不是折現率。","正確。P₀＝D₁／(k−g)＝2.4÷(10%−4%)＝2.4÷0.06＝40元。使用Gordon模型須滿足k＞g之前提，本題10%＞4%成立。"],"src":"Gordon固定成長模型 P₀＝D₁/(k−g)；證基會《投資學》題庫第3章"},{"id":"IV-C-004","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":1,"q":"丁公司股東權益報酬率（ROE）為15%，盈餘發放率為60%。若公司以保留盈餘再投資且維持相同獲利能力，其股利成長率（g）應為何？","options":["9%","6%","15%","40%"],"answer":1,"explain":["錯誤。9%係誤以「發放率」計算（15%×60%）；公式中應乘的是保留率b，而非發放率。","正確。保留率b＝1−發放率＝1−60%＝40%；股利成長率g＝ROE×b＝15%×40%＝6%。關鍵觀念：公司靠保留盈餘再投資創造成長，保留愈多、成長愈快。","錯誤。15%為ROE本身；只有在盈餘全數保留（b＝100%）時，g才會等於ROE。","錯誤。40%是保留率b本身，並非成長率；成長率必須以ROE×b計算。"],"src":"股利成長率公式 g＝ROE×保留率(b)；證基會《投資學》題庫第3章"},{"id":"IV-C-005","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":3,"q":"戊公司預期第1年將配發股利2元、第2年配發2.4元，自第3年起股利改以每年5%固定成長，投資人必要報酬率為10%。依兩階段股利折現模型，該股票目前之合理價格最接近下列何者？","options":["45.5元","50.4元","54.8元","43.6元"],"answer":0,"explain":["正確。第3年股利D₃＝2.4×1.05＝2.52元；第2年底之持續價值TV₂＝D₃／(k−g)＝2.52÷(10%−5%)＝50.4元；P₀＝2／1.10＋(2.4＋50.4)／1.10²＝1.82＋52.8／1.21＝1.82＋43.64≒45.5元。兩階段模型＝高成長期股利逐期折現＋以Gordon模型計算之終值折現。","錯誤。50.4元只是「第2年底」之持續價值TV₂，尚須折現回今日，並加計前兩年股利之現值。","錯誤。54.8元（2＋2.4＋50.4）為未折現之直接加總，忽略了貨幣時間價值。","錯誤。43.6元僅為(2.4＋50.4)／1.21之結果，漏掉第1年股利之現值2／1.10≒1.82元。"],"src":"兩階段股利折現模型（第二階段以Gordon模型求持續價值再折現）；證基會《投資學》題庫第3章"},{"id":"IV-C-006","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":1,"q":"己公司股票除息前一日收盤價為80元，每股配發現金股利3.5元，其除息參考價為何？","options":["83.5元","77.3元","76.5元","80元"],"answer":2,"explain":["錯誤。83.5元是把股利「加回」股價；除息表示股東領走現金，股票價值應扣除該金額。","錯誤。77.3元（80÷1.035）係誤套除權之「相除」公式；現金股利應以「減法」處理。","正確。除息參考價＝除息前收盤價−現金股利＝80−3.5＝76.5元。口訣：「除息用減、除權用除」。","錯誤。80元未做任何調整；除息當日開盤參考價必須扣除發放之現金股利，否則除息前後股東財富不一致。"],"src":"除息參考價公式：參考價＝前收盤價−現金股利；證基會《投資學》題庫第3章"},{"id":"IV-C-007","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":2,"q":"庚公司股票除權前一日收盤價為66元，每股配發股票股利2元（無現金股利），其除權參考價為何？","options":["55元","64元","52.8元","33元"],"answer":0,"explain":["正確。台股面額10元，配股率＝股票股利÷10＝2÷10＝0.2；除權參考價＝前收盤價÷(1＋配股率)＝66÷1.2＝55元。驗算：除權後1.2股×55元＝66元，股東財富不變。","錯誤。64元（66−2）係誤用除息之「減法」；股票股利使股數增加，應以「除法」調整（除以1＋配股率）。","錯誤。52.8元（66×0.8）係誤將股價乘上(1−配股率)；正確作法是除以(1＋配股率)，兩者結果不同。","錯誤。33元（66÷2）係誤把股票股利金額當成除數；除數應為(1＋配股率)＝1.2，且須先將股票股利換算為配股率。"],"src":"除權參考價公式：參考價＝前收盤價/(1＋配股率)，配股率＝股票股利/10；證基會《投資學》題庫第3章"},{"id":"IV-C-008","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":3,"q":"辛公司除權除息前一日收盤價為58元，每股配發現金股利3元、無償配股率30%，並同時辦理現金增資，認購率20%、現金增資認購價每股25元。其除權除息參考價為何？","options":["42.3元","40元","36.7元","33.3元"],"answer":1,"explain":["錯誤。42.3元（(58−3)÷1.3）完全忽略現金增資之影響：分子未加入股東繳交之現增股款、分母亦未加入認購率。","正確。含現增之參考價＝(前收盤價−現金股利＋現增認購價×認購率)÷(1＋無償配股率＋認購率)＝(58−3＋25×0.2)÷(1＋0.3＋0.2)＝(55＋5)÷1.5＝60÷1.5＝40元。","錯誤。36.7元（55÷1.5）之分母已計入現增股數，分子卻漏加股東繳交之現增股款25×0.2＝5元，一增一漏導致低估。","錯誤。33.3元係誤將現增股款自分子「扣除」（(55−5)÷1.5）；現增股款是股東投入公司之新資金，會增加每股所含價值，應「加」入分子。"],"src":"除權除息參考價（含現增）公式：(前收盤−息＋現增價×認購率)/(1＋無償配股率＋認購率)；證基會《投資學》題庫第3章"},{"id":"IV-C-009","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":2,"q":"依Gordon固定成長模型推導，合理本益比＝股利發放率／(k−g)。在其他條件不變下，下列何者將使股票之合理本益比「下降」？","options":["投資人必要報酬率（k）上升","預期股利成長率（g）上升","無風險利率下降","市場風險溢酬下降"],"answer":0,"explain":["正確。k上升使分母(k−g)變大，合理本益比下降。此即市場利率走升時，股市整體評價（本益比）通常遭到壓縮之理論基礎。","錯誤。g上升使分母(k−g)縮小，合理本益比「上升」；高成長股享有高本益比即為此理。","錯誤。無風險利率下降透過CAPM（k＝Rf＋β×市場風險溢酬）使k下降，分母縮小，本益比「上升」。","錯誤。市場風險溢酬下降同樣使k下降，合理本益比「上升」，方向與題目要求相反。"],"src":"本益比評價模型：合理P/E＝發放率/(k−g)；證基會《投資學》題庫第3章"},{"id":"IV-C-010","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":3,"q":"壬公司之股東權益報酬率（ROE）僅6%，低於股東必要報酬率10%。若該公司決定「提高」盈餘保留率，依股利折現模型推論，下列敘述何者正確？","options":["股利成長率g將下降","股價將上升","合理本益比將下降","股價與本益比均不受影響"],"answer":2,"explain":["錯誤。g＝ROE×b恆成立，提高保留率b必使g「上升」，此與ROE高低無關。","錯誤。ROE（6%）低於必要報酬率（10%）時，保留盈餘再投資之報酬不敷股東之資金成本，屬價值破壞，股價將「下跌」而非上升。","正確。當ROE＜k時，提高保留率雖使g上升（g＝b×ROE），但因再投資報酬率低於股東要求報酬，股價與合理本益比反而下降。「成長率上升」與「本益比下降」同時成立，正是本考點之經典陷阱。","錯誤。股利政策之改變會透過發放率與g影響評價結果，並非毫無影響。"],"src":"g＝ROE×b與Gordon模型之交互作用（ROE＜k時保留愈多、價值愈低）；證基會《投資學》題庫第3章"},{"id":"IV-C-011","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":2,"q":"癸公司目前股價60元，最近一年度每股盈餘（EPS）為4元，市場預估未來一年EPS為5元。下列敘述何者正確？","options":["落後本益比為12倍","領先本益比為15倍","落後本益比與領先本益比必然相等","領先本益比為12倍"],"answer":3,"explain":["錯誤。落後（trailing）本益比係以「歷史EPS」計算＝60÷4＝15倍，並非12倍。","錯誤。領先（forward）本益比係以「預估EPS」計算＝60÷5＝12倍，並非15倍。","錯誤。只要預估EPS與歷史EPS不同，兩者即不相等；盈餘成長之公司，其領先本益比通常「低於」落後本益比。","正確。領先本益比＝目前股價÷預估EPS＝60÷5＝12倍；落後本益比＝60÷4＝15倍。領先本益比使用未來盈餘，較能反映成長性，惟預估值有不確定性。"],"src":"領先／落後本益比定義（P₀/E₁與P₀/E₀）；證基會《投資學》題庫第3章"},{"id":"IV-C-012","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":2,"q":"甲公司股東權益總額（淨值）為新臺幣40億元，流通在外股數2億股，目前每股市價30元。該公司之股價淨值比（P/B）為何？","options":["0.67倍","1.5倍","0.75倍","15倍"],"answer":1,"explain":["錯誤。0.67倍（20÷30）算的是「淨值市價比（B/M）」，為股價淨值比之倒數。","正確。每股淨值＝40億元÷2億股＝20元；股價淨值比P/B＝每股市價÷每股淨值＝30÷20＝1.5倍。P/B以較保守之會計淨值衡量股價高低，低P/B為價值股之特徵之一。","錯誤。0.75倍（30÷40）係誤以「淨值總額（億元）」直接作分母，未先換算為每股淨值。","錯誤。15倍（30÷2）係誤以流通股數作分母，計算基礎錯置。"],"src":"股價淨值比P/B＝每股市價/每股淨值；證基會《投資學》題庫第3章"},{"id":"IV-C-013","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":1,"q":"乙公司發行之特別股每股每年固定配發股利2元，若投資人對該特別股要求之報酬率為8%，其合理價格為何？","options":["16元","20元","25元","27元"],"answer":2,"explain":["錯誤。16元（2×8）係誤把要求報酬率當乘數；評價應以股利「除以」要求報酬率。","錯誤。20元（2÷0.10）係誤以10%折現；題目給定之要求報酬率為8%。","正確。特別股股利固定且通常無到期日，視同永續年金，以零成長模型評價：P＝D／k＝2÷0.08＝25元。","錯誤。27元（2×1.08÷0.08）係誤將股利乘上(1＋8%)再折現；特別股股利固定不成長，分子無須調整。"],"src":"特別股評價（永續年金／零成長模型）P＝D/k；證基會《投資學》題庫第3章"},{"id":"IV-C-014","exam":"gaoye-invest","subject":"","topic":"普通股分析","difficulty":1,"q":"下列關於特別股特性之敘述，何者「錯誤」？","options":["股利分配順位優先於普通股","公司清算時，剩餘財產分配順位優先於一般債權人","通常無表決權，故不影響公司經營權","市場流動性通常較普通股差"],"answer":1,"explain":["敘述正確，非本題答案。特別股之「特別」即在於股利分配順位優先於普通股。","敘述錯誤，為本題答案。公司清算時之受償順位為：債權人（含公司債持有人）→特別股股東→普通股股東；特別股僅優先於「普通股」，仍排在債權人之後。","敘述正確，非本題答案。特別股通常無表決權，公司以特別股籌資不會稀釋原股東之經營權。","敘述正確，非本題答案。特別股發行量與成交量通常較小，市場流動性較普通股差。"],"src":"特別股特性（股利順位、清算受償順位、表決權、流動性）；證基會《投資學》題庫第3章"},{"id":"IV-C-015","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":1,"q":"證券基本分析採「由上而下」（Top-Down）之分析架構時，其正確之分析順序為何？","options":["公司分析→產業分析→總體經濟分析","產業分析→總體經濟分析→公司分析","總體經濟分析→產業分析→公司分析","公司分析→總體經濟分析→產業分析"],"answer":2,"explain":["錯誤。此順序由個體到總體，接近「由下而上」之精神；由上而下應從最宏觀之層次出發。","錯誤。順序錯置；產業分析應於總體經濟分析之後、公司分析之前進行。","正確。由上而下架構：先分析總體經濟情勢（景氣、利率、匯率、物價），再選擇具發展前景之產業，最後於該產業中挑選基本面優異之公司。","錯誤。將公司分析置於最前且順序錯置，不符由上而下之邏輯。"],"src":"基本分析由上而下架構（總體經濟→產業→公司）；證基會《投資學》題庫第5章證券投資基本分析"},{"id":"IV-C-016","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":2,"q":"關於「由上而下」（Top-Down）與「由下而上」（Bottom-Up）兩種投資分析方法，下列敘述何者正確？","options":["由下而上法最重視總體經濟情勢之預測","由上而下法先決定資產配置與產業比重，再挑選個股","由下而上法認為個股報酬完全由大盤走勢決定","兩種方法均不重視公司基本面資訊"],"answer":1,"explain":["錯誤。由下而上法之核心在「個股選擇」，直接尋找基本面優異或價值低估之公司，不以總體經濟預測為首要工作。","正確。由上而下法先依總體經濟判斷進行資產配置，再決定產業（類股）比重，最後才挑選個股，層層向下推進。","錯誤。由下而上法正好相反，認為優質個股即使在大盤疲弱時仍可能有超額表現，重視公司自身之條件。","錯誤。兩法皆屬基本分析範疇，均以基本面資訊為依據，差別僅在分析之起點與著重層次不同。"],"src":"由上而下vs由下而上分析法之比較；證基會《投資學》題庫第5章"},{"id":"IV-C-017","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":1,"q":"我國國家發展委員會發布之「景氣對策信號」，當信號燈號為「藍燈」時，代表之意義為何？","options":["景氣過熱，政府宜採取緊縮性政策","景氣穩定","景氣趨向熱絡","景氣低迷，政府宜採取擴張性政策刺激景氣"],"answer":3,"explain":["錯誤。景氣過熱對應「紅燈」，此時政府才宜採取緊縮性政策為景氣降溫。","錯誤。景氣穩定對應「綠燈」。","錯誤。景氣趨向熱絡（注意景氣轉熱）對應「黃紅燈」。","正確。藍燈代表景氣低迷，政府宜採取擴張性財政或貨幣政策以刺激景氣。五種燈號由熱至冷依序為：紅燈→黃紅燈→綠燈→黃藍燈→藍燈。"],"src":"國發會景氣對策信號燈號意義；證基會《投資學》題庫第5章"},{"id":"IV-C-018","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":2,"q":"下列何者屬於我國景氣「領先指標」之構成項目？","options":["失業率","工業生產指數","股價指數","金融業隔夜拆款利率"],"answer":2,"explain":["錯誤。失業率為「落後指標」之構成項目；景氣好轉一段時間後，企業才逐步增聘人力，故失業率之變動落後於景氣。","錯誤。工業生產指數為「同時指標」之構成項目，與當期景氣同步變動。","正確。股價指數反映投資人對「未來」景氣與企業獲利之預期，走勢通常領先實體景氣，為領先指標之構成項目；領先指標尚包括外銷訂單、實質貨幣總計數M1B等。","錯誤。金融業隔夜拆款利率為「落後指標」之構成項目。"],"src":"國發會景氣指標分類（領先／同時／落後指標構成項目）；證基會《投資學》題庫第5章"},{"id":"IV-C-019","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":2,"q":"下列何者屬於景氣「落後指標」之構成項目？","options":["外銷訂單動向指數","實質貨幣總計數M1B","製造業營業氣候測驗點","失業率"],"answer":3,"explain":["錯誤。外銷訂單動向指數反映廠商對未來接單情勢之預期，屬「領先指標」之構成項目。","錯誤。實質貨幣總計數M1B反映市場資金動能，其變動領先景氣，屬「領先指標」之構成項目。","錯誤。製造業營業氣候測驗點為廠商對未來景氣看法之調查結果，屬「領先指標」之構成項目。","正確。失業率之變動落後於景氣循環：景氣復甦相當時間後，廠商確認訂單回穩才增聘人力，失業率方才下降，故屬「落後指標」；落後指標尚包括金融業隔夜拆款利率等。"],"src":"國發會景氣指標分類（領先／同時／落後指標構成項目）；證基會《投資學》題庫第5章"},{"id":"IV-C-020","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":2,"q":"依我國中央銀行對貨幣總計數之定義，下列何者計入M2、但「不」計入M1B？","options":["活期儲蓄存款","支票存款","定期存款","通貨淨額"],"answer":2,"explain":["錯誤。活期儲蓄存款為M1B之構成項目（M1B＝M1A＋活期儲蓄存款），自然也包含於M2。","錯誤。支票存款屬M1A之構成項目，M1B與M2皆包含之。","正確。定期存款屬「準貨幣」；M2＝M1B＋準貨幣（含定期存款、定期儲蓄存款、外匯存款等），故定期存款計入M2但不計入M1B。此區分是判讀資金動能之基礎。","錯誤。通貨淨額為最狹義之貨幣構成，M1A、M1B、M2皆包含之。"],"src":"中央銀行貨幣總計數定義：M1B＝M1A＋活儲、M2＝M1B＋準貨幣；證基會《投資學》題庫第5章"},{"id":"IV-C-021","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":3,"q":"當M1B年增率自下方向上突破M2年增率（俗稱「黃金交叉」）時，市場通常之解讀為何？","options":["資金自活期性存款流向定期性存款，股市資金動能轉弱","資金自定期性存款流向活期性存款，股市資金動能轉強","中央銀行必將立即調高存款準備率","通貨膨脹壓力必然消失"],"answer":1,"explain":["錯誤。方向顛倒。M1B相對走強代表資金流「入」活期性存款；若M1B年增率跌破M2年增率（死亡交叉），才代表資金轉入定存、股市動能轉弱。","正確。M1B以活期性存款為主，流動性高、可隨時投入股市；M1B年增率上穿M2年增率，顯示資金由定期性存款轉入活期性存款，市場常解讀為股市「資金行情」可期之訊號。M1B與股市資金動能之關聯為高頻考點。","錯誤。貨幣總計數變化僅為央行決策參考之一，黃金交叉並不必然導致調高存款準備率。","錯誤。資金活化與通膨壓力消失並無必然關係，「必然」之敘述過於絕對。"],"src":"M1B與股市資金動能之關係（M1B/M2黃金交叉）；證基會《投資學》題庫第5章"},{"id":"IV-C-022","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":1,"q":"其他條件不變下，市場利率大幅「上升」對股票市場之影響，下列敘述何者正確？","options":["股票評價之折現率上升，股價通常下跌","企業借款成本下降，獲利提升","資金將自債市大量流入股市，推升股價","利率與股價完全無關"],"answer":0,"explain":["正確。利率上升使投資人必要報酬率（折現率）上升，依股利折現模型股票現值下降；同時企業資金成本上升、獲利受壓，兩管道皆使股價偏空。","錯誤。利率上升使企業「借款成本上升」而非下降，將侵蝕獲利，敘述方向顛倒。","錯誤。利率上升時，定存與債券等固定收益工具之吸引力提高，資金通常自股市流「出」，而非流入。","錯誤。利率是股票評價之核心變數，透過折現率與企業資金成本雙重管道影響股價。"],"src":"利率與股價之關係（折現率效果、資金成本效果）；證基會《投資學》題庫第5章"},{"id":"IV-C-023","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":3,"q":"關於匯率變動對我國經濟與股市之影響，下列敘述何者正確？","options":["新臺幣升值將使進口物價上漲，加重輸入性通膨","新臺幣升值有利於以出口為主之電子業獲利","日圓、歐元對美元貶值，將使我國以美元計價之外匯存底（內含日圓、歐元資產）金額增加","新臺幣升值使進口物價下跌，有助於減輕國內通膨壓力"],"answer":3,"explain":["錯誤。新臺幣升值使以外幣計價之進口商品換算成新臺幣後變便宜，進口物價「下跌」而非上漲。","錯誤。新臺幣升值使我國出口商品之外幣競爭力下降，且出口商持有之外幣應收帳款產生匯損，對出口導向之電子業不利。","錯誤。外匯存底中之日圓、歐元資產折算為美元時，因日圓、歐元對美元貶值而縮水，以美元計價之外匯存底金額「減少」。","正確。新臺幣升值→進口原物料與商品以新臺幣計價變便宜→進口物價下跌→有助抑制國內物價、減輕通膨壓力。"],"src":"匯率變動之經濟效果（升值與進口物價、外匯存底之計價變化）；證基會《投資學》題庫第5章"},{"id":"IV-C-024","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":3,"q":"當市場出現「未預期」之物價大幅上漲時，股價通常之反應為何？","options":["上漲，因企業名目營收必隨物價同步增加","下跌，因市場預期中央銀行將採取緊縮貨幣政策，折現率上升","不變，因物價資訊與股價無關","上漲，因股票在任何期間都是完美之通膨避險工具"],"answer":1,"explain":["錯誤。名目營收或有增加，但原料與人工成本同步上升，且未預期通膨引發之緊縮預期與折現率上升效果通常居於主導，整體對股價不利。","正確。未預期之物價大幅上漲使市場預期央行將升息（緊縮貨幣政策），無風險利率與股票評價之折現率隨之上升，股票現值下修，股價通常以下跌反應。","錯誤。通膨資訊直接影響利率預期、企業成本與評價折現率，與股價高度相關。","錯誤。長期而言股票或具部分抗通膨性質，但面對「未預期」之通膨衝擊，短期股價通常下跌，並非完美之通膨避險工具。"],"src":"未預期通膨與股價之關係（緊縮預期、折現率上升）；證基會《投資學》題庫第5章"},{"id":"IV-C-025","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":1,"q":"某國本年度失業率為3.8%、消費者物價上漲率為2.2%、經濟成長率為3.0%，該國之「痛苦指數」為何？","options":["6.0%","3.0%","9.0%","1.6%"],"answer":0,"explain":["正確。痛苦指數＝失業率＋物價上漲率＝3.8%＋2.2%＝6.0%。經濟成長率為干擾條件，不列入計算。","錯誤。3.0%為經濟成長率本身；痛苦指數之組成為失業率與物價上漲率，與經濟成長率無關。","錯誤。9.0%係誤將三項指標全部相加（3.8%＋2.2%＋3.0%）。","錯誤。1.6%係誤將失業率「減去」物價上漲率；痛苦指數為兩者「相加」。"],"src":"痛苦指數＝失業率＋物價上漲率；證基會《投資學》題庫第5章"},{"id":"IV-C-026","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":1,"q":"產業生命週期各階段中，產業銷售額與獲利快速成長、市場需求大幅擴張，最適合成長型投資人介入之階段為何？","options":["草創期","成熟期","衰退期","成長期"],"answer":3,"explain":["錯誤。草創期產品尚未被市場普遍接受，公司失敗率高、多數尚未穩定獲利，投資風險為各階段最大，較適合創業投資而非一般成長型投資人。","錯誤。成熟期市場趨於飽和、營收成長明顯趨緩，公司多以提高股利發放率回饋股東，屬收益型標的。","錯誤。衰退期需求萎縮、獲利下滑，一般投資人應避免介入。","正確。成長期產品已獲市場接受，營收與獲利快速成長，股價具上漲潛力，最適合追求資本利得之成長型投資人。"],"src":"產業生命週期（草創→成長→成熟→衰退）各階段特徵；證基會《投資學》題庫第5章"},{"id":"IV-C-027","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":2,"q":"下列關於產業生命週期與產業特性之敘述，何者「錯誤」？","options":["草創期公司失敗率高，投資風險為各階段中最大","成熟期產業成長趨緩，公司通常提高股利發放率","高科技產業具成長快速、技術密集與世界性市場之特性，但產品生命週期通常較短","衰退期產業因股價已低，市場通常給予最高之本益比評價"],"answer":3,"explain":["敘述正確，非本題答案。草創期產品與商業模式尚未經市場驗證，公司倒閉率高，投資風險最大。","敘述正確，非本題答案。成熟期再投資機會減少，公司傾向將盈餘以現金股利發放，股利發放率上升。","敘述正確，非本題答案。高科技產業成長快、市場遍及全球、技術密集，但因技術更迭快速，產品生命週期通常較短，此為其投資風險來源之一。","敘述錯誤，為本題答案。衰退期產業之獲利與前景惡化，市場給予之本益比評價通常「偏低」；高本益比通常出現於具高成長預期之成長期產業。"],"src":"產業生命週期特徵與高科技產業特性；證基會《投資學》題庫第5章"},{"id":"IV-C-028","exam":"gaoye-invest","subject":"","topic":"基本分析","difficulty":1,"q":"景氣衰退期間，下列何類股票之營收與股價通常相對「抗跌」？","options":["鋼鐵類股","營建類股","食品與公用事業類股","塑化類股"],"answer":2,"explain":["錯誤。鋼鐵為典型之景氣循環產業，需求隨景氣榮枯大幅波動，衰退期首當其衝。","錯誤。營建業對利率與景氣高度敏感，屬景氣循環股，衰退期表現通常不佳。","正確。食品、公用事業（電力、瓦斯等）之產品為民生必需，需求所得彈性低、受景氣波動影響小，屬防禦性類股，景氣衰退期間相對抗跌。","錯誤。塑化為景氣循環產業，產品報價與需求隨景氣起伏，並非防禦性類股。"],"src":"景氣循環股（塑化、鋼鐵、營建）與防禦性類股（食品、公用）之分類；證基會《投資學》題庫第5章"},{"id":"IV-C-029","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":1,"q":"某基金過去一年之平均報酬率為10%，報酬率標準差20%，β係數0.8，同期間無風險利率為2%。該基金之Sharpe（夏普）指標為何？","options":["0.40","0.50","0.10","0.08"],"answer":0,"explain":["正確。Sharpe指標＝(Rp−Rf)／σp＝(10%−2%)÷20%＝8%÷20%＝0.40，衡量每承擔一單位「總風險」可獲得之超額報酬；β為干擾條件。","錯誤。0.50（10%÷20%）係分子未扣除無風險利率；Sharpe指標之分子為超額報酬(Rp−Rf)，非總報酬。","錯誤。0.10（(10%−2%)÷0.8）係誤以β為分母，此為Treynor指標之算法；題目同時給σ與β即在誘導用錯分母。","錯誤。0.08僅為超額報酬8%本身，尚未除以風險進行風險調整。"],"src":"Sharpe指標＝(Rp−Rf)/σp（以總風險調整）；證基會《投資學》題庫第8章投資組合管理"},{"id":"IV-C-030","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":2,"q":"某投資組合年報酬率12%，β係數1.5，報酬率標準差30%，同期無風險利率3%。該組合之Treynor（崔納）指標為何？","options":["0.30","0.08","0.09","0.06"],"answer":3,"explain":["錯誤。0.30（(12%−3%)÷30%）係以標準差為分母，此為Sharpe指標之算法；標準差在本題為干擾條件。","錯誤。0.08（12%÷1.5）係分子未扣除無風險利率；Treynor之分子為風險溢酬(Rp−Rf)。","錯誤。0.09僅為風險溢酬(12%−3%)本身，尚未除以β進行風險調整。","正確。Treynor指標＝(Rp−Rf)／βp＝(12%−3%)÷1.5＝9%÷1.5＝6%（0.06），衡量每承擔一單位「系統風險」之超額報酬，適用於已充分分散之投資組合。"],"src":"Treynor指標＝(Rp−Rf)/βp（以系統風險調整）；證基會《投資學》題庫第8章"},{"id":"IV-C-031","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":2,"q":"某基金年報酬率15%，β係數1.2，同期市場投資組合報酬率12%，無風險利率4%。該基金之Jensen α為何？","options":["3.0%","1.4%","−1.4%","11.0%"],"answer":1,"explain":["錯誤。3.0%（15%−12%）僅是與市場報酬之簡單差距，未依β調整風險；β＝1.2之基金承擔較高系統風險，本應賺得高於市場之報酬。","正確。CAPM要求報酬＝Rf＋β×(Rm−Rf)＝4%＋1.2×(12%−4%)＝4%＋9.6%＝13.6%；Jensen α＝實際報酬−要求報酬＝15%−13.6%＝1.4%。α＞0表示經風險調整後績效優於市場（打敗大盤）。","錯誤。正負號顛倒；實際報酬15%「高於」CAPM要求報酬13.6%，α應為正值。","錯誤。11.0%（15%−4%）僅為超額報酬，未再扣除承擔市場風險應得之補償β×(Rm−Rf)＝9.6%。"],"src":"Jensen α＝Rp−[Rf＋βp(Rm−Rf)]；證基會《投資學》題庫第8章"},{"id":"IV-C-032","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":2,"q":"某主動式管理基金年報酬率10%，標竿指數報酬率7%，主動報酬之追蹤誤差為4%，無風險利率2%。該基金之資訊比率（Information Ratio）為何？","options":["2.00","2.50","0.75","1.75"],"answer":2,"explain":["錯誤。2.00（(10%−2%)÷4%）係誤以「無風險利率」為比較基準；資訊比率之分子是相對於「標竿指數」之超額報酬，非相對於無風險利率。","錯誤。2.50（10%÷4%）係分子未扣除標竿報酬。","正確。資訊比率IR＝(Rp−Rb)／追蹤誤差＝(10%−7%)÷4%＝3%÷4%＝0.75，衡量經理人每承擔一單位主動風險（追蹤誤差）所創造之主動報酬，是評估「主動管理能力」之指標。","錯誤。1.75（7%÷4%）係誤以標竿報酬除以追蹤誤差，計算對象錯置。"],"src":"資訊比率IR＝(Rp−Rb)/追蹤誤差；證基會《投資學》題庫第8章"},{"id":"IV-C-033","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":2,"q":"某投資人將「全部資產」單獨投資於一檔共同基金，未持有其他任何資產。評估該基金之績效時，最適合採用下列何項指標？","options":["Sharpe指標，因投資人承擔基金之總風險（含非系統風險）","Treynor指標，因僅系統風險與投資人攸關","Jensen α，因其完全不需考慮風險","僅比較各基金絕對報酬率之高低即可"],"answer":0,"explain":["正確。投資人將全部財富集中於單一基金、未另行分散投資，基金之非系統風險無從被其他資產抵銷，總風險（標準差）皆由投資人承擔，故應採以「總風險」調整之Sharpe指標。","錯誤。Treynor以β（系統風險）為分母，其前提是投資組合已充分分散、非系統風險可忽略；本題投資人未分散，非系統風險亦攸關。","錯誤。Jensen α係以CAPM為基準之風險調整指標（使用β），並非不需考慮風險，且其以系統風險為基礎，亦不完全適合未分散之情境。","錯誤。僅比較絕對報酬率完全忽略風險差異；高報酬可能只是承擔高風險之結果，非管理能力之展現。"],"src":"績效指標適用情境（未充分分散用Sharpe、充分分散用Treynor）；證基會《投資學》題庫第8章"},{"id":"IV-C-034","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":1,"q":"下列績效評估指標中，何者係以「系統風險（β）」作為風險調整之分母？","options":["Sharpe指標","變異係數","資訊比率","Treynor指標"],"answer":3,"explain":["錯誤。Sharpe指標之分母為報酬率標準差（總風險），非β。","錯誤。變異係數CV＝σ／E(R)，以標準差衡量每單位期望報酬所承擔之總風險，與β無關。","錯誤。資訊比率之分母為追蹤誤差（主動報酬之標準差），衡量主動管理風險。","正確。Treynor指標＝(Rp−Rf)／βp，以β（系統風險）為分母。記憶口訣「夏總、崔貝、簡森差」：Sharpe除以總風險、Treynor除以β、Jensen算與CAPM要求報酬之差距。"],"src":"績效指標公式比較（Sharpe/Treynor/Jensen/IR之風險分母）；證基會《投資學》題庫第8章"},{"id":"IV-C-035","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":3,"q":"甲、乙兩基金過去一年績效如下：甲基金報酬率14%、β＝1.0；乙基金報酬率16%、β＝1.5。同期市場報酬率12%、無風險利率4%。以Jensen α評估，下列敘述何者正確？","options":["乙基金α較高，風險調整後績效較佳","兩基金α相等，績效無差異","甲基金α＝2%、乙基金α＝0%，風險調整後甲基金績效較佳","乙基金報酬率較高，故在任何績效指標下皆必然較佳"],"answer":2,"explain":["錯誤。乙基金之「絕對報酬」雖較高，但其β亦較高；經CAPM風險調整後，α乙＝0%低於α甲＝2%，績效反而較差。","錯誤。兩基金α分別為2%與0%，並不相等。","正確。α甲＝14%−[4%＋1.0×(12%−4%)]＝14%−12%＝2%；α乙＝16%−[4%＋1.5×(12%−4%)]＝16%−16%＝0%。甲基金創造正的風險調整後超額報酬，績效較佳；乙基金僅賺到承擔較高β「應得」之報酬，無管理加值。","錯誤。絕對報酬高不代表風險調整後績效佳；乙之高報酬主要來自承擔較高之系統風險，非選股或擇時能力。"],"src":"Jensen α＝Rp−[Rf＋βp(Rm−Rf)]之比較應用；證基會《投資學》題庫第8章"},{"id":"IV-C-036","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":1,"q":"下列何者屬於「消極型」（被動式）投資組合管理策略？","options":["依景氣循環變化進行擇時進出","積極挖掘並加碼價格被低估之個股","頻繁進行產業輪動與持股調整","複製市場指數成分之指數化投資並長期買進持有"],"answer":3,"explain":["錯誤。擇時（market timing）企圖預測市場高低點進出，屬積極型策略之核心手段。","錯誤。選股（stock selection）尋找價格低估之標的以獲取超額報酬，屬積極型策略。","錯誤。產業輪動須主動預測各產業之相對強弱並頻繁調整持股，屬積極型策略。","正確。消極型策略不企圖打敗市場，以「指數化投資」與「買進持有」為代表，目標在複製市場報酬，並將交易成本與管理費用降至最低；其理論基礎與效率市場假說相呼應。"],"src":"積極型vs消極型投資策略（擇時、選股vs指數化、買進持有）；證基會《投資學》題庫第8章"},{"id":"IV-C-037","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":2,"q":"基金經理人若預期股市即將進入「空頭市場」，下列投資組合調整何者最「不」恰當？","options":["提高投資組合之β係數","增加現金與債券之比重","降低股票持股比率","將持股汰換為低β之防禦性個股"],"answer":0,"explain":["最不恰當，為本題答案。β愈高，組合隨市場下跌之幅度愈大；預期空頭時應「降低」組合β以減輕損失，提高β是預期多頭時放大獲利之作法。","恰當之作法。增加現金與債券等防禦性資產之比重，可降低股市下跌對組合之衝擊。","恰當之作法。降低持股比率即減少股市曝險，符合空頭預期下之防禦性調整。","恰當之作法。改持低β之防禦性個股，可降低組合對大盤下跌之敏感度。"],"src":"空頭市場之組合調整（降低β、增加現金債券比重）；證基會《投資學》題庫第8章"},{"id":"IV-C-038","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":2,"q":"某開放型基金之總資產市值為新臺幣52億元，總負債2億元，在外流通受益權單位數為4億單位。該基金每受益權單位之淨值（NAV）為何？","options":["12.5元","13.0元","13.5元","12.0元"],"answer":0,"explain":["正確。NAV＝(總資產−總負債)÷在外受益權單位數＝(52億−2億)÷4億＝50億÷4億＝12.5元。開放型基金即按每日計算之NAV供投資人申購與贖回。","錯誤。13.0元（52÷4）係漏未扣除總負債2億元；NAV之分子為基金淨資產。","錯誤。13.5元（(52＋2)÷4）係誤將負債「加入」資產；負債應自總資產中扣除。","錯誤。12.0元係重複扣除負債（(52−2−2)÷4）之結果，負債僅須扣除一次。"],"src":"基金淨值NAV＝(總資產−總負債)/在外受益單位數；證基會《投資學》題庫第8章"},{"id":"IV-C-039","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":1,"q":"關於開放型基金與封閉型基金之敘述，下列何者正確？","options":["封閉型基金投資人可隨時按淨值向投信公司申購與贖回","開放型基金掛牌後僅能於集中市場按市價買賣","封閉型基金發行單位數固定，於集中市場按市價交易，市價常低於淨值而出現折價","開放型基金之淨值必定高於封閉型基金"],"answer":2,"explain":["錯誤。可隨時按淨值申購贖回者為「開放型」基金；封閉型基金發行後不接受申購贖回，投資人僅能於次級市場轉讓。","錯誤。於集中市場按市價買賣是「封閉型」基金之交易方式；開放型基金係按每日淨值向基金公司申購贖回，規模隨申贖增減。","正確。封閉型基金規模固定、掛牌於集中市場以市價交易；市價由市場供需決定而可能偏離淨值，實務上常出現「折價」（市價低於淨值）現象。","錯誤。基金淨值高低取決於各自之投資績效與發行價格，與基金為開放型或封閉型並無必然關係。"],"src":"開放型vs封閉型基金特性（申贖方式、規模、折溢價）；證基會《投資學》題庫第8章"},{"id":"IV-C-040","exam":"gaoye-invest","subject":"","topic":"投資組合管理與績效","difficulty":3,"q":"某ETF於集中市場之市價明顯「高於」其每單位淨值（呈現溢價）時，套利者可採行下列何種操作以賺取價差？","options":["於市場買進ETF，同時申請實物贖回換取一籃子股票後賣出","買進一籃子成分股票向投信申購ETF，同時於集中市場賣出ETF","同時買進ETF與一籃子成分股票，等待兩者價格上漲","市價高於淨值時並不存在任何套利空間"],"answer":1,"explain":["錯誤。此為「折價」（市價低於淨值）時之套利方向：低價買進ETF、申請贖回換取一籃子股票，再按較高之股票價值賣出。","正確。溢價時ETF市價相對其淨值昂貴：以較低成本買進一籃子成分股票申購（創造）ETF單位，同時在集中市場以較高市價賣出ETF，即可賺取溢價價差。此套利會增加ETF在外單位數與市場供給，促使市價向淨值收斂，是ETF市價貼近淨值之關鍵機制。","錯誤。同時作多ETF與成分股只是加倍曝險，並未鎖住價差，不具套利性質。","錯誤。ETF具實物申購／贖回機制，市價明顯偏離淨值即產生套利機會；套利活動正是使折溢價收斂之原因。"],"src":"ETF實物申購／贖回與折溢價套利機制；證基會《投資學》題庫第1章、第8章"},{"id":"IV-D-001","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"依據道氏理論（Dow Theory），股價波動可分為三種趨勢，其中「主要趨勢（基本趨勢）」持續之期間通常為何？","options":["數小時至數日之內","三週至數個月","一年以上","固定恰好為十年"],"answer":2,"explain":["錯誤。數小時至數日之短暫波動屬「日常波動」，為道氏理論三種趨勢中期間最短者。","錯誤。持續三週至數個月者為「次級波動」，屬主要趨勢行進間之修正（折返）走勢。","正確。道氏理論將股價波動分為主要趨勢、次級波動與日常波動三個層級；主要趨勢代表市場長期多空方向，通常持續一年以上。","錯誤。道氏理論並未規定主要趨勢固定為十年，僅指其通常持續一年以上。"],"src":"道氏理論三種趨勢（證基會《投資學》學習指南與題庫第4章 證券投資技術分析）"},{"id":"IV-D-002","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"關於道氏理論之敘述，下列何者正確？","options":["道氏理論以股價「指數」表達整體市場之主要趨勢方向","道氏理論能明確指出投資人應買進或賣出哪一支個股","道氏理論對次級波動之判斷十分精確，為其最大優點","道氏理論認為股價僅存在日常波動一種趨勢"],"answer":0,"explain":["正確。道氏理論為趨勢分析之鼻祖，係以股價指數（如道瓊工業指數）表達整體市場主要趨勢之方向。","錯誤。道氏理論僅能研判大盤整體趨勢，「無法告訴投資人應買進哪一支股票」正是其著名缺點之一。","錯誤。道氏理論對次級波動之判斷並不精確，此為其常被批評之缺點，並非優點。","錯誤。道氏理論將股價波動分為主要趨勢、次級波動與日常波動三種，並非僅有日常波動。"],"src":"道氏理論之內涵與缺點（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-003","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"就K線（陰陽線）而言，出現「紅體（陽線）」表示當日價格間之關係為何？","options":["開盤價高於收盤價","收盤價高於開盤價","收盤價等於當日最高價","當日最高價等於最低價"],"answer":1,"explain":["錯誤。開盤價高於收盤價時，K線為黑體（陰線），代表當日收跌。","正確。紅體（陽線）代表收盤價高於開盤價；實體上緣為收盤價、下緣為開盤價，上影線頂端為當日最高價、下影線底端為當日最低價。","錯誤。紅體僅表示收盤價高於開盤價；若當日留有上影線，最高價仍高於收盤價。","錯誤。最高價等於最低價表示全日僅以單一價格成交（一字線，如一價到底之漲跌停），與紅體之定義無關。"],"src":"K線紅黑實體與上下影線之定義（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-004","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"某日個股之開盤價與收盤價幾乎相同，K線留有明顯之上、下影線而形成「十字線」，其一般之技術意涵為何？","options":["多方力道壓倒性勝出，後市必然大漲","空方力道壓倒性勝出，後市必然大跌","當日完全沒有成交量","多空力道暫時勢均力敵，常被視為可能變盤之觀察訊號"],"answer":3,"explain":["錯誤。十字線並非多方壓倒性勝出之型態；收盤價遠高於開盤價之長紅棒才代表多方力道強勁。","錯誤。十字線亦非空方全面獲勝之型態；長黑棒才代表空方力道強勁。","錯誤。十字線係因開盤價與收盤價相近所致，當日仍有正常成交，並非無量。","正確。十字線代表開盤價≒收盤價，多空拉鋸、勢均力敵；出現於高檔或低檔時，常被視為趨勢可能轉折（變盤）之觀察訊號。"],"src":"K線十字線之意義（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-005","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"股價經過一段漲勢後形成「頭肩頂」型態，並帶量跌破頸線，下列敘述何者正確？","options":["屬底部反轉型態，為買進訊號","屬頭部反轉型態，跌破頸線後空頭走勢確立，原頸線支撐日後常轉為壓力","屬整理型態，整理完成後將延續原上升趨勢","頭肩頂之「頭部」必低於左右兩肩"],"answer":1,"explain":["錯誤。頭肩頂為「頭部」反轉型態；底部反轉型態為頭肩底、W底（雙重底）等。","正確。頭肩頂由左肩、頭部、右肩組成（頭部最高），帶量跌破頸線代表支撐失守、趨勢由多轉空；且依「支撐與壓力互換」原理，跌破後之原頸線支撐常成為日後反彈之壓力。","錯誤。頭肩頂屬反轉型態；旗形、三角形等才屬整理（連續）型態。","錯誤。頭肩頂之頭部為三個波峰中之最高點，高於左右兩肩。"],"src":"頭肩頂型態、頸線與支撐壓力互換（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-006","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"下列何種價格型態一般被視為「底部反轉、後市偏多」之訊號？","options":["W底（雙重底）","M頭（雙重頂）","頭肩頂","高檔區出現之長黑K線"],"answer":0,"explain":["正確。W底（雙重底）係股價兩度回測低點均獲支撐、不再破底，向上突破頸線後確認底部反轉完成，屬偏多之買進訊號。","錯誤。M頭（雙重頂）為頭部反轉型態，跌破頸線後偏空。","錯誤。頭肩頂為頭部反轉型態，跌破頸線代表空頭走勢確立。","錯誤。高檔區之長黑K線顯示空方力道轉強，屬偏空訊號。"],"src":"W底與M頭型態之多空意涵（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-007","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"關於「旗形（Flag）」型態之敘述，下列何者正確？","options":["旗形屬反轉型態，出現後原趨勢必定反轉","旗形僅會出現於空頭市場","旗形屬整理（連續）型態，整理完成後股價通常朝原有趨勢方向續行","旗形整理期間通常長達一年以上"],"answer":2,"explain":["錯誤。旗形屬整理型態而非反轉型態；頭肩頂、W底等才是反轉型態。","錯誤。旗形於多頭與空頭市場均可能出現：上升趨勢中有上升旗形整理，下降趨勢中亦有下降旗形。","正確。旗形為趨勢行進間之短暫整理（連續型態），整理結束突破旗形後，股價通常延續原有趨勢方向續行。","錯誤。旗形屬短期整理型態，整理時間通常不長；持續一年以上者屬主要趨勢層級之波動。"],"src":"旗形整理型態（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-008","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"下列何種技術分析工具係以「成交量」之累積增減為編製基礎，用以觀察量能與股價之關係？","options":["OBV能量潮","寶塔線","RSI相對強弱指標","乖離率（BIAS）"],"answer":0,"explain":["正確。OBV（能量潮）係將股價上漲日之成交量累加、下跌日之成交量累減而編成；其理論基礎為：買賣雙方對股票合理價格之認定愈不一致，成交量愈大，故可藉量之累積研判價格走勢。","錯誤。寶塔線係以「收盤價」漲跌繪製之價格線路，翻紅一般視為買進訊號、翻黑視為賣出訊號，與成交量無關。","錯誤。RSI係以一段期間之平均漲幅與平均跌幅計算，屬價格動能指標。","錯誤。乖離率衡量股價偏離移動平均線之百分比，亦屬價格面指標。"],"src":"OBV能量潮與寶塔線之編製基礎（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-009","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"技術分析中之「移動平均線（MA）」，其所代表之基本意義為何？","options":["當日盤中每筆成交之即時均價","公司過去一年之每股盈餘平均值","未來股價之保證水準","過去一段期間市場投資人之平均持股成本，可用以觀察趨勢方向"],"answer":3,"explain":["錯誤。移動平均線係以「過去n個交易日之收盤價」計算之平均值，並非當日盤中即時均價。","錯誤。移動平均線為價格資料之平均，與每股盈餘等基本面數據無關。","錯誤。移動平均線僅反映過去之平均成本與趨勢，無法保證未來股價水準。","正確。n日移動平均線代表過去n日買進者之平均持股成本；股價與均線之相對位置及均線之方向，可用以研判支撐、壓力與趨勢方向。"],"src":"移動平均線之意義（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-010","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":3,"q":"依葛蘭碧（Granville）八大法則，下列何者屬於「賣出」訊號？","options":["移動平均線由下降轉為走平或上揚，且股價自下方向上突破均線","股價自高檔向下跌破走平或已下彎之移動平均線","股價回檔至上揚之均線附近，未跌破即獲支撐回升","股價暴跌遠離下彎之均線，負乖離過大"],"answer":1,"explain":["錯誤。此為葛蘭碧法則之典型「買進」訊號：均線止跌轉強且股價向上突破均線，為第一買點。","正確。均線走平或下彎時股價跌破均線，代表市場平均持股成本之支撐失守、趨勢轉弱，屬葛蘭碧八大法則之賣出訊號。","錯誤。股價回測上揚之均線獲支撐回升，屬「買進」訊號（拉回買點）。","錯誤。股價暴跌遠離均線、負乖離過大時，短線有向均線修正之反彈需求，屬短線「買進」訊號而非賣出訊號。"],"src":"葛蘭碧八大法則之買賣訊號（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-011","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"KD隨機指標中，當K值由下方向上穿越D值時，一般稱為何種訊號？","options":["黃金交叉，視為買進訊號","死亡交叉，視為賣出訊號","高檔鈍化，指標失去參考價值","量價背離，趨勢即將反轉"],"answer":0,"explain":["正確。K線為快速線、D線為慢速線；K值由下往上穿越D值稱為黃金交叉，屬買進訊號，若發生於20以下之低檔區，訊號意義更強。","錯誤。死亡交叉係指K值由上往下跌破D值，方屬賣出訊號。","錯誤。鈍化係指KD值長期停留於80以上（或20以下）高低檔區之現象，與K、D兩線之交叉不同。","錯誤。量價背離係成交量與股價走勢不一致之現象，與KD線交叉無關。"],"src":"KD指標黃金交叉與死亡交叉；K＝⅔K′＋⅓RSV、D＝⅔D′＋⅓K（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-012","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"某股票最近9個交易日之最高價為60元、最低價為50元，今日收盤價為58元，則其9日RSV（未成熟隨機值）為何？","options":["20","58","80","96.7"],"answer":2,"explain":["錯誤。20係誤以（最高價−收盤價）為分子之結果：(60−58)/(60−50)×100＝20，計算方向弄反。","錯誤。58僅為收盤價本身之數字，並非RSV。","正確。RSV＝(今日收盤價−9日內最低價)/(9日內最高價−9日內最低價)×100＝(58−50)/(60−50)×100＝8/10×100＝80。","錯誤。96.7係誤將收盤價直接除以9日最高價（58/60×100≈96.7），並非RSV公式。"],"src":"RSV公式：RSV＝(收−L)/(H−L)×100（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-013","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":3,"q":"強勢多頭行情中，某股之KD值連續多日維持在80以上，關於此「高檔鈍化」現象，下列敘述何者正確？","options":["KD值可無限上升，故不會有鈍化問題","高檔鈍化必為股價即將崩跌之訊號，應立即放空","鈍化現象僅會發生於20以下之低檔區","KD值受限於0至100之間，強勢行情中常於80以上高檔區徘徊；若僅憑超買訊號過早賣出，恐錯失波段漲勢"],"answer":3,"explain":["錯誤。KD值介於0與100之間，有上下限；正因指標有界，才會產生高低檔鈍化現象。","錯誤。高檔鈍化常出現於強勢多頭行情，並非崩跌前兆；鈍化期間超買訊號之參考價值反而降低。","錯誤。鈍化於80以上之高檔區與20以下之低檔區皆可能發生，並非僅限低檔。","正確。KD有0～100之上下限，強勢（弱勢）行情中會在高（低）檔區鈍化；此時不宜單憑80以上之超買訊號即行賣出，宜搭配其他指標（如無鈍化問題之乖離率）綜合研判。"],"src":"KD指標高低檔鈍化（證基會《投資學》學習指南與題庫第4章；歷屆高頻考點：KD、RSI有鈍化）"},{"id":"IV-D-014","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"某股最近6個交易日之平均漲幅為3元、平均跌幅為1元，依RSI公式計算，其6日RSI為何？","options":["25","33.3","50","75"],"answer":3,"explain":["錯誤。25係誤以平均跌幅為分子之結果：100×1/(3＋1)＝25，方向弄反。","錯誤。33.3係誤算為100×(平均跌幅/平均漲幅)＝100×1/3≈33.3，公式引用錯誤。","錯誤。50代表平均漲幅與平均跌幅相等之均衡情況；本題漲幅大於跌幅，RSI應高於50。","正確。RSI＝100×平均漲幅/(平均漲幅＋平均跌幅)＝100×3/(3＋1)＝75。RSI高於50表示近期買方力道較強，數值愈接近100愈趨於超買。"],"src":"RSI公式：RSI＝100×U/(U＋D)（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-015","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"關於RSI（相對強弱指標）之敘述，下列何者正確？","options":["RSI數值無上下限，可能出現負值","RSI介於0與100之間；數值愈接近100代表市場愈趨於超買，愈接近0則愈趨於超賣","RSI數值愈低，代表買方力道愈強","RSI之計算與股價漲跌幅完全無關"],"answer":1,"explain":["錯誤。RSI＝100×平均漲幅/(平均漲幅＋平均跌
