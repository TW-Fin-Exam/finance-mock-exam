幅)，分子不大於分母且皆為非負值，故RSI必介於0～100之間，不會為負。","正確。RSI衡量一段期間內漲勢之相對強度：數值偏高（接近100）為超買警訊、偏低（接近0）為超賣警訊；惟RSI於高低檔亦有鈍化現象，使用時須留意。","錯誤。RSI愈「高」代表平均漲幅相對愈大、買方力道愈強；RSI愈低代表賣方力道愈強。","錯誤。RSI即由一段期間股價之平均漲幅與平均跌幅計算而得，與股價漲跌直接相關。"],"src":"RSI之數值範圍與超買超賣意涵（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-016","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":3,"q":"關於MACD指標之敘述，下列何者「錯誤」？","options":["DIF（差離值）＝12日EMA−26日EMA","MACD線為DIF之9日指數移動平均，柱狀體OSC＝DIF−MACD","MACD屬極短線之當沖指標，不適合用於研判中長期趨勢","DIF由下向上穿越MACD線，一般視為買進訊號"],"answer":2,"explain":["此敘述正確。DIF為12日與26日指數移動平均（EMA）之差，用以衡量短、長期均線之差離程度。","此敘述正確。MACD線係將DIF再取9日EMA平滑而得，並以柱狀體OSC＝DIF−MACD觀察兩線差距之變化。","此敘述錯誤，為本題答案。MACD經兩次指數平滑處理，訊號反應較平緩，屬「中長期」趨勢指標，並不適合作為極短線當沖之主要工具。","此敘述正確。DIF由下向上穿越MACD線為黃金交叉，屬買進訊號；反之由上向下跌破則為賣出訊號。"],"src":"MACD：DIF＝EMA12−EMA26、MACD＝DIF之EMA9、OSC＝DIF−MACD，屬中長期趨勢指標（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-017","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":3,"q":"下列技術指標中，何者因「無上下限」而沒有高低檔鈍化之死角？","options":["乖離率（BIAS）","KD隨機指標","RSI相對強弱指標","威廉指標（WMS%R）"],"answer":0,"explain":["正確。乖離率＝(股價−n日均線)/n日均線×100%，理論上無上下限，故不像有界指標受0～100區間限制而產生高低檔鈍化之死角。","錯誤。KD值介於0～100之間，於強勢或弱勢行情中會出現高檔或低檔鈍化。","錯誤。RSI亦介於0～100之間，高低檔同樣有鈍化現象。","錯誤。威廉指標WMS%R亦為有上下限之擺盪指標，同樣有高低檔鈍化問題。"],"src":"乖離率無上下限、無鈍化死角（證基會《投資學》學習指南與題庫第4章；歷屆實考題眼）"},{"id":"IV-D-018","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"某股今日收盤價為66元，其30日移動平均價為60元，則該股之30日乖離率為何？","options":["6%","9.09%","10%","−10%"],"answer":2,"explain":["錯誤。6%係誤將價差（66−60＝6元）直接當成百分比，漏未除以移動平均價。","錯誤。9.09%係誤以收盤價為分母：(66−60)/66≈9.09%；正確之分母應為移動平均價。","正確。乖離率＝(股價−n日均線)/n日均線×100%＝(66−60)/60×100%＝10%，為正乖離，表示股價高於30日平均持股成本10%，正乖離過大時短線有拉回修正壓力。","錯誤。−10%方向相反；股價高於均線時為「正」乖離，負乖離係股價低於均線時方會出現。"],"src":"乖離率公式：BIAS＝(股價−n日均線)/n日均線×100%（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-019","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":2,"q":"技術分析中所謂「量價背離」，下列情況何者屬之？","options":["股價上漲且成交量同步放大","股價創波段新高，但成交量反而明顯萎縮","股價下跌且成交量萎縮","股價與成交量皆持平整理"],"answer":1,"explain":["錯誤。價漲量增為量價配合之健康多頭走勢，並非背離。","正確。「量是價的先行指標」；股價創新高而成交量未能同步放大（價漲量縮），即為量價背離，顯示追價意願不足，漲勢之持續性堪虞。","錯誤。價跌量縮屬多頭市場常見之正常拉回現象，一般不視為量價背離。","錯誤。價量皆持平屬觀望盤整，並非背離。"],"src":"量價關係：量為價之先行指標、量價背離（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-020","exam":"gaoye-invest","subject":"","topic":"技術分析","difficulty":1,"q":"依艾略特（Elliott）波浪理論，一個完整之股價循環包含幾個波段？","options":["上升3波與下降5波","上升5波與下降5波","上升8波與下降3波","上升5波與下降3波（a、b、c波）"],"answer":3,"explain":["錯誤。上升與下降之波數顛倒；波浪理論為「五升三降」，並非「三升五降」。","錯誤。下降段為3波（a、b、c），並非5波。","錯誤。8波為完整循環之總波數（5＋3＝8），並非上升段之波數。","正確。波浪理論主張完整循環為上升5波（第1、3、5波為推動波，第2、4波為修正波）加下降3波（a、b、c），合計8波；其中第3波通常為最長之主升段，波幅比例常與費波南希數列相關。"],"src":"艾略特波浪理論五升三降、第3波最長（證基會《投資學》學習指南與題庫第4章）"},{"id":"IV-D-021","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"相較於遠期契約（Forward），期貨契約（Futures）之特性下列何者正確？","options":["契約條件由買賣雙方私下議定，並無標準化","契約條件標準化、於集中市場交易，並透過結算機構每日結算損益","買賣雙方均無須繳存保證金即可交易","交易對手之違約風險完全由買賣雙方自行承擔"],"answer":1,"explain":["錯誤。契約條件由雙方自行議定者為「遠期契約」；期貨之標的、數量、到期月份等條件均已標準化。","正確。期貨為標準化契約，於集中市場（交易所）公開競價交易，並透過結算機構逐日洗價（每日結算），流動性與價格透明度均高於遠期契約。","錯誤。期貨交易人須繳存保證金始得交易；因保證金遠低於契約價值，期貨具有高槓桿特性。","錯誤。期貨由結算機構介入擔保履約，交易對手信用風險大幅降低；遠期契約才須由雙方自行承擔對手違約風險。"],"src":"期貨契約特性：標準化、集中市場、每日結算、保證金交易（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-022","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":3,"q":"依持有成本理論（Cost of Carry Model），期貨理論價格F＝S×(1＋r−d)。設現貨股價指數為16,000點，一年期股價指數期貨之理論價格為16,240點，若資金成本（利率）r為3%，則隱含之現金股利率d為何？","options":["0.5%","1.0%","1.5%","3.0%"],"answer":2,"explain":["錯誤。若d＝0.5%，則F＝16,000×(1＋0.03−0.005)＝16,000×1.025＝16,400點，高於題給之16,240點。","錯誤。若d＝1.0%，則F＝16,000×(1＋0.03−0.01)＝16,000×1.02＝16,320點，仍與16,240點不符。","正確。由F＝S×(1＋r−d)：16,240＝16,000×(1＋0.03−d)，故1＋0.03−d＝16,240/16,000＝1.015，解得d＝1.03−1.015＝0.015＝1.5%。","錯誤。若d＝3.0%，則r−d＝0，F＝S＝16,000點，代表資金成本與股利收益完全抵銷，與題給正價差240點不符。"],"src":"期貨持有成本模型：F＝S×(1＋r−d)（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-023","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"目前加權股價指數現貨為16,530點，同月份臺股期貨價格為16,480點，則基差（現貨−期貨）為何？市場並處於何種狀態？","options":["基差為＋50點，市場處於逆價差","基差為−50點，市場處於正價差","基差為＋50點，市場處於正價差","基差為−50點，市場處於逆價差"],"answer":0,"explain":["正確。基差＝現貨−期貨＝16,530−16,480＝＋50點；因期貨價格低於現貨價格，市場處於「逆價差」狀態。","錯誤。正負號與價差狀態皆誤：基差＝16,530−16,480＝＋50點為正值；且期貨低於現貨為逆價差而非正價差。","錯誤。基差數值正確，惟期貨價格「低於」現貨稱為逆價差；正價差係期貨高於現貨之情況。","錯誤。逆價差之判斷正確，惟基差＝現貨−期貨＝＋50點，並非−50點。"],"src":"基差＝現貨−期貨；期貨＞現貨為正價差、期貨＜現貨為逆價差（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-024","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"當股價指數「期貨價格高於現貨價格」時，市場一般稱此狀態為何？","options":["逆價差","基差為正","期貨與現貨價格已完全收斂","正價差"],"answer":3,"explain":["錯誤。逆價差係指期貨價格「低於」現貨價格之狀態，與題意方向相反。","錯誤。基差＝現貨−期貨；期貨高於現貨時，基差為「負」值而非正值，此為常見混淆點。","錯誤。收斂係指到期日接近時期貨與現貨價格趨於一致、基差趨近於零之現象，並非指期貨高於現貨。","正確。期貨價格高於現貨價格稱為「正價差」（期貨溢價），通常反映持有成本為正（資金利息成本高於股利收益）之定價結果。"],"src":"正價差／逆價差之定義；基差＝現貨−期貨（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-025","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"隨著期貨契約到期日之接近，期貨價格與現貨價格間之基差，理論上將如何變化？","options":["持續擴大","逐漸收斂並於到期時趨近於零","維持固定不變","必由負值轉為正值後持續為正"],"answer":1,"explain":["錯誤。隨到期日接近，剩餘持有成本遞減，期貨與現貨之價差應縮小而非擴大。","正確。到期時期貨即等同現貨交割，兩者價格必然趨於一致，故基差於到期時收斂為零；若到期不收斂，將存在無風險套利機會。","錯誤。基差隨持有成本遞減與市場供需而變動，並非固定不變，且到期時必收斂於零。","錯誤。基差之正負取決於當時正逆價差之狀態，並無「必由負轉正」之規律；到期時應趨近於零。"],"src":"基差到期收斂為零（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-026","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"臺股期貨每點契約乘數為NT$200，若目前期貨指數為20,000點，交易人繳交原始保證金NT$200,000買進一口，則以原始保證金衡量之財務槓桿倍數約為幾倍？","options":["5倍","10倍","20倍","100倍"],"answer":2,"explain":["錯誤。5倍係誤用小型臺指每點NT$50計算契約價值（20,000×50＝1,000,000；1,000,000/200,000＝5倍）；臺股期貨（大台）每點為NT$200。","錯誤。10倍係誤以每點NT$100計算（20,000×100＝2,000,000；2,000,000/200,000＝10倍）。","正確。契約價值＝20,000點×NT$200＝NT$4,000,000；槓桿倍數＝契約價值/原始保證金＝4,000,000/200,000＝20倍。保證金交易使期貨具「以小搏大」之高槓桿特性，獲利與損失均同倍數放大。","錯誤。100倍明顯高估；正確計算為4,000,000/200,000＝20倍。"],"src":"臺股期貨每點NT$200；槓桿倍數＝契約價值／保證金（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-027","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"小型臺指期貨（MTX）每點契約乘數為NT$50，若期貨指數為21,000點，則一口小型臺指期貨之契約價值為何？","options":["NT$1,050,000","NT$2,100,000","NT$4,200,000","NT$105,000"],"answer":0,"explain":["正確。契約價值＝期貨指數×每點乘數＝21,000×NT$50＝NT$1,050,000。","錯誤。NT$2,100,000係誤用每點NT$100計算（21,000×100）。","錯誤。NT$4,200,000係誤用臺股期貨（大台）之乘數每點NT$200計算（21,000×200＝4,200,000）；小台每點為NT$50。","錯誤。NT$105,000係誤用每點NT$5計算，少乘了10倍。"],"src":"契約乘數：臺股期貨每點NT$200、小型臺指每點NT$50（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-028","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":3,"q":"某投資機構持有市值NT$6,000萬、β值為1.2之股票投資組合，擬利用臺股期貨對整體部位進行完全避險。若臺股期貨指數為18,000點（每點NT$200），應如何操作？","options":["買進20口臺股期貨","賣出14口臺股期貨","賣出17口臺股期貨","賣出20口臺股期貨"],"answer":3,"explain":["錯誤。持有現貨多頭部位者應「賣出」期貨建立空頭避險；買進期貨反而增加多頭曝險，毫無避險效果。","錯誤。14口係誤將β放在分母（16.67÷1.2≈13.9）之結果；β應與口數相乘，因組合波動高於大盤，所需避險口數應更多。","錯誤。17口係未經β調整之口數（60,000,000/3,600,000≈16.67，約17口），忽略了該組合之系統風險為大盤之1.2倍。","正確。每口契約價值＝18,000×NT$200＝NT$3,600,000；避險口數N＝β×(現貨組合市值/每口期貨契約價值)＝1.2×(60,000,000/3,600,000)＝1.2×16.67＝20口。持有現貨為多頭部位，應「賣出」20口期貨進行空頭避險。"],"src":"避險口數N＝β×(現貨組合市值/每口期貨契約價值)；持有現貨→賣出期貨（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-029","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"投資人持有大量股票現貨部位，擔心短期內大盤下跌造成損失，下列何種操作屬正確之避險方式？","options":["買進股價指數期貨","加碼買進股票現貨","賣出股價指數賣權","賣出股價指數期貨"],"answer":3,"explain":["錯誤。買進指數期貨為增加多頭曝險之看多操作，大盤下跌時期貨與現貨部位將同步虧損。","錯誤。加碼現貨使多頭部位更大，風險不減反增，與避險目的相違。","錯誤。賣出賣權僅能收取有限之權利金，屬「看不跌」策略；大盤重挫時賣方須承擔履約損失，不僅無法保護現貨，反而擴大下跌風險。","正確。持有現貨（多頭部位）者應賣出股價指數期貨建立空頭部位，即「空頭避險（賣出避險）」；大盤下跌時，期貨空單之獲利可彌補現貨部位之損失。"],"src":"空頭避險：持有現貨→賣出期貨（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-030","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"某股票買權之履約價格為100元，目前標的股價為112元，該買權之市場權利金為15元，則其「時間價值」為何？","options":["0元","3元","12元","15元"],"answer":1,"explain":["錯誤。時間價值須至「到期日」才遞減至零；本題權利金15元高於內含價值12元，時間價值為正。","正確。買權內含價值＝max(S−K,0)＝max(112−100,0)＝12元；時間價值＝權利金−內含價值＝15−12＝3元。時間價值隨到期日接近而遞減，到期時歸零。","錯誤。12元為「內含價值」（立即履約可實現之價值），題目問的是時間價值。","錯誤。15元為權利金總額；權利金＝內含價值（12元）＋時間價值（3元）。"],"src":"權利金＝內含價值＋時間價值；買權內含價值＝max(S−K,0)（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-031","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"某股票賣權（Put）之履約價格為80元，目前標的股價為74元，該賣權之權利金為8元，則其「內含價值」為何？","options":["6元","8元","2元","0元"],"answer":0,"explain":["正確。賣權內含價值＝max(K−S,0)＝max(80−74,0)＝6元；因股價低於履約價，本賣權為價內（in-the-money）。","錯誤。8元為權利金總額；權利金＝內含價值（6元）＋時間價值（2元）。","錯誤。2元為時間價值（權利金8元−內含價值6元），並非內含價值。","錯誤。內含價值為0係股價高於或等於履約價（價平、價外賣權）時之情況；本題S＝74元低於K＝80元，屬價內賣權。"],"src":"賣權內含價值＝max(K−S,0)；權利金＝內含價值＋時間價值（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-032","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"投資人支付權利金25元，買進一個履約價格600元之股票買權（Call），則到期時之損益兩平點為何？","options":["575元","600元","625元","650元"],"answer":2,"explain":["錯誤。575元＝600−25，係「買進賣權」之損益兩平公式（K−權利金），誤用於買權。","錯誤。600元僅為履約價格，未計入已支付之權利金成本；到期股價恰為600元時，買方仍淨損25元權利金。","正確。買進買權之損益兩平點＝履約價格＋權利金＝600＋25＝625元；到期股價須高於625元，履約利得方足以回收權利金並開始獲利。","錯誤。650元＝600＋2×25，重複計算了權利金成本。"],"src":"買買權損益兩平＝K＋權利金；買賣權損益兩平＝K−權利金（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-033","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"投資人支付權利金3元，買進一個履約價格50元之股票賣權（Put）。若到期時標的股價為42元，則每股損益為何？","options":["損失3元","獲利5元","獲利8元","獲利11元"],"answer":1,"explain":["錯誤。損失3元（權利金全數損失）係到期股價「高於」履約價50元、買方放棄履約時之結果；本題股價42元低於履約價，應履約獲利。","正確。到期履約價值＝max(K−S,0)＝max(50−42,0)＝8元；扣除權利金成本3元後，淨損益＝8−3＝＋5元（獲利5元）。","錯誤。8元僅為履約所得之內含價值，尚未扣除支付之權利金3元。","錯誤。11元係誤將權利金「加回」（8＋3）；權利金為買方之成本，應予扣除而非加回。"],"src":"買進賣權到期損益＝max(K−S,0)−權利金（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-034","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"投資人預期標的股價未來將「上漲」，下列何種選擇權基本策略較為合理？","options":["買進買權（Buy Call）或賣出賣權（Sell Put）","買進賣權（Buy Put）或賣出買權（Sell Call）","同時買進買權與買進賣權，以在盤整行情中獲利","賣出買權並同時賣出股價指數期貨"],"answer":0,"explain":["正確。預期上漲時可「買進買權」（以有限權利金換取上漲獲利空間、最大損失限於權利金），或「賣出賣權」（股價不跌破履約價即可賺取權利金），兩者為選擇權之基本看多操作，即口訣「買C賣P多頭雙路」。","錯誤。買進賣權與賣出買權皆屬看「空」策略，適用於預期股價下跌時。","錯誤。同時買進買權與賣權（買進跨式部位）係預期價格將「大幅波動」時之策略；若行情盤整，兩邊部位之時間價值同步流失反而虧損，且此組合並非單純看多。","錯誤。賣出買權與賣出期貨均為空頭部位，與看多之預期完全相反。"],"src":"看多策略：買Call、賣Put（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-035","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"其他條件不變下，下列何種變動會使「買權」（Call）之價值下降？","options":["標的股價上漲","標的股價報酬率之波動性增加","距到期日之時間增長","標的股票發放現金股利"],"answer":3,"explain":["錯誤。標的股價（S）上漲使買權更趨價內，買權價值上升。","錯誤。波動性（σ）愈大，標的價格大漲之機會愈高而下方損失仍以權利金為限，故買權與賣權價值皆上升——「波動是選擇權之母」。","錯誤。距到期時間（T）愈長，時間價值愈大，買權價值愈高。","正確。發放現金股利使除息後股價下跌，對買權持有人不利，故股利發放會使買權價值下降。影響買權價值之六因素中，S、σ、T、無風險利率r為正向；履約價格K與股利為負向。"],"src":"買權價值影響因素：S↑σ↑T↑r↑→C↑；K↑、發放股利→C↓（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-036","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"其他條件不變下，下列何種變動會使「賣權」（Put）之價值上升？","options":["標的股價上漲","無風險利率上升","標的股價下跌","標的價格波動性下降"],"answer":2,"explain":["錯誤。標的股價（S）上漲使賣權更趨價外，賣權價值下降。","錯誤。無風險利率（r）上升使履約價之現值下降，對賣權不利，賣權價值下降（r之影響方向與買權相反）。","正確。賣權為股價下跌時獲利之權利；標的股價下跌使內含價值max(K−S,0)增加之機會上升，賣權價值上升。此外，K↑、σ↑、發放股利亦均使賣權價值上升。","錯誤。波動性（σ）下降使價格大幅下跌之機會減少，賣權價值下降；σ上升對買權與賣權皆為加值因素。"],"src":"賣權價值影響因素：K↑σ↑股利↑→P↑；S↑r↑→P↓（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-037","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":3,"q":"依買賣權平價關係（Put-Call Parity），某不發放股利股票之現價S為50元，一年期歐式買權（履約價K＝50元）之權利金C為6元，無風險利率r為5%，則同履約價、同到期日之歐式賣權（Put）合理權利金約為何？","options":["2.38元","3.62元","6.00元","8.38元"],"answer":1,"explain":["錯誤。2.38元僅為履約價與其現值之差（50−47.62＝2.38），是計算過程之中間數，並非賣權價格。","正確。Put-Call Parity：C＋K/(1＋r)^T＝P＋S，移項得P＝C＋K/(1＋r)−S＝6＋50/1.05−50＝6＋47.62−50＝3.62元。","錯誤。6.00元係未將履約價折現之誤算（P＝6＋50−50＝6）；平價關係中之K須以無風險利率折算為現值。","錯誤。8.38元係將等式方向弄反之結果（50＋6−47.62＝8.38）。"],"src":"Put-Call Parity：C＋K/(1+r)^T＝P＋S（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-038","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":3,"q":"某認購權證之標的股票前一日收盤價為40元（當日漲停最多可上漲4元），權證行使比例為0.5，權證前一日收盤價（權利金）為5元。在標的股票漲停之情況下，該權證當日之理論最大漲幅為何？","options":["10%","20%","40%","80%"],"answer":2,"explain":["錯誤。10%為標的「股票」之漲停幅度；權證具槓桿特性，其漲幅上限係依標的漲停金額與行使比例換算，通常遠高於股票之10%。","錯誤。20%係誤將行使比例重複計算（4×0.5×0.5＝1元；1/5＝20%）之結果。","正確。權證最大上漲金額＝標的漲停價差×行使比例＝4×0.5＝2元；最大漲幅＝最大上漲金額/權證前收盤＝2/5×100%＝40%。","錯誤。80%係漏乘行使比例（4/5＝80%）；行使比例0.5表示一單位權證僅能認購0.5股標的股票，須乘上0.5。"],"src":"權證最大漲幅%＝(標的漲停價差×行使比例)/權證前收盤×100%（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-039","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":2,"q":"關於認購權證（Call Warrant）之敘述，下列何者正確？","options":["性質類似買權；當市場利率下跌時，其理論價值亦隨之下跌","性質類似賣權，標的股價下跌時權證價值上升","權證持有人負有依履約價買進標的股票之「義務」","市場利率之變動與認購權證之價值完全無關"],"answer":0,"explain":["正確。認購權證賦予持有人於特定期間內以約定履約價「買進」標的之權利，性質同買權；無風險利率r為買權價值之正向因素，故市場利率下跌時，認購權證理論價值隨之下跌。","錯誤。標的下跌時價值上升者為「認售權證」（性質類似賣權）；認購權證係於標的上漲時獲利。","錯誤。權證持有人擁有的是「權利」而非義務，情勢不利時可放棄履約，最大損失以支付之權利金為限。","錯誤。利率為影響選擇權（權證）價值之六因素之一：利率上升時買權（認購權證）價值上升，利率下跌時則下跌。"],"src":"認購權證性質同買權；市場利率下跌→認購權證價值下跌（證基會《投資學》學習指南與題庫第9章）"},{"id":"IV-D-040","exam":"gaoye-invest","subject":"","topic":"衍生性商品","difficulty":1,"q":"關於利率交換（Interest Rate Swap, IRS）之基本概念，下列敘述何者正確？","options":["交易雙方須於期初與期末互相交換名目本金","屬於在集中市場交易之標準化契約","僅能用於交換不同幣別之本金與利息","交易雙方僅就同一名目本金交換利息（如固定利率與浮動利率），名目本金本身通常不互相交換"],"answer":3,"explain":["錯誤。期初與期末交換本金係「貨幣交換（Currency Swap）」之特徵；利率交換之雙方本金為同幣別且金額相同，交換本金並無實質意義。","錯誤。交換合約屬「店頭市場（OTC）」商品，契約條件由雙方議定而非標準化；於集中市場交易之標準化契約為期貨。","錯誤。交換「不同幣別」本金與利息者為貨幣交換；利率交換係同一幣別下固定利率與浮動利率之交換。","正確。利率交換係雙方約定就相同之名目本金，定期交換固定利率與浮動利率之利息（實務上多僅交換利息差額），名目本金僅作為計息基礎而不互相交換，常用於管理利率風險。"],"src":"交換合約基本概念：利率交換僅交換利息、名目本金不交換，屬店頭市場商品（證基會《投資學》學習指南與題庫第9章）"}],"gaoye-law":[{"id":"LAW-A-001","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"依證券交易法第1條規定，該法之立法目的為下列何者？","options":["發展國民經濟，並保障投資","促進產業升級，並健全稅制","維護金融穩定，並防制洗錢","保障存款人權益，並維持支付順暢"],"answer":0,"explain":["正確。證交法§1明定立法目的為『發展國民經濟，並保障投資』，此為每年高頻考點，須逐字記憶。","錯誤。促進產業升級屬產業創新條例、健全稅制屬稅法之目的，與證交法立法目的無關。","錯誤。維護金融穩定、防制洗錢係金融監督管理委員會組織法與洗錢防制法之範疇，非證交法§1文字。","錯誤。保障存款人權益、維持支付順暢係銀行法之立法目的，與證交法無涉。"],"src":"證券交易法§1"},{"id":"LAW-A-002","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"現行證券交易法之主管機關為下列何者？","options":["財政部證券暨期貨管理委員會","中央銀行","金融監督管理委員會","經濟部商業發展署"],"answer":2,"explain":["錯誤。財政部證券暨期貨管理委員會（證期會）為舊制主管機關，於民國93年金管會成立後已改隸，現行主管機關非財政部。","錯誤。中央銀行主管貨幣、外匯與支付系統政策，非證券交易法主管機關。","正確。現行證券交易法之主管機關為金融監督管理委員會（金管會），統籌證券、期貨、銀行、保險之監理。","錯誤。經濟部商業發展署主管公司登記與商業事務，非證券市場主管機關。"],"src":"證券交易法§3；金融監督管理委員會組織法"},{"id":"LAW-A-003","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"下列何者非屬證券交易法第6條所稱之有價證券或視為有價證券之範圍？","options":["銀行發行之可轉讓定期存單","公司股票","政府債券","新股認購權利證書"],"answer":0,"explain":["正確（為非屬者）。可轉讓定期存單（NCD）屬銀行法規範之貨幣市場工具，非證交法§6所稱有價證券。","錯誤（本題選非屬者）。公司股票為證交法§6明文列舉之有價證券。","錯誤（本題選非屬者）。政府債券係證交法§6明文列舉之有價證券。","錯誤（本題選非屬者）。新股認購權利證書依§6第2項視為有價證券。"],"src":"證券交易法§6"},{"id":"LAW-A-004","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"依證券交易法規定，公開發行公司之董事人數原則上不得少於幾人？","options":["3人","5人","7人","9人"],"answer":1,"explain":["錯誤。3人係公司法對一般（非公開發行）股份有限公司董事之最低要求，非公開發行公司之標準。","正確。證交法§26-3規定公開發行公司董事不得少於5人，高於公司法一般規定之3人。","錯誤。7人並無法源依據，係與其他委員會人數混淆之誘答。","錯誤。9人並非董事最低人數規定。"],"src":"證券交易法§26-3"},{"id":"LAW-A-005","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"依證券交易法規定，設有監察人之公開發行公司，其監察人人數不得少於幾人？","options":["1人","5人","3人","2人"],"answer":3,"explain":["錯誤。1人為公司法對一般股份有限公司監察人之最低要求，非公開發行公司標準。","錯誤。5人為董事最低人數，非監察人標準。","錯誤。3人係審計委員會之最低組成人數，與監察人最低人數混淆。","正確。證交法§26-3規定公開發行公司監察人不得少於2人。"],"src":"證券交易法§26-3"},{"id":"LAW-A-006","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"依證券交易法第14條之2規定，公司設置獨立董事者，其人數應符合下列何項要求？","options":["至少1人，且不得少於董事席次1/3","至少3人，且不得少於董事席次1/2","至少3人，且不得少於董事席次1/4","至少2人，且不得少於董事席次1/5"],"answer":3,"explain":["錯誤。人數下限應為2人而非1人，比例應為1/5而非1/3，兩者皆有誤。","錯誤。3人及1/2均非獨立董事設置之法定要求。","錯誤。3人係審計委員會之組成下限，非獨立董事之最低人數；比例1/4亦非法定。","正確。證交法§14-2規定獨立董事至少2人，且不得少於董事席次之1/5。"],"src":"證券交易法§14-2"},{"id":"LAW-A-007","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"依證券交易法規定，公開發行公司之獨立董事兼任其他公開發行公司獨立董事，合計不得超過幾家？","options":["1家","2家","3家","5家"],"answer":2,"explain":["錯誤。1家並非法定上限，過度限制，非正確數字。","錯誤。2家非法定兼任家數上限。","正確。證交法§14-2規定獨立董事兼任其他公開發行公司獨立董事不得逾3家，本人任職公司加計後即最多4家。","錯誤。5家超過法定上限，係常見誘答。"],"src":"證券交易法§14-2"},{"id":"LAW-A-008","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"依證券交易法第14條之4規定，審計委員會之組成應符合下列何者？","options":["由過半數獨立董事組成，成員不得少於2人","由全體監察人組成，成員不得少於3人","由董事及獨立董事共同組成，成員不得少於5人","由全體獨立董事組成，成員不得少於3人"],"answer":3,"explain":["錯誤。應由『全體』獨立董事組成而非過半數，人數下限為3人而非2人。","錯誤。審計委員會係由獨立董事組成以取代監察人，並非由監察人組成。","錯誤。審計委員會成員限於獨立董事，非董事與獨董共同組成，5人亦非下限。","正確。證交法§14-4規定審計委員會由全體獨立董事組成，其人數不得少於3人，其中至少1人應具會計或財務專長。"],"src":"證券交易法§14-4"},{"id":"LAW-A-009","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"關於審計委員會之組成，下列敘述何者正確？","options":["其中至少1人應具會計或財務專長","召集人須由具律師資格之獨立董事擔任","成員中得有1人為公司經理人","獨立董事與監察人得各半數組成"],"answer":0,"explain":["正確。證交法§14-4規定審計委員會成員中至少1人應具會計或財務專長，並由其中1人為召集人。","錯誤。法規僅要求至少1人具會計或財務專長，並未要求召集人須具律師資格。","錯誤。審計委員會由全體獨立董事組成，經理人並非獨立董事，不得為其成員。","錯誤。審計委員會之目的即在以全體獨立董事取代監察人，二者不併存亦不各半組成。"],"src":"證券交易法§14-4"},{"id":"LAW-A-010","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":3,"q":"某上市公司董事會共設董事9席，依證券交易法規定，其獨立董事人數至少應為幾人始符合法定下限？","options":["1人","2人","3人","5人"],"answer":1,"explain":["錯誤。1人低於獨立董事至少2人之絕對下限。","正確。§14-2要求獨立董事至少2人且不得少於席次1/5；9席之1/5為1.8，取整為2人，與絕對下限2人取其高者，故至少2人。","錯誤。3人係審計委員會組成下限，本題9席×1/5＝1.8無條件進位為2即可，未達3人。","錯誤。5人遠超本題所需下限，屬過度計算之誘答。"],"src":"證券交易法§14-2"},{"id":"LAW-A-011","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"依證券交易法規定，公開發行公司董事間具有配偶或二親等以內親屬關係者，其席次限制為下列何者？","options":["不得超過董事總席次1/5","不得超過董事總席次1/3","不得超過董事總席次半數","不得超過董事總席次1/2且至少保留2席"],"answer":2,"explain":["錯誤。1/5係獨立董事之比例下限，非親屬董事之席次限制。","錯誤。1/3並非證交法對親屬董事關係之席次上限規定。","正確。證交法§26-3規定董事間具配偶或二親等以內親屬關係者，其人數超過董事總席次半數時應予調整，即不得超過半數。","錯誤。法規以『超過半數』為限，並無另須保留2席之附加規定。"],"src":"證券交易法§26-3"},{"id":"LAW-A-012","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"下列關於公開發行公司薪資報酬委員會之敘述，何者正確？","options":["僅金控公司須設置，一般上市櫃公司免設","成員人數不得少於3人","須全部由獨立董事組成","委員會決議對董事會有絕對拘束力，董事會不得變更"],"answer":1,"explain":["錯誤。依證交法§14-6，上市櫃公司均應設置薪資報酬委員會，非僅限金控公司。","正確。薪資報酬委員會成員由董事會決議委任，人數不得少於3人。","錯誤。薪酬委員會成員得由獨立董事或其他符合資格者擔任，並非須全部為獨立董事（此與審計委員會不同）。","錯誤。薪酬委員會之建議提報董事會討論，董事會若不採納應敘明理由，並非絕對拘束董事會。"],"src":"證券交易法§14-6"},{"id":"LAW-A-013","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"依證券交易法規定，內部人（董事、監察人、經理人、持股超過10%之股東）計算其持股時，下列何者應一併計入？","options":["僅計入本人名義持有部分","計入本人及其四親等內親屬持有部分","僅計入本人及其配偶部分","計入本人及其配偶、未成年子女及利用他人名義持有部分"],"answer":3,"explain":["錯誤。持股計算不以本人名義為限，尚須併計特定關係人，否則易生規避。","錯誤。法規並非以四親等內親屬為併計範圍，而係配偶、未成年子女及他人名義持有者。","錯誤。除配偶外，尚須併計未成年子女及利用他人名義持有部分，僅計配偶不足。","正確。證交法規定內部人持股計算應含本人、配偶、未成年子女及利用他人名義持有者，以防脫法。"],"src":"證券交易法§22-2、§25"},{"id":"LAW-A-014","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":3,"q":"依證券交易法規定，公司選任獨立董事2人以上時，全體董事應持有之股份成數有何調整？","options":["提高為原成數之120%","維持原成數不變","降為原成數之80%","一律免除持股成數限制"],"answer":2,"explain":["錯誤。並無提高為120%之規定，方向亦相反。","錯誤。選任獨立董事達2人以上者，法規明定得調降成數，並非維持不變。","正確。依董監股權成數及查核實施規則，選任獨立董事2人以上者，全體董事應持股成數得降為原成數之80%。","錯誤。降為80%並非免除，僅於獨董過半數並設審計委員會時始全部不適用。"],"src":"公開發行公司董事監察人股權成數及查核實施規則§2"},{"id":"LAW-A-015","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":3,"q":"某公開發行公司實收資本額為2億元，依規定其全體董事及全體監察人應持有之最低股份成數分別為何？","options":["董事10%、監察人1%","董事15%、監察人1.5%","董事7.5%、監察人0.75%","董事5%、監察人0.5%"],"answer":1,"explain":["錯誤。10%與1%係『逾3億至10億元』級距之成數，本題資本額2億元屬3億元以下級距，成數更高。","正確。實收資本額3億元以下者，全體董事應持股15%、全體監察人1.5%（監察人恆為董事之1/10），2億元適用此級距。","錯誤。7.5%與0.75%為『逾10億至20億元』級距成數，遠低於本題應適用之成數。","錯誤。5%與0.5%為『逾20億至40億元』級距成數，與本題資本額不符。"],"src":"公開發行公司董事監察人股權成數及查核實施規則§2"},{"id":"LAW-A-016","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"依證券交易法第157條短線交易歸入權規定，內部人於取得公司股票後幾個月內再行賣出所得之利益，應歸於公司？","options":["3個月","24個月","12個月","6個月"],"answer":3,"explain":["錯誤。3個月非歸入權之期間門檻。","錯誤。24個月係歸入權請求權之消滅時效（2年），非短線交易之6個月期間。","錯誤。12個月非短線交易之認定期間。","正確。證交法§157規定內部人取得後6個月內再賣出、或賣出後6個月內再買進，其所得利益歸於公司。"],"src":"證券交易法§157"},{"id":"LAW-A-017","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"依證券交易法第157條之1規定，內部人獲悉重大消息後，須於消息公開後經過多久，始得買賣該公司股票？","options":["公開後12小時","公開後18小時","公開後24小時","公開後2日"],"answer":1,"explain":["錯誤。12小時非內線交易之沉澱時間規定。","正確。§157-1規定於消息明確後、未公開前，或公開後18小時內，不得自行或以他人名義買賣，須逾18小時始得交易。","錯誤。24小時非法定沉澱期，易與18小時混淆。","錯誤。2日係內部人重大事項公告或轉讓申報之期間，非內線交易沉澱期。"],"src":"證券交易法§157-1"},{"id":"LAW-A-018","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":3,"q":"下列何者非屬證券交易法第157條之1所定內線交易之規範主體？","options":["公司之董事、監察人及經理人","持股超過10%之股東","喪失內部人身分後未滿6個月者","僅單純閱讀公開資訊觀測站公告之一般投資人"],"answer":3,"explain":["錯誤（本題選非屬者）。董事、監察人、經理人為§157-1第1款明列之規範主體。","錯誤（本題選非屬者）。持股超過10%之大股東為第2款規範主體。","錯誤（本題選非屬者）。喪失前述身分後未滿6個月者為第4款規範主體。","正確（為非屬者）。單純閱讀已公開資訊者係依合法公開管道取得，非實際知悉未公開重大消息之人，不構成內線交易主體。"],"src":"證券交易法§157-1"},{"id":"LAW-A-019","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":1,"q":"依證券交易法規定，內部人應於每月幾日以前，向所屬公司申報上月份持股之變動情形？","options":["每月5日前","每月10日前","每月15日前","每月16日前"],"answer":0,"explain":["正確。內部人應於每月5日前向公司申報上月持股變動，公司再於每月15日前彙總申報。","錯誤。每月10日前係公開發行公司公告每月營運情形（營收）之期限，非內部人持股申報日。","錯誤。每月15日前係公司彙總申報內部人持股之期限，非內部人向公司申報之期限。","錯誤。每月16日前係證交所或櫃買中心通知董監持股成數不足補足之期限，非持股變動申報日。"],"src":"證券交易法§25"},{"id":"LAW-A-020","exam":"gaoye-law","subject":"","topic":"證交法總論與公司治理","difficulty":2,"q":"依現行證券交易法第43條之1規定，任何人單獨或與他人共同取得任一公開發行公司已發行股份總額超過多少比例時，應向主管機關申報並公告？","options":["超過3%","超過5%","超過10%","超過20%"],"answer":1,"explain":["錯誤。3%係股東提案權及少數股東召集權之持股門檻，非大量持股申報門檻。","正確。§43-1於民國113年5月10日施行新制，大量持股申報門檻由10%下修為超過5%，應於取得後10日內申報公告。","錯誤。10%為舊制門檻，現已修正為5%，舊考古題答案已失效。","錯誤。20%係強制公開收購之門檻（50日內取得20%以上），非大量持股申報門檻。"],"src":"證券交易法§43-1"},{"id":"LAW-A-021","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"我國企業於初級市場募集與發行有價證券，原則上應向主管機關辦理下列何種程序？","options":["申報生效制","核准制","登記備查制","許可特許制"],"answer":0,"explain":["正確。依發行人募集與發行有價證券處理準則，募集發行原則採申報生效制，屆期未經退回即生效。","錯誤。現行制度已由早期核准制改採申報生效制，核准制非原則。","錯誤。登記備查制屬事後報備性質，非募集發行有價證券之原則程序。","錯誤。許可特許制係銀行、保險等特許行業設立之審查方式，非有價證券募集發行之制度。"],"src":"發行人募集與發行有價證券處理準則"},{"id":"LAW-A-022","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":2,"q":"依證券交易法規定，承銷商包銷有價證券，於承銷契約所訂定之承銷期間屆滿而未能全數銷售者，其未售出部分應如何處理？","options":["由承銷商自行認購","全數退還發行人","延長承銷期間至售完為止","由主管機關指定他人承購"],"answer":0,"explain":["正確。包銷之特徵即在承銷期滿未售完部分由承銷商自行認購（餘額包銷），故發行人可確定取得資金。","錯誤。未售出退還發行人係『代銷』之特徵，非包銷。","錯誤。承銷期間屆滿即應依約處理，並無自動延長至售完為止之機制。","錯誤。主管機關不介入指定承購，包銷未售部分應由承銷商自行認購。"],"src":"證券交易法§71"},{"id":"LAW-A-023","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"下列關於代銷方式之敘述，何者正確？","options":["未售完部分由承銷商自行認購","未售完部分退還發行人","承銷商須先全數認購後再對外銷售","發行人可確定取得全額資金"],"answer":1,"explain":["錯誤。未售完由承銷商自行認購為包銷之特徵，非代銷。","正確。代銷係承銷商代為銷售，於承銷期滿未售完部分退還發行人，承銷商不負認購義務。","錯誤。先全數認購再對外銷售屬確定包銷（全額包銷）之作法，非代銷。","錯誤。代銷下未售完退還發行人，發行人無法確定取得全額資金；能確定取得者為包銷。"],"src":"證券交易法§72"},{"id":"LAW-A-024","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"依主管機關規定，承銷商辦理有價證券之包銷，其包銷報酬最高不得超過包銷總金額之多少比例？","options":["3%","5%","10%","15%"],"answer":2,"explain":["錯誤。3%非包銷報酬之上限規定。","錯誤。5%係代銷手續費之上限，非包銷報酬上限。","正確。依主管機關規定，包銷報酬不得超過包銷總金額之10%（代銷手續費則為5%）。","錯誤。15%係過額配售（綠鞋機制）之上限比例，非包銷報酬上限。"],"src":"證券商承銷或再行銷售有價證券處理辦法（承銷報酬上限）"},{"id":"LAW-A-025","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":2,"q":"依主管機關規定，承銷商辦理有價證券之代銷，其代銷手續費最高不得超過代銷總金額之多少比例？","options":["5%","10%","15%","20%"],"answer":0,"explain":["正確。代銷手續費不得超過代銷總金額之5%（相對地包銷報酬上限為10%）。","錯誤。10%係包銷報酬之上限，非代銷手續費上限。","錯誤。15%係過額配售之上限，非代銷手續費。","錯誤。20%非承銷報酬相關之法定上限。"],"src":"證券商承銷或再行銷售有價證券處理辦法（承銷報酬上限）"},{"id":"LAW-A-026","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":2,"q":"承銷商辦理有價證券承銷之過額配售（俗稱綠鞋機制），其數量不得超過原定承銷總數之多少比例？","options":["5%","10%","15%","20%"],"answer":2,"explain":["錯誤。5%非過額配售之上限比例。","錯誤。10%為包銷報酬上限或現金增資提撥公開承銷比例，非過額配售上限。","正確。過額配售（綠鞋機制）之數量不得超過承銷總數之15%，用以於掛牌後穩定股價。","錯誤。20%係強制公開收購門檻，非過額配售上限。"],"src":"證券商承銷或再行銷售有價證券處理辦法（過額配售）"},{"id":"LAW-A-027","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"下列何者非屬承銷商辦理有價證券配售之常見方式？","options":["競價拍賣","詢價圈購","公開申購配售（抽籤）","集中市場逐筆撮合"],"answer":3,"explain":["錯誤（本題選非屬者）。競價拍賣為承銷配售方式之一，常用於初次上市案件。","錯誤（本題選非屬者）。詢價圈購為承銷配售方式之一。","錯誤（本題選非屬者）。公開申購配售（公開抽籤）為承銷配售方式之一。","正確（為非屬者）。集中市場逐筆撮合係流通市場（次級市場）之交易撮合機制，非初級市場承銷配售方式。"],"src":"發行市場承銷配售方式；證券商承銷或再行銷售有價證券處理辦法"},{"id":"LAW-A-028","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":3,"q":"依證券交易法第32條規定，公開說明書之主要內容有虛偽或隱匿情事時，關於發行人及其負責人之民事賠償責任，下列敘述何者正確？","options":["發行人及其負責人負絕對責任，不得舉證免責","發行人及其負責人僅於故意時始負責","發行人及其負責人得舉證已盡相當注意而免責","發行人及其負責人不負民事責任，僅承銷商負責"],"answer":0,"explain":["正確。§32對發行人及其負責人採無過失（絕對）責任，縱能證明已盡注意亦不得免責，責任最重。","錯誤。發行人及負責人之責任不以故意為限，係絕對責任，過失亦須負責。","錯誤。得舉證已盡相當注意而免責者係承銷商、會計師等專家之推定過失責任，非發行人。","錯誤。發行人及負責人為公開說明書責任之核心，並非不負責。"],"src":"證券交易法§32"},{"id":"LAW-A-029","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":3,"q":"依證券交易法第32條規定，會計師就其簽證之財務報告所生公開說明書不實責任，其責任性質為下列何者？","options":["無過失之絕對責任","推定過失責任，能證明已盡相當注意者免責","僅負刑事責任，不負民事責任","須待發行人先行賠付後始負補充責任"],"answer":1,"explain":["錯誤。絕對責任係發行人及其負責人之責任型態，會計師非絕對責任。","正確。會計師、承銷商等專家就其職務範圍負推定過失責任，若能證明已盡相當注意且有正當理由確信內容真實者，得免負賠償責任。","錯誤。會計師依§32就不實內容仍須對善意取得人負民事賠償責任，非僅負刑責。","錯誤。§32各責任主體對善意受害人負責，並無須待發行人先賠付之補充責任設計。"],"src":"證券交易法§32"},{"id":"LAW-A-030","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":2,"q":"依證券交易法第43條之6規定，公開發行公司辦理有價證券之私募，其應募人中屬符合條件之自然人、法人或基金，及公司或其關係企業之董監事、經理人者，人數合計不得超過幾人？","options":["25人","200人","50人","35人"],"answer":3,"explain":["錯誤。25人非私募應募人之人數上限。","錯誤。200人係公開發行認定之相關人數概念，非私募應募人上限。","錯誤。50人非私募應募人人數上限，係與其他制度混淆之誘答。","正確。§43-6規定除專業機構投資人外，符合條件之自然人、法人、基金及公司關係人等應募人合計不得超過35人。"],"src":"證券交易法§43-6"},{"id":"LAW-A-031","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":3,"q":"依證券交易法規定，公開發行公司辦理股票私募，其股東會決議之門檻為下列何者？","options":["代表已發行股份總數過半數股東出席，出席股東表決權過半數同意","代表已發行股份總數2/3以上股東出席，出席股東表決權過半數同意","代表已發行股份總數過半數股東出席，出席股東表決權2/3以上同意","代表已發行股份總數過半數股東出席，出席股東表決權3/4以上同意"],"answer":2,"explain":["錯誤。此為普通決議門檻，私募決議門檻高於普通決議。","錯誤。此係公司法特別決議（2/3出席、過半同意）之型態，與私募決議之出席與同意比例配置相反。","正確。§43-6規定私募須『代表已發行股份總數過半數股東出席，出席股東表決權2/3以上同意』，恰與公司法特別決議相反，為經典陷阱題。","錯誤。私募同意門檻為2/3而非3/4，3/4非法定比例。"],"src":"證券交易法§43-6"},{"id":"LAW-A-032","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"依證券交易法第43條之8規定，私募之有價證券原則上自該私募有價證券交付日起屆滿多久後，始得依規定再行賣出？","options":["1年","2年","3年","5年"],"answer":2,"explain":["錯誤。1年係普通公司債私募得分次辦理之期限，非私募轉售之閉鎖期。","錯誤。2年非私募有價證券之轉售限制期間。","正確。§43-8規定私募有價證券原則上滿3年後，始得依主管機關規定之條件再行賣出。","錯誤。5年係庫藏股轉讓予員工之期限，非私募轉售限制期間。"],"src":"證券交易法§43-8"},{"id":"LAW-A-033","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":2,"q":"下列關於普通公司債私募之敘述，何者正確？","options":["一律須經股東會特別決議通過","得經董事會決議辦理，發行總額不得逾全部資產減全部負債後餘額之400%","發行總額不得逾淨值之50%","須先辦理公開發行後始得私募"],"answer":1,"explain":["錯誤。普通公司債之私募得由董事會決議，免經股東會，非一律須股東會特別決議。","正確。普通公司債私募得由董事會決議辦理，發行總額不得逾全部資產減全部負債（淨值）之400%，且得於決議日起1年內分次辦理。","錯誤。淨值之50%係公開發行無擔保公司債之額度限制，非普通公司債私募之上限。","錯誤。私募與公開發行係不同管道，私募不以先辦公開發行為前提。"],"src":"證券交易法§43-6"},{"id":"LAW-A-034","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"依證券交易法第28條之2規定，公司買回本公司股份（庫藏股）之數量，不得超過該公司已發行股份總數之多少比例？","options":["5%","20%","15%","10%"],"answer":3,"explain":["錯誤。5%係大量持股申報之門檻，非庫藏股買回數量上限。","錯誤。20%係強制公開收購門檻，非庫藏股買回數量上限。","錯誤。15%係過額配售之上限，非庫藏股數量上限。","正確。§28-2規定庫藏股買回數量不得超過已發行股份總數之10%。"],"src":"證券交易法§28-2"},{"id":"LAW-A-035","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"依證券交易法規定，公司買回庫藏股之總金額上限為下列何者？","options":["不得逾實收資本額之10%","不得逾保留盈餘加發行股份溢價及已實現資本公積之金額","不得逾當年度稅後淨利之50%","不得逾淨值之200%"],"answer":1,"explain":["錯誤。庫藏股金額上限並非以實收資本額10%計算，數量上限才與10%有關但係對已發行股份而言。","正確。§28-2規定買回股份之金額不得逾保留盈餘加發行股份溢價及已實現資本公積之金額，以確保買回財源。","錯誤。當年度稅後淨利50%非庫藏股金額上限之計算基礎。","錯誤。淨值200%係有擔保、轉換及附認股權公司債合計之發行額度限制，與庫藏股金額上限無關。"],"src":"證券交易法§28-2"},{"id":"LAW-A-036","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":3,"q":"依證券交易法第28條之2規定，公司買回庫藏股，應於董事會決議之日起幾日內公告，並自買回申報日起幾個月內執行完畢？","options":["2日內公告；2個月內執行完畢","5日內公告；3個月內執行完畢","2日內公告；6個月內執行完畢","10日內公告；1個月內執行完畢"],"answer":0,"explain":["正確。§28-2規定應於董事會決議日起2日內公告並申報，並於申報日起2個月內執行完畢（口訣：庫藏10-2-2-5-6）。","錯誤。公告期限為2日非5日，執行期限為2個月非3個月。","錯誤。公告2日正確，惟執行期限為2個月而非6個月；6個月係以維護信用目的買回後辦理銷除之期限。","錯誤。公告期限為2日非10日，執行期限為2個月非1個月。"],"src":"證券交易法§28-2"},{"id":"LAW-A-037","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":3,"q":"公司於買回庫藏股之期間內，下列何者受有『不得賣出』該公司股份之限制？","options":["一般散戶投資人","外資機構投資人","公司之董事、監察人、經理人及持股10%之股東本人與其配偶、未成年子女","公司之受僱一般職員"],"answer":2,"explain":["錯誤。一般散戶並非內部人，不受庫藏股買回期間不得賣出之限制。","錯誤。外資機構投資人若非該公司內部人，不在此限制範圍。","正確。§28-2規定公司買回期間，其關係企業及董事、監察人、經理人、持股10%之股東本人與配偶、未成年子女（含他人名義）不得賣出持股，以防內部人套利。","錯誤。受僱之一般職員若非經理人等內部人，不受此賣出限制。"],"src":"證券交易法§28-2"},{"id":"LAW-A-038","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":2,"q":"下列關於公司買回之庫藏股，於轉讓前之權利限制，何者正確？","options":["得於次級市場質押以取得資金","得參與盈餘分派領取股息","未轉讓前不享有股東權利，且不得質押","得行使表決權以鞏固經營權"],"answer":2,"explain":["錯誤。§28-2明定買回之股份不得質押，不得於市場質押取得資金。","錯誤。庫藏股於轉讓前不享有股東權利，不得參與盈餘分派領取股息。","正確。買回之股份於未轉讓前不享有股東權利（無表決權、不得配股息），且不得質押。","錯誤。庫藏股不享有表決權，不得用以行使表決權鞏固經營權。"],"src":"證券交易法§28-2"},{"id":"LAW-A-039","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":2,"q":"依證券交易法規定，上市或上櫃公司以現金增資發行新股時，原則上應提撥發行新股總額之多少比例，對外公開承銷？","options":["5%","20%","15%","10%"],"answer":3,"explain":["錯誤。5%非現金增資對外公開承銷之提撥比例。","錯誤。20%係強制公開收購門檻，非現金增資公開承銷比例。","錯誤。15%係過額配售上限，非現金增資公開承銷提撥比例；惟公司法員工新股認購保留為10%至15%，須加區辨。","正確。§28-1規定上市櫃公司現金發行新股，原則應提撥發行新股總額之10%對外公開承銷（股東會決議更高者從其決議）。"],"src":"證券交易法§28-1"},{"id":"LAW-A-040","exam":"gaoye-law","subject":"","topic":"發行市場","difficulty":1,"q":"依證券交易法第28條之4規定，公開發行公司發行『無擔保』公司債之總額，原則上不得逾全部資產減全部負債後餘額（淨值）之多少比例？","options":["淨值之50%（1/2）","淨值之100%","淨值之200%","淨值之400%"],"answer":0,"explain":["正確。§28-4規定無擔保公司債之發行總額不得逾淨值之1/2（50%）。","錯誤。100%非公司債發行額度之法定比例。","錯誤。200%係有擔保公司債、轉換公司債及附認股權公司債『合計』之額度上限，非無擔保公司債之上限。","錯誤。400%係普通公司債『私募』得由董事會決議之發行額度上限，非公開發行無擔保公司債之限額。"],"src":"證券交易法§28-4"},{"id":"LAW-B-001","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"依證券交易法規定，下列何者「不」屬於公司內部人之範圍？","options":["董事、監察人","經理人","持有公司已發行股份超過10%之股東","持有公司已發行股份達3%之一般股東"],"answer":3,"explain":["董事、監察人為典型內部人，屬內部人範圍。","經理人屬內部人範圍。","持股超過10%之大股東屬內部人範圍。","正確。內部人＝董事、監察人、經理人及持股『超過10%』之大股東；持股僅達3%之一般股東並非內部人，且持股計算尚須併計配偶、未成年子女及利用他人名義持有部分。"],"src":"證交法§22-2、§25、§157-1；研究筆記第7章"},{"id":"LAW-B-002","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"依證券交易法第157條之1，內部人於重大影響股票價格之消息明確後、未公開前，或公開後多久時間內，不得買賣該公司股票？","options":["公開後6小時內","公開後12小時內","公開後24小時內","公開後18小時內"],"answer":3,"explain":["並非6小時，法定沉澱期為公開後18小時。","並非12小時，法定沉澱期為公開後18小時。","並非24小時，法定沉澱期為公開後18小時。","正確。內線交易之禁止期間為消息明確後至公開前，及『公開後18小時內』，於此期間內內部人不得自行或以他人名義買賣。"],"src":"證交法§157-1第1項；研究筆記高頻考點1"},{"id":"LAW-B-003","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"依證券交易法第157條短線交易歸入權規定，內部人取得公司股票後多久期間內再行賣出，其所得利益應歸屬於公司？","options":["6個月內","1年內","3個月內","2年內"],"answer":0,"explain":["正確。內部人取得後『6個月內』再行賣出，或賣出後6個月內再行買進，所獲利益應歸於公司，此即短線交易歸入權。","並非1年，短線交易期間為6個月。","並非3個月，歸入權之短線交易期間為6個月。","2年係股東請求權因不行使而消滅之時效（自獲得利益之日起算），並非短線交易之6個月期間。"],"src":"證交法§157；研究筆記高頻考點2"},{"id":"LAW-B-004","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":2,"q":"公開發行公司之內部人依證券交易法第25條規定，應於每月幾日以前向公司申報上月持股變動情形？","options":["每月5日前","每月10日前","每月15日前","每月16日前"],"answer":0,"explain":["正確。內部人應於『每月5日前』向公司申報上月持股變動；公司再於每月15日前彙總向主管機關申報。","每月10日前為公開發行公司公告申報每月營運情形（營收）之期限，非內部人申報持股之期限。","每月15日前係『公司』彙總申報之期限，非內部人向公司申報之期限。","每月16日前為證交所（櫃買）於董監持股成數不足時通知補足之期限，非申報持股變動期限。"],"src":"證交法§25；研究筆記高頻考點4"},{"id":"LAW-B-005","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":2,"q":"公開發行公司之內部人將其持股設定質權時，公司應於質權設定後幾日內向主管機關申報並公告？","options":["5日內","2日內","10日內","15日內"],"answer":0,"explain":["正確。內部人持股設定質權者，出質人應即通知公司，公司應於質權設定後『5日內』申報並公告。","2日內為重大訊息或庫藏股決議之公告期限，非設質申報期限。","10日內為大量持股（超過5%）之申報期限，非設質申報期限。","15日內為公司登記後申報內部人持股、或公司彙總申報之相關期限，非設質申報期限。"],"src":"證交法§25第4項；研究筆記高頻考點4"},{"id":"LAW-B-006","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"公開發行公司內部人依證券交易法第22條之2規定，於集中交易市場一般轉讓持股採事前申報制，原則上應於向主管機關申報之日起多久後始得轉讓？","options":["申報之日起3日後","申報之日起1日後","申報之日起5日後","申報之日起10日後"],"answer":0,"explain":["正確。內部人依第22條之2第1項第2款在集中交易市場或櫃檯買賣轉讓者，應於『向主管機關申報之日起3日後』始得為之（但每一交易日轉讓未逾1萬股者免申報）。","並非1日，事前申報之等待期為3日。","並非5日，事前申報等待期為3日後。","並非10日，事前申報等待期為3日後。"],"src":"證交法§22-2第1項第2款；研究筆記高頻考點3"},{"id":"LAW-B-007","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"公開發行公司內部人於集中交易市場轉讓持股，若每一交易日轉讓股數未超過多少股，得免依證券交易法第22條之2規定申報？","options":["未超過1萬股","未超過5萬股","未超過5千股","未超過10萬股"],"answer":0,"explain":["正確。依第22條之2第1項第2款但書，每一交易日轉讓股數『未超過1萬股』者，免予事前申報。","5萬股為委託書徵求人繼續6個月以上持有之最低股數門檻，與本題免申報門檻無關。","並非5千股，免申報門檻為每一交易日1萬股以下。","並非10萬股，免申報門檻為1萬股。"],"src":"證交法§22-2第1項第2款但書；研究筆記高頻考點3"},{"id":"LAW-B-008","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"依證券交易法第157條，短線交易之利益歸入權應由何者行使？","options":["由公司行使（董事會或監察人）","由主管機關代為行使","由證券交易所行使","由投保中心行使"],"answer":0,"explain":["正確。短線交易所得利益『歸於公司』，歸入權原則上由公司之董事會或監察人代表公司行使；董事會或監察人不行使時，股東得以30日為限期請求其行使。","主管機關並非歸入權之行使主體。","證券交易所並非歸入權之行使主體。","投保中心行使者為團體訴訟、代表訴訟及裁判解任之訴，非短線交易歸入權。"],"src":"證交法§157；研究筆記高頻考點2"},{"id":"LAW-B-009","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":3,"q":"依證券交易法第157條，公司董事會或監察人不行使短線交易歸入權時，股東得以多久為期限請求董事會或監察人行使？又該歸入請求權自獲得利益之日起多久不行使即消滅？","options":["限期30日；時效2年","限期15日；時效1年","限期30日；時效1年","限期60日；時效2年"],"answer":0,"explain":["正確。股東得以『30日』為限期請求董事會或監察人行使歸入權；歸入請求權自獲得利益之日起『2年』間不行使而消滅。","請求期限並非15日、時效並非1年；正確為限期30日、時效2年。","時效並非1年，正確時效為2年。","限期並非60日，正確為30日。"],"src":"證交法§157第2項、第4項；研究筆記高頻考點2"},{"id":"LAW-B-010","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"依證券交易法第36條，發行公司之年度財務報告原則上應於會計年度終了後多久內公告並向主管機關申報？","options":["1個月內","2個月內","3個月內","45日內"],"answer":2,"explain":["1個月內非年報申報期限。","2個月內非年報申報期限。","正確。年度財務報告應於會計年度終了後『3個月內』公告申報（12月制公司即3月31日前），並經會計師查核簽證、董事會通過及監察人（審計委員會）承認。","45日內為各季季報之申報期限，非年報期限。"],"src":"證交法§36第1項；研究筆記高頻考點9"},{"id":"LAW-B-011","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"依證券交易法第36條，發行公司第一季、第二季、第三季之季度財務報告，應於每季終了後多久內公告並申報？","options":["3個月內","2個月內","30日內","45日內"],"answer":3,"explain":["3個月內為年度財務報告之申報期限，非季報期限。","2個月內非季報申報期限。","30日內非季報申報期限。","正確。第一、二、三季季報均應於每季終了後『45日內』公告申報（即5/15、8/14、11/14前），並經會計師核閱。"],"src":"證交法§36第1項；研究筆記高頻考點9"},{"id":"LAW-B-012","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":2,"q":"公開發行公司發生對股東權益或證券價格有重大影響之事項時，依證券交易法第36條應於事實發生之日起多久內公告並向主管機關申報？","options":["10日內","5日內","2日內","30日內"],"answer":2,"explain":["10日內為每月營收公告或大量持股申報等期限，非重大事項申報期限。","5日內為內部人設質申報等其他期限，非重大事項申報期限。","正確。發生股東常會決議與財報不一致，或對股東權益／證券價格有重大影響之事項，應於『事實發生之日起2日內』公告並申報。","30日內非重大事項申報期限。"],"src":"證交法§36第3項；研究筆記高頻考點9"},{"id":"LAW-B-013","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"公開發行公司應於每月幾日以前，公告並申報上月份之營運情形（每月營業收入）？","options":["次月5日前","次月月底前","次月15日前","次月10日前"],"answer":3,"explain":["次月5日前為內部人向公司申報持股變動之期限，非月營收公告期限。","次月月底前非月營收公告期限。","次月15日前為公司彙總申報內部人持股之期限，非月營收公告期限。","正確。發行公司應於『每月10日前』公告並申報上月份之營運情形（月營收）。"],"src":"證交法§36第1項；研究筆記第6章財報與資訊公開"},{"id":"LAW-B-014","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":2,"q":"依現行公開收購相關規定，任何人單獨或與他人共同預定於50日內取得公開發行公司已發行股份總額達多少比例以上者，應採公開收購方式為之？","options":["10%以上","20%以上","33%以上","50%以上"],"answer":1,"explain":["10%為舊制大量持股申報門檻（已下修為超過5%），非強制公開收購門檻。","正確。任何人單獨或與他人共同『預定於50日內取得已發行股份總額20%以上』者，應採公開收購方式為之（強制公開收購）。","33%（三分之一）非我國強制公開收購之現行門檻。","50%非強制公開收購之啟動門檻。"],"src":"公開收購辦法§11；研究筆記高頻考點6"},{"id":"LAW-B-015","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":2,"q":"依公開收購公開發行公司有價證券管理辦法，公開收購之收購期間原則上應為多久？","options":["不得少於10日、不得多於30日","不得少於30日、不得多於60日","不得少於20日、不得多於50日","不得少於50日、不得多於90日"],"answer":2,"explain":["收購期間下限並非10日、上限並非30日。","收購期間之區間並非30至60日。","正確。公開收購期間原則上『不得少於20日、多於50日』；有正當理由得申報延長，惟延長期間合計不得超過50日。","收購期間之區間並非50至90日。"],"src":"公開收購辦法§18；研究筆記高頻考點6"},{"id":"LAW-B-016","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":3,"q":"依證券交易法第157條之1，下列關於內線交易『內部人』主體範圍之敘述，何者「錯誤」？","options":["公司之董事、監察人及經理人屬內線交易主體","持有公司股份超過10%之股東屬內線交易主體","喪失董事、監察人、經理人或大股東身分後未滿6個月者，仍屬內線交易主體","僅限現任內部人，任何已離職之人一律不受規範"],"answer":3,"explain":["董事、監察人、經理人為內線交易主體第一款，敘述正確。","持股超過10%之股東為內線交易主體第二款，敘述正確。","喪失前述身分後『未滿6個月』者仍為內線交易主體（第四款），敘述正確。","正確（為錯誤敘述）。法定主體尚包含喪失身分後未滿6個月者，以及基於職業或控制關係、或自前四款之人獲悉消息之消息受領人；並非僅限現任內部人。"],"src":"證交法§157-1第1項各款；研究筆記第7章、高頻考點1"},{"id":"LAW-B-017","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":2,"q":"公開發行公司內部人依證券交易法第22條之2規定，於申報之日起3日內向『特定人』轉讓持股，該特定人應符合何種要件？","options":["任何自然人均可，無須條件","須為持股超過10%之大股東","須為公司之現任董事、監察人","須為符合主管機關所定條件之特定人"],"answer":3,"explain":["並非任何自然人均可，受讓之特定人須符合主管機關所定條件。","受讓人不以10%大股東為限，法條要件為『符合所定條件之特定人』。","受讓人不以現任董監事為限，法條要件為『符合所定條件之特定人』。","正確。依第22條之2第1項第3款，內部人得於申報之日起『3日內』向『符合所定條件之特定人』轉讓持股。"],"src":"證交法§22-2第1項第3款；研究筆記第7章"},{"id":"LAW-B-018","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"依證券交易法第157條之1，判斷內線交易之時點時，行為人係於重大消息具備何種狀態後、公開前（或公開後18小時內）買賣，始構成內線交易？","options":["消息尚在醞釀階段","消息明確後","消息公開後滿1日","消息經媒體大幅報導後"],"answer":1,"explain":["消息尚在醞釀、未臻明確時，尚不構成禁止買賣之時點。","正確。內線交易之禁止起點為重大消息『明確後』，至消息公開前或公開後18小時內，內部人不得買賣。","消息公開後已逾18小時之限制期間，原則上得為買賣，並非構成內線交易之時點。","是否構成內線交易以『消息明確、公開與否及18小時』為準，非以是否經媒體大幅報導判斷。"],"src":"證交法§157-1第1項；研究筆記高頻考點1"},{"id":"LAW-B-019","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":2,"q":"公開發行公司應於設立（公司）登記後多久內，向主管機關申報其內部人（董事、監察人、經理人及大股東）之持股情形？","options":["登記後1個月內","登記後2個月內","登記後10日內","登記後15日內"],"answer":3,"explain":["並非1個月，正確為登記後15日內。","並非2個月，正確為登記後15日內。","並非10日；公司申報內部人持股之期限為登記後15日內。","正確。公司應於『登記後15日內』申報內部人之持股情形（證交法§25第1項）。"],"src":"證交法§25第1項；研究筆記第7章"},{"id":"LAW-B-020","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":3,"q":"甲為某上市公司經理人，於民國115年3月1日買進該公司股票10張，嗣於同年7月15日賣出而獲利。下列關於短線交易歸入權之敘述，何者正確？","options":["買進與賣出間隔已逾6個月，不生歸入權問題","買進與賣出間隔未逾6個月，其獲利應歸屬公司","經理人非內部人，不適用歸入權","須待甲離職後始能主張歸入權"],"answer":1,"explain":["3月1日至7月15日僅約4個半月，未逾6個月，本選項對期間之判斷錯誤。","正確。經理人屬內部人，其於取得後6個月內（3/1至7/15約4.5個月）再行賣出獲利，該利益應依證交法§157歸屬於公司。","經理人係內部人，適用短線交易歸入權，本選項錯誤。","歸入權於短線交易獲利發生時即成立，不以離職為要件，本選項錯誤。"],"src":"證交法§157；研究筆記高頻考點2"},{"id":"LAW-B-021","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":1,"q":"公開發行公司之內部人持股計算，除本人名下持股外，尚應併計下列何者之持股？","options":["僅本人持股，無須併計他人","僅公司其他董事之持股","僅配偶持股，不含子女","配偶、未成年子女及利用他人名義持有者"],"answer":3,"explain":["內部人持股須併計特定關係人，並非僅計本人名下持股。","併計對象為配偶、未成年子女及借名持有者，並非其他董事之持股。","除配偶外尚須併計未成年子女及利用他人名義持有部分，本選項不完整。","正確。內部人持股之計算應併計『配偶、未成年子女及利用他人名義持有』之股份。"],"src":"證交法§25、§22-2；研究筆記第7章"},{"id":"LAW-B-022","exam":"gaoye-law","subject":"","topic":"內部人規範與資訊揭露","difficulty":3,"q":"依現行證券交易法第43條之1規定，任何人單獨或與他人共同取得任一公開發行公司已發行股份總額超過多少比例，應於取得後10日內向主管機關申報並公告？","options":["超過3%","超過5%","超過10%","超過20%"],"answer":1,"explain":["大量持股申報門檻並非3%。","正確。現行制度（113年5月10日施行）大量持股申報門檻已由10%『下修為超過5%』，應於取得後10日內申報並公告，之後持股增減達1%時應於2日內補正申報。","超過10%為舊制之申報門檻，現行已下修為超過5%，本選項為過時答案。","超過20%為強制公開收購之啟動門檻，非大量持股申報門檻。"],"src":"證交法§43-1第1項；研究筆記高頻考點5"},{"id":"LAW-B-023","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":1,"q":"依證券投資人及期貨交易人保護法，我國法定之投資人保護機構為下列何者？","options":["財團法人證券投資人及期貨交易人保護中心","財團法人中華民國證券暨期貨市場發展基金會","中華民國證券商業同業公會","金融消費評議中心"],"answer":0,"explain":["正確。依證券投資人及期貨交易人保護法設立之保護機構為『財團法人證券投資人及期貨交易人保護中心』（投保中心），辦理團體訴訟、代表訴訟及保護基金償付等業務。","證基會（SFI）為辦理證照測驗及市場發展之機構，非投資人保護機構。","證券商業同業公會為證券商之同業自律組織，非投資人保護機構。","金融消費評議中心處理金融消費爭議評議，非證券投資人保護法所定之保護機構。"],"src":"證券投資人及期貨交易人保護法；研究筆記高頻考點19"},{"id":"LAW-B-024","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"依投資人保護相關規定，證券商因財務困難失卻清償能力而違約時，保護基金對『每一投資人』之償付上限為新臺幣多少元？","options":["50萬元","100萬元","120萬元","200萬元"],"answer":2,"explain":["償付上限並非50萬元。","償付上限並非100萬元。","正確。保護基金對每一投資人之償付上限為新臺幣『120萬元』（依保護基金償付作業辦法）。","償付上限並非200萬元。"],"src":"證券投資人及期貨交易人保護法及保護基金償付作業辦法；研究筆記高頻考點19"},{"id":"LAW-B-025","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"依證券投資人及期貨交易人保護法，須有多少人以上之投資人授與訴訟實施權，保護機構始得為其提起團體訴訟？","options":["50人以上","30人以上","10人以上","20人以上"],"answer":3,"explain":["團體訴訟之人數門檻並非50人。","團體訴訟之人數門檻並非30人。","團體訴訟之人數門檻並非10人。","正確。『20人以上』之投資人授與訴訟實施權者，保護機構（投保中心）得起訴或提付仲裁，即團體訴訟制度。"],"src":"證券投資人及期貨交易人保護法；研究筆記高頻考點19"},{"id":"LAW-B-026","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":1,"q":"依證券交易法第155條，行為人意圖抬高或壓低集中交易市場某有價證券之價格，自行或以他人名義，對該有價證券連續以高價買入或以低價賣出，此種操縱行為一般稱為？","options":["連續交易（炒作）","相對委託","沖洗買賣","散布流言"],"answer":0,"explain":["正確。意圖影響價格而『連續』以高價買入或低價賣出，屬證交法§155之連續交易（拉抬或壓低股價之炒作）行為。","相對委託係與他人通謀，一方賣出、他方買入而約定成交，與連續交易之型態不同。","沖洗買賣係同一人（同一利益人）同時委託買進及賣出以製造交易活絡假象，非連續高低價買賣。","散布流言或不實資料係另一款操縱行為，與連續交易之型態不同。"],"src":"證交法§155第1項；研究筆記第12章"},{"id":"LAW-B-027","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"下列關於證券交易法第155條操縱市場行為之敘述，何者係指『相對委託』？","options":["自行同時委託買進及賣出相互成交，製造交易活絡假象","與他人通謀，約定一方買進、他方同時或稍後以同一價格賣出","連續以高價買入意圖拉抬股價","散布不實資料影響股價"],"answer":1,"explain":["自己同時委託買賣相互成交、製造活絡假象者為『沖洗買賣』，非相對委託。","正確。相對委託係『與他人通謀』，約定一方買進、他方於同一時間以相同價格賣出（或相反），屬證交法§155之通謀操縱。","連續以高價買入拉抬股價為『連續交易（炒作）』，非相對委託。","散布不實資料影響股價為另一款操縱行為，非相對委託。"],"src":"證交法§155第1項；研究筆記第12章"},{"id":"LAW-B-028","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":3,"q":"依證券交易法第32條，公開說明書所載主要內容有虛偽或隱匿情事時，下列何者對善意之相對人所受損害，應負『絕對責任』（不得以已盡相當注意為由免責）？","options":["發行人及其負責人","簽證會計師","承銷商","曾在公開說明書簽章之律師"],"answer":0,"explain":["正確。公開說明書虛偽隱匿時，『發行人及其負責人』負絕對責任，不得主張已盡相當注意而免責。","簽證會計師就其職務範圍負推定過失責任，能證明已盡相當注意者得免責，非絕對責任。","承銷商就其職務範圍負推定過失責任，能證明已盡相當注意者得免責，非絕對責任。","律師等專家就其簽證或意見部分負推定過失責任，得舉證免責，非絕對責任。"],"src":"證交法§32；研究筆記第2章公開說明書責任"},{"id":"LAW-B-029","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":3,"q":"依證券交易法第171條，違反內線交易（§157-1）或操縱市場（§155）者，除有加重情形外，其法定本刑為何？","options":["1年以上7年以下有期徒刑","3年以上10年以下有期徒刑","5年以上12年以下有期徒刑","7年以上有期徒刑"],"answer":1,"explain":["法定本刑並非1年以上7年以下。","正確。違反內線交易或操縱市場者，處『3年以上10年以下』有期徒刑，得併科1,000萬元以上2億元以下罰金。","法定本刑並非5年以上12年以下。","7年以上有期徒刑係『犯罪所得金額達1億元以上』之加重情形之刑度，非一般本刑。"],"src":"證交法§171第1項、第2項；研究筆記第7章、第12章"},{"id":"LAW-B-030","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":3,"q":"依證券交易法第171條，違反內線交易或操縱市場之罪，若其『犯罪所得金額』達新臺幣多少以上者，將加重處以7年以上有期徒刑？","options":["3千萬元以上","5千萬元以上","1億元以上","2億元以上"],"answer":2,"explain":["加重門檻並非3千萬元。","加重門檻並非5千萬元。","正確。犯罪所得金額達新臺幣『1億元以上』者，處7年以上有期徒刑，得併科2,500萬元以上5億元以下罰金。","2億元為一般情形罰金之上限（1,000萬至2億元），非犯罪所得加重之門檻金額。"],"src":"證交法§171第2項；研究筆記第7章、第12章"},{"id":"LAW-B-031","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"依證券交易法第157條之1，內部人從事內線交易，對於當日善意從事相反買賣之人所受損害應負賠償責任；情節重大者，法院得將賠償額最高提高至損害額之幾倍？","options":["1倍","2倍","3倍","5倍"],"answer":2,"explain":["情節重大得提高之倍數並非1倍。","情節重大得提高之倍數並非2倍。","正確。內線交易情節重大者，法院得將賠償額提高至損害額之『3倍』；情節輕微者，得減至2分之1。","情節重大得提高之倍數並非5倍。"],"src":"證交法§157-1第3項；研究筆記第7章"},{"id":"LAW-B-032","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"依證券投資人及期貨交易人保護法，投保中心於發現公司董事、監察人執行業務有重大損害公司之行為時，得對其提起下列何種訴訟以達成公司治理之目的？","options":["刑事自訴","消費爭議評議","代表訴訟及裁判解任之訴","支付命令"],"answer":2,"explain":["投保中心之特別權能係民事上之代表訴訟與解任訴訟，非提起刑事自訴。","消費爭議評議係金融消費者保護法之機制，非投保中心對董監提起之訴訟。","正確。投保中心得為公司對董事、監察人提起『代表訴訟』，並得訴請法院『裁判解任』該董事、監察人，屬保護法賦予之特別權能。","支付命令係一般債權之督促程序，非投保中心對董監行使之公司治理權能。"],"src":"證券投資人及期貨交易人保護法§10-1；研究筆記第12章"},{"id":"LAW-B-033","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"依證券交易法第155條，行為人於同一時間內，以自己不同帳戶或利用他人名義，對同一有價證券同時委託買進及賣出而相互成交，藉以製造交易活絡之表象，此種操縱行為稱為？","options":["連續交易","相對委託","沖洗買賣","違約交割"],"answer":2,"explain":["連續交易係連續以高價買入或低價賣出以拉抬或壓低股價，與本題型態不同。","相對委託係與『他人通謀』約定買賣相互成交，本題為同一人（同一利益）自為買賣，非通謀之相對委託。","正確。同一人（同一利益人）就同一有價證券同時委託買進及賣出而相互成交，製造交易活絡假象者，即『沖洗買賣』。","違約交割係未依限完成交割之行為，非製造活絡假象之沖洗買賣。"],"src":"證交法§155第1項；研究筆記第12章"},{"id":"LAW-B-034","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":1,"q":"依證券交易法第20條之1，公開發行公司之財務報告或財務業務文件有虛偽或隱匿之情事，致善意取得或出賣有價證券之人受有損害者，下列何者應負賠償責任？","options":["僅主辦承銷商","發行人及其負責人等應負賠償責任","僅集中交易市場之對手方","僅金融監督管理委員會"],"answer":1,"explain":["財報不實之賠償責任主體不以承銷商為限。","正確。財務報告或財務業務文件不實者，發行人及其負責人（董事長、總經理等）應對善意投資人所受損害負賠償責任，簽證會計師另依法負責。","集中交易市場之交易對手非財報不實之賠償責任主體。","主管機關（金管會）非財報不實民事賠償之責任主體。"],"src":"證交法§20-1；研究筆記第12章"},{"id":"LAW-B-035","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"依現行規定，證券商與證券交易所間所生之爭議，以及證券商與委託人（投資人）間之爭議，其仲裁性質分別為何？","options":["前者為約定仲裁；後者為強制仲裁","前者為強制仲裁；後者依約定仲裁","二者均為強制仲裁","二者均須經法院裁判，不得仲裁"],"answer":1,"explain":["性質恰好相反：證券商與證交所間為強制仲裁，非約定仲裁。","正確。證券商與證券交易所間之爭議採『強制仲裁』；證券商與委託人（投資人）間之爭議則『依當事人約定』仲裁。","證券商與委託人間為約定仲裁而非強制仲裁，故非二者均強制。","證券爭議設有仲裁機制，並非一律須經法院裁判。"],"src":"證交法§166、§167；研究筆記第12章證券爭議仲裁"},{"id":"LAW-B-036","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":3,"q":"依證券交易法第157條之1，消息受領人（自內部人獲悉重大消息之人）從事內線交易時，其民事損害賠償責任與提供消息之內部人間，性質為何？","options":["各自獨立、互不相涉","與提供消息之內部人負連帶賠償責任","僅提供消息之人負責，受領人免責","僅受領人負責，提供消息之人免責"],"answer":1,"explain":["消息受領人與提供消息之人並非各自獨立，法律明定其連帶責任。","正確。第五款消息受領人與『所從該內部人（提供消息之人）』對善意相反買賣之人所受損害，負『連帶』賠償責任。","提供消息之內部人不因將消息交付他人即免責，仍與受領人連帶負責。","受領人與提供消息之人均應負責（連帶），並非僅受領人單獨負責。"],"src":"證交法§157-1第1項第5款、第3項；研究筆記第7章"},{"id":"LAW-B-037","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"下列關於證券交易法第155條第1項所列操縱市場行為之敘述，何者「錯誤」？","options":["在集中交易市場報價，業經有人承諾接受而不履行交割（違約不交割）","與他人通謀而為相對委託","散布流言或不實資料影響證券交易價格","於公開收購期間依規定申報並公告後進行公開收購"],"answer":3,"explain":["違約不交割係§155第1項第1款明定之操縱行為，敘述正確。","相對委託係§155第1項所定之操縱行為，敘述正確。","散布流言或不實資料影響價格係§155第1項所定之操縱行為，敘述正確。","正確（為錯誤敘述）。依法申報公告後進行之公開收購係合法之股權取得程序，並非操縱市場行為。"],"src":"證交法§155第1項；研究筆記第12章"},{"id":"LAW-B-038","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":1,"q":"依證券交易法第20條之反詐欺（詐欺）條款，有價證券之募集、發行、私募或買賣，應遵守下列何項規定？","options":["得為虛偽、詐欺或其他足致他人誤信之行為","不得有虛偽、詐欺或其他足致他人誤信之行為","僅禁止對機構投資人為詐欺行為","僅於集中市場買賣始受規範"],"answer":1,"explain":["法條係『禁止』虛偽詐欺行為，本選項語意相反，為錯誤。","正確。證交法§20第1項明定，有價證券之募集、發行、私募或買賣，『不得有虛偽、詐欺或其他足致他人誤信之行為』。","反詐欺條款保護對象不限於機構投資人，一般投資人亦受保護。","反詐欺條款適用於募集、發行、私募及買賣，不以集中市場為限。"],"src":"證交法§20第1項；研究筆記第12章"},{"id":"LAW-B-039","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":1,"q":"投資人於集中交易市場買進股票後未依規定於期限內完成交割而構成違約時，證券商得對該投資人處以最高不超過成交金額多少比例之違約金？","options":["3%","5%","7%","10%"],"answer":2,"explain":["違約金上限並非成交金額之3%。","違約金上限並非成交金額之5%。","正確。投資人違約交割時，證券商得處以『最高成交金額7%』之違約金；情節重大者另可能涉及證交法§155操縱市場之刑責。","違約金上限並非成交金額之10%。"],"src":"證交法§155及交割相關規定；研究筆記高頻考點17"},{"id":"LAW-B-040","exam":"gaoye-law","subject":"","topic":"投資人保護與罰則","difficulty":2,"q":"下列關於證券交易法第32條公開說明書不實民事責任之敘述，何者「正確」？","options":["發行人及其負責人得證明已盡相當注意即可免責","簽證會計師須就全部公開說明書內容負絕對責任","承銷商、律師、會計師等專家就其職務範圍負推定過失責任，能證明已盡相當注意者免責","公開說明書縱有虛偽隱匿，任何人均不負民事賠償責任"],"answer":2,"explain":["發行人及其負責人負『絕對責任』，不得以已盡相當注意主張免責，本選項錯誤。","會計師僅就其簽證之職務範圍負推定過失責任，非就全部內容負絕對責任，本選項錯誤。","正確。承銷商、律師、會計師等專家係就其職務範圍負『推定過失責任』，能證明已盡相當之注意者得免責。","公開說明書虛偽隱匿時，發行人、負責人及相關專家均可能負民事賠償責任，本選項錯誤。"],"src":"證交法§32；研究筆記第2章公開說明書責任"},{"id":"LAW-C-001","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"依現行規定，我國上市（櫃）股票在集中交易市場之每日升降幅度（漲跌幅）原則上限為多少？","options":["7%","15%","無漲跌幅限制","10%"],"answer":3,"explain":["7%為104年6月1日以前之舊制漲跌幅，現已放寬，非現行標準。","15%並非我國股票之漲跌幅標準，屬臆造數字。","一般上市（櫃）股票有10%漲跌幅限制；僅興櫃股票、初上市（櫃）前5個交易日等特殊情形才無漲跌幅限制。","正確。自104年6月1日起，上市（櫃）股票每日漲跌幅由7%放寬為10%，以前一營業日收盤價為基準。"],"src":"證交所業務規章；漲跌幅10%（104.6.1起）"},{"id":"LAW-C-002","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"下列何者為興櫃股票交易的正確敘述？","options":["無漲跌幅限制，由投資人與推薦證券商議價成交","有10%漲跌幅限制，採集中競價撮合","僅能於店頭市場以固定牌價買賣","與上市股票同採逐筆撮合且有漲跌幅限制"],"answer":0,"explain":["正確。興櫃股票無漲跌幅限制，透過推薦證券商報價、由投資人與推薦證券商議價成交，是申請上市（櫃）前的必經階段（滿6個月）。","興櫃股票並無10%漲跌幅限制，也非採集中市場競價撮合，敘述錯誤。","興櫃並非以固定牌價買賣，而是議價成交，敘述錯誤。","興櫃股票無漲跌幅限制，與上市股票之10%限制不同，敘述錯誤。"],"src":"櫃買中心興櫃股票制度；興櫃無漲跌幅、議價成交"},{"id":"LAW-C-003","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"下列關於上市（設立3年）與上櫃（設立2個完整會計年度）設立年限之敘述，何者正確？","options":["上市與上櫃均須設立屆滿5年以上","上市須設立滿1年；上櫃須設立滿6個月","上櫃之設立年限要求較上市嚴格","上市須設立屆滿3年以上；上櫃須設立滿2個完整會計年度"],"answer":3,"explain":["上市為滿3年、上櫃為滿2個完整會計年度，並非均為5年，敘述錯誤。","上市為滿3年、上櫃為滿2個完整會計年度，此敘述數字均過低，錯誤。","上市（3年）之設立年限要求較上櫃（2完整會計年度）嚴格，敘述恰好相反，錯誤。","正確。申請上市者設立年限原則須屆滿3年以上；申請上櫃者則須設立滿2個完整會計年度，上市之年限要求較上櫃嚴格。"],"src":"證交所上市審查準則、櫃買上櫃審查準則；上市滿3年、上櫃滿2完整會計年度"},{"id":"LAW-C-004","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"甲公司欲申請股票上市，下列關於上市「實收資本額」門檻的敘述，何者正確？","options":["實收資本額新臺幣5,000萬元以上","實收資本額新臺幣2億元以上","實收資本額新臺幣6億元以上，且發行普通股3,000萬股以上","實收資本額新臺幣10億元以上"],"answer":2,"explain":["5,000萬元為「上櫃」之實收資本額門檻，並非上市。","2億元並非上市之資本額門檻，屬易混淆數字。","正確。上市之傳統標準為實收資本額6億元以上，且發行普通股3,000萬股以上（上櫃則為5,000萬元以上）。","10億元為綜合證券商（兼營三種業務）之合計最低資本額，並非股票上市之門檻。"],"src":"證交所上市審查準則；上市資本額6億、普通股3,000萬股"},{"id":"LAW-C-005","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"下列關於上市與上櫃「股權分散」記名股東人數門檻之敘述，何者正確？","options":["上市與上櫃均須記名股東500人以上","上市須記名股東300人以上；上櫃須1,000人以上","上市須記名股東1,000人以上；上櫃須內部人以外記名股東300人以上","上市與上櫃均須記名股東1,000人以上"],"answer":2,"explain":["上市為1,000人、上櫃為300人，並非均為500人，敘述錯誤。","此敘述將上市、上櫃人數對調（上市應為1,000、上櫃300），敘述錯誤。","正確。上市之股權分散要求記名股東1,000人以上；上櫃則要求內部人以外記名股東300人以上。","上櫃為300人，並非1,000人，敘述錯誤。"],"src":"證交所上市審查準則、櫃買上櫃審查準則；股東1,000人／300人"},{"id":"LAW-C-006","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"公司申請股票上市或上櫃前，原則上須先於興櫃市場交易滿多久？","options":["滿1個月","滿6個月","滿3個月","滿1年"],"answer":1,"explain":["滿1個月不符興櫃掛牌期間要求，數字過短。","正確。無論申請上市或上櫃，原則上均須先在興櫃市場交易滿6個月。","滿3個月為開立信用交易帳戶（受託買賣帳戶）之期間要求，並非興櫃掛牌期間。","滿1年並非興櫃掛牌之期間要求，數字過長。"],"src":"證交所、櫃買審查準則；上市（櫃）前興櫃滿6個月"},{"id":"LAW-C-007","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"我國集中交易市場現行盤中交易（9:00至13:30）與開盤、收盤之撮合方式為何？","options":["全日均採集合競價，每盤集中撮合一次","盤中採集合競價，開盤及收盤採逐筆交易","全日採固定牌價交易，不進行競價","盤中採逐筆交易，開盤及收盤（13:25–13:30）採集合競價"],"answer":3,"explain":["現行盤中採逐筆交易，並非全日集合競價，敘述錯誤。","現行係盤中逐筆、開收盤集合競價，此敘述恰好相反，錯誤。","集中市場採競價交易，並非全日固定牌價，敘述錯誤。","正確。自109年3月23日起，盤中交易改採逐筆交易，成交即時揭示；開盤及收盤（13:25–13:30）則採集合競價，以最大成交量原則決定單一價格。"],"src":"證交所業務規章；盤中逐筆交易（109.3.23起）、開收盤集合競價"},{"id":"LAW-C-008","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":3,"q":"為避免逐筆交易下瞬間巨量委託造成價格劇烈波動，我國集中市場設有「瞬間價格穩定措施」，其主要作用為何？","options":["當試算成交價超逾參考價上下一定比率時，該筆暫緩撮合約2分鐘、改採集合競價","直接停止該股票當日所有交易","將該股票立即打入全額交割","取消當日漲跌幅限制"],"answer":0,"explain":["正確。瞬間價格穩定措施於逐筆交易試算成交價超逾參考價上下一定比率時，該筆暫緩撮合約2分鐘、改以集合競價方式撮合，藉此緩和瞬間價格波動。","瞬間價格穩定措施僅短暫延緩該筆撮合，並非停止該股票當日所有交易，敘述錯誤。","打入全額交割屬變更交易方法之處置，與瞬間價格穩定措施無關，敘述錯誤。","該措施並不會取消漲跌幅限制，敘述錯誤。"],"src":"證交所逐筆交易瞬間價格穩定措施；暫緩撮合改集合競價"},{"id":"LAW-C-009","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"我國現行融資交易之融資比率（上市、上櫃股票）為多少？投資人須自備之款項成數為何？","options":["融資比率60%，自備4成","融資比率50%，自備5成","融資比率90%，自備1成","融資比率70%，自備3成"],"answer":0,"explain":["正確。現行上市與上櫃股票之融資比率均為60%，即向證券金融事業融資六成，自備款為四成。","融資比率並非50%，數字過低。","90%為融券保證金之成數，並非融資比率，屬概念混淆。","融資比率為60%，並非70%，數字錯誤。"],"src":"有價證券得為融資融券標準；融資比率60%"},{"id":"LAW-C-010","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"投資人辦理融券賣出時，現行應繳交之融券保證金成數為多少？","options":["60%","70%","130%","90%"],"answer":3,"explain":["60%為融資比率，並非融券保證金成數。","70%並非融券保證金之現行成數，屬臆造數字。","130%為信用交易整戶擔保維持率，並非融券保證金成數，屬概念混淆。","正確。現行融券保證金成數為90%，即以融券賣出價金之九成作為保證金。"],"src":"有價證券得為融資融券標準；融券保證金90%"},{"id":"LAW-C-011","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"依現行規定，信用交易之整戶擔保維持率低於多少時，將通知投資人補繳？","options":["120%","130%","140%","166%"],"answer":1,"explain":["120%並非現行之整戶擔保維持率追繳門檻，屬易混淆數字。","正確。整戶擔保維持率低於130%時，即通知投資人於2個營業日內補繳差額，逾期未補得處分擔保品（斷頭）。","140%並非現行維持率門檻，數字錯誤。","166%為早期單戶維持率之舊制數字，現行整戶維持率為130%。"],"src":"信用交易維持率規範；整戶擔保維持率130%"},{"id":"LAW-C-012","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":3,"q":"投資人某信用帳戶整戶擔保維持率跌破130%，經證券商通知補繳，投資人應於幾個營業日內補繳，逾期未補繳將如何處理？","options":["當日立即補繳，否則帳戶凍結","2個營業日內補繳，逾期得處分擔保品（斷頭）","3個營業日內補繳，逾期則暫停信用交易","5個營業日內補繳，逾期移送法辦"],"answer":1,"explain":["並非要求當日立即補繳並凍結帳戶，敘述錯誤。","正確。維持率低於130%經通知後，投資人應於2個營業日內補繳，逾期未補繳，證券金融事業（證券商）得處分其擔保品（俗稱斷頭）以清償融資融券債務。","補繳期限為2個營業日，並非3個營業日；逾期處理亦非僅暫停交易，敘述錯誤。","補繳期限為2個營業日，且逾期係處分擔保品而非移送法辦，敘述錯誤。"],"src":"信用交易維持率規範；低於130%通知2營業日內補繳"},{"id":"LAW-C-013","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"關於「平盤以下不得融（借）券賣出」之規定，下列敘述何者正確？","options":["所有上市櫃股票一律不得於平盤以下放空，無任何例外","原則上平盤以下不得融券賣出，但臺灣50指數成分股等經核定者豁免適用","僅權證不得於平盤以下放空","平盤以下放空完全開放，無任何限制"],"answer":1,"explain":["雖原則禁止，但並非一律無例外，臺灣50成分股等經核定者可豁免，敘述過於絕對。","正確。原則上平盤以下不得融（借）券賣出以避免助跌，但臺灣50指數成分股等流動性較佳、經核定之標的豁免適用，得於平盤下放空。","此規定適用對象為融（借）券賣出之標的股票，並非僅限權證，敘述錯誤。","平盤以下放空原則上受限制，並非完全開放，敘述錯誤。"],"src":"有價證券得為融資融券標準；平盤下不得放空（台灣50豁免）"},{"id":"LAW-C-014","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"投資人欲開立信用交易（融資融券）帳戶，須先開立受託買賣帳戶滿多久？","options":["滿1個月","滿6個月","滿3個月","滿1年"],"answer":2,"explain":["滿1個月不符開立信用帳戶之期間要求，數字過短。","滿6個月為股票「得為融資融券標的」之上市（櫃）期間要求，並非投資人開戶條件。","正確。開立信用交易帳戶之條件之一，為開立受託買賣帳戶須滿3個月（另須最近1年內成交10筆以上等條件）。","滿1年並非開戶期間門檻，屬易混淆數字。"],"src":"證券商辦理融資融券業務操作辦法；開戶滿3個月"},{"id":"LAW-C-015","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"下列關於信用交易（融資融券）期限及展延之敘述，何者正確？","options":["融資融券期限為3個月，不得展延","融資融券期限為1年，不得展延","融資融券期限為6個月，得申請展延6個月且以2次為限","融資融券無期限限制，可長期持有"],"answer":2,"explain":["融資融券期限為6個月（非3個月），且得展延，敘述錯誤。","融資融券期限為6個月（非1年），且展延有次數限制，敘述錯誤。","正確。融資、融券期限均為6個月，屆期得申請展延6個月，並以2次為限（最長合計18個月）。","融資融券有明確期限（6個月）與展延次數限制，並非可無限期持有，敘述錯誤。"],"src":"有價證券得為融資融券標準；期限6個月、展延2次為限"},{"id":"LAW-C-016","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"投資人辦理現股當日沖銷（現股當沖）之資格條件，下列何者正確？","options":["開立受託買賣帳戶滿1年，且不需任何交易紀錄","須先取得融資融券帳戶始能現股當沖","開立受託買賣帳戶滿3個月，且最近1年內成交10筆以上（先賣後買另須簽署風險預告書）","僅法人得辦理現股當沖，自然人不得為之"],"answer":2,"explain":["當沖資格之開戶期間為滿3個月（非滿1年），且須有交易紀錄，敘述錯誤。","現股當沖為現股交易，不以先開立融資融券帳戶為必要條件，敘述錯誤。","正確。現股當沖資格與開立信用帳戶之基礎條件類似：開戶滿3個月＋最近1年內成交10筆以上，另若採先賣後買方式須簽署風險預告書。","自然人符合資格條件者亦得辦理現股當沖，並非僅限法人，敘述錯誤。"],"src":"證交所現股當沖沖銷交易作業辦法；開戶3個月＋1年10筆"},{"id":"LAW-C-017","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"為配合租稅政策，現股當日沖銷交易之證券交易稅稅率減半課徵，其現行稅率及施行期限為何？","options":["稅率3‰，永久適用","稅率1.5‰，延長施行至民國116年12月31日","稅率1‰，施行至民國115年12月31日","稅率0.5‰，無期限限制"],"answer":1,"explain":["3‰為一般股票賣出之稅率，並非當沖減半後之稅率，且當沖優惠並非永久，敘述錯誤。","正確。現股當沖之證券交易稅減半課徵為1.5‰（一般賣出為3‰），並經修法延長施行至民國116年12月31日。","當沖減半稅率為1.5‰（並非1‰），且施行期限為116年底（並非115年底），敘述錯誤。","0.5‰並非當沖之稅率，且優惠有施行期限，敘述錯誤。"],"src":"證券交易稅條例；當沖減半1.5‰延長至116.12.31"},{"id":"LAW-C-018","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":1,"q":"我國一般上市（櫃）股票之普通交割，投資人應於成交後第幾個營業日完成款券劃撥交割？","options":["成交當日（T日）","成交次一營業日（T+1日）","成交後第二營業日（T+2日）","成交後第三營業日（T+3日）"],"answer":2,"explain":["T日為成交日，並非普通交割之交割日，敘述錯誤。","T+1日並非現行普通交割之交割日，數字錯誤。","正確。現行普通交割為T+2日，投資人至遲應於T+2日上午10:00前完成款券劃撥交割。","T+3為舊制交割日，現行已縮短為T+2日。"],"src":"證交所業務規章；普通交割T+2日"},{"id":"LAW-C-019","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":3,"q":"投資人未依規定履行交割義務而構成違約交割時，依現行規定證券商得處以之違約金上限為成交金額之多少？","options":["最高成交金額之7%","最高成交金額之3%","最高成交金額之5%","最高成交金額之10%"],"answer":0,"explain":["正確。投資人違約交割時，證券商得處以最高不超過成交金額7%之違約金；情節重大者另可能涉及證交法§155操縱市場之刑事責任。","3‰為股票賣出之證券交易稅率，並非違約金上限，屬概念混淆。","5%並非違約金之上限比率，數字錯誤。","10%為承銷包銷報酬之上限，並非違約金上限，屬概念混淆。"],"src":"證交所業務規章；違約金上限成交金額7%"},{"id":"LAW-C-020","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"下列關於我國款券劃撥（帳簿劃撥）制度之敘述，何者正確？","options":["上市櫃有價證券已全面無實體發行，透過集中保管帳簿劃撥方式完成交割","投資人買賣交割仍須以實體股票及現金當面點交","僅債券採帳簿劃撥，股票仍發實體","帳簿劃撥制度僅適用於興櫃股票"],"answer":0,"explain":["正確。上市櫃有價證券已全面無實體發行，投資人買賣款項與證券透過集中保管事業之帳簿劃撥完成交割，兼具便利與安全。","現行採帳簿劃撥制度，並非以實體股票與現金當面點交，敘述錯誤。","股票亦已無實體化並採帳簿劃撥，並非仍發實體，敘述錯誤。","帳簿劃撥制度適用於上市櫃有價證券，並非僅限興櫃，敘述錯誤。"],"src":"有價證券集中保管帳簿劃撥作業辦法；全面無實體、帳簿劃撥"},{"id":"LAW-C-021","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"下列關於集中交易市場與店頭（櫃檯買賣）市場之區別，何者正確？","options":["集中市場與店頭市場均由櫃買中心經營","店頭市場之股票流動性一律高於集中市場","集中市場僅買賣債券，店頭市場僅買賣股票","集中市場於證券交易所以競價方式撮合上市有價證券；店頭市場為櫃買中心之上櫃、興櫃等買賣"],"answer":3,"explain":["集中市場由證券交易所經營，店頭市場由櫃買中心經營，並非均由櫃買中心經營，敘述錯誤。","流動性因個股而異，不能一概認定店頭市場一律高於集中市場，敘述錯誤。","集中市場與店頭市場均可買賣股票與債券，並非以商品種類截然二分，敘述錯誤。","正確。集中交易市場由證券交易所經營，以集中競價方式撮合上市有價證券；店頭市場（櫃檯買賣）由櫃買中心經營，包含上櫃、興櫃等交易。"],"src":"證券交易法；集中市場（證交所）vs店頭市場（櫃買）"},{"id":"LAW-C-022","exam":"gaoye-law","subject":"","topic":"交易市場與實務","difficulty":2,"q":"投資人賣出上市股票100張，成交價每股新臺幣50元（每張1,000股），依現行稅率應繳納之證券交易稅為多少？（不計手續費）","options":["新臺幣7,125元","新臺幣5,000元","新臺幣15,000元","新臺幣50,000元"],"answer":2,"explain":["7,125元係以手續費上限1.425‰計算之金額（5,000,000×0.001425），並非證券交易稅，屬概念混淆。","5,000元之計算誤用稅率1‰（ETF稅率），並非一般股票之3‰，計算錯誤。","正確。成交金額＝50元×1,000股×100張＝5,000,000元；股票賣出證交稅率3‰，證交稅＝5,000,000×0.003＝15,000元。","50,000元係誤以1%計算，稅率過高，計算錯誤。"],"src":"證券交易稅條例；股票賣出證交稅3‰"},{"id":"LAW-C-023","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":1,"q":"依證券商設置標準，經營「經紀」業務之證券商，其最低實收資本額為新臺幣多少元？","options":["4億元","5,000萬元","2億元","10億元"],"answer":2,"explain":["4億元為承銷商及自營商之最低實收資本額，並非經紀商，敘述錯誤。","5,000萬元為股票上櫃之實收資本額門檻，並非證券商設置之最低資本額，屬概念混淆。","正確。依設置標準，經紀商最低實收資本額為2億元（承銷商與自營商均為4億元）。","10億元為綜合證券商（兼營承銷、自營、經紀三種業務）之合計最低資本額，並非單一經紀業務門檻。"],"src":"證券商設置標準§3；經紀商資本額2億"},{"id":"LAW-C-024","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":2,"q":"依證券商設置標準，經營「承銷」與「自營」業務之證券商，其最低實收資本額分別為多少？","options":["承銷2億元、自營2億元","承銷10億元、自營4億元","承銷4億元、自營4億元","承銷4億元、自營2億元"],"answer":2,"explain":["承銷商與自營商之最低實收資本額均為4億元，並非2億元，敘述錯誤。","10億元為綜合證券商三種業務合計之最低資本額，並非單一承銷業務門檻，敘述錯誤。","正確。依設置標準，承銷商與自營商之最低實收資本額均為4億元（經紀商則為2億元）。","自營商為4億元（並非2億元），此敘述將自營商誤植為經紀商之2億元，錯誤。"],"src":"證券商設置標準§3；承銷、自營各4億"},{"id":"LAW-C-025","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":2,"q":"某公司欲設立兼營承銷、自營及經紀三種業務之綜合證券商，其最低實收資本額合計為新臺幣多少元？","options":["8億元","6億元","10億元","14億元"],"answer":2,"explain":["8億元並非綜合證券商之合計資本額門檻，數字錯誤。","6億元為股票上市之實收資本額門檻，並非綜合證券商之資本額，屬概念混淆。","正確。綜合證券商合計最低實收資本額為10億元（承銷4億＋自營4億＋經紀2億＝10億）。","14億元高於承銷4億＋自營4億＋經紀2億之合計10億，計算錯誤。"],"src":"證券商設置標準§3；綜合證券商合計10億"},{"id":"LAW-C-026","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":3,"q":"依證券商管理規則，經營「經紀」業務之證券商應提存之營業保證金為新臺幣多少元？","options":["1,000萬元","5,000萬元","4,000萬元","500萬元"],"answer":1,"explain":["1,000萬元為自營商應提存之營業保證金，並非經紀商，敘述錯誤。","正確。依管理規則，經紀商應提存營業保證金5,000萬元（承銷商4,000萬、自營商1,000萬），為三者中最高。","4,000萬元為承銷商應提存之營業保證金，並非經紀商，敘述錯誤。","500萬元為每增設一分支機構應增提之營業保證金，並非經紀商本身之保證金，屬概念混淆。"],"src":"證券商管理規則§9；經紀商營業保證金5,000萬"},{"id":"LAW-C-027","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":3,"q":"依證券商管理規則，承銷商、自營商、經紀商應提存之營業保證金分別為多少？","options":["承銷5,000萬、自營4,000萬、經紀1,000萬","承銷1,000萬、自營4,000萬、經紀5,000萬","承銷4,000萬、自營5,000萬、經紀1,000萬","承銷4,000萬、自營1,000萬、經紀5,000萬"],"answer":3,"explain":["承銷商為4,000萬（非5,000萬）、經紀商為5,000萬（非1,000萬），數字對應錯誤。","承銷商為4,000萬（非1,000萬）、自營商為1,000萬（非4,000萬），數字對應錯誤。","自營商為1,000萬（非5,000萬）、經紀商為5,000萬（非1,000萬），數字對應錯誤。","正確。依管理規則§9，承銷商營業保證金4,000萬、自營商1,000萬、經紀商5,000萬（口訣「四千、一千、五千」）。"],"src":"證券商管理規則§9；4,000萬／1,000萬／5,000萬（承-自-經）"},{"id":"LAW-C-028","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":1,"q":"證券商每增設一家分支機構，依規定應另行增提之營業保證金為新臺幣多少元？","options":["500萬元","100萬元","1,000萬元","5,000萬元"],"answer":0,"explain":["正確。證券商每增設一分支機構，應另增提營業保證金500萬元。","100萬元並非增設分支機構應增提之金額，數字過低。","1,000萬元為自營商本身之營業保證金，並非分支機構增提額，屬概念混淆。","5,000萬元為經紀商本身之營業保證金，並非分支機構之增提額，屬概念混淆。"],"src":"證券商管理規則§9；每一分支機構增提500萬"},{"id":"LAW-C-029","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":3,"q":"依現行證券商管理規則，證券商對外負債總額原則上不得超過其淨值之多少倍？","options":["4倍","10倍","15倍","6倍"],"answer":3,"explain":["4倍為舊制之對外負債限制，現行已修正放寬，並非現行標準。","10倍為自有資本適足比率低於120%時之包銷限額倍數，並非對外負債之限制倍數，屬概念混淆。","15倍為包銷總金額不得超過（流動資產減流動負債）之倍數上限，並非對外負債限制，屬概念混淆。","正確。依現行管理規則§13，證券商對外負債總額不得超過其淨值之6倍（且流動負債不得超過流動資產）。"],"src":"證券商管理規則§13；對外負債不得超過淨值6倍"},{"id":"LAW-C-030","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":1,"q":"依證券商管理規則，自營商持有任一本國公司股份，不得超過該公司已發行股份總額之多少？","options":["5%","10%","15%","20%"],"answer":1,"explain":["5%並非自營商持股單一公司之限制比率，數字錯誤。","正確。依管理規則§19，證券自營商持有任一本國公司股份，不得超過該公司已發行股份總額之10%，以避免過度持股影響市場。","15%為承銷過額配售之上限比率，並非自營商持股限制，屬概念混淆。","20%並非自營商持股單一公司之限制比率，數字過高。"],"src":"證券商管理規則§19；自營商持股單一公司不得逾10%"},{"id":"LAW-C-031","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":1,"q":"依證券商管理規則，證券商每年度應自稅後盈餘提列特別盈餘公積之比率，及其得免提之條件為何？","options":["提列20%，累積已達實收資本額者免提","提列10%，累積達實收資本額二分之一者免提","提列30%，累積達淨值者免提","提列5%，永久提列不得免提"],"answer":0,"explain":["正確。依管理規則§14，證券商每年度應就稅後盈餘提列20%為特別盈餘公積，俟累積金額已達實收資本額時始得免提。","提列比率為20%（非10%），且免提條件為累積達實收資本額（非二分之一），敘述錯誤。","提列比率為20%（非30%），且免提基準為實收資本額（非淨值），敘述錯誤。","提列比率為20%（非5%），且累積達實收資本額後即可免提，並非永久提列，敘述錯誤。"],"src":"證券商管理規則§14；特別盈餘公積提列20%"},{"id":"LAW-C-032","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":3,"q":"依證券商管理規則，承銷商辦理包銷之總金額，原則上不得超過其流動資產減流動負債後餘額之多少倍？","options":["5倍","10倍","20倍","15倍"],"answer":3,"explain":["5倍為自有資本適足比率低於100%時所調整後之包銷限額倍數，並非原則倍數。","10倍為自有資本適足比率低於120%時所調整後之倍數，並非原則倍數。","20倍高於原則之15倍上限，數字錯誤。","正確。依管理規則§22，包銷總金額原則上不得超過（流動資產減流動負債）餘額之15倍；適足比率低於120%調降為10倍、低於100%調降為5倍。"],"src":"證券商管理規則§22；包銷限額（流動資產－流動負債）×15倍"},{"id":"LAW-C-033","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":2,"q":"下列關於證券商業務人員「登錄」之敘述，何者正確？","options":["業務人員未經登錄即可先行執行業務，事後補登錄即可","登錄僅為形式，執行業務不以登錄為前提","僅高級業務員須登錄，一般業務員免登錄","業務人員應向證券主管機關（或指定機構）辦理登錄後，始得執行證券業務"],"answer":3,"explain":["業務人員應先完成登錄始得執行業務，並非可先執行事後補登錄，敘述錯誤。","登錄係執行業務之法定前提，並非僅形式，敘述錯誤。","無論高級或一般業務員，執行業務均須登錄，並非僅高級業務員須登錄，敘述錯誤。","正確。依證券商負責人與業務人員管理規則，業務人員應辦理登錄後始得執行職務所定之證券業務，未登錄不得執行業務。"],"src":"證券商負責人與業務人員管理規則；登錄後始得執行業務"},{"id":"LAW-C-034","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":2,"q":"依證券商負責人與業務人員管理規則，關於業務人員兼職之限制，下列敘述何者正確？","options":["業務人員非經專任（專職），不得執行證券業務","業務人員得同時受僱於二家以上證券商並執行業務","業務人員得自由兼營其他行業之業務並代客操作","業務人員得以非專職身分執行受託買賣業務"],"answer":0,"explain":["正確。業務人員原則上應為專任（專職），非經專職不得執行證券業務，以維護執業品質與利益迴避。","業務人員不得同時受僱於多家證券商執行業務，兼職受有限制，敘述錯誤。","業務人員不得任意兼營他業並代客操作（全權委託另屬投信投顧業務且須核准），敘述錯誤。","業務人員須以專職身分執行受託買賣，並非得以非專職身分為之，敘述錯誤。"],"src":"證券商負責人與業務人員管理規則；業務人員非專職不得執行業務"},{"id":"LAW-C-035","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":3,"q":"依證券商負責人與業務人員管理規則，關於在職業務人員之在職訓練，下列敘述何者正確？","options":["在職業務人員應每3年參加在職訓練","在職業務人員每年均須參加在職訓練","在職業務人員每5年參加一次在職訓練即可","在職業務人員取得資格後即無須再受任何訓練"],"answer":0,"explain":["正確。在職業務人員應每3年參加在職訓練（初任及離職滿3年再任者另應於到職後半年內參加職前訓練）。","在職訓練之週期為每3年，並非每年，敘述錯誤。","在職訓練週期為每3年，並非每5年，敘述錯誤。","業務人員取得資格後仍須依規定接受在職訓練，並非無須再受訓練，敘述錯誤。"],"src":"證券商負責人與業務人員管理規則；在職人員每3年在職訓練"},{"id":"LAW-C-036","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":2,"q":"依證券商負責人與業務人員管理規則，下列何者屬於不得充任證券商業務人員之「消極資格」情形？","options":["受破產之宣告尚未復權者","曾任其他證券商之業務人員","年滿三十歲以上者","大學財經相關科系畢業者"],"answer":0,"explain":["正確。受破產之宣告尚未復權者，屬管理規則所定不得充任業務人員之消極資格情形之一（另如曾犯特定罪經判刑確定等）。","曾任其他證券商業務人員屬正常經歷，並非消極資格，敘述錯誤。","年滿三十歲並非消極資格，反而通常需具備完全行為能力，敘述錯誤。","財經科系畢業屬有利之積極條件，並非消極資格，敘述錯誤。"],"src":"證券商負責人與業務人員管理規則；消極資格（破產未復權等）"},{"id":"LAW-C-037","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":2,"q":"下列關於證券商受託買賣業務之規範，何者正確？","options":["證券經紀商得接受委託人全權委託代為決定買賣","證券商得任意於集中市場外進行場外交易","證券商得自由收受存款並辦理放款","證券經紀商受託買賣不得接受全權委託（代客操作屬投信投顧業務，另須核准）"],"answer":3,"explain":["證券經紀商受託買賣不得接受全權委託，敘述恰好相反，錯誤。","集中市場買賣以場內為原則（§150），證券商不得任意場外交易，敘述錯誤。","證券商原則上不得收受存款、辦理放款（除經核准之業務外），敘述錯誤。","正確。證券經紀商受託買賣不得接受委託人全權委託（代客操作屬投信投顧之全權委託投資業務，須另經核准），且集中市場買賣以場內為原則。"],"src":"證券交易法§60、§150；經紀商不得接受全權委託、不得收受存款放款"},{"id":"LAW-C-038","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":1,"q":"投資人自公開發行公司取得之現金股利（股利所得），依現行稅制原則上應如何處理？","options":["屬證券交易所得，現行停徵免稅","屬股利所得，須依所得稅法規定課徵綜合所得稅（得選合併計稅或分開計稅）","一律按千分之3課徵證券交易稅","屬免稅所得，完全不課任何稅"],"answer":1,"explain":["現金股利屬「股利所得」，並非停徵之證券交易所得，二者不同，敘述錯誤。","正確。投資人領取之現金股利屬股利所得，須依所得稅法課徵綜合所得稅；個人得就股利所得選擇併入綜合所得總額或按單一稅率分開計稅，擇優適用。","千分之3為股票「賣出」之證券交易稅率，與領取股利之所得課稅無關，屬概念混淆。","股利所得須課徵綜合所得稅，並非完全免稅，敘述錯誤。"],"src":"所得稅法；股利所得課徵綜合所得稅"},{"id":"LAW-C-039","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":1,"q":"依現行規定，證券經紀商受託買賣有價證券之手續費費率上限為成交金額之多少？","options":["千分之3（3‰）","千分之1.425（1.425‰）","千分之1（1‰）","千分之1.5（1.5‰）"],"answer":1,"explain":["3‰為股票賣出之證券交易稅率，並非手續費上限，屬概念混淆。","正確。證券經紀商受託買賣手續費上限為成交金額之千分之1.425（1.425‰），由證券商在此上限內自訂並申報。","1‰為ETF受益憑證賣出之證交稅率，並非受託買賣手續費上限，敘述錯誤。","1.5‰為現股當沖之證交稅（減半）稅率，並非手續費上限，屬概念混淆。"],"src":"證交所經紀商受託契約準則；手續費上限1.425‰"},{"id":"LAW-C-040","exam":"gaoye-law","subject":"","topic":"證券商管理與市場規範","difficulty":1,"q":"下列關於證券商設置與業務經營之敘述，何者正確？","options":["證券商經營任一業務之營業保證金一律相同","證券商經營二種以上業務者，其營業保證金應按各業務所定金額併計提存","證券商設立後不受任何最低實收資本額之限制","營業保證金與實收資本額為同一概念，無須分別計算"],"answer":1,"explain":["各業務之營業保證金金額不同（承銷4,000萬、自營1,000萬、經紀5,000萬），並非一律相同，敘述錯誤。","正確。證券商經營二種以上業務者，其營業保證金應按各業務所定金額併計提存（如綜合證券商須將承銷、自營、經紀之保證金合併計算）。","證券商設立須符合設置標準所定最低實收資本額（承銷、自營各4億、經紀2億），並非不受限制，敘述錯誤。","營業保證金（依管理規則提存）與實收資本額（依設置標準）為不同概念，須分別符合，敘述錯誤。"],"src":"證券商管理規則§9；經營二種以上業務營業保證金併計"},{"id":"LAW-D-001","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"依證券交易法規定，公開發行股票之公司股東常會應於每會計年度終了後多久內召開，且不得延期？","options":["3個月內","4個月內","6個月內","1年內"],"answer":2,"explain":["錯誤。3個月是年度財務報告的公告申報期限（會計年度終了後3個月內），非股東常會召開期限。","錯誤。4個月非法定期限；股東常會之召開期限為6個月，勿與其他期限混淆。","正確。證交法第36條第7項規定股東常會應於每會計年度終了後6個月內召開，且排除公司法第170條但書之延期規定，故不得延期。","錯誤。1年並非股東常會召開期限；股東常會為每年召開一次之會議，須於年度終了後6個月內召開。"],"src":"證券交易法第36條第7項；研究筆記第6、10章"},{"id":"LAW-D-002","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"公開發行股票之公司召開股東常會，其召集通知應於幾日前送達股東？","options":["30日前","21日前","15日前","10日前"],"answer":0,"explain":["正確。公開發行公司股東常會之召集通知應於30日前為之（臨時會為15日前），此為公司法第172條就公開發行公司之特別規定。","錯誤。21日是非公開發行公司在採用公告方式時的一般常會通知期間之一態樣，但公開發行公司常會通知為30日前。","錯誤。15日前是公開發行公司股東臨時會之通知期間，非常會。","錯誤。10日前是非公開發行公司股東臨時會之通知期間，非公開發行公司常會。"],"src":"公司法第172條；研究筆記第10章"},{"id":"LAW-D-003","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"依公司法規定，公司於完納稅捐後分派盈餘時，除章程另有較高規定外，應先提出多少比率為法定盈餘公積？","options":["百分之五","百分之十","百分之二十","百分之二十五"],"answer":1,"explain":["錯誤。百分之五非法定盈餘公積提列比率，易與其他成數混淆。","正確。公司法第237條規定，公司於完納稅捐後分派盈餘時，應先提出百分之十為法定盈餘公積，但已達實收資本額時不在此限。","錯誤。百分之二十是證券商依證券商管理規則第14條每年提列特別盈餘公積之成數，非公司法之法定盈餘公積。","錯誤。百分之二十五並非法定盈餘公積之提列比率。"],"src":"公司法第237條；研究筆記第10、11章"},{"id":"LAW-D-004","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"依公司法第172條之1股東提案權規定，持有多少比率以上股份之股東，得向公司提出股東常會議案？","options":["已發行股份總數百分之一以上","已發行股份總數百分之三以上","已發行股份總數百分之五以上","已發行股份總數百分之十以上"],"answer":0,"explain":["正確。公司法第172條之1規定，持有已發行股份總數百分之一以上股份之股東，得以書面或電子受理方式向公司提出股東常會議案，且以一項為限、不超過300字。","錯誤。百分之三是少數股東請求董事會召集股東臨時會（繼續1年以上持有）之門檻，非提案權門檻。","錯誤。百分之五是大量持股申報之取得門檻，與股東提案權無關。","錯誤。百分之十是內部人（大股東）之持股認定門檻，非股東提案權門檻。"],"src":"公司法第172條之1；研究筆記第10章"},{"id":"LAW-D-005","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"依公司法規定，繼續1年以上持有已發行股份總數3%以上之股東，得以書面記明提議事項及理由請求董事會召集股東臨時會；董事會於幾日內不為召集之通知時，股東得報經主管機關許可自行召集？","options":["10日","15日","30日","60日"],"answer":1,"explain":["錯誤。10日並非本條之期限；股東提案受理公告期間才是不得少於10日。","正確。公司法第173條規定，董事會於股東請求提出後15日內不為召集之通知時，股東得報經主管機關許可，自行召集股東臨時會。","錯誤。30日是股東催告董事會或監察人行使短線交易歸入權之限期，非本條召集期限。","錯誤。60日是股東常會前停止過戶之閉鎖期日數，非董事會召集之回應期限。"],"src":"公司法第173條；研究筆記第10章"},{"id":"LAW-D-006","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":3,"q":"依公司法規定，公開發行股票之公司，於股東常會前停止股票過戶（閉鎖期）之日數為何？","options":["常會前30日","常會前15日","常會前5日","常會前60日"],"answer":3,"explain":["錯誤。30日是公開發行公司股東臨時會前之停止過戶日數，非常會。","錯誤。15日並非停止過戶之法定日數，易與臨時會通知期間混淆。","錯誤。5日是決定分派股息、紅利或其他利益之基準日前停止過戶之日數，非股東常會。","正確。公司法第165條規定，公開發行股票之公司於股東常會開會前60日內、股東臨時會開會前30日內，不得辦理股東名簿記載之變更（停止過戶）。"],"src":"公司法第165條；研究筆記第10章"},{"id":"LAW-D-007","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"上市（櫃）公司召開股東會，依規定應將下列何種方式列為股東行使表決權之方式之一？","options":["書面投票","電子方式","委託金融機構代理","公開喊價"],"answer":1,"explain":["錯誤。書面投票並非法規強制上市櫃公司必須採行之方式；法規強制者為電子方式。","正確。依公司法及主管機關規定，上市（櫃）公司應將電子方式列為股東行使表決權之方式之一，以便利股東參與。","錯誤。委託金融機構代理並非表決權行使方式之強制規定，委託書之使用另有委託書規則規範。","錯誤。股東會表決權行使並無公開喊價之方式，此為干擾選項。"],"src":"公司法第177條之1；研究筆記第10章"},{"id":"LAW-D-008","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"依公開發行公司出席股東會使用委託書規則，非屬徵求委託書之受託代理人，其代理股數不得超過已發行股份總數之多少？","options":["百分之一","百分之十","百分之五","百分之三"],"answer":3,"explain":["錯誤。百分之一是股東提案權之持股門檻，非受託代理人之代理上限。","錯誤。百分之十為內部人持股認定門檻，與受託代理人代理上限無關。","錯誤。百分之五是委託書徵求人原則須繼續6個月以上持有之股數基準（5萬股）所對應之概念，或大量持股申報門檻，非代理上限。","正確。依委託書規則，非屬徵求之受託代理人（一般受託代理）代理股數不得超過已發行股份總數之百分之三。"],"src":"公開發行公司出席股東會使用委託書規則；研究筆記第10章"},{"id":"LAW-D-009","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":3,"q":"依公開發行公司出席股東會使用委託書規則，委託書之徵求人原則上須為持有公司已發行股份達一定數額之股東，該持股條件為何？","options":["繼續3個月以上持有1萬股以上","繼續6個月以上持有1萬股以上","繼續1年以上持有10萬股以上","繼續6個月以上持有5萬股以上"],"answer":3,"explain":["錯誤。繼續3個月是開立信用交易帳戶之受託買賣帳戶期間條件，1萬股是內部人每日轉讓免申報之股數，皆非徵求人條件。","錯誤。持有期間6個月正確，但股數門檻為5萬股而非1萬股。","錯誤。持有期間為6個月而非1年，股數門檻亦非10萬股。","正確。依委託書規則，委託書徵求人原則上須為繼續6個月以上持有該公司已發行股份5萬股以上之股東（選任董監事之股東會另有較高門檻）。"],"src":"公開發行公司出席股東會使用委託書規則；研究筆記第10章"},{"id":"LAW-D-010","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"依證券交易法規定，公開發行股票之公司，其董事人數不得少於幾人？","options":["3人","5人","7人","9人"],"answer":1,"explain":["錯誤。3人是一般（非公開發行）股份有限公司公司法所定董事最低人數，非公開發行公司之標準。","正確。證券交易法第26條之3規定，已依本法發行股票之公司董事會，設置董事不得少於5人。","錯誤。7人並非法定最低董事人數，為干擾選項。","錯誤。9人並非法定最低董事人數，為干擾選項。"],"src":"證券交易法第26條之3；研究筆記第1章"},{"id":"LAW-D-011","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"依證券交易法規定，公開發行公司設置獨立董事者，其人數與比率之最低要求為何？","options":["至少1人，且不得少於董事席次1/5","至少2人，且不得少於董事席次1/3","至少3人，且不得少於董事席次1/4","至少2人，且不得少於董事席次1/5"],"answer":3,"explain":["錯誤。獨立董事人數下限為2人而非1人，比率下限1/5則正確。","錯誤。人數2人正確，但比率下限為1/5而非1/3。","錯誤。人數下限並非3人，比率下限亦非1/4；1/5才是正確比率。","正確。證券交易法第14條之2規定，公開發行公司設置獨立董事，人數不得少於2人，且不得少於董事席次之1/5。"],"src":"證券交易法第14條之2；研究筆記第1章"},{"id":"LAW-D-012","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"依證券交易法規定，公開發行公司設置審計委員會者，其成員之組成與人數要求為何？","options":["由過半數獨立董事組成，不得少於3人","由全體獨立董事組成，不得少於3人","由全體董事組成，不得少於5人","由獨立董事及監察人共同組成，不得少於3人"],"answer":1,"explain":["錯誤。審計委員會須由全體獨立董事組成，而非僅過半數獨立董事。","正確。證券交易法第14條之4規定，審計委員會應由全體獨立董事組成，人數不得少於3人，其中1人為召集人，且至少1人應具會計或財務專長。","錯誤。審計委員會由全體獨立董事組成，非全體董事，人數下限亦為3人非5人。","錯誤。審計委員會設置後取代監察人，故不含監察人，而是由全體獨立董事組成。"],"src":"證券交易法第14條之4；研究筆記第1章"},{"id":"LAW-D-013","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"依證券交易法及相關規則，公開發行公司實收資本額在新臺幣3億元以下者，全體董事所持有記名股票之股份總額，不得少於已發行股份總額之多少（未設審計委員會且未選任2人以上獨立董事之情形）？","options":["百分之十","百分之五","百分之七點五","百分之十五"],"answer":3,"explain":["錯誤。百分之十是實收資本額逾3億至10億元級距之全體董事持股成數，非3億元以下。","錯誤。百分之五是實收資本額逾20億至40億元級距之董事持股成數。","錯誤。百分之七點五是實收資本額逾10億至20億元級距之董事持股成數。","正確。依董事監察人股權成數及查核實施規則，實收資本額3億元以下者，全體董事持股成數為百分之十五（監察人為其1/10即百分之一點五）。"],"src":"公開發行公司董事監察人股權成數及查核實施規則第2條；研究筆記第7章"},{"id":"LAW-D-014","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"依公司法規定，公開發行股票之公司董事會決議停止過戶後決定分派股息紅利之基準日，其於基準日前停止股票過戶之日數為何？","options":["基準日前5日","基準日前15日","基準日前30日","基準日前60日"],"answer":0,"explain":["正確。公司法第165條規定，公司決定分派股息及紅利或其他利益之基準日前5日內，不得辦理股東名簿記載之變更（停止過戶）。","錯誤。15日並非分派基準日之停止過戶日數，為干擾選項。","錯誤。30日是股東臨時會前之停止過戶日數，非分派基準日。","錯誤。60日是股東常會前之停止過戶日數，非分派基準日。"],"src":"公司法第165條；研究筆記第10章"},{"id":"LAW-D-015","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":1,"q":"依公司法規定，公開發行公司股東會選舉董事，除章程另有規定外，應採用下列何種投票方式？","options":["普通多數決","全額連記法","累積投票制","逐一表決制"],"answer":2,"explain":["錯誤。董事選舉並非採普通多數決，而是以累積投票制保障少數股東。","錯誤。全額連記法是每股對每一席次均有一表決權，會使多數股東囊括全部席次，非現行公司法所採。","正確。公司法第198條規定，股東會選任董事時，每一股份有與應選出董事人數相同之選舉權，得集中選舉一人或分配選舉數人，由所得選票代表選舉權較多者當選（累積投票制）。","錯誤。逐一表決制並非公司法所定之董事選舉方法，為干擾選項。"],"src":"公司法第198條；研究筆記第10章"},{"id":"LAW-D-016","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"依公司法規定，公開發行公司董事缺額達董事總額多少比率時，應於60日內召開股東臨時會補選？","options":["三分之一","二分之一","四分之一","五分之一"],"answer":0,"explain":["正確。公司法第201條規定，董事缺額達1/3時，公開發行公司董事會應於60日內召開股東臨時會補選之（非公開發行公司為30日內）。","錯誤。二分之一並非補選門檻；缺額達1/3即應召開臨時會補選。","錯誤。四分之一並非補選門檻，為相近比率之干擾選項。","錯誤。五分之一是獨立董事席次比率下限，非董事缺額補選門檻。"],"src":"公司法第201條；研究筆記第10章"},{"id":"LAW-D-017","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"依公司法第172條之1股東提案權規定，股東所提議案以幾項為限，且字數不得超過多少字？","options":["以一項為限，300字以內","以二項為限，300字以內","以一項為限，500字以內","以三項為限，200字以內"],"answer":0,"explain":["正確。公司法第172條之1規定，股東所提議案以一項為限，提案超過一項者，均不列入議案；且提案字數以300字為限，超過部分不予列入。","錯誤。項數上限為一項而非二項，300字則正確。","錯誤。項數一項正確，但字數上限為300字而非500字。","錯誤。項數上限為一項而非三項，字數上限亦為300字而非200字。"],"src":"公司法第172條之1；研究筆記第10章"},{"id":"LAW-D-018","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":3,"q":"依公司法規定，繼續3個月以上持有已發行股份總數過半數股份之股東，得為召集股東臨時會之行為為何？","options":["須先請求董事會召集，董事會不召集始得自行召集","得報經主管機關許可後自行召集","得自行召集股東臨時會，無須經主管機關許可","僅得聲請法院選派檢查人"],"answer":2,"explain":["錯誤。此為公司法第173條（繼續1年以上持有3%）之程序；持有過半數股份達3個月者適用第173條之1，無須先請求董事會。","錯誤。持有過半數股份達3個月之股東（大同條款）得逕行自行召集，無須報經主管機關許可，此為與第173條之區別。","正確。公司法第173條之1（俗稱大同條款）規定，繼續3個月以上持有已發行股份總數過半數股份之股東，得自行召集股東臨時會，不受須先請求董事會或經主管機關許可之限制。","錯誤。聲請法院選派檢查人為公司法第245條之少數股東權，非本題所指之自行召集權。"],"src":"公司法第173條之1；研究筆記第10章"},{"id":"LAW-D-019","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":2,"q":"下列有關公開發行公司股東常會之敘述，何者正確？","options":["選任董事、變更章程等事項得以臨時動議提出","董事、監察人選舉一律採全額連記法","選任或解任董事、變更章程、公司減資等重大事項應在召集事由中列舉並說明主要內容，不得以臨時動議提出","股東常會得經董事會決議延期至年度終了後8個月內召開"],"answer":2,"explain":["錯誤。選任董事、變更章程等屬重大事項，應於召集事由列舉，不得以臨時動議提出。","錯誤。董事、監察人選舉採累積投票制而非全額連記法。","正確。公司法規定，選任或解任董事監察人、變更章程、減資、公司解散合併分割、申請停止公開發行等重大事項，應在召集事由中列舉並說明主要內容，不得以臨時動議提出。","錯誤。股東常會應於年度終了後6個月內召開且不得延期（證交法第36條排除公司法延期但書）。"],"src":"公司法第172條、第198條；證券交易法第36條；研究筆記第10章"},{"id":"LAW-D-020","exam":"gaoye-law","subject":"","topic":"公司法與股務","difficulty":3,"q":"依公司法關係企業專章規定，下列有關「控制與從屬公司」之敘述，何者正確？","options":["公司持有他公司有表決權之股份或出資額超過半數者，為控制公司","控制從屬關係僅以形式持股計算，不含直接或間接控制人事財務業務之情形","從屬公司對控制公司之投資不受任何限制","相互投資公司行使表決權完全不受限制"],"answer":0,"explain":["正確。公司法第369條之2規定，公司持有他公司有表決權之股份或出資額超過他公司已發行有表決權股份總數或資本總額半數者，為控制公司，該他公司為從屬公司。","錯誤。除形式過半持股外，直接或間接控制他公司之人事、財務或業務經營者亦構成控制公司（實質控制），並非僅以形式持股認定。","錯誤。從屬公司對控制公司之投資設有限制，並非全無限制。","錯誤。相互投資公司之表決權行使受有限制（相互投資達一定比率時表決權行使受限），並非完全不受限制。"],"src":"公司法第369條之2、第369條之10；研究筆記第10章關係企業專章"},{"id":"LAW-D-021","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"公開發行公司財務資訊及重大訊息之申報公開，主管機關指定之網際網路資訊揭露平台為下列何者？","options":["台灣證券交易所公司治理中心","證券櫃檯買賣中心債券資訊系統","公開資訊觀測站（MOPS）","金融監督管理委員會證期局網站"],"answer":2,"explain":["錯誤。公司治理中心並非法定財務及重大訊息之統一申報公開平台。","錯誤。債券資訊系統僅提供債券相關資訊，非公司財務及重大訊息之統一申報平台。","正確。公開發行公司之財務報告、重大訊息、內部控制聲明書、年報等，均應依規定於公開資訊觀測站（MOPS）申報公開，為統一資訊揭露平台。","錯誤。證期局網站非公司資訊申報之統一平台，公司之申報係透過公開資訊觀測站辦理。"],"src":"證券交易法第36條；公開發行公司資訊申報規定；研究筆記第6章"},{"id":"LAW-D-022","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"依證券交易法規定，發行公司發生對股東權益或證券價格有重大影響之事項時，應於事實發生之日起幾日內公告並向主管機關申報？","options":["2日內","5日內","10日內","15日內"],"answer":0,"explain":["正確。證券交易法第36條規定，發生對股東權益或證券價格有重大影響之事項，應於事實發生之日起2日內公告並向主管機關申報。","錯誤。5日並非重大事項之公告期限；5日內申報適用於股票設質等其他情形。","錯誤。10日是大量持股取得後之申報期限或每月營收之公告期限概念，非重大偶發事項。","錯誤。15日是私募價款繳納完成後報備查之期限，非重大事項公告期限。"],"src":"證券交易法第36條；研究筆記第6章"},{"id":"LAW-D-023","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"依證券交易法規定，公開發行公司之年度財務報告應於會計年度終了後多久內公告並向主管機關申報？其查核程度為何？","options":["3個月內，經會計師查核簽證","45日內，經會計師核閱","2個月內，經會計師查核簽證","4個月內，經會計師核閱"],"answer":0,"explain":["正確。年度財務報告應於會計年度終了後3個月內公告申報，並經會計師查核簽證、董事會通過及監察人（審計委員會）承認。","錯誤。45日內、經會計師核閱者為第1、2、3季之季報，非年度財務報告。","錯誤。年報期限為3個月而非2個月；查核簽證則正確。","錯誤。年報期限為3個月而非4個月，且年報應經查核簽證而非僅核閱。"],"src":"證券交易法第36條；研究筆記第6章"},{"id":"LAW-D-024","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"依證券交易法規定，公開發行公司之各季（第1、2、3季）財務報告應於每季終了後多久內公告申報？其查核程度為何？","options":["30日內，經會計師查核簽證","3個月內，經會計師查核簽證","2個月內，經會計師核閱","45日內，經會計師核閱"],"answer":3,"explain":["錯誤。季報期限為45日而非30日，且季報僅須核閱而非查核簽證。","錯誤。3個月內、經查核簽證者為年度財務報告，非季報。","錯誤。季報期限為45日而非2個月；核閱則正確。","正確。第1、2、3季財務報告應於每季終了後45日內（即5/15、8/14、11/14前）公告申報，並經會計師核閱。"],"src":"證券交易法第36條；研究筆記第6章"},{"id":"LAW-D-025","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"依證券交易法規定，公開發行公司應於每月幾日以前，公告並申報上月份之營運情形（營業收入）？","options":["次月5日前","次月10日前","次月15日前","次月月底前"],"answer":1,"explain":["錯誤。次月5日前是內部人向公司申報上月持股變動之期限，非公司公告月營收之期限。","正確。證券交易法第36條規定，公開發行公司應於每月10日以前，公告並申報上月份之營運情形（月營業收入）。","錯誤。次月15日前是公司彙總申報內部人持股之期限，非公告月營收之期限。","錯誤。次月月底前並非月營收之公告期限，正確為次月10日前。"],"src":"證券交易法第36條；研究筆記第6章"},{"id":"LAW-D-026","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":3,"q":"依公開收購公開發行公司有價證券管理辦法，任何人單獨或與他人共同預定於一定期間內取得公開發行公司已發行股份總額達一定比率以上者，應採公開收購方式為之。該「期間」與「比率」為何？","options":["30日內取得10%以上","50日內取得30%以上","60日內取得15%以上","50日內取得20%以上"],"answer":3,"explain":["錯誤。期間為50日而非30日，比率為20%而非10%；10%為舊制大量持股申報門檻。","錯誤。期間50日正確，但強制公開收購之比率門檻為20%而非30%。","錯誤。期間為50日而非60日，比率為20%而非15%。","正確。依公開收購辦法第11條，任何人單獨或與他人共同預定於50日內取得公開發行公司已發行股份總額20%以上者，應採公開收購方式為之（強制公開收購）。"],"src":"公開收購公開發行公司有價證券管理辦法第11條；研究筆記第8章"},{"id":"LAW-D-027","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"依公開收購公開發行公司有價證券管理辦法，公開收購有價證券之收購期間，應符合下列何項規定？","options":["不得少於10日、多於30日","不得少於20日、多於50日","不得少於30日、多於60日","不得少於15日、多於45日"],"answer":1,"explain":["錯誤。收購期間下限為20日、上限為50日，非10日至30日。","正確。依公開收購辦法第18條，公開收購之收購期間不得少於20日、多於50日；有正當理由得申報延長，延長期間合計不得超過50日。","錯誤。收購期間為20日至50日，非30日至60日。","錯誤。收購期間為20日至50日，非15日至45日。"],"src":"公開收購公開發行公司有價證券管理辦法第18條；研究筆記第8章"},{"id":"LAW-D-028","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":3,"q":"依證券交易法第43條之1第1項（113年5月10日施行新制），任何人單獨或與他人共同取得任一公開發行公司已發行股份總額超過多少比率時，應向主管機關申報並公告？","options":["超過百分之五","超過百分之十","超過百分之十五","超過百分之二十"],"answer":0,"explain":["正確。證券交易法第43條之1第1項於113年5月10日施行新制，將大量持股申報門檻由10%下修為超過百分之五，應於取得後10日內向主管機關申報並公告。","錯誤。超過百分之十為舊制門檻，113年5月10日新制施行後已下修為超過百分之五，舊答案已失效。","錯誤。百分之十五並非大量持股申報門檻，為干擾選項。","錯誤。百分之二十是強制公開收購之取得門檻，非大量持股申報門檻。"],"src":"證券交易法第43條之1第1項；研究筆記第8章"},{"id":"LAW-D-029","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"依證券交易法規定之短線交易歸入權，公司內部人對公司之上市（櫃）股票，於取得後多久內再行賣出，或賣出後同期間內再行買進，因而獲得利益者，公司得請求將其利益歸於公司？","options":["3個月","2年","1年","6個月"],"answer":3,"explain":["錯誤。3個月並非短線交易之認定期間；6個月才是。","錯誤。2年是歸入權請求權消滅時效（自獲得利益之日起2年），非短線交易之6個月認定期間。","錯誤。1年並非短線交易歸入權之期間，為干擾選項。","正確。證券交易法第157條規定，發行股票公司之董事、監察人、經理人或持股超過10%股東，對公司上市股票於取得後6個月內再行賣出，或賣出後6個月內再行買進，所得利益應歸於公司。"],"src":"證券交易法第157條；研究筆記第7章"},{"id":"LAW-D-030","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":3,"q":"依證券交易法第157條之1內線交易規定，內部人於獲悉有重大影響股票價格之消息，在該消息明確後、未公開前，或公開後多久內，不得對該公司之上市（櫃）股票買入或賣出？","options":["12小時內","18小時內","24小時內","48小時內"],"answer":1,"explain":["錯誤。沉澱期為公開後18小時內，非12小時。","正確。證券交易法第157條之1規定，內部人實際知悉發行公司有重大影響其股票價格之消息時，在該消息明確後、未公開前或公開後18小時內，不得自行或以他人名義買入或賣出。","錯誤。沉澱期為18小時而非24小時，為相近數字之干擾選項。","錯誤。沉澱期為18小時而非48小時，為干擾選項。"],"src":"證券交易法第157條之1；研究筆記第7章"},{"id":"LAW-D-031","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"依證券投資信託基金管理辦法及相關規定，證券投資信託基金之資產，應如何保管？","options":["由證券投資信託事業自行保管","存放於證券商之集中保管帳戶","委由基金保管機構（保管銀行）以基金專戶保管","由基金經理人個人名義開戶保管"],"answer":2,"explain":["錯誤。基金資產不得由投信事業自行保管，以達資產分離保護受益人之目的。","錯誤。基金資產並非存放於證券商之集中保管帳戶，而是由基金保管機構以專戶保管。","正確。證券投資信託基金之資產應委由獨立之基金保管機構（保管銀行）以基金專戶名義保管，與投信事業及保管機構之自有財產分離，保障受益人權益。","錯誤。基金資產不得以基金經理人個人名義開戶保管，須以基金專戶且由獨立保管機構保管。"],"src":"證券投資信託及顧問法；證券投資信託基金管理辦法；研究筆記第2章命題範圍"},{"id":"LAW-D-032","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"外國發行人來臺以其自身股票申請於我國證券市場掛牌交易者，一般稱為下列何者？","options":["台灣存託憑證（TDR）","第二上市（櫃）","第一上市（櫃）","興櫃股票"],"answer":2,"explain":["錯誤。台灣存託憑證（TDR）是以外國股票為基礎在臺發行之存託憑證，並非直接以原股掛牌。","錯誤。第二上市（櫃）指已在國外掛牌之外國企業再來臺掛牌其股票，並非首次掛牌。","正確。外國發行人以其原股（股票）直接來臺申請上市（櫃）掛牌交易者，稱為第一上市（櫃），為初次於我國掛牌之外國企業。","錯誤。興櫃股票為上市櫃前之交易階段，非外國發行人掛牌類型之專有名稱。"],"src":"外國發行人募集與發行有價證券處理準則；研究筆記第2章命題範圍"},{"id":"LAW-D-033","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"台灣存託憑證（TDR）之敘述，下列何者正確？","options":["TDR係由本國公司在國外發行之存託憑證","TDR之持有人不得請求兌回所表彰之外國有價證券","TDR係外國發行人委託存託機構在我國發行、表彰其外國有價證券之憑證","TDR僅得由專業投資機構持有"],"answer":2,"explain":["錯誤。TDR並非本國公司在國外發行；本國公司在海外發行者為海外存託憑證（GDR/ADR）。","錯誤。TDR持有人得依規定請求兌回（轉換）所表彰之外國有價證券，並非一律不得兌回。","正確。台灣存託憑證（TDR）係外國發行人委託存託機構在我國境內發行，用以表彰存放於保管機構之該外國有價證券（原股）之憑證。","錯誤。TDR得於我國證券市場交易並由一般投資人持有，並非僅限專業投資機構。"],"src":"外國發行人募集與發行有價證券處理準則；研究筆記第2章命題範圍"},{"id":"LAW-D-034","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"依公開發行公司建立內部控制制度處理準則，公開發行公司應每年出具下列何項文件，並於公開資訊觀測站辦理公告申報？","options":["內部控制制度聲明書","公司治理評鑑報告","企業社會責任報告書","財務預測資訊"],"answer":0,"explain":["正確。依內部控制制度處理準則，公開發行公司應每年由董事長、總經理及內部稽核主管等評估內部控制制度之有效性，並出具內部控制制度聲明書，於規定期限內公告申報。","錯誤。公司治理評鑑係由主管機關指定機構辦理之評比，非公司每年自行出具之聲明文件。","錯誤。企業社會責任報告書（永續報告書）雖部分公司須編製，但非內部控制制度處理準則所要求每年出具之聲明文件。","錯誤。財務預測資訊之公開有其專屬規範，並非內部控制制度處理準則所定每年應出具之聲明書。"],"src":"公開發行公司建立內部控制制度處理準則；研究筆記第2章命題範圍、第6章"},{"id":"LAW-D-035","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":3,"q":"依公開發行公司取得或處分資產處理準則，公司取得或處分不動產或其他固定資產，達一定重大性標準（例如交易金額達公司實收資本額20%或達一定金額以上）時，除依規定辦理外，通常應取得下列何者以資佐證交易價格之合理性？","options":["主管機關之核准函","證券交易所之核備文件","全體股東同意書","專業機構出具之估價報告或會計師意見"],"answer":3,"explain":["錯誤。取得或處分資產原則採事後公告申報，通常無須事前取得主管機關核准函。","錯誤。取得或處分資產係依準則規定公告申報，非以取得證券交易所核備文件為要件。","錯誤。取得或處分資產依金額大小分別由董事會或股東會決議，並非一律須全體股東同意。","正確。依取得或處分資產處理準則，交易金額達重大性標準時，應取得專業估價者出具之估價報告、或會計師、律師、證券承銷商等專家意見，以評估交易價格之合理性。"],"src":"公開發行公司取得或處分資產處理準則；研究筆記第2章命題範圍"},{"id":"LAW-D-036","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"依企業併購法及相關規定，關於公司併購時對股東權益之保護，下列敘述何者正確？","options":["併購案一律無須經股東會決議，董事會決議即可","公司合併時，消滅公司之股東一律不得取得存續公司之股份","對併購決議表示異議之股東，得請求公司按當時公平價格收買其股份（股份收買請求權）","併購後存續公司無須承受消滅公司之權利義務"],"answer":2,"explain":["錯誤。重大併購（如合併）原則上須經股東會特別決議，並非一律僅董事會決議即可。","錯誤。公司合併時，消滅公司之股東通常換發存續（新設）公司之股份或取得現金等對價，並非一律不得取得存續公司股份。","正確。依企業併購法，對併購決議表示異議並依法定程序放棄表決權之股東，得請求公司按決議日當時公平價格收買其持有之股份（股份收買請求權），以保護不同意併購之股東。","錯誤。公司合併後，存續或新設公司應概括承受消滅公司之全部權利義務，並非無須承受。"],"src":"企業併購法（股份收買請求權、概括承受）；研究筆記第2章命題範圍"},{"id":"LAW-D-037","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":1,"q":"依公司治理相關規範，上市（櫃）公司揭露永續（ESG）資訊，主要係透過下列何種報告或管道？","options":["公開說明書","永續報告書（ESG報告書）並於公開資訊觀測站公告","融資融券餘額表","證券商財務報告"],"answer":1,"explain":["錯誤。公開說明書主要用於募集發行有價證券時之資訊揭露，非ESG資訊之經常性揭露管道。","正確。依主管機關及證交所（櫃買）之規範，一定條件之上市櫃公司應編製永續報告書（ESG報告書），揭露環境、社會及公司治理資訊，並於公開資訊觀測站公告。","錯誤。融資融券餘額表為信用交易統計資訊，與ESG資訊揭露無關。","錯誤。證券商財務報告為證券商自身之財務揭露，非上市櫃公司ESG資訊之揭露管道。"],"src":"公司治理守則；上市櫃公司永續發展行動方案；研究筆記第2章命題範圍"},{"id":"LAW-D-038","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"依公開收購公開發行公司有價證券管理辦法，公開收購人於開始公開收購後，原則上之行為限制，下列敘述何者正確？","options":["得隨時任意停止公開收購","公開收購期間得另行以其他方式購買同種類之有價證券","除有法定事由並經主管機關核准外不得停止公開收購，且不得於收購期間另行購買同種類之有價證券","公開收購無須向主管機關申報，逕行公告即可"],"answer":2,"explain":["錯誤。公開收購開始後不得任意停止，須有法定事由並經核准，以保護應賣人權益。","錯誤。公開收購人於收購期間不得於集中市場或其他方式另行購買同種類之有價證券，以維持收購之公平。","正確。依公開收購辦法，公開收購開始後除有法定事由並經主管機關核准外不得停止；且公開收購人於收購期間不得另行以公開收購以外之方式購買同種類之有價證券。","錯誤。公開收購應向主管機關（金管會）申報並公告後始得為之，並非逕行公告即可。"],"src":"公開收購公開發行公司有價證券管理辦法；研究筆記第8章"},{"id":"LAW-D-039","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"依證券交易法規定，違反內線交易規定情節重大者，法院得就投資人所受損害額，酌量將賠償金額提高至多少倍？","options":["2倍","10倍","5倍","3倍"],"answer":3,"explain":["錯誤。加重倍數上限為3倍而非2倍。","錯誤。加重上限為3倍而非10倍，為干擾選項。","錯誤。損害賠償額之加重上限為3倍，非5倍；5倍是與其他罰金區間相近之干擾。","正確。證券交易法第157條之1規定，內線交易對善意從事相反買賣之人負損害賠償責任，其情節重大者，法院得依善意從事相反買賣之人之請求，將賠償額提高至3倍；情節輕微者得減至2分之1。"],"src":"證券交易法第157條之1；研究筆記第7章"},{"id":"LAW-D-040","exam":"gaoye-law","subject":"","topic":"證券相關子法與實務","difficulty":2,"q":"依證券投資人及期貨交易人保護法，證券商因財務困難違約而未能履行交割義務時，保護基金對於每一投資人之償付上限為新臺幣多少？","options":["100萬元","120萬元","150萬元","200萬元"],"answer":1,"explain":["錯誤。償付上限為120萬元而非100萬元。","正確。依證券投資人及期貨交易人保護法及保護基金償付作業辦法，證券商違約時，保護基金對每一投資人之償付上限為新臺幣120萬元。","錯誤。償付上限為120萬元而非150萬元，為相近數字之干擾。","錯誤。償付上限為120萬元而非200萬元；20人以上始得提起團體訴訟，勿與償付金額混淆。"],"src":"證券投資人及期貨交易人保護法；研究筆記第12章"}]};
</script>
<script>
(function(){
'use strict';
var META=window.__META__, BANK=window.__BANK__;
